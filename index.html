const Input = {
  keys:{}, pressed:{}, released:{},
  init(){
    window.addEventListener('keydown', e=>{
      if(!this.keys[e.code]) this.pressed[e.code]=true;
      this.keys[e.code]=true;
      const game=['Space','KeyW','KeyS','KeyA','KeyD','KeyJ','KeyK','KeyE','KeyF',
                  'ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Escape','Tab','KeyR','KeyT'];
      if(game.includes(e.code)) e.preventDefault();
    });
    window.addEventListener('keyup', e=>{ this.keys[e.code]=false; this.released[e.code]=true; });
  },
  clear(){ this.pressed={}; this.released={}; },
  down(c){ return !!this.keys[c]; },
  just(c){ return !!this.pressed[c]; },
  anyKey(){ return Object.keys(this.pressed).length > 0; },
};

ctx.imageSmoothingEnabled = false;

const R = {
  rect(x,y,w,h,c)          { ctx.fillStyle=c; ctx.fillRect(x,y,w,h); },
  rectA(x,y,w,h,c,a)       { ctx.globalAlpha=a; ctx.fillStyle=c; ctx.fillRect(x,y,w,h); ctx.globalAlpha=1; },
  // pixel dot (2×2 block) — used for minimap dots
  dot(x,y,c)                { ctx.fillStyle=c; ctx.fillRect(x-1,y-1,3,3); },
  text(t,x,y,c,sz=14,align='left'){
    ctx.fillStyle=c; ctx.font=`${sz}px monospace`;
    ctx.textAlign=align; ctx.textBaseline='alphabetic'; ctx.fillText(t,x,y);
  },
  bold(t,x,y,c,sz=14,align='left'){
    ctx.fillStyle=c; ctx.font=`bold ${sz}px monospace`;
    ctx.textAlign=align; ctx.textBaseline='alphabetic'; ctx.fillText(t,x,y);
  },
  shadow(t,x,y,c,sc,sz=16,align='center'){
    ctx.font=`bold ${sz}px monospace`; ctx.textAlign=align; ctx.textBaseline='alphabetic';
    ctx.fillStyle=sc; ctx.fillText(t,x+2,y+2);
    ctx.fillStyle=c;  ctx.fillText(t,x,y);
  },
  // GBC-style bar: thick 2px black border, flat fill, 1px top highlight
  bar(x,y,w,h,cur,max,fill,bg='#111'){
    ctx.fillStyle='#000'; ctx.fillRect(x-2,y-2,w+4,h+4);
    ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
    const fw=Math.max(0,(cur/max)*w)|0;
    ctx.fillStyle=fill; ctx.fillRect(x,y,fw,h);
    ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(x,y,fw,1);
  },
  // GBC-style panel: solid black border, flat dark bg
  panel(x,y,w,h,bg='#0a0a0a'){
    ctx.fillStyle='#000'; ctx.fillRect(x-2,y-2,w+4,h+4);
    ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
  },
  // Stepped pixel vignette — no gradients
  vignette(){
    const S=SCREEN_W, H=SCREEN_H;
    ctx.fillStyle='rgba(0,0,0,0.60)'; ctx.fillRect(0,0,S,16); ctx.fillRect(0,H-16,S,16);
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(0,16,S,10); ctx.fillRect(0,H-26,S,10);
    ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,26,S,10); ctx.fillRect(0,H-36,S,10);
    ctx.fillStyle='rgba(0,0,0,0.60)'; ctx.fillRect(0,0,16,H); ctx.fillRect(S-16,0,16,H);
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(16,0,10,H); ctx.fillRect(S-26,0,10,H);
  },
};

// CRT scanline overlay — drawn last each frame
function drawScanlines(){
  ctx.globalAlpha=0.09;
  ctx.fillStyle='#000';
  for(let y=0;y<SCREEN_H;y+=2) ctx.fillRect(0,y,SCREEN_W,1);
  ctx.globalAlpha=1;
}

// ============================================================
// SCREEN FX — shake & flash
// ============================================================
const ScreenFX = {
  sx:0, sy:0,                 // current shake offset
  shakeMag:0, shakeTimer:0,
  flashAlpha:0, flashColor:'#fff', flashTimer:0, flashDur:0.3,

  shake(mag=6, dur=0.22){ this.shakeMag=mag; this.shakeTimer=dur; },
  flash(color='#fff', alpha=0.35, dur=0.25){
    this.flashColor=color; this.flashAlpha=alpha; this.flashTimer=dur; this.flashDur=dur;
  },

  update(dt){
    if(this.shakeTimer>0){
      this.shakeTimer-=dt;
      const t=Math.max(0,this.shakeTimer/0.22);
      this.sx=(Math.random()-0.5)*this.shakeMag*t*2;
      this.sy=(Math.random()-0.5)*this.shakeMag*t*2;
    } else { this.sx=0; this.sy=0; }
    if(this.flashTimer>0) this.flashTimer-=dt;
  },

  apply()  { ctx.save(); ctx.translate(this.sx, this.sy); ctx.imageSmoothingEnabled=false; },
  restore(){ ctx.restore(); ctx.imageSmoothingEnabled=false; },

  drawFlash(){
    if(this.flashTimer<=0) return;
    const a=(this.flashTimer/this.flashDur)*this.flashAlpha;
    ctx.fillStyle=this.flashColor; ctx.globalAlpha=a;
    ctx.fillRect(0,0,SCREEN_W,SCREEN_H); ctx.globalAlpha=1;
  },
};

// ============================================================
// FLOATING DAMAGE NUMBERS
// ============================================================
const DmgNums = {
  _list:[],

  add(x, y, val, color='#FFD060', big=false){
    this._list.push({
      x, y, vy:-55-Math.random()*30, vx:(Math.random()-0.5)*28,
      val: big ? val : val,
      color, sz: big?20:13,
      life: big?1.2:0.75, max: big?1.2:0.75,
    });
  },

  update(dt){
    for(let i=this._list.length-1;i>=0;i--){
      const n=this._list[i];
      n.x+=n.vx*dt; n.y+=n.vy*dt; n.vy+=40*dt;
      n.life-=dt;
      if(n.life<=0) this._list.splice(i,1);
    }
  },

  draw(cx,cy){
    for(const n of this._list){
      const a=Math.min(1,(n.life/n.max)*2);
      ctx.globalAlpha=a;
      ctx.font=`bold ${n.sz}px monospace`; ctx.textAlign='center';
      ctx.fillStyle='#000000'; ctx.fillText(n.val,n.x-cx+1,n.y-cy+1);
      ctx.fillStyle=n.color;  ctx.fillText(n.val,n.x-cx,n.y-cy);
    }
    ctx.globalAlpha=1;
  },
};

  _sum(key){ let v=0; for(const id of Object.values(GS.player.equipment)) if(id) v+=EQUIPMENT_ITEMS[id].bonuses[key]||0; return v; },
  damage()    { return this._sum('damage');   },

  maxHP()     { return PLAYER_CONFIG.maxHP     + this._sum('hp');      },
  maxStamina(){ return PLAYER_CONFIG.maxStamina + this._sum('stamina'); },
};

// ============================================================
// WORLD / MAP
// ============================================================
const World = {
  map:[],

  generate(){
    // Fill entire world with impassable void
    for(let y=0;y<WORLD_H;y++){ this.map[y]=[]; for(let x=0;x<WORLD_W;x++) this.map[y][x]=T.WALL; }
    // Carve zones in order (later calls overwrite earlier for overlaps)
    this._ruins();
    this._forest();
    this._village();
    this._castle();
    this._graveyard();
    this._bossArena();
    this._connectors();
    this._waterAndBridge();
    // Fog gate at end of castle central corridor
    for(let fx=127;fx<=131;fx++){
      this._set(fx,164,T.FOG_GATE); this._set(fx,165,T.FOG_GATE); this._set(fx,166,T.FOG_GATE);
    }
    this._border();
    GS.tileMap=this.map;
  },

  _set(tx,ty,tile){ if(tx>=0&&tx<WORLD_W&&ty>=0&&ty<WORLD_H) this.map[ty][tx]=tile; },
  _fill(tx,ty,tw,th,tile){ for(let dy=0;dy<th;dy++) for(let dx=0;dx<tw;dx++) this._set(tx+dx,ty+dy,tile); },

  // Carve through any impassable tile — used for corridors
  _carve(tx,ty,tw,th,floor){
    for(let dy=0;dy<th;dy++) for(let dx=0;dx<tw;dx++){
      const t=this.map[ty+dy][tx+dx];
      if(t===T.WALL||t===T.RUINS_WALL||t===T.FOREST_TREE||t===T.CASTLE_WALL)
        this._set(tx+dx,ty+dy,floor);
    }
  },

  _ruins(){
    const b=ZONES.RUINS.bounds; // x:5 y:38 w:70 h:64
    this._fill(b.x,b.y,b.w,b.h,T.RUINS_FLOOR);

    // Irregular western cliff edge (stepped, not a straight wall)
    for(let ty=b.y;ty<b.y+b.h;ty++){
      const d=1+((ty*13+7)%5);
      for(let i=0;i<d;i++) this._set(b.x+i,ty,T.WALL);
    }

    // Wall clusters forming interconnected rooms
    // (coords relative to b.x, b.y)
    const walls=[
      // North row
      [7,1,5,3],[15,2,4,4],[24,1,5,3],[34,2,4,4],[43,1,5,3],[53,2,4,4],[61,1,5,3],
      // Row 2
      [8,7,4,3],[17,8,3,3],[27,7,4,3],[37,8,3,3],[47,7,4,3],[56,8,3,3],[62,7,4,3],
      // Row 3
      [7,13,3,3],[18,13,4,3],[29,12,5,3],[39,13,3,3],[49,12,4,3],[58,13,3,3],
      // Row 4
      [8,19,4,2],[19,19,3,3],[28,18,5,2],[38,19,4,2],[48,18,3,3],[57,19,4,2],[63,18,3,3],
      // Row 5
      [7,24,3,3],[17,24,4,3],[27,23,3,3],[36,24,4,2],[46,23,5,3],[56,24,3,3],[62,23,4,3],
      // Row 6

    for(const[wx,wy,ww,wh] of walls) this._fill(b.x+wx,b.y+wy,ww,wh,T.RUINS_WALL);

  _forest(){

    this._fill(b.x,b.y,b.w,b.h,T.FOREST_TREE);
    const lf=(tx,ty,tw,th)=>this._fill(b.x+tx,b.y+ty,tw,th,T.FOREST_FLOOR);

  _village(){
    const b=ZONES.VILLAGE.bounds; // x:170 y:5 w:70 h:75
    this._fill(b.x,b.y,b.w,b.h,T.VILLAGE_FLOOR);

    // Irregular natural eastern border
    for(let ty=b.y;ty<b.y+b.h;ty++){
      const d=1+((ty*11+5)%4);
      for(let i=0;i<d;i++) this._set(b.x+b.w-1-i,ty,T.WALL);
    }
    // Irregular southern border
    for(let tx=b.x;tx<b.x+b.w;tx++){
      const d=1+((tx*7+3)%4);
      for(let i=0;i<d;i++) this._set(tx,b.y+b.h-1-i,T.WALL);
    }

    // Building 1 — Inn:  tx=173-183, ty=8-15 (11×8)
    for(let dx=0;dx<11;dx++) for(let dy=0;dy<8;dy++){
      const tx=173+dx, ty=8+dy;
      const door=(dx>=4&&dx<=6&&dy===7);
      if((dx===0||dx===10||dy===0||dy===7)&&!door) this._set(tx,ty,T.VILLAGE_WALL);
    }
    // Building 2 — House: tx=186-194, ty=7-13 (9×7)
    for(let dx=0;dx<9;dx++) for(let dy=0;dy<7;dy++){
      const tx=186+dx, ty=7+dy;
      const door=(dx>=3&&dx<=5&&dy===6);
      if((dx===0||dx===8||dy===0||dy===6)&&!door) this._set(tx,ty,T.VILLAGE_WALL);
    }
    // Building 3 — Forge: tx=200-209, ty=9-16 (10×8)
    for(let dx=0;dx<10;dx++) for(let dy=0;dy<8;dy++){
      const tx=200+dx, ty=9+dy;
      const door=(dx>=3&&dx<=5&&dy===7);
      if((dx===0||dx===9||dy===0||dy===7)&&!door) this._set(tx,ty,T.VILLAGE_WALL);
    }
    // Building 4 — Church: tx=179-192, ty=38-49 (14×12)
    for(let dx=0;dx<14;dx++) for(let dy=0;dy<12;dy++){
      const tx=179+dx, ty=38+dy;
      const door=(dx>=5&&dx<=8&&dy===11);
      if((dx===0||dx===13||dy===0||dy===11)&&!door) this._set(tx,ty,T.VILLAGE_WALL);
    }

    // Village well — 2×2 block near center square
    this._fill(200,44,2,2,T.VILLAGE_WALL);

    // Low decorative fences along the main path (single-tile thick)
    for(let tx=175;tx<=186;tx++) this._set(tx,22,T.VILLAGE_WALL); // north fence
    for(let tx=175;tx<=186;tx++) this._set(tx,35,T.VILLAGE_WALL); // south fence
    // Open gate gap in fences
    for(let tx=179;tx<=182;tx++){ this._set(tx,22,T.VILLAGE_FLOOR); this._set(tx,35,T.VILLAGE_FLOOR); }
  },

  _castle(){
    const b=ZONES.CASTLE.bounds; // x:18 y:112 w:202 h:58
    this._fill(b.x,b.y,b.w,b.h,T.CASTLE_FLOOR);

    // Crenellated ramparts on all four sides
    for(let x=b.x;x<b.x+b.w;x++){
      if(Math.floor((x-b.x)/6)%3!==1){
        this._set(x,b.y,T.CASTLE_WALL); this._set(x,b.y+b.h-1,T.CASTLE_WALL);
      }
    }
    for(let y=b.y;y<b.y+b.h;y++){
      if(Math.floor((y-b.y)/5)%3!==1){
        this._set(b.x,y,T.CASTLE_WALL); this._set(b.x+b.w-1,y,T.CASTLE_WALL);
      }
    }

    // Interior structural walls with gate openings
    const walls=[
      // Three east-west dividers
      [8,10,38,2],[60,10,38,2],[112,10,38,2],[163,10,32,2],
      [8,24,38,2],[60,24,38,2],[112,24,38,2],[163,24,32,2],
      [8,38,38,2],[60,38,38,2],[112,38,38,2],[163,38,32,2],
      // North-south pillars with gate gaps
      [22,4,2,16],[22,24,2,16],[22,42,2,14],
      [48,4,2,12],[48,18,2,12],[48,34,2,12],[48,48,2,8],
      [82,4,2,16],[82,24,2,16],[82,42,2,14],
      [112,4,2,12],[112,18,2,12],[112,34,2,12],[112,48,2,8],
      [148,4,2,16],[148,24,2,16],[148,42,2,14],
      [175,4,2,12],[175,18,2,12],[175,34,2,12],[175,48,2,8],
    ];
    for(const[wx,wy,ww,wh] of walls) this._fill(b.x+wx,b.y+wy,ww,wh,T.CASTLE_WALL);

    // Central corridor leading to fog gate (x=125-133, full height)
    for(let y=b.y;y<b.y+b.h;y++)
      for(let x=125;x<=133;x++) this._set(x,y,T.CASTLE_FLOOR);
  },

  _graveyard(){
    // Graveyard occupies northwest castle corner
    const gx=23, gy=117, gw=48, gh=44;
    this._fill(gx,gy,gw,gh,T.GRAVEYARD_FLOOR);

    // Stone fence (CASTLE_WALL border) with two gate openings
    for(let x=gx;x<gx+gw;x++){
      const southGate=(x>=37&&x<=40);
      this._set(x,gy,T.CASTLE_WALL);
      if(!southGate) this._set(x,gy+gh-1,T.CASTLE_WALL);
    }
    for(let y=gy;y<gy+gh;y++){
      const eastGate=(y>=140&&y<=143);
      this._set(gx,y,T.CASTLE_WALL);
      if(!eastGate) this._set(gx+gw-1,y,T.CASTLE_WALL);
    }

    // Grave markers — rows of 2×3 headstones
    const graves=[
      [2,4],[8,4],[14,4],[20,4],[27,4],[33,4],[39,4],
      [2,11],[8,11],[14,11],[20,11],[27,11],[33,11],[39,11],
      [2,18],[8,18],[14,18],[20,18],[27,18],[33,18],[39,18],
      [2,26],[8,26],[14,26],[20,26],[27,26],[33,26],
      [2,33],[8,33],[14,33],[20,33],[27,33],[33,33],
    ];

      const ax=gx+gvx, ay=gy+gvy;
      this._set(ax,ay,T.CASTLE_WALL);     this._set(ax+1,ay,T.CASTLE_WALL);
      this._set(ax,ay+1,T.CASTLE_WALL);   this._set(ax+1,ay+1,T.CASTLE_WALL);

    }

  _bossArena(){
    const b=ZONES.BOSS_ARENA.bounds; // x:108 y:168 w:44 h:29
    this._fill(b.x,b.y,b.w,b.h,T.CASTLE_WALL);
    const cx=b.x+b.w/2, cy=b.y+b.h/2, r=b.w/2-2;
    for(let y=b.y;y<b.y+b.h;y++) for(let x=b.x;x<b.x+b.w;x++)
      if(Math.hypot(x-cx,y-cy)<r) this._set(x,y,T.BOSS_FLOOR);
    // Entrance from fog gate corridor
    for(let fy=b.y;fy<=b.y+2;fy++){
      this._set(128,fy,T.BOSS_FLOOR); this._set(129,fy,T.BOSS_FLOOR); this._set(130,fy,T.BOSS_FLOOR);
    }
  },

  _connectors(){
    // 1. Ruins ↔ Forest — eastern corridor x=67-77, y=55-102
    this._carve(67,55,10,47,T.RUINS_FLOOR);
    // Forest entry side (y=55-94)
    for(let cy=55;cy<=94;cy++) for(let cx=70;cx<=77;cx++) this._set(cx,cy,T.FOREST_FLOOR);

    // 2. Forest ↔ Castle — south corridor x=128-140, y=90-115
    this._carve(128,90,12,26,T.FOREST_FLOOR);
    // Castle-side floor
    for(let cy=112;cy<=117;cy++) for(let cx=128;cx<=140;cx++) this._set(cx,cy,T.CASTLE_FLOOR);

    // 3. Forest ↔ Village — east passage x=166-173, y=22-50
    this._carve(166,22,10,30,T.FOREST_FLOOR);
    for(let cy=22;cy<=50;cy++) for(let cx=170;cx<=175;cx++) this._set(cx,cy,T.VILLAGE_FLOOR);

    // 4. Ruins south approach to bridge x=46-54, y=96-103
    this._carve(46,96,10,8,T.RUINS_FLOOR);

    // 5. Castle north from bridge x=46-54, y=112-120
    for(let cy=112;cy<=120;cy++) for(let cx=46;cx<=54;cx++) this._set(cx,cy,T.CASTLE_FLOOR);

    // 6. Ruined bridge approach from forest side x=36-48, y=95-103
    this._carve(36,95,14,9,T.FOREST_FLOOR);
  },

  _waterAndBridge(){
    // River strip between ruins/forest and castle
    for(let cy=103;cy<=113;cy++) for(let cx=18;cx<=220;cx++) this._set(cx,cy,T.WATER);
    // Ruins bridge — 8 tiles wide, stone walkway
    for(let cy=103;cy<=113;cy++) for(let cx=46;cx<=54;cx++) this._set(cx,cy,T.RUINS_FLOOR);
    // Bridge guard rails (wall blocks flanking bridge)
    for(let cy=103;cy<=113;cy++){
      this._set(45,cy,T.RUINS_WALL); this._set(55,cy,T.RUINS_WALL);
    }
    // Forest side: secondary crossing near castle connector — stepping stones
    for(let cy=103;cy<=113;cy++) for(let cx=130;cx<=138;cx++) this._set(cx,cy,T.FOREST_FLOOR);
  },

  _border(){
    for(let x=0;x<WORLD_W;x++){ this.map[0][x]=T.WALL; this.map[WORLD_H-1][x]=T.WALL; }
    for(let y=0;y<WORLD_H;y++){ this.map[y][0]=T.WALL; this.map[y][WORLD_W-1]=T.WALL; }
  },

  tile(wx,wy){
    const tx=wx/TILE_SIZE|0, ty=wy/TILE_SIZE|0;
    if(tx<0||ty<0||tx>=WORLD_W||ty>=WORLD_H) return T.WALL;
    return this.map[ty][tx];
  },

  passable(t){
    return t!==T.WALL&&t!==T.RUINS_WALL&&t!==T.FOREST_TREE&&
           t!==T.CASTLE_WALL&&t!==T.WATER&&t!==T.VILLAGE_WALL;
  },

  canMove(wx,wy,r){
    const pts=[[-r,-r],[r,-r],[-r,r],[r,r],[0,-r],[0,r],[-r,0],[r,0]];
    for(const[ox,oy] of pts) if(!this.passable(this.tile(wx+ox,wy+oy))) return false;
    return true;
  },

  zoneAt(wx,wy){
    const tx=wx/TILE_SIZE, ty=wy/TILE_SIZE;
    const order=['BOSS_ARENA','VILLAGE','FOREST','RUINS','CASTLE'];
    for(const id of order){
      const b=ZONES[id].bounds;
      if(tx>=b.x&&tx<b.x+b.w&&ty>=b.y&&ty<b.y+b.h) return id;
    }
    return 'RUINS';
  },

  draw(cx,cy){
    const tx0=Math.max(0,(cx/TILE_SIZE)|0),    ty0=Math.max(0,(cy/TILE_SIZE)|0);
    const tx1=Math.min(WORLD_W,Math.ceil((cx+SCREEN_W)/TILE_SIZE)+1);
    const ty1=Math.min(WORLD_H,Math.ceil((cy+SCREEN_H)/TILE_SIZE)+1);
    const now=Date.now();
    for(let ty=ty0;ty<ty1;ty++) for(let tx=tx0;tx<tx1;tx++){
      const sx=tx*TILE_SIZE-cx, sy=ty*TILE_SIZE-cy;
      this._drawTile(this.map[ty][tx],sx,sy,tx,ty,now);
    }
  },

  _drawTile(tile,sx,sy,tx,ty,now){
    // Terraria-style: chunky tiles, bright earthy palette, strong edge shadows, pixel texture
    const S=TILE_SIZE; // 32px
    switch(tile){

      // ---- Generic void / impassable ----
      case T.FLOOR:
        ctx.fillStyle='#1a1612'; ctx.fillRect(sx,sy,S,S);
        break;
      case T.WALL:
        // Deep void — very dark, barely visible
        ctx.fillStyle='#080808'; ctx.fillRect(sx,sy,S,S);
        break;

      // ---- Crumbling Ruins — sandy tan stone with warm cracks ----
      case T.RUINS_FLOOR:{
        const base=((tx+ty)%2===0)?'#7a6840':'#8a7448';
        ctx.fillStyle=base; ctx.fillRect(sx,sy,S,S);
        // Edge shadow (depth illusion — Terraria style)
        ctx.fillStyle='rgba(0,0,0,0.22)';
        ctx.fillRect(sx,sy,S,2); ctx.fillRect(sx,sy,2,S);
        // Stone tile grid
        ctx.fillStyle='rgba(0,0,0,0.18)';
        ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        ctx.fillRect(sx,sy+16,S,1); ctx.fillRect(sx+16,sy,1,S);
        // Bright face highlight top-left
        ctx.fillStyle='rgba(255,240,200,0.12)';
        ctx.fillRect(sx+2,sy+2,14,1); ctx.fillRect(sx+2,sy+2,1,6);
        // Random crack detail
        if((tx*7+ty*3)%11===0){
          ctx.fillStyle='#503a28';
          ctx.fillRect(sx+8,sy+10,1,8); ctx.fillRect(sx+9,sy+16,4,1);
        }
        if((tx*3+ty*9)%17===0){
          ctx.fillStyle='#503a28';
          ctx.fillRect(sx+18,sy+6,1,6); ctx.fillRect(sx+14,sy+10,5,1);
        }
        break;}
      case T.RUINS_WALL:{
        // Warm tan ashlar blocks — Terraria brick look
        ctx.fillStyle='#604830'; ctx.fillRect(sx,sy,S,S);
        // Mortar lines (dark)
        ctx.fillStyle='#3a2818';
        ctx.fillRect(sx,sy,S,2); ctx.fillRect(sx,sy+14,S,2); ctx.fillRect(sx,sy+28,S,2);
        // Brick rows (offset every other row)
        const off=((ty%2)===0)?0:8;
        ctx.fillStyle='#7a6040';
        ctx.fillRect(sx+off+2, sy+2,  12,10);
        ctx.fillRect(sx+off+18,sy+2,  10,10);
        ctx.fillRect(sx+off+2, sy+16, 14,10);
        ctx.fillRect(sx+off+20,sy+16,  8,10);
        // Highlight each brick top
        ctx.fillStyle='#9a8060';
        ctx.fillRect(sx+off+2, sy+2,  12,1);
        ctx.fillRect(sx+off+18,sy+2,  10,1);
        ctx.fillRect(sx+off+2, sy+16, 14,1);
        ctx.fillRect(sx+off+20,sy+16,  8,1);
        // Deep shadow bottom
        ctx.fillStyle='rgba(0,0,0,0.35)';
        ctx.fillRect(sx,sy+28,S,4);
        break;}

      // ---- Darkroot Forest — bright Terraria green grass / tree ----
      case T.FOREST_FLOOR:{
        // Vivid grass — Terraria forest floor
        const g=((tx+ty)%3===0)?'#3a8020':'#2e7018';
        ctx.fillStyle=g; ctx.fillRect(sx,sy,S,S);
        // Dirt undertone at bottom
        ctx.fillStyle='#5a3e18'; ctx.fillRect(sx,sy+22,S,10);
        // Edge shading
        ctx.fillStyle='rgba(0,0,0,0.20)';
        ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        // Grass blades (small upward rects)
        if((tx*5+ty*7)%7===0){
          ctx.fillStyle='#58b030';
          ctx.fillRect(sx+4, sy+14,2,8);
          ctx.fillRect(sx+10,sy+10,2,10);
          ctx.fillRect(sx+20,sy+16,2,6);
          ctx.fillRect(sx+26,sy+12,2,8);
        }
        if((tx*11+ty*3)%9===0){
          ctx.fillStyle='#4aa028';
          ctx.fillRect(sx+14,sy+12,2,9);
          ctx.fillRect(sx+22,sy+14,2,7);
        }
        // Top highlight
        ctx.fillStyle='rgba(120,220,80,0.14)';
        ctx.fillRect(sx+2,sy+14,S-4,1);
        break;}
      case T.FOREST_TREE:{
        // Dark undergrowth base
        ctx.fillStyle='#1a2a10'; ctx.fillRect(sx,sy,S,S);
        // Trunk — warm brown, chunky
        ctx.fillStyle='#6a3a10'; ctx.fillRect(sx+11,sy+16,10,16);
        ctx.fillStyle='#8a5020'; ctx.fillRect(sx+12,sy+16,6,14); // highlight face
        ctx.fillStyle='#3a1a08'; ctx.fillRect(sx+11,sy+28,10,4); // root shadow
        // Canopy — stacked rectangular pixel blocks (Terraria style)
        // Bottom layer (wide, dark green)
        ctx.fillStyle='#1a5010'; ctx.fillRect(sx+2,sy+10,28,14);
        // Mid layer
        ctx.fillStyle='#226814'; ctx.fillRect(sx+4,sy+6,24,10);
        // Upper layer
        ctx.fillStyle='#2a8018'; ctx.fillRect(sx+6,sy+2,20,8);
        // Top peak
        ctx.fillStyle='#38a020'; ctx.fillRect(sx+10,sy+0,12,4);
        // Leaf highlight (bright pixels on top-left of each layer)
        ctx.fillStyle='#50c830';
        ctx.fillRect(sx+4, sy+6,  4,2);
        ctx.fillRect(sx+8, sy+2,  4,2);
        ctx.fillRect(sx+4, sy+10, 6,1);
        // Shadow underside of canopy
        ctx.fillStyle='rgba(0,0,0,0.30)';
        ctx.fillRect(sx+2,sy+22,28,3);
        break;}

      // ---- Castle Approach — cool dark gray flagstone ----
      case T.CASTLE_FLOOR:{
        const c=((tx+ty)%2===0)?'#363636':'#303030';
        ctx.fillStyle=c; ctx.fillRect(sx,sy,S,S);
        // Flagstone grid
        ctx.fillStyle='#1e1e1e';
        ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        ctx.fillRect(sx,sy+16,S,1); ctx.fillRect(sx+16,sy,1,S);
        // Edge shadow
        ctx.fillStyle='rgba(0,0,0,0.25)';
        ctx.fillRect(sx,sy,S,2); ctx.fillRect(sx,sy,2,S);
        // Face highlight
        ctx.fillStyle='rgba(255,255,255,0.06)';
        ctx.fillRect(sx+2,sy+2,S-4,1); ctx.fillRect(sx+2,sy+2,1,S-4);
        break;}
      case T.CASTLE_WALL:{
        // Dark gray stone blocks — strong Terraria look
        ctx.fillStyle='#282828'; ctx.fillRect(sx,sy,S,S);
        // Mortar
        ctx.fillStyle='#141414';
        ctx.fillRect(sx,sy,S,2); ctx.fillRect(sx,sy+15,S,2); ctx.fillRect(sx,sy+28,S,2);
        // Alternating brick offset
        const oc=((ty%2)===0)?0:8;
        ctx.fillStyle='#3c3c3c';
        ctx.fillRect(sx+oc+2,  sy+2, 12,11);
        ctx.fillRect(sx+oc+18, sy+2, 10,11);
        ctx.fillRect(sx+oc+2,  sy+17,14,9);
        ctx.fillRect(sx+oc+20, sy+17, 8,9);
        // Bright highlight top of each brick
        ctx.fillStyle='#505050';
        ctx.fillRect(sx+oc+2,  sy+2,  12,1);
        ctx.fillRect(sx+oc+18, sy+2,  10,1);
        ctx.fillRect(sx+oc+2,  sy+17, 14,1);
        ctx.fillRect(sx+oc+20, sy+17,  8,1);
        // Heavy shadow on bottom
        ctx.fillStyle='rgba(0,0,0,0.45)';
        ctx.fillRect(sx,sy+28,S,4);
        break;}

      // ---- Fog Gate — animated purple void ----
      case T.FOG_GATE:{
        ctx.fillStyle='#0e0618'; ctx.fillRect(sx,sy,S,S);
        const frame=(now/160|0)%16;
        ctx.fillStyle='rgba(100,40,200,0.60)'; ctx.fillRect(sx,sy,S,S);
        ctx.fillStyle='rgba(140,60,240,0.40)';
        ctx.fillRect(sx+2, sy+(frame)%32,      6,18);
        ctx.fillRect(sx+14,sy+(frame+10)%32,   6,14);
        ctx.fillRect(sx+24,sy+(frame+6)%32,    5,18);
        ctx.fillStyle='rgba(200,120,255,0.22)';
        ctx.fillRect(sx+8, sy+(32-frame)%32,   4,12);
        ctx.fillRect(sx+20,sy+(32-frame+8)%32, 4,10);
        // Edge glow
        ctx.fillStyle='rgba(160,80,255,0.15)';
        ctx.fillRect(sx,sy,S,2); ctx.fillRect(sx,sy+S-2,S,2);
        ctx.fillRect(sx,sy,2,S); ctx.fillRect(sx+S-2,sy,2,S);
        break;}

      // ---- Boss Arena — dark crimson with ember glow ----
      case T.BOSS_FLOOR:{
        ctx.fillStyle='#1e0808'; ctx.fillRect(sx,sy,S,S);
        // Flagstone grid (very faint)
        ctx.fillStyle='#150606';
        ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        ctx.fillRect(sx,sy+16,S,1); ctx.fillRect(sx+16,sy,1,S);
        // Ember glow on select tiles (Terraria hellstone style)
        if((tx*3+ty*5)%6===0){
          const hot=(now/400|0)%2;
          ctx.fillStyle=hot?'rgba(220,80,10,0.22)':'rgba(180,50,8,0.14)';
          ctx.fillRect(sx+4,sy+4,S-8,S-8);
          // Lava crack
          ctx.fillStyle=hot?'#e04010':'#b02808';
          ctx.fillRect(sx+12,sy+14,2,6); ctx.fillRect(sx+10,sy+18,6,2);
        }
        break;}

      // ---- Water — bright animated Terraria blue ----
      case T.WATER:{
        const wf=(now/200|0)%4;
        ctx.fillStyle='#1040a0'; ctx.fillRect(sx,sy,S,S);
        // Animated highlight strips
        ctx.fillStyle='rgba(40,100,220,0.70)'; ctx.fillRect(sx,sy,S,S);
        const wy2=(ty*9+wf*5)%S;
        ctx.fillStyle='rgba(80,160,255,0.55)';
        ctx.fillRect(sx,sy+wy2,S,3); ctx.fillRect(sx,sy+(wy2+14)%S,S,3);
        ctx.fillStyle='rgba(140,210,255,0.30)';
        ctx.fillRect(sx,sy+(wy2+7)%S,S,1);
        // Foam edge (top of tile)
        ctx.fillStyle='rgba(200,240,255,0.28)';
        ctx.fillRect(sx,sy,S,2); ctx.fillRect(sx,sy,2,S);
        // Darker depth at bottom
        ctx.fillStyle='rgba(0,20,80,0.25)';
        ctx.fillRect(sx,sy+24,S,8);
        break;}

      // ---- Village Floor — warm cobblestone ----
      case T.VILLAGE_FLOOR:{
        const vc=((tx+ty)%2===0)?'#9a7c50':'#8a6c40';
        ctx.fillStyle=vc; ctx.fillRect(sx,sy,S,S);
        // Cobblestone mortar grid
        ctx.fillStyle='#5a4020';
        ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        ctx.fillRect(sx,sy+16,S,1); ctx.fillRect(sx+16,sy,1,S);
        // Individual cobble stones
        ctx.fillStyle='#b09060';
        ctx.fillRect(sx+2, sy+2, 13,13);
        ctx.fillRect(sx+18,sy+2, 12,13);
        ctx.fillRect(sx+2, sy+18,12,12);
        ctx.fillRect(sx+18,sy+18,12,12);
        // Highlight top-left of each stone
        ctx.fillStyle='#d0b080';
        ctx.fillRect(sx+2, sy+2,  13,1); ctx.fillRect(sx+2, sy+2,  1,6);
        ctx.fillRect(sx+18,sy+2,  12,1); ctx.fillRect(sx+18,sy+2,  1,6);
        ctx.fillRect(sx+2, sy+18, 12,1); ctx.fillRect(sx+2, sy+18, 1,5);
        ctx.fillRect(sx+18,sy+18, 12,1); ctx.fillRect(sx+18,sy+18, 1,5);
        // Shadow bottom-right of each stone
        ctx.fillStyle='rgba(0,0,0,0.20)';
        ctx.fillRect(sx+3, sy+13, 13,2);
        ctx.fillRect(sx+18,sy+13, 12,2);
        break;}

      // ---- Village Wall — warm wood/stone ----
      case T.VILLAGE_WALL:{
        ctx.fillStyle='#8a6030'; ctx.fillRect(sx,sy,S,S);
        // Mortar
        ctx.fillStyle='#4a2e10';
        ctx.fillRect(sx,sy,S,2); ctx.fillRect(sx,sy+14,S,2); ctx.fillRect(sx,sy+28,S,2);
        const ow=((ty%2)===0)?0:6;
        // Warm stone bricks
        ctx.fillStyle='#b07840';
        ctx.fillRect(sx+ow+2, sy+2,  12,10);
        ctx.fillRect(sx+ow+18,sy+2,  10,10);
        ctx.fillRect(sx+ow+2, sy+16, 14,10);
        ctx.fillRect(sx+ow+20,sy+16,  8,10);
        // Highlight top
        ctx.fillStyle='#d09c60';
        ctx.fillRect(sx+ow+2, sy+2,  12,1);
        ctx.fillRect(sx+ow+18,sy+2,  10,1);
        ctx.fillRect(sx+ow+2, sy+16, 14,1);
        ctx.fillRect(sx+ow+20,sy+16,  8,1);
        // Shadow bottom
        ctx.fillStyle='rgba(0,0,0,0.30)';
        ctx.fillRect(sx,sy+28,S,4);
        break;}

      // ---- Graveyard Floor — dark damp earth ----
      case T.GRAVEYARD_FLOOR:{
        const gc=((tx+ty)%3===0)?'#1e2a1c':'#243020';
        ctx.fillStyle=gc; ctx.fillRect(sx,sy,S,S);
        // Edge grid (subtle)
        ctx.fillStyle='rgba(0,0,0,0.22)';
        ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        // Mossy patches
        if((tx*5+ty*11)%13===0){
          ctx.fillStyle='#2e4828';
          ctx.fillRect(sx+6, sy+8,  6,5); ctx.fillRect(sx+20,sy+18, 7,4);
          ctx.fillStyle='#3a5c32';
          ctx.fillRect(sx+7, sy+8,  4,2); ctx.fillRect(sx+21,sy+18, 5,1);

        if((tx*11+ty*3)%11===0){
          ctx.fillStyle='#0e160e';
          ctx.fillRect(sx+12,sy+10,1,8); ctx.fillRect(sx+10,sy+14,5,1);
        }
        // Dew highlight
        if((tx*7+ty*13)%19===0){
          ctx.fillStyle='rgba(100,180,100,0.10)';
          ctx.fillRect(sx+4,sy+4,5,5);
        }
        break;}

      default:
        ctx.fillStyle='#0a0a0a'; ctx.fillRect(sx,sy,S,S);
    }
  },
};

const Particles = {
  _p: GS.particles,

  embers(x,y,n=2){
    for(let i=0;i<n;i++) this._p.push({
      type:'ember', x, y,
      vx:(Math.random()-0.5)*65, vy:-Math.random()*85-20,
      life:0.9+Math.random()*0.6, max:1.5,
      sz:1.5+Math.random()*2.5,
      color:Math.random()>0.5?'#FF6020':'#FFB040',
    });
  },

  sparks(x,y,n=8){
    for(let i=0;i<n;i++){
      const a=(Math.PI*2*i/n)+Math.random()*0.5, spd=70+Math.random()*90;
      this._p.push({type:'spark',x,y, vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
        life:0.25+Math.random()*0.2, max:0.45, sz:2+Math.random()*2,
        color:Math.random()>0.5?'#FFD060':'#FF8020'});
    }
  },

  heal(x,y,n=8){
    for(let i=0;i<n;i++){
      const a=(Math.PI*2*i/n);
      this._p.push({type:'rune',x,y, vx:Math.cos(a)*45,vy:Math.sin(a)*45-20,
        life:0.7,max:0.7,sz:3,color:'#60FF60'});
    }
  },

  death(x,y,color,n=18){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, spd=25+Math.random()*110;
      this._p.push({type:'death',
        x:x+(Math.random()-0.5)*18, y:y+(Math.random()-0.5)*18,
        vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
        life:0.6+Math.random()*0.8, max:1.4, sz:3+Math.random()*5, color});
    }
  },

  rune(x,y){
    for(let i=0;i<8;i++){
      const a=Math.PI*2*i/8;
      this._p.push({type:'rune',x,y, vx:Math.cos(a)*55,vy:Math.sin(a)*55-25,
        life:0.7,max:0.7,sz:4,color:'#c8a060'});
    }
  },

  update(dt){
    for(let i=this._p.length-1;i>=0;i--){
      const p=this._p[i];
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
      if(p.type==='ember')       { p.vy+=18*dt; p.vx*=0.98; }
      else if(p.type==='spark')  { p.vx*=0.84; p.vy*=0.84; }
      else if(p.type==='death')  { p.vx*=0.91; p.vy*=0.91; }
      if(p.life<=0) this._p.splice(i,1);
    }
  },

  draw(cx,cy){
    for(const p of this._p){
      const a=Math.max(0,p.life/p.max);
      const sx=(p.x-cx)|0, sy=(p.y-cy)|0;
      const s=Math.max(1,p.sz|0);
      ctx.globalAlpha=a; ctx.fillStyle=p.color;
      ctx.fillRect(sx-(s>>1),sy-(s>>1),s,s);
    }
    ctx.globalAlpha=1;
  },
};

    for(const bf of this.list)

  },

  rest(bf){
    bf.lit=true;
    const p=GS.player;
    p.hp=Stats.maxHP(); p.fp=PLAYER_CONFIG.maxFP; p.stamina=Stats.maxStamina();
    p.flaskCharges=PLAYER_CONFIG.flaskCharges;
    p.bonfireX=bf.x; p.bonfireY=bf.y;
    Enemies.respawnAll();
    // Bonfire rest overlay
    GS.phase='bonfire_rest';
    GS.bonfireRestTimer=2.5;
    GS.bonfireRestName=bf.name;
    ScreenFX.flash('#FFA020', 0.45, 0.6);
    for(let i=0;i<25;i++) Particles.embers(bf.x, bf.y);
  },

    for(const bf of this.list)
      if(bf.lit && Math.random()<0.25) Particles.embers(bf.x,bf.y,1);

  draw(cx,cy){
    for(const bf of this.list){
      const sx=(bf.x-cx)|0, sy=(bf.y-cy)|0;
      if(sx<-60||sx>SCREEN_W+60||sy<-60||sy>SCREEN_H+60) continue;
      const now=Date.now();
      // Stone base — flat pixel rects, no ellipse
      ctx.fillStyle='#1e1818'; ctx.fillRect(sx-12,sy+6,24,4);
      ctx.fillStyle='#3a3030'; ctx.fillRect(sx-10,sy+2,20,6);
      ctx.fillStyle='#504848'; ctx.fillRect(sx-8, sy-2, 16,6);
      ctx.fillStyle='#5e5252'; ctx.fillRect(sx-6, sy-4,  4,4);
      ctx.fillStyle='#5e5252'; ctx.fillRect(sx+2, sy-4,  4,4);
      if(bf.lit){
        // Animated pixel flame (4-frame cycle via integer time)
        const frame=(now/100|0)%4;
        // Terraria-style torch glow — concentric square rects fading out
        ctx.globalAlpha=0.08; ctx.fillStyle='#FF9020'; ctx.fillRect(sx-48,sy-40,96,72);
        ctx.globalAlpha=0.11; ctx.fillStyle='#FF7810'; ctx.fillRect(sx-36,sy-30,72,54);
        ctx.globalAlpha=0.15; ctx.fillStyle='#FF6010'; ctx.fillRect(sx-24,sy-22,48,38);
        ctx.globalAlpha=0.20; ctx.fillStyle='#FF5010'; ctx.fillRect(sx-16,sy-14,32,26);
        ctx.globalAlpha=1;
        // Flame shapes per frame (outer orange)
        ctx.fillStyle='#FF5010';
        const F=[
          [[sx-4,sy-4,8,6],[sx-3,sy-10,6,8],[sx-2,sy-16,4,8]],
          [[sx-5,sy-4,10,6],[sx-4,sy-10,8,8],[sx-2,sy-17,5,9]],
          [[sx-4,sy-4,8,6],[sx-3,sy-11,6,9],[sx-1,sy-16,3,8]],
          [[sx-5,sy-4,10,6],[sx-3,sy-10,7,8],[sx-2,sy-16,4,7]],
        ][frame];
        for(const[fx,fy,fw,fh] of F) ctx.fillRect(fx,fy,fw,fh);
        // Inner flame (gold)
        ctx.fillStyle='#FFB020';
        ctx.fillRect(sx-2,sy-4,4,4); ctx.fillRect(sx-2,sy-10,4,6); ctx.fillRect(sx-1,sy-14,2,5);
        // Core (bright)
        ctx.fillStyle='#FFE070';
        ctx.fillRect(sx-1,sy-6,2,4); ctx.fillRect(sx-1,sy-10,2,4);
        ctx.fillStyle='#FFFFF0'; ctx.fillRect(sx-1,sy-12,2,2);
      } else {
        // Unlit — ash pile
        ctx.fillStyle='#2a1a0a'; ctx.fillRect(sx-4,sy-2,8,4);
        ctx.fillStyle='#1a1208'; ctx.fillRect(sx-2,sy-4,4,2);
      }
      // Interaction prompt
      if(GS.phase==='playing'){
        const dist=Math.hypot(GS.player.x-bf.x,GS.player.y-bf.y);
        if(dist<55) R.text('[E] Rest',sx,sy-(bf.lit?34:24),'#c8a060',10,'center');
      }
    }
  },
};

const RARITY_COLOR = { common:'#c0c0d0', uncommon:'#4878e8', rare:'#FFD040' };

function _makeDropItem(itemKey, x, y){
  const def=EQUIPMENT_ITEMS[itemKey]; if(!def) return null;
  return { ...def, equipId:itemKey, isEquipment:true,
           x, y, pt:0, collected:false,
           color:RARITY_COLOR[def.rarity]||'#c0c0d0',
           glow: RARITY_GLOW[def.rarity]||'#888898' };
}

const Chests = {
  list: GS.chests,

  init(){
    const pos=[
      // Ruins — standard
      {tx:23,ty:50,zone:'RUINS'}, {tx:52,ty:62,zone:'RUINS'},
      // Ruins — HIDDEN: far western dead-end behind cliff face
      {tx:8, ty:92,zone:'RUINS'},
      // Forest — standard
      {tx:88,ty:22,zone:'FOREST'}, {tx:113,ty:65,zone:'FOREST'},
      // Forest — HIDDEN: northeast corner near village connector, off main path
      {tx:163,ty:8, zone:'FOREST'},
      // Castle — standard
      {tx:55,ty:130,zone:'CASTLE'}, {tx:195,ty:148,zone:'CASTLE'},

      {tx:186,ty:43,zone:'VILLAGE'},

      this.list.push({x:p.tx*TILE_SIZE+16, y:p.ty*TILE_SIZE+16, zone:p.zone, opened:false});

// ============================================================
// PLAYER SYSTEM
// ============================================================
let atkHitbox=null; // {x,y,w,h,dmg,type,timer,hit:Set}

const Player = {
  update(dt){
    const p=GS.player;
    if(p.isDead){ this._updateDeath(dt); return; }
    // Timers
    if(p.hitFlash>0)     p.hitFlash    -=dt;
    if(p.staminaEmpty>0) p.staminaEmpty-=dt;
    if(p.combo>0){ p.comboTimer-=dt; if(p.comboTimer<=0){ p.combo=0; } }
    this._move(dt);
    this._roll(dt);
    this._attack(dt);
    this._staminaRegen(dt);
    this._interact();
    this._flask();
    this._checkZone();
    this._checkFogGate();
    this._checkItems();
    // Level-up detection
    const newLevel=Math.floor(p.runes/500)+1;
    if(newLevel>p.prevLevel){ p.prevLevel=newLevel; p.level=newLevel; UI.msg(`LEVEL UP — Lv.${newLevel}`,'levelup',2.5); ScreenFX.flash('#c8a060',0.3,0.4); }
  },

  _move(dt){
    const p=GS.player;
    if(p.isRolling) return;
    const root=p.isAttacking&&p.attackType==='heavy';
    let dx=0, dy=0;
    if(!root){
      if(Input.down('KeyW')||Input.down('ArrowUp'))    dy-=1;
      if(Input.down('KeyS')||Input.down('ArrowDown'))  dy+=1;
      if(Input.down('KeyA')||Input.down('ArrowLeft'))  dx-=1;
      if(Input.down('KeyD')||Input.down('ArrowRight')) dx+=1;
    }
    if(dx||dy){
      const len=Math.sqrt(dx*dx+dy*dy); dx/=len; dy/=len;
      p.facing.x=dx; p.facing.y=dy;
    }
    const spd=p.isAttacking ? PLAYER_CONFIG.speed*0.35 : PLAYER_CONFIG.speed;
    const nx=p.x+dx*spd*dt, ny=p.y+dy*spd*dt;
    if(World.canMove(nx,p.y,PLAYER_CONFIG.size-1)) p.x=nx;
    if(World.canMove(p.x,ny,PLAYER_CONFIG.size-1)) p.y=ny;
  },

  _roll(dt){
    const p=GS.player;
    if(p.isRolling){
      p.rollTimer-=dt; p.rollITimer-=dt;
      const prog=1-(p.rollTimer/PLAYER_CONFIG.rollDuration);
      const spd=PLAYER_CONFIG.rollSpeed*(1-prog*0.5);
      const nx=p.x+p.rollDx*spd*dt, ny=p.y+p.rollDy*spd*dt;
      if(World.canMove(nx,p.y,PLAYER_CONFIG.size-3)) p.x=nx;
      if(World.canMove(p.x,ny,PLAYER_CONFIG.size-3)) p.y=ny;
      p.isInvincible=(p.rollITimer>0);
      if(p.rollTimer<=0){ p.isRolling=false; p.isInvincible=false; }
      return;
    }
    if(Input.just('Space')&&!p.isAttacking){
      if(p.stamina>=PLAYER_CONFIG.rollStaminaCost){
        p.stamina-=PLAYER_CONFIG.rollStaminaCost;
        p.isRolling=true;
        p.rollTimer=PLAYER_CONFIG.rollDuration;
        p.rollITimer=PLAYER_CONFIG.rollIFrames;
        let dx=0, dy=0;
        if(Input.down('KeyW')||Input.down('ArrowUp'))    dy-=1;
        if(Input.down('KeyS')||Input.down('ArrowDown'))  dy+=1;
        if(Input.down('KeyA')||Input.down('ArrowLeft'))  dx-=1;
        if(Input.down('KeyD')||Input.down('ArrowRight')) dx+=1;
        if(!dx&&!dy){ dx=p.facing.x; dy=p.facing.y; }
        const l=Math.sqrt(dx*dx+dy*dy)||1;
        p.rollDx=dx/l; p.rollDy=dy/l;
      } else {
        p.staminaEmpty=0.4; // flash stamina bar
      }
    }
  },

  _attack(dt){
    const p=GS.player;
    if(p.attackCooldown>0) p.attackCooldown-=dt;
    if(p.isAttacking){
      p.attackTimer-=dt;
      if(atkHitbox){ this._syncHitbox(); this._checkHits(); atkHitbox.timer-=dt; if(atkHitbox.timer<=0) atkHitbox=null; }
      if(p.attackTimer<=0){ p.isAttacking=false; atkHitbox=null; }
      return;
    }
    if(p.attackCooldown>0) return;
    if(Input.just('KeyJ')&&p.stamina>=PLAYER_CONFIG.lightStamina){
      p.stamina-=PLAYER_CONFIG.lightStamina; p.isAttacking=true; p.attackType='light';
      p.attackTimer=PLAYER_CONFIG.lightDur; p.attackCooldown=PLAYER_CONFIG.attackCooldown;
      this._makeHitbox('light');
    } else if(Input.just('KeyK')&&p.stamina>=PLAYER_CONFIG.heavyStamina){
      p.stamina-=PLAYER_CONFIG.heavyStamina; p.isAttacking=true; p.attackType='heavy';
      p.attackTimer=PLAYER_CONFIG.heavyDur; p.attackCooldown=PLAYER_CONFIG.attackCooldown;
      this._makeHitbox('heavy');
    } else if((Input.just('KeyJ')||Input.just('KeyK'))&&p.stamina<PLAYER_CONFIG.lightStamina){
      p.staminaEmpty=0.4;
    }
  },

  _makeHitbox(type){
    const p=GS.player;
    const range=type==='light'?52:72, w=type==='light'?34:56;
    atkHitbox={
      x:p.x+p.facing.x*range-w/2, y:p.y+p.facing.y*range-w/2,
      w,h:w, dmg:(type==='light'?PLAYER_CONFIG.lightDmg:PLAYER_CONFIG.heavyDmg)+Stats.damage(),
      type, timer:type==='light'?PLAYER_CONFIG.lightDur:PLAYER_CONFIG.heavyDur,
      hit:new Set()
    };
    this._checkHits();
  },

  _syncHitbox(){
    if(!atkHitbox) return;
    const p=GS.player;
    const range=atkHitbox.type==='light'?52:72, w=atkHitbox.w;
    atkHitbox.x=p.x+p.facing.x*range-w/2;
    atkHitbox.y=p.y+p.facing.y*range-w/2;
  },

  _checkHits(){
    if(!atkHitbox) return;
    const hx=atkHitbox.x+atkHitbox.w/2, hy=atkHitbox.y+atkHitbox.h/2;
    const p=GS.player;
    for(const e of GS.enemies){
      if(e.isDead||atkHitbox.hit.has(e.id)) continue;
      if(Math.hypot(e.x-hx,e.y-hy)<atkHitbox.w/2+e.size){
        Enemies.damage(e, atkHitbox.dmg, p.facing.x, p.facing.y);
        atkHitbox.hit.add(e.id);
        Particles.sparks(e.x,e.y,8);
        // Combo tracking
        p.combo++; p.comboTimer=2.0;
        if(p.combo===3) UI.msg('COMBO x3','combo',1.0);
        else if(p.combo===5) UI.msg('COMBO x5','combo',1.2);
        else if(p.combo>=8) UI.msg(`COMBO x${p.combo}`,'combo',1.2);
      }
    }
  },

  _staminaRegen(dt){
    const p=GS.player;
    if(!p.isRolling&&!p.isAttacking)
      p.stamina=Math.min(Stats.maxStamina(), p.stamina+PLAYER_CONFIG.staminaRegen*dt);
  },

  _interact(){
    if(!Input.just('KeyE')) return;
    const p=GS.player;
    if(Bonfires.interact(p.x,p.y)) return;
    if(Chests.interact(p.x,p.y)) return;
    if(Quest.interactElder(p.x,p.y)) return;
    // Bloodstain recovery
    if(p.bloodstainX!==null && Math.hypot(p.x-p.bloodstainX,p.y-p.bloodstainY)<32){
      p.runes+=p.bloodstainRunes;
      UI.msg(`Recovered ${p.bloodstainRunes} Runes`,'rune',2);
      Particles.rune(p.x,p.y);
      p.bloodstainX=null; p.bloodstainY=null; p.bloodstainRunes=0;
    }
    // TODO: NPC interaction, shop, lore items
  },

  _flask(){
    const p=GS.player;
    if(!Input.just('KeyF')||p.flaskCharges<=0||p.hp>=Stats.maxHP()) return;
    p.flaskCharges--;
    p.hp=Math.min(Stats.maxHP(), p.hp+PLAYER_CONFIG.flaskHeal);
    UI.msg(`+${PLAYER_CONFIG.flaskHeal} HP`,'heal',1.2);
    Particles.heal(p.x,p.y-10,8);
    ScreenFX.flash('#40a040',0.18,0.3);
  },

  _checkZone(){
    const p=GS.player;
    const z=World.zoneAt(p.x,p.y);
    if(z!==GS.currentZone){
      GS.currentZone=z; GS.discoveredZones.add(z);
      if(ZONES[z]) UI.msg(ZONES[z].name,'zone',3);
      ScreenFX.flash('#ffffff',0.12,0.5);
    }
  },

  _checkFogGate(){
    const p=GS.player;
    if(GS.flags.fogGateEntered) return;
    if(World.tile(p.x,p.y)===T.FOG_GATE){
      GS.flags.fogGateEntered=true;
      Enemies.spawnBoss();
      UI.msg('THE ASHEN KING AWAKENS','boss',4);
      ScreenFX.flash('#6020a0',0.6,1.0);
      ScreenFX.shake(8,0.5);
    }
  },

  _checkItems(){
    const p=GS.player;
    for(const item of GS.items){
      if(item.collected) continue;
      if(Math.hypot(p.x-item.x,p.y-item.y)<20){
        item.collected=true;
        if(item.isEquipment){
          p.inventory.push(item.equipId);
          UI.msg(`${RARITY_LABEL[EQUIPMENT_ITEMS[item.equipId]?.rarity||'common']}: ${item.name}`,'item',2);
        } else if(item.effect==='flask'){ p.flaskCharges=Math.min(9,p.flaskCharges+item.value); UI.msg(`+1 ${item.name}`,'item',2); }
        else if(item.effect==='runes'){ p.runes+=item.value; UI.msg(`+${item.value} Runes`,'rune',2); }
        Particles.rune(p.x,p.y);
      }
    }
  },

  takeDamage(dmg){
    const p=GS.player;
    if(p.isInvincible||p.isDead) return;
    const actual=Math.max(1, dmg-Stats.defense());
    p.hp-=actual; p.hitFlash=0.25;
    Particles.sparks(p.x,p.y,10);
    ScreenFX.shake(5,0.18);
    DmgNums.add(p.x,p.y-20, `-${Math.ceil(dmg)}`, '#FF4040');
    if(p.hp<=0){ p.hp=0; this._die(); }
  },

  _die(){
    const p=GS.player;
    p.isDead=true; p.deathTimer=3.5;
    p.bloodstainX=p.x; p.bloodstainY=p.y;
    p.bloodstainRunes=p.runes; p.runes=0;
    p.combo=0; p.comboTimer=0;
    atkHitbox=null;
    Particles.death(p.x,p.y,'#a03020',28);
    UI.msg('YOU DIED','death',4);
    ScreenFX.shake(10,0.4);
  },

  _updateDeath(dt){
    const p=GS.player; p.deathTimer-=dt;
    if(p.deathTimer<=0) this._respawn();
  },

  _respawn(){
    const p=GS.player;
    p.isDead=false; p.hp=Stats.maxHP(); p.fp=PLAYER_CONFIG.maxFP; p.stamina=Stats.maxStamina();
    p.flaskCharges=PLAYER_CONFIG.flaskCharges;
    p.x=p.bonfireX; p.y=p.bonfireY;
    p.isRolling=false; p.isAttacking=false; p.isInvincible=false;
    p.hitFlash=0; p.combo=0;
    atkHitbox=null;
    Enemies.respawnAll();
    GS.messages=GS.messages.filter(m=>m.type!=='death');
  },

  draw(cx,cy){
    const p=GS.player;
    const sx=(p.x-cx)|0, sy=(p.y-cy)|0;
    const baseA=p.isDead?Math.max(0,p.deathTimer/2):1;
    ctx.globalAlpha=baseA;

    // Roll ghost trail (chunky rects)
    if(p.isRolling){
      for(let i=3;i>=1;i--){
        ctx.globalAlpha=baseA*(0.14-i*0.04);
        ctx.fillStyle='#607080';
        ctx.fillRect((sx-p.rollDx*i*9)|0-5,(sy-p.rollDy*i*9)|0-5,10,10);
      }
      ctx.globalAlpha=baseA;
    }

    // I-frame glow (solid border rect, no arc)
    if(p.isInvincible){
      ctx.fillStyle='#3060a0';
      ctx.fillRect(sx-16,sy-20,32,36);
    }

    // Hit flash border
    if(p.hitFlash>0){
      ctx.fillStyle='#FF2020';
      ctx.fillRect(sx-16,sy-20,32,36);
    }

    // Shadow (flat rect)
    ctx.globalAlpha=baseA*0.45; ctx.fillStyle='#000';
    ctx.fillRect(sx-12,sy+12,24,5);
    ctx.globalAlpha=baseA;

    // Legs — chunky Terraria-style
    ctx.fillStyle=p.isRolling?'#2a3a4a':'#404850';
    ctx.fillRect(sx-8,sy+2,6,10); ctx.fillRect(sx+2,sy+2,6,10);

    // --- Derive colors from equipped armor ---
    const eqArmor=p.equipment.armor;
    let bodyMain, bodyShade, pauldronCol, legCol;
    if(eqArmor==='LEATHER_ARMOR'){
      bodyMain  = p.isRolling?'#6a4830':p.isAttacking?'#9a6820':'#7a5838';
      bodyShade = p.isAttacking?'#b07828':'#5a3820';
      pauldronCol='#4a2810';
      legCol    ='#4a3020';
    } else if(eqArmor==='CHAIN_MAIL'){
      bodyMain  = p.isRolling?'#5a6068':p.isAttacking?'#9a8820':'#848c90';
      bodyShade = p.isAttacking?'#b09828':'#606870';
      pauldronCol='#505860';
      legCol    ='#484e54';
    } else if(eqArmor==='ASHEN_PLATE'){
      bodyMain  = p.isRolling?'#303438':p.isAttacking?'#887010':'#3c4044';
      bodyShade = p.isAttacking?'#a08820':'#28282e';
      pauldronCol='#222226';
      legCol    ='#2a2c30';
    } else {
      // Unarmored defaults
      bodyMain  = p.isRolling?'#4a5a6a':p.isAttacking?'#8a7820':'#707880';
      bodyShade = p.isAttacking?'#a09028':'#505860';
      pauldronCol='#505860';
      legCol    ='#404850';
    }

    // Legs (color overridden by armor)
    ctx.fillStyle=p.isRolling?'#2a3a4a':legCol;
    ctx.fillRect(sx-8,sy+2,6,10); ctx.fillRect(sx+2,sy+2,6,10);
    // Boot highlights
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.fillRect(sx-8,sy+2,6,1); ctx.fillRect(sx+2,sy+2,6,1);

    // Torso / armor — wider, chunkier
    ctx.fillStyle=bodyMain; ctx.fillRect(sx-10,sy-7,20,11);
    // Chest highlight
    ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.fillRect(sx-8,sy-7,18,2);
    // Pauldrons — bigger
    ctx.fillStyle=pauldronCol;
    ctx.fillRect(sx-14,sy-7,6,7); ctx.fillRect(sx+8,sy-7,6,7);
    // Pauldron highlights
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.fillRect(sx-14,sy-7,6,1); ctx.fillRect(sx+8,sy-7,6,1);

    // Chain mail — horizontal ring lines across torso
    if(eqArmor==='CHAIN_MAIL'){
      ctx.fillStyle='rgba(0,0,0,0.25)';
      ctx.fillRect(sx-9,sy-3,18,1); ctx.fillRect(sx-9,sy,18,1);
    }
    // Ashen plate — gold trim lines
    if(eqArmor==='ASHEN_PLATE'){
      ctx.fillStyle='#a08020';
      ctx.fillRect(sx-9,sy-6,18,1);   // top trim
      ctx.fillRect(sx-9,sy+3,18,1);   // bottom trim
      ctx.fillRect(sx-12,sy-6,5,1);   // left pauldron trim
      ctx.fillRect(sx+7,sy-6,5,1);    // right pauldron trim
    }

    // Head — bigger (12×12 instead of 10×10)
    ctx.fillStyle='#b0a878'; ctx.fillRect(sx-6,sy-18,12,12);
    ctx.fillStyle='#c0b888'; ctx.fillRect(sx-5,sy-18,10,3); // forehead bright
    // Helmet top — wider
    ctx.fillStyle='#808070'; ctx.fillRect(sx-7,sy-20,14,4);
    ctx.fillStyle='#909080'; ctx.fillRect(sx-6,sy-20,12,1); // helm gleam
    // Ashen plate — full visor (dark face plate)
    if(eqArmor==='ASHEN_PLATE'){
      ctx.fillStyle='#1c1c22'; ctx.fillRect(sx-6,sy-18,12,12);
      ctx.fillStyle='#a08020'; ctx.fillRect(sx-7,sy-20,14,4); // gold helm
      ctx.fillStyle='#c0a020'; ctx.fillRect(sx-6,sy-20,12,1); // helm gleam
      ctx.fillStyle='#a08020'; ctx.fillRect(sx-5,sy-14,10,1); // visor slit trim
    }
    // Eyes
    ctx.fillStyle='#100808';
    ctx.fillRect(sx-4,sy-14,3,3); ctx.fillRect(sx+1,sy-14,3,3);
    // Eye glow (tarnished amber)
    ctx.fillStyle=p.isAttacking?'#FFB020':'#a08040';
    ctx.fillRect(sx-3,sy-14,2,2); ctx.fillRect(sx+2,sy-14,2,2);

    // Talisman — small hanging bead on lower torso
    if(p.equipment.talisman){
      const talCol = p.equipment.talisman==='EMBER_TALISMAN'?'#e84010':
                     p.equipment.talisman==='WOODEN_TALISMAN'?'#7a4818':'#888898';
      ctx.fillStyle='#1a1a1a'; ctx.fillRect(sx-1,sy+3,2,4);  // cord
      ctx.fillStyle=talCol;    ctx.fillRect(sx-2,sy+6,4,3);  // bead
    }

    // Ring — tiny colored pip on wrist (right side)
    if(p.equipment.ring){
      const ringCol= p.equipment.ring==='SOVEREIGN_RING'?'#FFD040':
                     p.equipment.ring==='CRIMSON_RING'?'#e02020':'#c0c8d8';
      ctx.fillStyle=ringCol; ctx.fillRect(sx+8,sy,3,2);
    }

    // Facing indicator (2px dot on correct edge)
    if(!p.isDead){
      ctx.fillStyle='#e8d880';
      const fd=11;
      ctx.fillRect((sx+Math.round(p.facing.x*fd))-1,(sy+Math.round(p.facing.y*fd))-1,2,2);
    }

    // ---- WEAPON ----
    // Visual varies by equipped weapon:
    //   null/unarmed  → short rusty dagger
    //   IRON_SWORD    → standard straight sword (gray-blue)
    //   HOLLOW_BLADE  → longer, cold steel with blue tint
    //   ASHEN_GREATSWORD → wide two-hander, ash-gray + ember glow
    if(!p.isDead){
      const eqWeapon=p.equipment.weapon;
      const facingAngle=Math.atan2(p.facing.y,p.facing.x);
      ctx.save();
      ctx.translate(sx,sy);
      ctx.rotate(facingAngle);
      ctx.globalAlpha=baseA;

      if(p.isAttacking){
        const dur=p.attackType==='light'?PLAYER_CONFIG.lightDur:PLAYER_CONFIG.heavyDur;
        const prog=Math.min(1,1-(p.attackTimer/dur));
        const half=p.attackType==='light'?0.85:1.15;
        const swingAngle=-half+prog*half*2;
        ctx.rotate(swingAngle);

        if(eqWeapon==='ASHEN_GREATSWORD'){
          // Wide greatsword — large & ember-glowing
          ctx.globalAlpha=baseA*0.35; ctx.fillStyle='#e04010';
          ctx.fillRect(8,-10,44,18);             // big ember glow
          ctx.globalAlpha=baseA;
          ctx.fillStyle='#5a3010'; ctx.fillRect(4,-3,9,6);   // handle (longer)
          ctx.fillStyle='#c07820'; ctx.fillRect(11,-7,6,13); // wide crossguard
          ctx.fillStyle='#484858'; ctx.fillRect(17,-6,36,11); // blade base
          ctx.fillStyle='#888898'; ctx.fillRect(17,-4,34,7);  // blade body
          ctx.fillStyle='#c8cce0'; ctx.fillRect(17,-3,32,3);  // bright face
          ctx.fillStyle='#f0f4ff'; ctx.fillRect(17,-3,30,1);  // gleam
          ctx.fillStyle='#a8aab8'; ctx.fillRect(51,-3,6,6);   // wide tip
        } else if(eqWeapon==='HOLLOW_BLADE'){
          // Long cold-steel blade — narrow, icy blue tint
          ctx.globalAlpha=baseA*0.20; ctx.fillStyle='#4060c0';
          ctx.fillRect(8,-5,34,8);               // cold glow
          ctx.globalAlpha=baseA;
          ctx.fillStyle='#6a4020'; ctx.fillRect(6,-2,6,4);   // handle
          ctx.fillStyle='#6870a0'; ctx.fillRect(10,-4,4,8);  // blue guard
          ctx.fillStyle='#505878'; ctx.fillRect(14,-3,30,5); // blade base (narrower)
          ctx.fillStyle='#8890b8'; ctx.fillRect(14,-2,28,3); // blade face
          ctx.fillStyle='#c0d0f0'; ctx.fillRect(14,-2,26,1); // cold gleam
          ctx.fillStyle='#a0a8c0'; ctx.fillRect(42,-1,4,3);  // tip
        } else if(eqWeapon==='IRON_SWORD'||eqWeapon===null){
          // Standard iron sword / unarmed fallback (original look)
          if(p.attackType==='heavy'){
            ctx.globalAlpha=baseA*0.30; ctx.fillStyle='#c08020';
            ctx.fillRect(10,-8,36,14);
            ctx.globalAlpha=baseA;
            ctx.fillStyle='#6a4020'; ctx.fillRect(6,-2,7,5);
            ctx.fillStyle='#a07830'; ctx.fillRect(11,-5,5,10);
            ctx.fillStyle='#7878a0'; ctx.fillRect(16,-4,32,7);
            ctx.fillStyle='#b0b4cc'; ctx.fillRect(16,-3,30,5);
            ctx.fillStyle='#e8eeff'; ctx.fillRect(16,-2,28,2);
            ctx.fillStyle='#d0d8f0'; ctx.fillRect(46,-2,4,4);
          } else {
            ctx.globalAlpha=baseA*0.22; ctx.fillStyle='#a09060';
            ctx.fillRect(8,-6,28,10);
            ctx.globalAlpha=baseA;
            ctx.fillStyle='#6a4020'; ctx.fillRect(6,-2,6,4);
            ctx.fillStyle='#906820'; ctx.fillRect(10,-4,4,7);
            ctx.fillStyle='#707090'; ctx.fillRect(14,-3,24,5);
            ctx.fillStyle='#a8acc8'; ctx.fillRect(14,-2,22,3);
            ctx.fillStyle='#dce4f8'; ctx.fillRect(14,-2,20,1);
            ctx.fillStyle='#c0c8e0'; ctx.fillRect(36,-1,4,3);
          }
        } else {
          // No weapon — small dagger jab
          ctx.globalAlpha=baseA*0.15; ctx.fillStyle='#806020';
          ctx.fillRect(6,-4,16,7);
          ctx.globalAlpha=baseA;
          ctx.fillStyle='#5a3010'; ctx.fillRect(5,-1,5,3);   // stub handle
          ctx.fillStyle='#804818'; ctx.fillRect(9,-2,3,5);   // guard
          ctx.fillStyle='#907060'; ctx.fillRect(12,-2,14,4); // short rusty blade
          ctx.fillStyle='#c0a888'; ctx.fillRect(12,-2,12,2); // face
        }
      } else {
        // ---- Resting pose ----
        ctx.rotate(0.42);
        if(eqWeapon==='ASHEN_GREATSWORD'){
          // Two-hander rested upright (bigger, ember-tinted)
          ctx.fillStyle='#5a3010'; ctx.fillRect(5,-2,9,5);   // thick handle
          ctx.fillStyle='#c07820'; ctx.fillRect(12,-5,5,9);  // crossguard
          ctx.fillStyle='#484858'; ctx.fillRect(17,-3,28,5); // blade base
          ctx.fillStyle='#888898'; ctx.fillRect(17,-2,26,3); // blade body
          ctx.fillStyle='#c8cce0'; ctx.fillRect(17,-2,24,1); // gleam
        } else if(eqWeapon==='HOLLOW_BLADE'){
          // Long blade — narrower and longer at rest
          ctx.fillStyle='#6a4020'; ctx.fillRect(6,-1,6,3);
          ctx.fillStyle='#6870a0'; ctx.fillRect(10,-3,4,6);  // blue guard
          ctx.fillStyle='#505878'; ctx.fillRect(14,-1,22,3); // longer blade
          ctx.fillStyle='#8890b8'; ctx.fillRect(14,-1,20,1); // gleam
        } else if(eqWeapon===null){
          // Unarmed / dagger — short stub
          ctx.fillStyle='#5a3010'; ctx.fillRect(6,-1,4,2);
          ctx.fillStyle='#804818'; ctx.fillRect(9,-1,3,3);
          ctx.fillStyle='#907060'; ctx.fillRect(12,-1,10,2);
          ctx.fillStyle='#b09070'; ctx.fillRect(12,-1,8,1);
        } else {
          // IRON_SWORD default resting
          ctx.fillStyle='#6a4020'; ctx.fillRect(6,-1,6,3);
          ctx.fillStyle='#806828'; ctx.fillRect(10,-2,4,5);
          ctx.fillStyle='#585870'; ctx.fillRect(14,-1,16,3);
          ctx.fillStyle='#8890a8'; ctx.fillRect(14,-1,14,1);
        }
      }
      ctx.restore();
    }

    ctx.globalAlpha=1;

    // Attack hitbox (pixel outline)
    if(atkHitbox){
      ctx.globalAlpha=0.22;
      ctx.fillStyle=atkHitbox.type==='light'?'#FFE080':'#FF8040';
      ctx.fillRect(atkHitbox.x-cx,atkHitbox.y-cy,atkHitbox.w,atkHitbox.h);
      ctx.globalAlpha=1;
      ctx.fillStyle=atkHitbox.type==='light'?'#FFD040':'#FF6020';
      // Pixel outline (4 edge rects)
      const hx=atkHitbox.x-cx, hy=atkHitbox.y-cy, hw=atkHitbox.w, hh=atkHitbox.h;
      ctx.fillRect(hx,hy,hw,1); ctx.fillRect(hx,hy+hh-1,hw,1);
      ctx.fillRect(hx,hy,1,hh); ctx.fillRect(hx+hw-1,hy,1,hh);
    }

    // Bloodstain (pixel cross)
    if(p.bloodstainX!==null){
      const bsx=(p.bloodstainX-cx)|0, bsy=(p.bloodstainY-cy)|0;
      if(bsx>-25&&bsx<SCREEN_W+25&&bsy>-25&&bsy<SCREEN_H+25){
        ctx.fillStyle='#660000';
        ctx.fillRect(bsx-10,bsy-2,20,4); ctx.fillRect(bsx-2,bsy-10,4,20);
        ctx.fillStyle='#aa1818';
        ctx.fillRect(bsx-6,bsy-1,12,2); ctx.fillRect(bsx-1,bsy-6,2,12);
        const dist=Math.hypot(p.x-p.bloodstainX,p.y-p.bloodstainY);
        if(dist<90) R.text(`[E] Recover ${p.bloodstainRunes} Runes`,bsx,bsy-16,'#c8a060',10,'center');
      }
    }
  },
};

let eidCtr=0;
const Enemies = {
  spawnCfg:[],

  init(){
    this.spawnCfg=[
      // ====== Crumbling Ruins ======
      // Grunts — original 9
      {t:'GRUNT', x:16,y:51},{t:'GRUNT', x:28,y:44},{t:'GRUNT', x:42,y:52},
      {t:'GRUNT', x:55,y:46},{t:'GRUNT', x:20,y:72},{t:'GRUNT', x:38,y:80},
      {t:'GRUNT', x:60,y:76},{t:'GRUNT', x:48,y:62},{t:'GRUNT', x:25,y:88},

  spawn(type, x, y, isBoss=false){
    const cfg=ENEMY_TYPES[type]; if(!cfg) return null;
    // Validate spawn position — try up to 9 candidate offsets before giving up
    const r=cfg.size+2;
    const candidates=[
      [0,0],[1,0],[-1,0],[0,1],[0,-1],[2,0],[-2,0],[0,2],[0,-2]
    ];
    let wx=x*TILE_SIZE+16, wy=y*TILE_SIZE+16;
    let placed=false;
    for(const[ox,oy] of candidates){
      const cx2=wx+ox*TILE_SIZE, cy2=wy+oy*TILE_SIZE;
      if(World.canMove(cx2,cy2,r)){ wx=cx2; wy=cy2; placed=true; break; }
    }
    if(!placed) return null; // tile and all neighbours are solid — skip this spawn
    const e={
      id:eidCtr++, type, cfg, isBoss,
      x:wx+(Math.random()-0.5)*8,
      y:wy+(Math.random()-0.5)*8,
      hp:cfg.maxHP, maxHP:cfg.maxHP, size:cfg.size,
      isDead:false, deathTimer:0,
      state:'idle', stateTimer:2+Math.random()*2, prevState:'idle',
      patrolAngle:Math.random()*Math.PI*2, patrolTimer:0,
      patrolTX:wx, patrolTY:wy,
      spawnX:wx,   spawnY:wy,
      attackCD:Math.random()*cfg.attackCD, attackTimer:0, isAttacking:false,
      hitFlash:0,           // white flash on hit
      knockVx:0, knockVy:0, // knockback velocity
      stagger:0,            // stagger timer (can't attack)
      aggroShown:false,     // "!" was shown
      phase:1, runesGiven:false,
      // Boss-specific
      slamCD:0, slamPending:false, slamTimer:0, slamX:0, slamY:0,
    };
    GS.enemies.push(e); return e;
  },

  spawnBoss(){
    if(GS.bossDefeated) return;
    const b=ZONES.BOSS_ARENA.bounds;
    const boss=this.spawn('BOSS', b.x+b.w/2|0, b.y+b.h/2|0, true);
    if(boss){
      boss.x=(b.x+b.w/2)*TILE_SIZE;
      boss.y=(b.y+b.h/2)*TILE_SIZE;
      GS.bossRef=boss; GS.bossActive=true;
    }
  },

  respawnAll(){
    GS.enemies=GS.enemies.filter(e=>e.isBoss&&!e.isDead);
    GS.slamIndicators=[];
    for(const s of this.spawnCfg) this.spawn(s.t,s.x,s.y);
  },

  // dmg — amount; kx,ky — knockback direction
  damage(e, dmg, kx=0, ky=0){
    if(e.isDead) return;
    e.hp-=dmg; e.hitFlash=0.15; e.stagger=0.12;
    // Knockback (bosses get reduced knockback)
    const kStr=e.isBoss?18:55;
    e.knockVx=kx*kStr; e.knockVy=ky*kStr;
    DmgNums.add(e.x, e.y-e.size-10, Math.ceil(dmg), e.isBoss?'#FF8020':'#FFD060', e.isBoss);
    if(e.state==='idle'||e.state==='patrol'){ e.state='chase'; }
    if(e.hp<=0){ e.hp=0; this.kill(e); }
  },

  kill(e){
    e.isDead=true; e.state='dead'; e.deathTimer=1.5;
    if(!e.runesGiven){
      e.runesGiven=true;
      GS.player.runes+=e.cfg.runesDrop;
      GS.player.level=Math.floor(GS.player.runes/500)+1;
      Particles.rune(e.x,e.y);
      this._dropItem(e);
    }
    if(e.isBoss){
      GS.bossDefeated=true; GS.bossActive=false; GS.flags.bossArenaOpen=true;
      UI.msg('GREAT ENEMY FELLED','boss_won',6);
      ScreenFX.flash('#FFD060',0.6,1.2); ScreenFX.shake(12,0.6);
      for(let i=0;i<8;i++) setTimeout(()=>Particles.rune(e.x+(Math.random()-0.5)*90,e.y+(Math.random()-0.5)*70),i*200);
    }
    Particles.death(e.x,e.y,e.cfg.color,14);
  },

  _dropItem(e){
    const table=LOOT_TABLES[e.type]; if(!table) return;
    for(const entry of table){
      if(Math.random()<entry.chance){
        const drop=_makeDropItem(entry.item, e.x+(Math.random()-0.5)*30, e.y+(Math.random()-0.5)*30);
        if(drop) GS.items.push(drop);
        break; // one drop per kill
      }
    }
  },

  update(dt){
    const p=GS.player;
    for(let i=GS.enemies.length-1;i>=0;i--){
      const e=GS.enemies[i];
      if(e.isDead){ e.deathTimer-=dt; if(e.deathTimer<=0&&!e.isBoss) GS.enemies.splice(i,1); continue; }
      // Phase 2 check
      if(e.isBoss&&e.phase===1&&e.hp/e.maxHP<=ENEMY_TYPES.BOSS.p2Threshold){
        e.phase=2;
        UI.msg('PHASE II','boss',2.5);
        ScreenFX.flash('#FF3010',0.55,0.8); ScreenFX.shake(12,0.5);
        Particles.death(e.x,e.y,'#FF6020',40);
      }
      // Knockback decay
      e.knockVx*=Math.pow(0.05,dt); e.knockVy*=Math.pow(0.05,dt);
      const nx=e.x+e.knockVx*dt, ny=e.y+e.knockVy*dt;
      if(World.canMove(nx,e.y,e.size)) e.x=nx;
      if(World.canMove(e.x,ny,e.size)) e.y=ny;
      if(e.hitFlash>0) e.hitFlash-=dt;
      if(e.stagger>0) e.stagger-=dt;
      if(e.slamCD>0) e.slamCD-=dt;
      // Slam pending countdown
      if(e.slamPending){
        e.slamTimer-=dt;
        if(e.slamTimer<=0){
          e.slamPending=false;
          this._executeSlamAOE(e,p);
        }
      }
      this._ai(e,p,dt);
    }
    // Update slam indicator circles
    for(let i=GS.slamIndicators.length-1;i>=0;i--){
      const s=GS.slamIndicators[i]; s.timer-=dt;
      if(s.timer<=0) GS.slamIndicators.splice(i,1);
    }
    this._updateProjectiles(dt);
  },

  _ai(e,p,dt){
    if(e.stagger>0) return;
    if(p.isDead&&e.state!=='idle'){ e.state='patrol'; return; }
    const dist=Math.hypot(p.x-e.x,p.y-e.y);
    const cfg=e.cfg;
    const spdM=(e.phase===2&&cfg.p2SpeedMult)?cfg.p2SpeedMult:1;
    if(e.attackCD>0) e.attackCD-=dt;
    if(e.isAttacking){ e.attackTimer-=dt; if(e.attackTimer<=0) e.isAttacking=false; }

    // Aggro indicator
    if(e.state!=='chase'&&e.state!=='attack') e.aggroShown=false;

    switch(e.state){
      case 'idle':
        e.stateTimer-=dt;
        if(dist<cfg.detRange){ e.state='chase'; e.aggroShown=false; }
        else if(e.stateTimer<=0){ e.state='patrol'; e.patrolTimer=2+Math.random()*3; }
        break;
      case 'patrol':
        if(dist<cfg.detRange){ e.state='chase'; e.aggroShown=false; break; }
        e.patrolTimer-=dt;
        if(e.patrolTimer<=0){
          e.patrolAngle+=(Math.random()-0.5)*Math.PI;
          const pd=60+Math.random()*60;
          e.patrolTX=e.spawnX+Math.cos(e.patrolAngle)*pd;
          e.patrolTY=e.spawnY+Math.sin(e.patrolAngle)*pd;
          e.patrolTimer=2+Math.random()*3;
        }
        this._moveToward(e,e.patrolTX,e.patrolTY,cfg.speed*0.45*spdM,dt);
        break;
      case 'chase':
        if(!e.aggroShown){ e.aggroShown=true; e.aggroTimer=0.8; }
        if(e.aggroTimer>0) e.aggroTimer-=dt;
        if(dist>cfg.detRange*1.6){ e.state='idle'; e.stateTimer=2; break; }
        if(cfg.behavior==='archer'){
          if(dist<cfg.backoff){
            const dx=e.x-p.x, dy=e.y-p.y, l=Math.sqrt(dx*dx+dy*dy)||1;
            this._moveToward(e,e.x+dx/l*100,e.y+dy/l*100,cfg.speed*spdM,dt);
          }
          if(dist<cfg.attackRange&&e.attackCD<=0&&!e.isAttacking) this._attack(e,p,spdM);
        } else {
          if(dist>cfg.attackRange) this._moveToward(e,p.x,p.y,cfg.speed*spdM,dt);
          else e.state='attack';
        }
        break;
      case 'attack':
        if(dist>cfg.attackRange*1.4){ e.state='chase'; break; }
        if(e.attackCD<=0&&!e.isAttacking) this._attack(e,p,spdM);
        // Boss: slam in phase 2
        if(e.isBoss&&e.phase===2&&e.slamCD<=0&&!e.slamPending&&dist<cfg.attackRange*2){
          this._initSlam(e,p);
        }
        break;
    }
  },

  _moveToward(e,tx,ty,spd,dt){
    const dx=tx-e.x, dy=ty-e.y, l=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=e.x+(dx/l)*spd*dt, ny=e.y+(dy/l)*spd*dt;
    if(World.canMove(nx,e.y,e.size)) e.x=nx;
    if(World.canMove(e.x,ny,e.size)) e.y=ny;
  },

  _attack(e,p,spdM){
    const cfg=e.cfg;
    const dmgM=(e.phase===2&&cfg.p2DmgMult)?cfg.p2DmgMult:1;
    e.isAttacking=true; e.attackTimer=cfg.attackDur; e.attackCD=cfg.attackCD;
    if(cfg.behavior==='archer'){
      const dx=p.x-e.x, dy=p.y-e.y, l=Math.sqrt(dx*dx+dy*dy)||1;
      GS.projectiles.push({
        x:e.x, y:e.y, vx:(dx/l)*cfg.projSpeed, vy:(dy/l)*cfg.projSpeed,
        dmg:cfg.meleeDmg*dmgM, sz:5, life:3, color:'#c0c060'
      });
    } else {
      if(Math.hypot(p.x-e.x,p.y-e.y)<cfg.attackRange+14){
        Player.takeDamage(cfg.meleeDmg*dmgM);
        if(e.isBoss) Particles.sparks(e.x,e.y,20);
      }
    }
  },

  // Boss phase-2 telegraphed ground slam
  _initSlam(e,p){
    const cfg=e.cfg;
    e.slamPending=true;
    e.slamTimer=cfg.slamDelay||0.9;
    e.slamCD=3.5;
    e.slamX=p.x; e.slamY=p.y;
    // Visual warning circle
    GS.slamIndicators.push({
      x:p.x, y:p.y, r:0, maxR:cfg.slamRange||110,
      timer:cfg.slamDelay||0.9, max:cfg.slamDelay||0.9
    });
    Particles.sparks(e.x,e.y,12);
  },

  _executeSlamAOE(e,p){
    const cfg=e.cfg;
    const range=cfg.slamRange||110;
    const dmgM=(e.phase===2&&cfg.p2DmgMult)?cfg.p2DmgMult:1;
    ScreenFX.shake(14,0.5);
    ScreenFX.flash('#FF2000',0.35,0.3);
    Particles.sparks(e.slamX,e.slamY,20);
    for(let i=0;i<5;i++) Particles.death(e.slamX+(Math.random()-0.5)*range, e.slamY+(Math.random()-0.5)*range,'#FF4020',5);
    if(!p.isDead&&!p.isInvincible&&Math.hypot(p.x-e.slamX,p.y-e.slamY)<range){
      Player.takeDamage((cfg.slamDmg||40)*dmgM);
    }
  },

  _updateProjectiles(dt){
    const p=GS.player;
    for(let i=GS.projectiles.length-1;i>=0;i--){
      const pr=GS.projectiles[i];
      pr.x+=pr.vx*dt; pr.y+=pr.vy*dt; pr.life-=dt;
      if(pr.life<=0||!World.passable(World.tile(pr.x,pr.y))){
        Particles.sparks(pr.x,pr.y,4); GS.projectiles.splice(i,1); continue;
      }
      if(!p.isDead&&!p.isInvincible&&Math.hypot(p.x-pr.x,p.y-pr.y)<PLAYER_CONFIG.size+pr.sz){
        Player.takeDamage(pr.dmg); Particles.sparks(pr.x,pr.y,6); GS.projectiles.splice(i,1);
      }
    }
  },

  draw(cx,cy){
    // Slam warning indicators — square pixel outline (no arcs)
    for(const s of GS.slamIndicators){
      const sx=(s.x-cx)|0, sy=(s.y-cy)|0;
      const prog=1-(s.timer/s.max);
      const R2=s.maxR*prog|0;
      const a=0.15+prog*0.45;
      ctx.globalAlpha=a*0.18; ctx.fillStyle='#FF2000';
      ctx.fillRect(sx-R2,sy-R2,R2*2,R2*2);
      ctx.globalAlpha=a; ctx.fillStyle='#FF2000';
      // 4-edge pixel outline
      ctx.fillRect(sx-R2,sy-R2,R2*2,2); ctx.fillRect(sx-R2,sy+R2-2,R2*2,2);
      ctx.fillRect(sx-R2,sy-R2,2,R2*2); ctx.fillRect(sx+R2-2,sy-R2,2,R2*2);
      ctx.globalAlpha=1;
    }

    // Items — pixel diamond shape, no arcs
    for(const item of GS.items){
      if(item.collected) continue;
      const sx=(item.x-cx)|0, sy=(item.y-cy)|0;
      if(sx<-25||sx>SCREEN_W+25||sy<-25||sy>SCREEN_H+25) continue;
      item.pt=(item.pt||0)+0.05;
      const bob=Math.sin(item.pt)*3|0;
      // Glow (solid rect, no gradient)
      ctx.globalAlpha=0.25; ctx.fillStyle=item.glow;
      ctx.fillRect(sx-10,sy-10+bob,20,20);
      ctx.globalAlpha=1;
      // Diamond body (3 stacked rects)
      ctx.fillStyle=item.color;
      ctx.fillRect(sx-2,sy-8+bob,4,14);
      ctx.fillRect(sx-5,sy-4+bob,10,6);
      ctx.fillRect(sx-7,sy-1+bob,14,2);
      // Highlight
      ctx.fillStyle='#ffffff'; ctx.fillRect(sx-1,sy-6+bob,2,3);
    }

    // Enemies
    for(const e of GS.enemies) this._drawEnemy(e,cx,cy);

    // Projectiles — pixel square + 1-pixel trail
    for(const pr of GS.projectiles){
      const sx=(pr.x-cx)|0, sy=(pr.y-cy)|0;
      if(sx<-20||sx>SCREEN_W+20||sy<-20||sy>SCREEN_H+20) continue;
      const s=Math.max(2,pr.sz|0);
      // Trail
      ctx.globalAlpha=0.4; ctx.fillStyle='#FFD060';
      ctx.fillRect((sx-pr.vx*0.022)|0-(s>>1),(sy-pr.vy*0.022)|0-(s>>1),s,s);
      // Body
      ctx.globalAlpha=1; ctx.fillStyle=pr.color||'#c0c060';
      ctx.fillRect(sx-(s>>1),sy-(s>>1),s,s);
    }
  },

  _drawEnemy(e,cx,cy){
    const sx=(e.x-cx)|0, sy=(e.y-cy)|0;
    if(sx<-80||sx>SCREEN_W+80||sy<-80||sy>SCREEN_H+80) return;
    const a=e.isDead?Math.max(0,e.deathTimer/1.5):1;

    // Shadow (flat rect, no ellipse)
    ctx.globalAlpha=a*0.35; ctx.fillStyle='#000';
    ctx.fillRect(sx-e.size,sy+e.size-3,e.size*2,4);
    ctx.globalAlpha=a;

    if(e.isBoss) this._drawBoss(e,sx,sy);
    else if(e.type==='HOLLOW') this._drawHollow(e,sx,sy);
    else if(e.type==='BEAST_KNIGHT') this._drawBeastKnight(e,sx,sy);
    else if(e.cfg.behavior==='archer') this._drawArcher(e,sx,sy);
    else this._drawGrunt(e,sx,sy);

    // Hit flash — solid white rect, no arc
    if(e.hitFlash>0){
      ctx.globalAlpha=a*Math.min(1,e.hitFlash/0.1);
      ctx.fillStyle='#FFFFFF';
      ctx.fillRect(sx-e.size,sy-e.size*2|0,e.size*2,e.size*2+6);
      ctx.globalAlpha=a;
    }

    ctx.globalAlpha=1;

    // HP bar (GBC style via updated R.bar)
    if(!e.isDead){
      const bw=e.isBoss?60:34, bh=e.isBoss?6:3;
      R.bar(sx-bw/2|0, sy-e.size-16|0, bw, bh, e.hp, e.maxHP,
            e.phase===2?'#CC2000':'#882010','#1a0000');
    }

    // Aggro "!" indicator
    if(e.aggroShown&&e.aggroTimer>0&&!e.isDead){
      const a2=Math.min(1,e.aggroTimer/0.5);
      ctx.globalAlpha=a2;
      ctx.font='bold 14px monospace'; ctx.textAlign='center'; ctx.fillStyle='#FFD040';
      ctx.fillText('!',sx,sy-e.size-20);
      ctx.globalAlpha=1;
    }
  },

  _drawGrunt(e,sx,sy){
    const isGK=e.type==='GRAVE_KNIGHT';
    const col=e.isAttacking?(isGK?'#8898b8':e.cfg.color==='#5a5c6a'?'#7888a8':'#d07828'):e.cfg.color;
    const dark=e.cfg.darkColor;
    // Shadow
    ctx.fillStyle='#000'; ctx.globalAlpha*=0.22;
    ctx.fillRect(sx-8,sy+11,16,3); ctx.globalAlpha/=0.22;
    // Legs — chunky Terraria-style rectangles
    ctx.fillStyle=dark;
    ctx.fillRect(sx-7,sy+4,6,9); ctx.fillRect(sx+1,sy+4,6,9);
    // Feet
    ctx.fillStyle=isGK?'#202230':'#3a2808';
    ctx.fillRect(sx-8,sy+11,7,3); ctx.fillRect(sx+1,sy+11,7,3);
    // Body — wider torso

    ctx.fillRect(sx-4,sy-13,4,4); ctx.fillRect(sx+0,sy-13,4,4);

    ctx.fillRect(sx-3,sy-12,2,2); ctx.fillRect(sx+1,sy-12,2,2);

    ctx.fillRect(sx+7,sy-13,4,24); // stave

  _drawBoss(e,sx,sy){
    const r=e.size, p2=e.phase===2;
    const ba=e.isDead?Math.max(0,e.deathTimer/1.5):1;

    // Flat aura rect (no radial gradient)
    ctx.globalAlpha=ba*0.14; ctx.fillStyle=p2?'#FF2000':'#c8a060';
    ctx.fillRect(sx-r*2,sy-r*2,r*4,r*4);
    ctx.globalAlpha=ba;

    // Lower body / legs
    ctx.fillStyle=p2?'#3a1008':'#7a5020';
    ctx.fillRect(sx-22,sy+12,14,20); ctx.fillRect(sx+8,sy+12,14,20);

    // Main torso (wide)
    ctx.fillStyle=p2?'#7a1a08':'#b89040';
    ctx.fillRect(sx-22,sy-18,44,32);

    // Shoulder plates
    ctx.fillStyle=p2?'#5a1005':'#906830';
    ctx.fillRect(sx-32,sy-16,12,14); ctx.fillRect(sx+20,sy-16,12,14);

    // Head
    ctx.fillStyle=p2?'#501008':'#907030';
    ctx.fillRect(sx-15,sy-36,30,20);

    // Crown gems (5 pixel squares across top)
    ctx.fillStyle=p2?'#FF5010':'#FFD040';
    for(let i=0;i<5;i++) ctx.fillRect(sx-12+i*6,sy-40,4,5);

    // Eyes (large, glowing)
    const ec=p2?'#FF0000':'#FFA000';
    ctx.fillStyle=ec;
    ctx.fillRect(sx-12,sy-30,8,6); ctx.fillRect(sx+4,sy-30,8,6);
    ctx.globalAlpha=ba*0.4; ctx.fillStyle=ec;
    ctx.fillRect(sx-14,sy-32,12,10); ctx.fillRect(sx+2,sy-32,12,10);
    ctx.globalAlpha=ba;

    // Greatsword — 3 stacked rects (blade, edge, crossguard)
    ctx.fillStyle=p2?'#CC3010':'#9090a8';
    ctx.fillRect(sx+r+4,sy-r-24,7,r*2+34);
    ctx.fillStyle=p2?'#FF6020':'#d0d0e0';
    ctx.fillRect(sx+r+5,sy-r-24,2,r*2+34); // edge gleam
    ctx.fillStyle='#806028';
    ctx.fillRect(sx+r,sy-r-2,18,5); // crossguard

    // Slam windup — pixel square flash, no arc
    if(e.slamPending){
      const t=1-(e.slamTimer/(ENEMY_TYPES.BOSS.slamDelay||0.9));
      ctx.globalAlpha=ba*t*0.45; ctx.fillStyle='#FF2000';
      ctx.fillRect(sx-r*2,sy-r*2,r*4,2); ctx.fillRect(sx-r*2,sy+r*2,r*4,2);
      ctx.fillRect(sx-r*2,sy-r*2,2,r*4); ctx.fillRect(sx+r*2,sy-r*2,2,r*4);
      ctx.globalAlpha=ba;
    }
  },
};

// ============================================================
// CAMERA  — lerp follow with shake offset applied externally
// ============================================================
const Camera = {
  x:0, y:0,
  update(dt){
    const p=GS.player;
    const tx=Math.max(0,Math.min(WORLD_W*TILE_SIZE-SCREEN_W, p.x-SCREEN_W/2));
    const ty=Math.max(0,Math.min(WORLD_H*TILE_SIZE-SCREEN_H, p.y-SCREEN_H/2));
    const ease=1-Math.pow(0.04,dt);
    this.x+=(tx-this.x)*ease;
    this.y+=(ty-this.y)*ease;
  },
};

// ============================================================
// VILLAGE — peaceful NPCs, no combat, purely visual walkers
// ============================================================
const Village = {
  list: GS.npcs,

  // NPC appearance configs
  _defs:[
    {tx:183,ty:30,color:'#8a6840',hair:'#2a1808',name:'Villager'},
    {tx:199,ty:32,color:'#7a6070',hair:'#1a0a0a',name:'Elder'},
    {tx:212,ty:28,color:'#607050',hair:'#302010',name:'Herbalist'},
    {tx:196,ty:56,color:'#9a7050',hair:'#1a1008',name:'Blacksmith'},
    {tx:222,ty:42,color:'#7080a0',hair:'#0a0c18',name:'Wanderer'},
  ],

  init(){
    for(const d of this._defs){
      this.list.push({
        x:d.tx*TILE_SIZE+16, y:d.ty*TILE_SIZE+16,
        vx:(Math.random()-0.5)*20, vy:(Math.random()-0.5)*20,
        color:d.color, hair:d.hair, name:d.name,
        facing:1,
        wanderTimer:Math.random()*4,
        idleTimer:0,
      });
    }
  },

  update(dt){
    const vb=ZONES.VILLAGE.bounds;
    const px0=(vb.x+2)*TILE_SIZE, px1=(vb.x+vb.w-4)*TILE_SIZE;
    const py0=(vb.y+2)*TILE_SIZE, py1=(vb.y+vb.h-4)*TILE_SIZE;
    for(const n of this.list){
      n.wanderTimer-=dt;
      if(n.wanderTimer<=0){
        if(Math.random()<0.3){
          // Brief idle pause
          n.vx=0; n.vy=0; n.wanderTimer=1+Math.random()*2;
        } else {
          const a=Math.random()*Math.PI*2, spd=16+Math.random()*14;
          n.vx=Math.cos(a)*spd; n.vy=Math.sin(a)*spd;
          n.wanderTimer=2+Math.random()*4;
        }
      }
      const nx=n.x+n.vx*dt, ny=n.y+n.vy*dt;
      if(World.canMove(nx,n.y,7)&&nx>px0&&nx<px1){ n.x=nx; if(n.vx!==0) n.facing=n.vx>0?1:-1; }
      else { n.vx=-n.vx*0.5; n.wanderTimer=0.5; }
      if(World.canMove(n.x,ny,7)&&ny>py0&&ny<py1) n.y=ny;
      else { n.vy=-n.vy*0.5; n.wanderTimer=0.5; }
    }
  },

  draw(cx,cy){
    for(const n of this.list){
      const sx=(n.x-cx)|0, sy=(n.y-cy)|0;
      if(sx<-24||sx>SCREEN_W+24||sy<-24||sy>SCREEN_H+24) continue;
      // Shadow
      ctx.globalAlpha=0.28; ctx.fillStyle='#000';
      ctx.fillRect(sx-7,sy+8,14,3);
      ctx.globalAlpha=1;
      // Legs
      ctx.fillStyle='#383840'; ctx.fillRect(sx-5,sy+2,4,7); ctx.fillRect(sx+1,sy+2,4,7);
      // Body / tunic
      ctx.fillStyle=n.color; ctx.fillRect(sx-7,sy-6,14,9);
      // Head
      ctx.fillStyle='#c4a880'; ctx.fillRect(sx-4,sy-15,8,9);
      // Hair
      ctx.fillStyle=n.hair; ctx.fillRect(sx-4,sy-17,8,4);
      // Eyes
      ctx.fillStyle='#100808';
      const ex=n.facing>0?sx+1:sx-3;
      ctx.fillRect(ex,sy-12,2,2);
      // Name label (faint, only when player is nearby)
      const dist=Math.hypot(n.x-GS.player.x,n.y-GS.player.y);
      if(dist<80) R.text(n.name,sx,sy-24,'#a09068',8,'center');
    }
  },
};

// QUEST SYSTEM — "The Elder's Request"
// ============================================================
const Quest = {
  // Fragment world positions (tile→pixel)
  _frags:[
    { tx:27*32+16, ty:49*32+16, label:'Tome Fragment I',   hint:'in the Crumbling Ruins'    },
    { tx:82*32+16, ty:36*32+16, label:'Tome Fragment II',  hint:'deep in the Darkroot Forest'},
    { tx:28*32+16, ty:126*32+16,label:'Tome Fragment III', hint:'inside the Graveyard'       },
  ],

  get q(){ return GS.quest; },

  // Elder is Village.list[1]
  get elder(){ return Village.list[1]||null; },

  init(){
    // fragments are purely in-module; no GS.items needed
  },

  // Called from Player._interact()
  interactElder(px,py){
    const e=this.elder; if(!e) return false;
    if(Math.hypot(px-e.x,py-e.y)>55) return false;
    const q=this.q;
    if(q.phase===0){
      q.phase=1;
      UI.msg("Elder: 'My Ashen Tome was shattered. Find its 3 Fragments — Ruins, Forest, Graveyard.'",'rune',6);
      UI.msg("Quest started: The Elder's Request",'item',3);
      ScreenFX.flash('#c8a020',0.25,0.8);
    } else if(q.phase===1){
      const n=q.found.filter(Boolean).length;
      const next=this._frags.find((_,i)=>!q.found[i]);
      UI.msg(`Elder: '${3-n} fragment${3-n>1?'s':''} remain... seek one ${next?next.hint:'.'}'`,'rune',4);
    } else if(q.phase===2){
      q.phase=3;
      GS.player.runes+=2000;
      GS.player.inventory.push('SOVEREIGN_RING');
      UI.msg("Elder: 'You have my eternal gratitude, Ashen One.'",'rune',5);
      UI.msg("Reward: +2000 Runes",'rune',3);
      UI.msg("Rare: Sovereign Ring",'item',3.5);
      ScreenFX.flash('#FFD040',0.4,1.2);
      Particles.rune(e.x,e.y);
    } else if(q.phase===3){
      UI.msg("Elder: 'May the flames guide you. The tome is whole again.'",'rune',3);
    }
    return true;
  },

  // Called once per frame during 'playing' phase
  update(dt){
    const q=this.q; if(q.phase!==1) return;
    const p=GS.player;
    this._frags.forEach((f,i)=>{
      if(q.found[i]) return;
      if(Math.hypot(p.x-f.tx,p.y-f.ty)<30){
        q.found[i]=true;
        UI.msg(`Found: ${f.label}`,'item',3);
        Particles.sparks(f.tx,f.ty,12);
        ScreenFX.flash('#c8a020',0.3,0.5);
        const done=q.found.every(Boolean);
        if(done){ q.phase=2; UI.msg("All fragments recovered! Return to the Elder in the Village.",'rune',5); }
        else {
          const next=this._frags.find((_,j)=>!q.found[j]);
          if(next) UI.msg(`Next: ${next.hint}`,'rune',3);
        }
      }
    });
  },

  draw(cx,cy){
    const q=this.q;
    // Draw uncollected fragments
    if(q.phase===1){
      const now=Date.now();
      this._frags.forEach((f,i)=>{
        if(q.found[i]) return;
        const sx=(f.tx-cx)|0, sy=(f.ty-cy)|0;
        if(sx<-40||sx>SCREEN_W+40||sy<-40||sy>SCREEN_H+40) return;
        // Pulsing glow
        const pulse=(now/400|0)%2;
        ctx.globalAlpha=0.20+pulse*0.12; ctx.fillStyle='#FFD040';
        ctx.fillRect(sx-12,sy-12,24,24);
        ctx.globalAlpha=1;
        // Orb — layered rects (no arc)
        ctx.fillStyle='#6a4010'; ctx.fillRect(sx-6,sy-6,12,12);
        ctx.fillStyle='#c8900a'; ctx.fillRect(sx-5,sy-5,10,10);
        ctx.fillStyle='#f0c040'; ctx.fillRect(sx-4,sy-4,8,8);
        ctx.fillStyle='#ffe880'; ctx.fillRect(sx-3,sy-3,4,4);
        ctx.fillStyle='#fffff0'; ctx.fillRect(sx-2,sy-2,2,2);
        // Floating rune marks (2px pixel cross)
        ctx.fillStyle='rgba(255,220,80,0.6)';
        ctx.fillRect(sx-8,sy,4,2); ctx.fillRect(sx+4,sy,4,2);
        ctx.fillRect(sx,sy-8,2,4); ctx.fillRect(sx,sy+4,2,4);
        // Label
        R.text(f.label,sx,sy-16,'#c8a060',8,'center');
      });
    }
    // Elder talk prompt
    const e=this.elder;
    if(e&&q.phase!==3){
      const sx=(e.x-cx)|0, sy=(e.y-cy)|0;
      if(Math.hypot(GS.player.x-e.x,GS.player.y-e.y)<60)
        R.text('[E] Talk',sx,sy-32,'#c8a060',10,'center');
    }
    // Minimap fragment dots (shown during active quest)
    if(q.phase===1){
      const mw=100,mh=66,mx=SCREEN_W-mw-8,my=36;
      const scx=mw/(WORLD_W*TILE_SIZE), scy=mh/(WORLD_H*TILE_SIZE);
      this._frags.forEach((f,i)=>{
        if(q.found[i]) return;
        const ex=(mx+f.tx*scx)|0, ey=(my+f.ty*scy)|0;
        ctx.fillStyle='#FFD040'; ctx.fillRect(ex-2,ey-2,4,4);
      });
    }
  },

  drawHUD(){
    const q=this.q; if(q.phase===0||q.phase===3) return;
    const n=q.found.filter(Boolean).length;
    if(q.phase===1){
      R.text(`QUEST  Tome Fragments  ${n} / 3`,8,SCREEN_H-54,'#b89040',9,'left');
      // Small fragment pips
      for(let i=0;i<3;i++){
        ctx.fillStyle=q.found[i]?'#FFD040':'#403020';
        ctx.fillRect(8+i*14,SCREEN_H-44,10,4);
      }
    } else if(q.phase===2){
      R.text('QUEST  Return to the Elder',8,SCREEN_H-54,'#FFD040',9,'left');
    }
  },
};
