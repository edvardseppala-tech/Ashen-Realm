    for(const[ox,oy] of candidates){
      const cx2=wx+ox*TILE_SIZE, cy2=wy+oy*TILE_SIZE;
      if(World.canMove(cx2,cy2,r)){ wx=cx2; wy=cy2; placed=true; break; }
    }
    if(!placed) return null; // tile and all neighbours are solid — skip this spawn
    const e={
      id:eidCtr++, type, cfg, isBoss,
      x:wx+(Math.random()-0.5)*8,
      y:wy+(Math.random()-0.5)*8,
      hp:cfg.maxHP, maxHP:cfg.maxHP, size:cfg.size,
      isDead:false, deathTimer:0,
      state:'idle', stateTimer:2+Math.random()*2, prevState:'idle',
      patrolAngle:Math.random()*Math.PI*2, patrolTimer:0,
      patrolTX:wx, patrolTY:wy,
      spawnX:wx,   spawnY:wy,
      attackCD:Math.random()*cfg.attackCD, attackTimer:0, isAttacking:false,
      hitFlash:0,           // white flash on hit
      knockVx:0, knockVy:0, // knockback velocity
      stagger:0,            // stagger timer (can't attack)
      aggroShown:false,     // "!" was shown
      phase:1, runesGiven:false,
      // Boss-specific slam
      slamCD:0, slamPending:false, slamTimer:0, slamX:0, slamY:0,
      // Custom moveset
      specialMoveCD:0.5+Math.random()*1.5,  // cooldown between special moves
      moveType:'basic',                      // current move type for animation hints
      chargeActive:false, chargeDx:0, chargeDy:0, chargeTimer:0, chargeDmg:0,
      submerged:false, submergeTimer:0,      // for swamp monster submerge
      blazeCD:0,                             // fire trail for boss phase 2
    };
    GS.enemies.push(e); return e;
  },

  spawnBoss(){
    if(GS.bossDefeated||GS.bossActive) return;
    const b=ZONES.BOSS_ARENA.bounds;
    const boss=this.spawn('BOSS', b.x+b.w/2|0, b.y+b.h/2|0, true);
    if(boss){
      boss.x=(b.x+b.w/2)*TILE_SIZE;
      boss.y=(b.y+b.h/2)*TILE_SIZE;
      GS.bossRef=boss; GS.bossActive=true;
    }
  },

  spawnDesertBoss(){
    const db=GS.desertBoss;
    if(db.defeated||db.active) return;
    const b=ZONES.DESERT.bounds;
    const boss=this.spawn('SAND_SERPENT', b.x+b.w/2|0, b.y+b.h/2|0, true);
    if(boss){
      boss.x=(b.x+b.w/2)*TILE_SIZE; boss.y=(b.y+b.h/2)*TILE_SIZE;
      boss.isDesertBoss=true; db.ref=boss; db.active=true;
    }
  },

  spawnEndgameBoss(zone){
    const typeMap={volcanic:'LAVA_TITAN',abyssal:'VOID_LEVIATHAN',crystal:'CRYSTAL_COLOSSUS',corrupted:'CORRUPT_SOVEREIGN'};
    const eb=GS.endgameBoss[zone]; if(!eb||eb.defeated||eb.active) return;
    const b=ZONES[zone.toUpperCase()].bounds;
    const boss=this.spawn(typeMap[zone], b.x+b.w/2|0, b.y+b.h/2|0, true);
    if(boss){
      boss.x=(b.x+b.w/2)*TILE_SIZE; boss.y=(b.y+b.h/2)*TILE_SIZE;
      boss.isEndBoss=true; boss.endZone=zone; eb.ref=boss; eb.active=true;
    }
  },

  spawnMiniBoss(type, zone){
    const mb=GS.miniBosses[zone];
    if(mb.defeated) return;
    const cfg=ENEMY_TYPES[type]; if(!cfg) return;
    // Place in center of zone bounds
    let bounds;
    if(zone==='swamp') bounds=ZONES.SWAMP.bounds;
    else if(zone==='mountain') bounds=ZONES.MOUNTAIN.bounds;
    else if(zone==='grassland'){ bounds=null; } // use fixed spawn for grassland
    const tx=bounds?(bounds.x+bounds.w/2)|0:138, ty=bounds?(bounds.y+bounds.h/2)|0:18;
    const e=this.spawn(type, tx, ty, false);
    if(e){
      e.isMiniBoss=true;
      mb.ref=e; mb.active=true;
    }
  },

  respawnAll(){
    // Remove all enemies (including live bosses); dead ones removed by update loop
    GS.enemies=[];
    GS.slamIndicators=[];
    for(const s of this.spawnCfg) this.spawn(s.t,s.x,s.y);
  },

  // dmg — amount; kx,ky — knockback direction
  damage(e, dmg, kx=0, ky=0){
    if(e.isDead) return;
    if(e.submerged) return; // untargetable while submerged
    e.hp-=dmg; e.hitFlash=0.15; e.stagger=0.12;
    // Knockback (bosses get reduced knockback)
    const kStr=e.isBoss?18:55;
    e.knockVx=kx*kStr; e.knockVy=ky*kStr;
    DmgNums.add(e.x, e.y-e.size-10, Math.ceil(dmg), e.isBoss?'#FF8020':'#FFD060', e.isBoss);
    if(e.state==='idle'||e.state==='patrol'){ e.state='chase'; }
    if(e.hp<=0){ e.hp=0; this.kill(e); }
  },

  kill(e){
    e.isDead=true; e.state='dead'; e.deathTimer=1.5;
    if(!e.runesGiven){
      e.runesGiven=true;
      GS.player.runes+=e.cfg.runesDrop;
      GS.player.totalRunes+=e.cfg.runesDrop;
      Particles.rune(e.x,e.y);
      this._dropItem(e);
    }
    if(e.isBoss){
      GS.bossDefeated=true; GS.bossActive=false; GS.flags.bossArenaOpen=true;
      UI.msg('GREAT ENEMY FELLED','boss_won',6);
      ScreenFX.flash('#FFD060',0.6,1.2); ScreenFX.shake(12,0.6);
      for(let i=0;i<8;i++) setTimeout(()=>Particles.rune(e.x+(Math.random()-0.5)*90,e.y+(Math.random()-0.5)*70),i*200);
      setTimeout(()=>BossRooms.unlock(true),1200);
    }
    // Mini-boss handling
    if(e.isMiniBoss){
      const isSwamp=e.type==='SWAMP_MONSTER', isMtn=e.type==='YETI', isWarden=e.type==='VERDANT_WARDEN';
      if(isSwamp){ GS.miniBosses.swamp.defeated=true; GS.miniBosses.swamp.active=false; }
      if(isMtn){   GS.miniBosses.mountain.defeated=true; GS.miniBosses.mountain.active=false; }
      if(isWarden){ GS.miniBosses.grassland.defeated=true; GS.miniBosses.grassland.active=false; }
      UI.msg('GREAT ENEMY FELLED','boss_won',5);
      ScreenFX.flash('#FFD060',0.5,1.0); ScreenFX.shake(10,0.5);
      for(let i=0;i<6;i++) setTimeout(()=>Particles.rune(e.x+(Math.random()-0.5)*80,e.y+(Math.random()-0.5)*60),i*200);
      setTimeout(()=>BossRooms.unlock(true),1000);
    }
    // Desert boss
    if(e.isDesertBoss){
      GS.desertBoss.defeated=true; GS.desertBoss.active=false;
      UI.msg('THE SAND SERPENT IS SLAIN','boss_won',6);
      ScreenFX.flash('#d4a030',0.6,1.2); ScreenFX.shake(12,0.6);
      for(let i=0;i<8;i++) setTimeout(()=>Particles.rune(e.x+(Math.random()-0.5)*90,e.y+(Math.random()-0.5)*70),i*200);
      setTimeout(()=>BossRooms.unlock(true),1200);
    }
    // End-game bosses
    if(e.isEndBoss){
      const z=e.endZone; const eb=GS.endgameBoss[z];
      if(eb){ eb.defeated=true; eb.active=false; }
      UI.msg('GREAT ENEMY FELLED','boss_won',6);
      ScreenFX.flash('#FFD060',0.7,1.4); ScreenFX.shake(14,0.8);
      for(let i=0;i<10;i++) setTimeout(()=>Particles.rune(e.x+(Math.random()-0.5)*110,e.y+(Math.random()-0.5)*90),i*180);
      setTimeout(()=>BossRooms.unlock(true),1400);
    }
    Particles.death(e.x,e.y,e.cfg.color,14);
  },

  _dropItem(e){
    const table=LOOT_TABLES[e.type]; if(!table) return;
    for(const entry of table){
      if(Math.random()<entry.chance){
        const ix=e.x+(Math.random()-0.5)*30, iy=e.y+(Math.random()-0.5)*30;
        // Check if it's a key item first (from ITEMS), then equipment
        const keyDef=ITEMS[entry.item];
        if(keyDef){
          GS.items.push({...keyDef, ikey:entry.item, x:ix, y:iy, pt:0, collected:false, isConsumable:true});
        } else {
          const drop=_makeDropItem(entry.item, ix, iy);
          if(drop) GS.items.push(drop);
        }
        // Allow all drops for bosses (not just break after first)
        if(!e.isBoss&&!e.isMiniBoss&&!e.isDesertBoss&&!e.isEndBoss) break;
      }
    }
  },

  update(dt){
    const p=GS.player;
    for(let i=GS.enemies.length-1;i>=0;i--){
      const e=GS.enemies[i];
      if(e.isDead){ e.deathTimer-=dt; if(e.deathTimer<=0&&!e.isBoss) GS.enemies.splice(i,1); continue; }
      // Phase 2 check (all boss types)
      const p2thresh=e.cfg.p2Threshold||0.5;
      if((e.isBoss||e.isMiniBoss||e.isDesertBoss||e.isEndBoss)&&e.phase===1&&e.hp/e.maxHP<=p2thresh){
        e.phase=2;
        UI.msg('PHASE II','boss',2.5);
        ScreenFX.flash('#FF3010',0.55,0.8); ScreenFX.shake(12,0.5);
        Particles.death(e.x,e.y,'#FF6020',40);
      }
      // Knockback decay
      e.knockVx*=Math.pow(0.05,dt); e.knockVy*=Math.pow(0.05,dt);
      const nx=e.x+e.knockVx*dt, ny=e.y+e.knockVy*dt;
      if(World.canMove(nx,e.y,e.size)) e.x=nx;
      if(World.canMove(e.x,ny,e.size)) e.y=ny;
      if(e.hitFlash>0) e.hitFlash-=dt;
      if(e.stagger>0) e.stagger-=dt;
      if(e.slamCD>0) e.slamCD-=dt;
      // Slam pending countdown
      if(e.slamPending){
        e.slamTimer-=dt;
        if(e.slamTimer<=0){
          e.slamPending=false;
          this._executeSlamAOE(e,p);
        }
      }
      this._ai(e,p,dt);
    }
    // Update slam indicator circles
    for(let i=GS.slamIndicators.length-1;i>=0;i--){
      const s=GS.slamIndicators[i]; s.timer-=dt;
      if(s.timer<=0) GS.slamIndicators.splice(i,1);
    }
    this._updateProjectiles(dt);
  },

  _ai(e,p,dt){
    if(e.stagger>0) return;
    // Special state: submerged (swamp monster hides briefly)
    if(e.submerged){
      e.submergeTimer-=dt;
      if(e.submergeTimer<=0){
        e.submerged=false;
        // Erupt near player
        e.x=p.x+(Math.random()-0.5)*80;
        e.y=p.y+(Math.random()-0.5)*80;
        Particles.death(e.x,e.y,'#204010',20);
        ScreenFX.shake(8,0.3);
        if(!p.isInvincible&&!p.isDead&&Math.hypot(p.x-e.x,p.y-e.y)<60)
          Player.takeDamage(e.cfg.meleeDmg*1.5*(e.phase===2&&e.cfg.p2DmgMult?e.cfg.p2DmgMult:1));
      }
      return;
    }
    // Special state: charge move
    if(e.chargeActive){
      e.chargeTimer-=dt;
      const spd=e.cfg.speed*3.8;
      const nx=e.x+e.chargeDx*spd*dt, ny=e.y+e.chargeDy*spd*dt;
      if(World.canMove(nx,e.y,e.size)) e.x=nx; else e.chargeActive=false;
      if(World.canMove(e.x,ny,e.size)) e.y=ny; else e.chargeActive=false;
      if(!p.isDead&&!p.isInvincible&&Math.hypot(p.x-e.x,p.y-e.y)<e.size+PLAYER_CONFIG.size+6){
        Player.takeDamage(e.chargeDmg);
        Particles.sparks(e.x,e.y,14);
        ScreenFX.shake(6,0.25);
        e.chargeActive=false; // stop after hit
      }
      if(e.chargeTimer<=0) e.chargeActive=false;
      // Boss fire trail during phase 2 dash
      if(e.isBoss&&e.phase===2&&e.blazeCD<=0){
        e.blazeCD=0.08;
        GS.slamIndicators.push({x:e.x,y:e.y,r:0,maxR:26,timer:0.9,max:0.9,isBlaze:true});
      }
      if(e.blazeCD>0) e.blazeCD-=dt;
      return;
    }
    if(p.isDead&&e.state!=='idle'){ e.state='patrol'; return; }
    // Archer sneak — enemies lose the player
    if(p.sneakTimer>0&&e.state!=='attack'){ e.state='idle'; e.stateTimer=0.5; return; }
    const dist=Math.hypot(p.x-e.x,p.y-e.y);
    const cfg=e.cfg;
    const spdM=(e.phase===2&&cfg.p2SpeedMult)?cfg.p2SpeedMult:1;
    if(e.attackCD>0) e.attackCD-=dt;
    if(e.specialMoveCD>0) e.specialMoveCD-=dt;
    if(e.isAttacking){ e.attackTimer-=dt; if(e.attackTimer<=0) e.isAttacking=false; }

    // Aggro indicator
    if(e.state!=='chase'&&e.state!=='attack') e.aggroShown=false;

    switch(e.state){
      case 'idle':
        e.stateTimer-=dt;
        if(dist<cfg.detRange){ e.state='chase'; e.aggroShown=false; }
        else if(e.stateTimer<=0){ e.state='patrol'; e.patrolTimer=2+Math.random()*3; }
        break;
      case 'patrol':
        if(dist<cfg.detRange){ e.state='chase'; e.aggroShown=false; break; }
        e.patrolTimer-=dt;
        if(e.patrolTimer<=0){
          e.patrolAngle+=(Math.random()-0.5)*Math.PI;
          const pd=60+Math.random()*60;
          e.patrolTX=e.spawnX+Math.cos(e.patrolAngle)*pd;
          e.patrolTY=e.spawnY+Math.sin(e.patrolAngle)*pd;
          e.patrolTimer=2+Math.random()*3;
        }
        this._moveToward(e,e.patrolTX,e.patrolTY,cfg.speed*0.45*spdM,dt);
        break;
      case 'chase':
        if(!e.aggroShown){ e.aggroShown=true; e.aggroTimer=0.8; }
        if(e.aggroTimer>0) e.aggroTimer-=dt;
        if(dist>cfg.detRange*1.6){ e.state='idle'; e.stateTimer=2; break; }
        if(cfg.behavior==='archer'){
          if(dist<cfg.backoff){
            const dx=e.x-p.x, dy=e.y-p.y, l=Math.sqrt(dx*dx+dy*dy)||1;
            this._moveToward(e,e.x+dx/l*100,e.y+dy/l*100,cfg.speed*spdM,dt);
          }
          if(dist<cfg.attackRange&&e.attackCD<=0&&!e.isAttacking) this._attack(e,p,spdM);
        } else {
          if(dist>cfg.attackRange) this._moveToward(e,p.x,p.y,cfg.speed*spdM,dt);
          else e.state='attack';
        }
        break;
      case 'attack':
        if(dist>cfg.attackRange*1.5){ e.state='chase'; break; }
        if(e.attackCD<=0&&!e.isAttacking) this._attack(e,p,spdM);
        // Boss/miniboss/desert/endgame: slam in phase 2
        if((e.isBoss||e.isMiniBoss||e.isDesertBoss||e.isEndBoss)&&e.phase===2&&e.slamCD<=0&&!e.slamPending&&dist<cfg.attackRange*2){
          this._initSlam(e,p);
        }
        break;
    }
  },

  _moveToward(e,tx,ty,spd,dt){
    // Frost aura from Yeti Pelt slows nearby enemies
    const p=GS.player;
    if(p.equipment.armor==='YETI_PELT'&&Math.hypot(p.x-e.x,p.y-e.y)<92) spd*=0.38;
    const dx=tx-e.x, dy=ty-e.y, l=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=e.x+(dx/l)*spd*dt, ny=e.y+(dy/l)*spd*dt;
    if(World.canMove(nx,e.y,e.size)) e.x=nx;
    if(World.canMove(e.x,ny,e.size)) e.y=ny;
  },

  _selectMove(e, dist){
    // Returns a move type string based on enemy type and phase
    const r=Math.random(); const t=e.type; const p2=(e.phase===2);
    const canSpecial=(e.specialMoveCD<=0);
    switch(t){
      case 'GRUNT':
        if(canSpecial&&r<0.22) return 'lunge';
        if(canSpecial&&r<0.40) return 'heavy_slash';
        return 'slash';
      case 'ARCHER':
        if(canSpecial&&r<0.35) return 'volley';
        return 'arrow';
      case 'GRAVE_KNIGHT':
        if(canSpecial&&r<0.25) return 'sweep';
        if(canSpecial&&r<0.42) return 'shield_bash';
        return 'thrust';
      case 'HOLLOW':
        if(canSpecial&&r<0.30) return 'flurry';
        if(canSpecial&&r<0.48) return 'feint';
        return 'slash';
      case 'BEAST_KNIGHT':
        if(canSpecial&&r<0.28) return 'charge';
        if(canSpecial&&r<0.46) return 'stomp';
        return 'axe_swing';
      case 'SWAMP_BEAST':
        if(canSpecial&&r<0.30) return 'spit';
        if(canSpecial&&r<0.48) return 'leap';
        return 'claw';
      case 'SWAMP_MONSTER':
        if(canSpecial&&p2&&r<0.18) return 'submerge';
        if(canSpecial&&r<0.35) return 'toxic_spray';
        if(canSpecial&&r<0.50) return 'vine_grab';
        return 'slam_melee';
      case 'SNOW_GRUNT':
        if(canSpecial&&r<0.40) return 'ice_throw';
        if(canSpecial&&r<0.56) return 'ice_slam';
        return 'jab';
      case 'YETI':
        if(canSpecial&&p2&&r<0.20) return 'blizzard_spin';
        if(canSpecial&&r<0.35) return 'frost_breath';
        if(canSpecial&&r<0.50) return 'charge';
        return 'slam_melee';
      case 'BOSS':
        if(canSpecial&&p2&&r<0.20) return 'crown_beam';
        if(canSpecial&&r<0.35) return 'dash_slash';
        if(canSpecial&&r<0.55) return 'sweep';
        return 'slash';
      case 'BANDIT':
        if(canSpecial&&r<0.30) return 'lunge';
        if(canSpecial&&r<0.50) return 'smoke_step';
        return 'slash';
      case 'BANDIT_ARCHER':
        if(canSpecial&&r<0.40) return 'volley';
        return 'arrow';
      case 'VINE_LURKER':
        if(canSpecial&&r<0.30) return 'vine_grab';
        if(canSpecial&&r<0.50) return 'thorn_burst';
        return 'claw';
      case 'FOREST_KNIGHT':
        if(canSpecial&&r<0.25) return 'sweep';
        if(canSpecial&&r<0.45) return 'shield_bash';
        if(canSpecial&&r<0.60) return 'charge';
        return 'thrust';
      case 'VERDANT_WARDEN':
        if(canSpecial&&p2&&r<0.18) return 'leaf_storm';
        if(canSpecial&&r<0.35) return 'root_trap';
        if(canSpecial&&r<0.55) return 'vine_whip';
        return 'slam_melee';
      default:
        return 'slash';
    }
  },

  _attack(e,p,spdM){
    const cfg=e.cfg;
    const dmgM=(e.phase===2&&cfg.p2DmgMult)?cfg.p2DmgMult:1;
    const dist=Math.hypot(p.x-e.x,p.y-e.y);
    const move=this._selectMove(e,dist);
    e.moveType=move;
    e.isAttacking=true; e.attackTimer=cfg.attackDur; e.attackCD=cfg.attackCD;

    // ── Ranged base attack (archer behavior) ──────────────────────────
    if(cfg.behavior==='archer'){
      if(move==='volley'){
        e.specialMoveCD=2.8;
        const dx=p.x-e.x, dy=p.y-e.y, l=Math.sqrt(dx*dx+dy*dy)||1;
        const ang=Math.atan2(dy,dx);
        for(let i=-1;i<=1;i++){
          const a=ang+i*0.28;
          GS.projectiles.push({x:e.x,y:e.y,vx:Math.cos(a)*cfg.projSpeed,vy:Math.sin(a)*cfg.projSpeed,
            dmg:cfg.meleeDmg*dmgM*0.85, sz:5, life:3.2, color:'#d0d080'});
        }
      } else {
        // arrow (standard)
        const dx=p.x-e.x, dy=p.y-e.y, l=Math.sqrt(dx*dx+dy*dy)||1;
        GS.projectiles.push({x:e.x,y:e.y,vx:(dx/l)*cfg.projSpeed,vy:(dy/l)*cfg.projSpeed,
          dmg:cfg.meleeDmg*dmgM, sz:5, life:3, color:'#c0c060'});
      }
      return;
    }

    // ── Move-based melee attacks ──────────────────────────────────────
    switch(move){
      case 'slash': case 'jab': case 'thrust': case 'claw': case 'axe_swing': case 'slam_melee':
        // Standard melee hit
        if(dist<cfg.attackRange+16){
          const mul=(move==='jab')?0.65:(move==='slam_melee')?1.15:1.0;
          Player.takeDamage(cfg.meleeDmg*dmgM*mul);
          if(e.isBoss||e.isMiniBoss||e.isDesertBoss||e.isEndBoss) Particles.sparks(e.x,e.y,20);
        }
        break;

      case 'heavy_slash':
        e.specialMoveCD=1.8;
        if(dist<cfg.attackRange+20){
          Player.takeDamage(cfg.meleeDmg*dmgM*1.7);
          GS.player.stamina=Math.max(0,GS.player.stamina-25);
          Particles.sparks(e.x,e.y,10);
        }
        break;

      case 'sweep':
        // Wide arc — hits even if player is slightly off-center
        e.specialMoveCD=2.2;
        if(dist<cfg.attackRange*1.35){
          Player.takeDamage(cfg.meleeDmg*dmgM*1.25);
          Particles.sparks(p.x,p.y,12);
          ScreenFX.shake(4,0.15);
        }
        break;

      case 'shield_bash':
        // Short range, staggers (drains stamina)
        e.specialMoveCD=2.5;
        if(dist<cfg.attackRange*0.8){
          Player.takeDamage(cfg.meleeDmg*dmgM*0.6);
          GS.player.stamina=Math.max(0,GS.player.stamina-40);
          GS.player.rootTimer=0.6; // brief root from the bash
          Particles.sparks(p.x,p.y,8);
        }
        break;

      case 'stomp': {
        // Small AOE at feet
        e.specialMoveCD=2.0;
        const sRange=cfg.attackRange*1.1;
        GS.slamIndicators.push({x:e.x,y:e.y,r:0,maxR:sRange,timer:0.3,max:0.3});
        if(dist<sRange&&!GS.player.isInvincible){
          Player.takeDamage(cfg.meleeDmg*dmgM*0.9);
          ScreenFX.shake(5,0.2);
        }
        Particles.sparks(e.x,e.y,12);
        break;}

      case 'flurry':
        // Rapid 3-hit burst — schedule 3 quick damage ticks
        e.specialMoveCD=2.2; e.attackCD=0.3;
        if(dist<cfg.attackRange+14){
          for(let i=0;i<3;i++){
            setTimeout(()=>{
              if(!GS.player.isDead&&!GS.player.isInvincible&&Math.hypot(p.x-e.x,p.y-e.y)<cfg.attackRange+18)
                Player.takeDamage(cfg.meleeDmg*dmgM*0.5);
              Particles.sparks(e.x,e.y,4);
            },i*100);
          }
        }
        break;

      case 'feint':
        // Lunge toward player — no damage; follows up with slash on next attack
        e.specialMoveCD=1.8;
        e.attackCD=0.35; // faster follow-up
        {const dx2=p.x-e.x,dy2=p.y-e.y,l2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
        e.knockVx=(dx2/l2)*-60; e.knockVy=(dy2/l2)*-60;} // lurch toward
        break;

      case 'lunge':
        // Charge dash at player
        e.specialMoveCD=3.0;
        { const dx2=p.x-e.x,dy2=p.y-e.y,l2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
          e.chargeActive=true; e.chargeDx=dx2/l2; e.chargeDy=dy2/l2;
          e.chargeTimer=0.28; e.chargeDmg=cfg.meleeDmg*dmgM*1.4;
          Particles.sparks(e.x,e.y,10); }
        break;

      case 'charge':
        // Full-speed charge
        e.specialMoveCD=4.0;
        { const dx2=p.x-e.x,dy2=p.y-e.y,l2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
          e.chargeActive=true; e.chargeDx=dx2/l2; e.chargeDy=dy2/l2;
          e.chargeTimer=0.45; e.chargeDmg=cfg.meleeDmg*dmgM*(e.type==='YETI'?2.0:1.65);
          GS.slamIndicators.push({x:p.x,y:p.y,r:0,maxR:60,timer:0.38,max:0.38});
          Particles.sparks(e.x,e.y,16); }
        break;

      case 'leap':
        // Swamp beast leaps at player
        e.specialMoveCD=3.2;
        { const dx2=p.x-e.x,dy2=p.y-e.y,l2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
          e.chargeActive=true; e.chargeDx=dx2/l2; e.chargeDy=dy2/l2;
          e.chargeTimer=0.22; e.chargeDmg=cfg.meleeDmg*dmgM*1.3;
          Particles.sparks(e.x,e.y,8); }
        break;

      case 'spit':
        // Toxic projectile
        e.specialMoveCD=2.5;
        { const dx2=p.x-e.x,dy2=p.y-e.y,l2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
          GS.projectiles.push({x:e.x,y:e.y,vx:(dx2/l2)*110,vy:(dy2/l2)*110,
            dmg:cfg.meleeDmg*dmgM*1.1, sz:8, life:4, color:'#4a8010', glow:'#60a020'}); }
        break;

      case 'ice_throw':
        // Ice projectile — slightly slower, slightly bigger
        e.specialMoveCD=2.2;
        { const dx2=p.x-e.x,dy2=p.y-e.y,l2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
          GS.projectiles.push({x:e.x,y:e.y,vx:(dx2/l2)*145,vy:(dy2/l2)*145,
            dmg:cfg.meleeDmg*dmgM*0.9, sz:7, life:3.5, color:'#88b8d8', glow:'#a8d8f8',
            isIce:true}); }
        break;

      case 'ice_slam':
        // Stamp spear, mini-AOE at feet
        e.specialMoveCD=1.8;
        if(dist<cfg.attackRange*1.2){
          Player.takeDamage(cfg.meleeDmg*dmgM*0.85);
          GS.player.rootTimer=Math.max(GS.player.rootTimer,0.5);
          Particles.sparks(e.x,e.y,10);
        }
        break;

      case 'toxic_spray': {
        // Swamp monster: cone of 5 projectiles
        e.specialMoveCD=3.5;
        const dx3=p.x-e.x,dy3=p.y-e.y;
        const ang3=Math.atan2(dy3,dx3);
        for(let i=-2;i<=2;i++){
          const a3=ang3+i*0.22;
          const spd3=90+Math.random()*40;
          GS.projectiles.push({x:e.x,y:e.y,vx:Math.cos(a3)*spd3,vy:Math.sin(a3)*spd3,
            dmg:cfg.meleeDmg*dmgM*0.7, sz:9, life:3.5, color:'#3a7010', glow:'#50a018'});
        }
        ScreenFX.flash('#204010',0.2,0.3);
        break;}

      case 'vine_grab':
        // Root player in place briefly
        e.specialMoveCD=5.0;
        if(dist<cfg.attackRange*1.8){
          GS.player.rootTimer=2.0;
          UI.msg('Ensnared by vines!','rune',1.5);
          Particles.death(p.x,p.y,'#204010',12);
          ScreenFX.flash('#204010',0.18,0.4);
        }
        break;

      case 'submerge':
        // Swamp monster dives underground briefly, erupts near player
        e.specialMoveCD=7.0;
        e.submerged=true; e.submergeTimer=1.6;
        Particles.death(e.x,e.y,'#204010',16);
        UI.msg('The Horror submerges!','rune',1.2);
        break;

      case 'frost_breath': {
        // Yeti: cone of 7 icy projectiles
        e.specialMoveCD=4.0;
        const dx4=p.x-e.x,dy4=p.y-e.y;
        const ang4=Math.atan2(dy4,dx4);
        for(let i=-3;i<=3;i++){
          const a4=ang4+i*0.18;
          GS.projectiles.push({x:e.x,y:e.y,vx:Math.cos(a4)*105,vy:Math.sin(a4)*105,
            dmg:cfg.meleeDmg*dmgM*0.65, sz:8, life:3.8, color:'#6898c8', glow:'#90c8f0',
            isIce:true});
        }
        ScreenFX.flash('#101830',0.22,0.35);
        break;}

      case 'blizzard_spin': {
        // Yeti phase 2: AOE spin for 2s
        e.specialMoveCD=6.0;
        GS.slamIndicators.push({x:e.x,y:e.y,r:0,maxR:cfg.attackRange*1.6,timer:0.5,max:0.5});
        if(dist<cfg.attackRange*1.6&&!GS.player.isInvincible){
          Player.takeDamage(cfg.meleeDmg*dmgM*1.2);
          GS.player.rootTimer=Math.max(GS.player.rootTimer,0.6);
        }
        for(let i=0;i<4;i++){
          const a5=i*Math.PI/2;
          GS.projectiles.push({x:e.x,y:e.y,vx:Math.cos(a5)*80,vy:Math.sin(a5)*80,
            dmg:cfg.meleeDmg*dmgM*0.4, sz:7, life:0.9, color:'#80c0e8', isIce:true});
        }
        ScreenFX.flash('#101830',0.3,0.45);
        break;}

      case 'dash_slash':
        // Boss teleports to player, slash
        e.specialMoveCD=4.5;
        { const dx5=p.x-e.x,dy5=p.y-e.y,l5=Math.sqrt(dx5*dx5+dy5*dy5)||1;
          e.chargeActive=true; e.chargeDx=dx5/l5; e.chargeDy=dy5/l5;
          e.chargeTimer=0.35; e.chargeDmg=cfg.meleeDmg*dmgM*1.8;
          GS.slamIndicators.push({x:p.x,y:p.y,r:0,maxR:80,timer:0.28,max:0.28});
          e.blazeCD=0; // reset so fire trail starts immediately
          Particles.sparks(e.x,e.y,18); ScreenFX.flash('#300808',0.2,0.25); }
        break;

      case 'smoke_step':
        // Bandit dashes sideways, repositions
        e.specialMoveCD=2.0;
        { const perp={x:-GS.player.facing.y||1, y:GS.player.facing.x||0};
          const side=(Math.random()<0.5?1:-1)*80;
          e.knockVx=perp.x*side; e.knockVy=perp.y*side;
          e.chargeActive=false; }
        break;

      case 'thorn_burst': {
        // Vine Lurker: 4 projectiles outward
        e.specialMoveCD=2.5;
        const angles=[0,Math.PI/2,Math.PI,Math.PI*1.5];
        for(const ang of angles){
          GS.projectiles.push({x:e.x,y:e.y,vx:Math.cos(ang)*120,vy:Math.sin(ang)*120,
            dmg:cfg.meleeDmg*dmgM*0.75, sz:7, life:3.0, color:'#2a6010', glow:'#40a018'});
        }
        Particles.death(e.x,e.y,'#2a6010',10);
        break;}

      case 'leaf_storm': {
        // Verdant Warden phase 2: 8 projectiles in all directions
        e.specialMoveCD=4.5;
        for(let i=0;i<8;i++){
          const ang2=i*(Math.PI/4);
          GS.projectiles.push({x:e.x,y:e.y,vx:Math.cos(ang2)*140,vy:Math.sin(ang2)*140,
            dmg:cfg.meleeDmg*dmgM*0.60, sz:8, life:3.5, color:'#3a7818', glow:'#60c030'});
        }
        ScreenFX.flash('#204010',0.25,0.4);
        UI.msg('Leaf Storm!','boss',1.0);
        break;}

      case 'root_trap':
        // Verdant Warden: roots the player
        e.specialMoveCD=5.0;
        if(dist<cfg.attackRange*2.0){
          GS.player.rootTimer=1.8;
          UI.msg('Roots ensnare you!','rune',1.5);
          Particles.death(GS.player.x,GS.player.y,'#204010',14);
          ScreenFX.flash('#204010',0.2,0.4);
        }
        break;

      case 'vine_whip':
        // Verdant Warden: heavy vine strike
        e.specialMoveCD=2.8;
        if(dist<cfg.attackRange*1.4){
          Player.takeDamage(cfg.meleeDmg*dmgM*1.6);
          Particles.sparks(e.x,e.y,16);
          ScreenFX.shake(6,0.25);
        }
        break;

      case 'crown_beam': {
        // Boss phase 2: aimed beam after telegraph
        e.specialMoveCD=5.5;
        const dx6=p.x-e.x,dy6=p.y-e.y,l6=Math.sqrt(dx6*dx6+dy6*dy6)||1;
        GS.slamIndicators.push({x:p.x,y:p.y,r:0,maxR:50,timer:0.85,max:0.85,isBeam:true,
          bx:e.x,by:e.y,tx:dx6/l6,ty:dy6/l6});
        setTimeout(()=>{
          if(!GS.player.isDead&&!GS.player.isInvincible){
            const d=Math.hypot(GS.player.x-e.x,GS.player.y-e.y);
            if(d<260){ // beam range
              Player.takeDamage(cfg.meleeDmg*dmgM*2.4);
              ScreenFX.flash('#601010',0.4,0.5);
              ScreenFX.shake(10,0.35);
              Particles.sparks(GS.player.x,GS.player.y,20);
            }
          }
        },900);
        ScreenFX.flash('#300808',0.25,0.4);
        UI.msg('Crown Beam!','boss',1.0);
        break;}
    }

    if(e.isBoss||e.isMiniBoss||e.isDesertBoss||e.isEndBoss) Particles.sparks(e.x,e.y,12);
  },

  // Boss phase-2 telegraphed ground slam
  _initSlam(e,p){
    const cfg=e.cfg;
    e.slamPending=true;
    e.slamTimer=cfg.slamDelay||0.9;
    e.slamCD=3.5;
    e.slamX=p.x; e.slamY=p.y;
    // Visual warning circle
    GS.slamIndicators.push({
      x:p.x, y:p.y, r:0, maxR:cfg.slamRange||110,
      timer:cfg.slamDelay||0.9, max:cfg.slamDelay||0.9
    });
    Particles.sparks(e.x,e.y,12);
  },

  _executeSlamAOE(e,p){
    const cfg=e.cfg;
    const range=cfg.slamRange||110;
    const dmgM=(e.phase===2&&cfg.p2DmgMult)?cfg.p2DmgMult:1;
    ScreenFX.shake(14,0.5);
    ScreenFX.flash('#FF2000',0.35,0.3);
    Particles.sparks(e.slamX,e.slamY,20);
    for(let i=0;i<5;i++) Particles.death(e.slamX+(Math.random()-0.5)*range, e.slamY+(Math.random()-0.5)*range,'#FF4020',5);
    if(!p.isDead&&!p.isInvincible&&Math.hypot(p.x-e.slamX,p.y-e.slamY)<range){
      Player.takeDamage((cfg.slamDmg||40)*dmgM);
    }
  },

  _updateProjectiles(dt){
    const p=GS.player;
    for(let i=GS.projectiles.length-1;i>=0;i--){
      const pr=GS.projectiles[i];
      pr.x+=pr.vx*dt; pr.y+=pr.vy*dt; pr.life-=dt;
      const hitWall=!World.passable(World.tile(pr.x,pr.y));
      if(pr.life<=0||hitWall){
        // Explosive arrow detonates on wall/expiry
        if(pr.isExplosive&&hitWall){
          const aoeR=pr.explosionR||64;
          const nvx=pr.vx/(Math.abs(pr.vx)||1), nvy=pr.vy/(Math.abs(pr.vy)||1);
          for(const e of GS.enemies){
            if(e.isDead) continue;
            if(Math.hypot(e.x-pr.x,e.y-pr.y)<aoeR) Enemies.damage(e,pr.dmg,nvx,nvy);
          }
          for(let fi=0;fi<14;fi++) Particles.death(pr.x+(Math.random()-0.5)*aoeR,pr.y+(Math.random()-0.5)*aoeR,'#ff6010',4);
          ScreenFX.flash('#ff4010',0.25,0.25); ScreenFX.shake(6,0.2);
        } else {
          Particles.sparks(pr.x,pr.y,4);
        }
        GS.projectiles.splice(i,1); continue;
      }
      if(pr.isPlayerProj){
        // Player projectile — hits enemies
        let hit=false;
        for(const e of GS.enemies){
          if(e.isDead) continue;
          if(pr.isPiercing&&pr.piercedIds&&pr.piercedIds.has(e.id)) continue;
          if(Math.hypot(e.x-pr.x,e.y-pr.y)<e.size+pr.sz){
            const nvx=pr.vx/(Math.abs(pr.vx)||1), nvy=pr.vy/(Math.abs(pr.vy)||1);
            Enemies.damage(e,pr.dmg,nvx,nvy);
            if(pr.isExplosive){
              // Explosive arrow — AoE splash
              const aoeR=pr.explosionR||64;
              for(const e2 of GS.enemies){
                if(e2.isDead||e2===e) continue;
                if(Math.hypot(e2.x-pr.x,e2.y-pr.y)<aoeR)
                  Enemies.damage(e2,pr.dmg*0.6,nvx,nvy);
              }
              for(let fi=0;fi<12;fi++) Particles.death(pr.x+(Math.random()-0.5)*aoeR,pr.y+(Math.random()-0.5)*aoeR,'#ff6010',4);
              ScreenFX.flash('#ff4010',0.25,0.25); ScreenFX.shake(6,0.2);
              Particles.sparks(pr.x,pr.y,18);
              GS.projectiles.splice(i,1); hit=true; break;
            }
            if(pr.isFireball){
              // Fireball AOE — splash all nearby enemies
              const aoeR=pr.fireballSz*2.8;
              for(const e2 of GS.enemies){
                if(e2.isDead||e2===e) continue;
                if(Math.hypot(e2.x-pr.x,e2.y-pr.y)<aoeR)
                  Enemies.damage(e2,pr.dmg*0.6,nvx,nvy);
              }
              ScreenFX.flash('#ff4010',0.25,0.25);
              ScreenFX.shake(6,0.2);
              for(let fi=0;fi<12;fi++) Particles.death(pr.x+(Math.random()-0.5)*aoeR,pr.y+(Math.random()-0.5)*aoeR,'#ff6010',4);
            }
            if(pr.freezeHit){
              e.rootTimer=Math.max(e.rootTimer||0, 2.0);
              UI.msg('Frozen!','rune',0.8);
            }
            if(pr.isToxic&&!pr.freezeHit){
              e.rootTimer=Math.max(e.rootTimer||0, 0.8);
            }
            Particles.sparks(pr.x,pr.y,pr.isFireball?16:8);
            if(pr.isPiercing){ pr.piercedIds.add(e.id); }
            else { hit=true; break; }
          }
        }
        if(hit){ GS.projectiles.splice(i,1); continue; }
      } else {
        // Enemy projectile — hits player
        if(!p.isDead&&!p.isInvincible&&Math.hypot(p.x-pr.x,p.y-pr.y)<PLAYER_CONFIG.size+pr.sz){
          Player.takeDamage(pr.dmg);
          if(pr.isIce){ p.rootTimer=Math.max(p.rootTimer,0.5); UI.msg('Chilled!','rune',0.8); }
          Particles.sparks(pr.x,pr.y,6); GS.projectiles.splice(i,1);
        }
      }
    }
  },

  draw(cx,cy){
    // Slam / special warning indicators
    for(const s of GS.slamIndicators){
      const sx=(s.x-cx)|0, sy=(s.y-cy)|0;
      const prog=1-(s.timer/s.max);
      const R2=s.maxR*prog|0;
      if(s.isBlaze){
        // Fire trail from boss dash — ember circle
        ctx.globalAlpha=0.45*(1-prog); ctx.fillStyle='#c03010';
        ctx.fillRect(sx-s.maxR/2|0,sy-s.maxR/2|0,s.maxR,s.maxR);
        ctx.globalAlpha=1; continue;
      }
      if(s.isBeam){
        // Crown beam telegraph — thin red line toward target
        const bsx=(s.bx-cx)|0, bsy=(s.by-cy)|0;
        const a2=0.15+prog*0.65;
        ctx.globalAlpha=a2; ctx.fillStyle='#FF2000';
        const len2=Math.min(260,Math.hypot(sx-bsx,sy-bsy));
        ctx.save(); ctx.translate(bsx,bsy);
        ctx.rotate(Math.atan2(sy-bsy,sx-bsx));
        ctx.fillRect(0,-3,len2,6);
        ctx.globalAlpha=a2*0.35; ctx.fillStyle='#FF6020';
        ctx.fillRect(0,-8,len2,16);
        ctx.restore();
        ctx.globalAlpha=1; continue;
      }
      const a=0.15+prog*0.45;
      ctx.globalAlpha=a*0.18; ctx.fillStyle='#FF2000';
      ctx.fillRect(sx-R2,sy-R2,R2*2,R2*2);
      ctx.globalAlpha=a; ctx.fillStyle='#FF2000';
      // 4-edge pixel outline
      ctx.fillRect(sx-R2,sy-R2,R2*2,2); ctx.fillRect(sx-R2,sy+R2-2,R2*2,2);
      ctx.fillRect(sx-R2,sy-R2,2,R2*2); ctx.fillRect(sx+R2-2,sy-R2,2,R2*2);
      ctx.globalAlpha=1;
    }

    // Items — pixel diamond shape, no arcs
    for(const item of GS.items){
      if(item.collected) continue;
      const sx=(item.x-cx)|0, sy=(item.y-cy)|0;
      if(sx<-25||sx>SCREEN_W+25||sy<-25||sy>SCREEN_H+25) continue;
      item.pt=(item.pt||0)+0.05;
      const bob=Math.sin(item.pt)*3|0;
      // Glow (solid rect, no gradient)
      ctx.globalAlpha=0.25; ctx.fillStyle=item.glow;
      ctx.fillRect(sx-10,sy-10+bob,20,20);
      ctx.globalAlpha=1;
      // Diamond body (3 stacked rects)
      ctx.fillStyle=item.color;
      ctx.fillRect(sx-2,sy-8+bob,4,14);
      ctx.fillRect(sx-5,sy-4+bob,10,6);
      ctx.fillRect(sx-7,sy-1+bob,14,2);
      // Highlight
      ctx.fillStyle='#ffffff'; ctx.fillRect(sx-1,sy-6+bob,2,3);
    }

    // Enemies
    for(const e of GS.enemies) this._drawEnemy(e,cx,cy);

    // Projectiles — pixel square + 1-pixel trail
    for(const pr of GS.projectiles){
      const sx=(pr.x-cx)|0, sy=(pr.y-cy)|0;
      if(sx<-20||sx>SCREEN_W+20||sy<-20||sy>SCREEN_H+20) continue;
      const s=Math.max(2,pr.sz|0);
      if(pr.isPlayerProj){
        if(pr.isArrow){
          // Arrow — elongated rotated rect
          const a=pr.angle||Math.atan2(pr.vy,pr.vx);
          ctx.save();
          ctx.translate(sx,sy);
          ctx.rotate(a);
          // Shaft
          ctx.globalAlpha=1; ctx.fillStyle=pr.color||'#9a5018';
          ctx.fillRect(-10,-2,20,4);
          // Tip (darker point)
          ctx.fillStyle='#d0d0c0';
          ctx.fillRect(8,-2,6,4);
          // Fletching
          ctx.fillStyle='#f0f0e0';
          ctx.fillRect(-12,-3,5,2); ctx.fillRect(-12,1,5,2);
          // Glow halo for explosive arrow
          if(pr.isExplosive){
            ctx.globalAlpha=0.4; ctx.fillStyle=pr.glow||'#ff8020';
            ctx.fillRect(-12,-5,28,10);
          }
          ctx.restore();
          ctx.globalAlpha=1;
        } else if(pr.isFireball){
          // Fireball — layered orange glow
          ctx.globalAlpha=0.20; ctx.fillStyle='#ff8020';
          ctx.fillRect(sx-(s+6>>1),sy-(s+6>>1),s+6,s+6);
          ctx.globalAlpha=0.45; ctx.fillStyle='#ff6010';
          ctx.fillRect(sx-(s+3>>1),sy-(s+3>>1),s+3,s+3);
          ctx.globalAlpha=1; ctx.fillStyle='#ff4010';
          ctx.fillRect(sx-(s>>1),sy-(s>>1),s,s);
          ctx.fillStyle='#ffe060'; ctx.fillRect(sx-2,sy-2,4,4); // hot core
          ctx.fillStyle='#fff'; ctx.fillRect(sx-1,sy-1,2,2);    // white center
        } else if(pr.isMagicBolt){
          // Magic bolt — pulsing colored square with bright core
          ctx.globalAlpha=0.30; ctx.fillStyle=pr.glow||'#c060ff';
          ctx.fillRect(sx-(s+4>>1),sy-(s+4>>1),s+4,s+4);
          ctx.globalAlpha=0.65; ctx.fillStyle=pr.color||'#8040c0';
          ctx.fillRect(sx-(s>>1),sy-(s>>1),s,s);
          ctx.globalAlpha=1; ctx.fillStyle='#ffffff';
          ctx.fillRect(sx-2,sy-2,4,4); // bright core
          // Ice bolt tint
          if(pr.isIce){
            ctx.globalAlpha=0.4; ctx.fillStyle='#80e0ff';
            ctx.fillRect(sx-(s>>1),sy-(s>>1),s,s);
          }
          ctx.globalAlpha=1;
        } else {
          // Generic player projectile
          ctx.globalAlpha=0.35; ctx.fillStyle=pr.glow||'#406020';
          ctx.fillRect(sx-(s+3>>1),sy-(s+3>>1),s+3,s+3);
          ctx.globalAlpha=1; ctx.fillStyle=pr.color||'#2a6a10';
          ctx.fillRect(sx-(s>>1),sy-(s>>1),s,s);
          ctx.fillStyle='#60ff40'; ctx.fillRect(sx-1,sy-1,2,2);
        }
      } else {
        // Trail
        ctx.globalAlpha=0.4; ctx.fillStyle='#FFD060';
        ctx.fillRect((sx-pr.vx*0.022)|0-(s>>1),(sy-pr.vy*0.022)|0-(s>>1),s,s);
        // Body
        ctx.globalAlpha=1; ctx.fillStyle=pr.color||'#c0c060';
        ctx.fillRect(sx-(s>>1),sy-(s>>1),s,s);
      }
    }
  },

  drawFiltered(cx,cy,pred){
    // Draw slam indicators and items always, then only enemies matching pred
    for(const s of GS.slamIndicators){
      const sx=(s.x-cx)|0, sy=(s.y-cy)|0;
      const prog=1-(s.timer/s.max); const R2=s.maxR*prog|0;
      if(s.isBlaze){ ctx.globalAlpha=0.45*(1-prog); ctx.fillStyle='#c03010'; ctx.fillRect(sx-s.maxR/2|0,sy-s.maxR/2|0,s.maxR,s.maxR); ctx.globalAlpha=1; continue; }
      const a=0.15+prog*0.45; ctx.globalAlpha=a; ctx.fillStyle='#FF2000';
      ctx.fillRect(sx-R2,sy-R2,R2*2,2); ctx.fillRect(sx-R2,sy+R2-2,R2*2,2);
      ctx.fillRect(sx-R2,sy-R2,2,R2*2); ctx.fillRect(sx+R2-2,sy-R2,2,R2*2);
      ctx.globalAlpha=1;
    }
    for(const e of GS.enemies){ if(pred(e)) this._drawEnemy(e,cx,cy); }
    // Projectiles
    for(const pr of GS.projectiles){
      const sx=(pr.x-cx)|0, sy=(pr.y-cy)|0;
      if(sx<-20||sx>SCREEN_W+20||sy<-20||sy>SCREEN_H+20) continue;
      const s=Math.max(2,pr.sz|0);
      ctx.globalAlpha=0.4; ctx.fillStyle='#FFD060';
      ctx.fillRect((sx-pr.vx*0.022)|0-(s>>1),(sy-pr.vy*0.022)|0-(s>>1),s,s);
      ctx.globalAlpha=1; ctx.fillStyle=pr.color||'#c0c060';
      ctx.fillRect(sx-(s>>1),sy-(s>>1),s,s);
    }
  },

  _drawEnemy(e,cx,cy){
    const sx=(e.x-cx)|0, sy=(e.y-cy)|0;
    if(sx<-80||sx>SCREEN_W+80||sy<-80||sy>SCREEN_H+80) return;
    const a=e.isDead?Math.max(0,e.deathTimer/1.5):1;

    // Shadow (flat rect, no ellipse)
    ctx.globalAlpha=a*0.35; ctx.fillStyle='#000';
    ctx.fillRect(sx-e.size,sy+e.size-3,e.size*2,4);
    ctx.globalAlpha=a;

    if(e.isBoss) this._drawBoss(e,sx,sy);
    else if(e.type==='SWAMP_MONSTER') this._drawSwampMonster(e,sx,sy);
    else if(e.type==='YETI') this._drawYeti(e,sx,sy);
    else if(e.type==='VERDANT_WARDEN') this._drawVerdantWarden(e,sx,sy);
    else if(e.type==='HOLLOW') this._drawHollow(e,sx,sy);
    else if(e.type==='BEAST_KNIGHT') this._drawBeastKnight(e,sx,sy);
    else if(e.type==='SWAMP_BEAST') this._drawSwampBeast(e,sx,sy);
    else if(e.type==='SNOW_GRUNT') this._drawSnowGrunt(e,sx,sy);
    else if(e.type==='BANDIT'||e.type==='FOREST_KNIGHT') this._drawBandit(e,sx,sy);
    else if(e.type==='VINE_LURKER') this._drawVineLurker(e,sx,sy);
    // Desert enemies
    else if(e.type==='SCORPION') this._drawScorpion(e,sx,sy);
    else if(e.type==='MUMMY') this._drawMummy(e,sx,sy);
    else if(e.type==='SAND_WARRIOR') this._drawSandWarrior(e,sx,sy);
    else if(e.type==='SAND_ARCHER') this._drawSandArcher(e,sx,sy);
    else if(e.type==='SAND_SERPENT') this._drawSandSerpent(e,sx,sy);
    // Endgame enemies
    else if(e.type==='ASH_SPAWN'||e.type==='LAVA_BRUTE') this._drawVolcanicEnemy(e,sx,sy);
    else if(e.type==='DEPTH_WRAITH'||e.type==='ABYSSAL_STALKER') this._drawAbyssalEnemy(e,sx,sy);
    else if(e.type==='CRYSTAL_DRONE'||e.type==='PRISM_GOLEM') this._drawCrystalEnemy(e,sx,sy);
    else if(e.type==='CORRUPTED_HOLLOW'||e.type==='SHADOW_KNIGHT') this._drawCorruptedEnemy(e,sx,sy);
    else if(e.type==='LAVA_TITAN') this._drawLavaTitan(e,sx,sy);
    else if(e.type==='VOID_LEVIATHAN') this._drawVoidLeviathan(e,sx,sy);
    else if(e.type==='CRYSTAL_COLOSSUS') this._drawCrystalColossus(e,sx,sy);
    else if(e.type==='CORRUPT_SOVEREIGN') this._drawCorruptSovereign(e,sx,sy);
    else if(e.cfg.behavior==='archer') this._drawArcher(e,sx,sy);
    else this._drawGrunt(e,sx,sy);

    // Charge motion trail
    if(e.chargeActive){
      ctx.globalAlpha=a*0.50; ctx.fillStyle='#FFD040';
      ctx.fillRect(sx-e.size-(e.chargeDx*10|0),sy-e.size-(e.chargeDy*10|0),e.size*2,e.size*2);
      ctx.globalAlpha=a*0.25; ctx.fillRect(sx-e.size-(e.chargeDx*22|0),sy-e.size-(e.chargeDy*22|0),e.size*2,e.size*2);
      ctx.globalAlpha=a;
    }

    // Submerge — draw only the "sinking" silhouette, skip full draw
    if(e.submerged){
      ctx.globalAlpha=a*0.28; ctx.fillStyle='#204010';
      ctx.fillRect(sx-e.size,sy,e.size*2,e.size);
      ctx.globalAlpha=1; return;
    }

    // Hit flash — solid white rect, no arc
    if(e.hitFlash>0){
      ctx.globalAlpha=a*Math.min(1,e.hitFlash/0.1);
      ctx.fillStyle='#FFFFFF';
      ctx.fillRect(sx-e.size,sy-e.size*2|0,e.size*2,e.size*2+6);
      ctx.globalAlpha=a;
    }

    ctx.globalAlpha=1;

    // HP bar (GBC style via updated R.bar)
    if(!e.isDead){
      const bw=e.isBoss?60:34, bh=e.isBoss?6:3;
      R.bar(sx-bw/2|0, sy-e.size-16|0, bw, bh, e.hp, e.maxHP,
            e.phase===2?'#CC2000':'#882010','#1a0000');
    }

    // Aggro "!" indicator
    if(e.aggroShown&&e.aggroTimer>0&&!e.isDead){
      const a2=Math.min(1,e.aggroTimer/0.5);
      ctx.globalAlpha=a2;
      ctx.font='bold 14px monospace'; ctx.textAlign='center'; ctx.fillStyle='#FFD040';
      ctx.fillText('!',sx,sy-e.size-20);
      ctx.globalAlpha=1;
    }
  },

  _drawSandSerpent(e,sx,sy){
    // Sand Serpent — true horizontal snake form, NOT humanoid
    // The body is a wide sinuous coil centered on (sx,sy), head extends right, tail left
    const r=e.size; const p2=e.phase===2;
    const ba=e.isDead?Math.max(0,e.deathTimer/1.5):1;
    const t=(Date.now()/380)%(Math.PI*2);
    const sway=Math.sin(t)*6|0;  // body sway animation

    ctx.globalAlpha=ba*0.14; ctx.fillStyle=p2?'#e09020':'#c06818';
    ctx.fillRect(sx-r*3,sy-r,r*6,r*2); // horizontal aura
    ctx.globalAlpha=ba;

    const sc=p2?'#d09828':'#a87020'; // scale color
    const sc2=p2?'#e8b030':'#c08828'; // lighter scale
    const belly=p2?'#f0d868':'#d4b040'; // belly color
    const outline='#000';

    // ── TAIL section (left side, thin rattler) ──────────────────────
    // Rattle segments
    ctx.fillStyle='#6a4808'; ctx.fillRect(sx-r*3-10,sy-4+sway,10,8);
    ctx.fillStyle='#9a7010'; ctx.fillRect(sx-r*3-8, sy-3+sway, 7,6);
    ctx.fillStyle='#6a4808'; ctx.fillRect(sx-r*3-5, sy-2+sway, 5,4); // rattle tip
    // Tail body — tapers from left
    ctx.fillStyle=sc;   ctx.fillRect(sx-r*3,   sy-5+sway, r+2,10);
    ctx.fillStyle=sc2;  ctx.fillRect(sx-r*3+2, sy-3+sway, r-2, 6);
    ctx.fillStyle=outline; ctx.fillRect(sx-r*3-1,sy-5+sway,1,10); ctx.fillRect(sx-r*2,sy-6+sway,r+2,1); ctx.fillRect(sx-r*2,sy+5+sway,r+2,1);

    // ── MID-BODY section (center mass, widest part, upper coil) ─────
    const midY=sway;
    ctx.fillStyle=sc;   ctx.fillRect(sx-r*2, sy-r/2+midY, r*4, r);
    ctx.fillStyle=sc2;  ctx.fillRect(sx-r*2+4, sy-r/2+4+midY, r*4-8, r-8);
    ctx.fillStyle=outline;
    ctx.fillRect(sx-r*2-1,sy-r/2+midY,1,r); ctx.fillRect(sx+r*2,sy-r/2+midY,1,r);
    ctx.fillRect(sx-r*2,sy-r/2-1+midY,r*4,1); ctx.fillRect(sx-r*2,sy+r/2+midY,r*4,1);

    // Scale chevrons across mid-body
    ctx.fillStyle=sc2;
    for(let i=0;i<8;i++){
      const bx=sx-r*2+6+i*14;
      ctx.fillRect(bx,   sy-r/2+4+midY, 10,4);
      ctx.fillRect(bx+2, sy-r/2+9+midY,  6,3);
    }
    // Belly stripe
    ctx.fillStyle=belly;
    ctx.fillRect(sx-r*2+6, sy-4+midY, r*4-12, 8);
    ctx.fillStyle=p2?'#fff080':'#e8c850';
    for(let i=0;i<12;i++) ctx.fillRect(sx-r*2+8+i*10,sy-2+midY,6,4);

    // Lower coil loop under main body (gives snake its coil silhouette)
    const loopY=sy+r/2+10;
    ctx.fillStyle=sc;   ctx.fillRect(sx-r,   loopY, r*2, r*0.7|0);
    ctx.fillStyle=sc2;  ctx.fillRect(sx-r+4, loopY+3, r*2-8, r*0.7-6|0);
    ctx.fillStyle=outline; ctx.fillRect(sx-r-1,loopY,1,r*0.7|0); ctx.fillRect(sx+r,loopY,1,r*0.7|0);
    ctx.fillRect(sx-r,loopY-1,r*2,1); ctx.fillRect(sx-r,loopY+r*0.7|0,r*2,1);

    // ── NECK section (between body and head) ─────────────────────────
    const neckOff=Math.sin(t+0.5)*4|0;
    ctx.fillStyle=sc;   ctx.fillRect(sx+r*2-2, sy-r/2+neckOff, r+4, r);
    ctx.fillStyle=sc2;  ctx.fillRect(sx+r*2,   sy-r/2+4+neckOff, r,   r-8);
    // Hood flare / neck frill
    ctx.fillStyle=p2?'#e8a028':'#c07820';
    ctx.fillRect(sx+r*2+r/2-2,sy-r+neckOff, r+4,4);  // top frill
    ctx.fillRect(sx+r*2+r/2-2,sy+r/2-4+neckOff, r+4,4); // bottom frill
    ctx.fillStyle=p2?'#f0c050':'#d4980c';
    ctx.fillRect(sx+r*2+r/2,sy-r+2+neckOff, r,2);
    ctx.fillRect(sx+r*2+r/2,sy+r/2-2+neckOff, r,2);

    // ── HEAD section (right side, triangular skull) ───────────────────
    const hx=sx+r*3+r/2; const hy=sy+neckOff;
    const hw=r*1.2|0; const hh=r*0.9|0;

    ctx.fillRect(sx-r+2,sy+r,r-2,r+14); ctx.fillRect(sx+2,sy+r,r-2,r+14);

  _drawVoidLeviathan(e,sx,sy){
    // Void Leviathan — deep-sea eel creature. Horizontal elongated body, rows of eyes,
    // massive fanged maw at front-right, thrashing tentacle tail at rear-left.
    const r=e.size; const p2=e.phase===2;
    const ba=e.isDead?Math.max(0,e.deathTimer/1.5):1;
    const t=(Date.now()/420)%(Math.PI*2);
    const wave=Math.sin(t)*5|0; // body undulation

    ctx.globalAlpha=ba*0.18; ctx.fillStyle=p2?'#3060ff':'#0818b0';
    ctx.fillRect(sx-r*3,sy-r,r*6,r*2); ctx.globalAlpha=ba; // horizontal aura

    const bc=p2?'#0c1840':'#060c28';   // body dark
    const bc2=p2?'#1838a0':'#0c1870';  // body mid
    const vc=p2?'#4080ff':'#2050c0';   // void-energy color

    // ── TAIL tentacles (left side) ────────────────────────────────────
    for(let i=0;i<4;i++){
      const ty2=wave+sy+(i-1.5)*10;
      const len=30+i%2*14;
      ctx.fillStyle=bc; ctx.fillRect(sx-r*3-len,ty2-4+i*2,len,6-i);
      ctx.fillStyle=bc2; ctx.fillRect(sx-r*3-len+2,ty2-2+i*2,len-4,3-Math.floor(i/2));
      // Sucker dots
      ctx.fillStyle=vc;
      for(let j=0;j<3;j++) ctx.fillRect(sx-r*3-10-j*10,ty2-1+i*2,3,3);
    }

    // ── BODY — long horizontal slab, widest in center ─────────────────
    const bh=r*1.1|0; // body height
    ctx.fillStyle=bc;
    ctx.fillRect(sx-r*3, sy-bh/2+wave, r*6, bh);
    ctx.fillStyle='#000';
    ctx.fillRect(sx-r*3-1,sy-bh/2+wave,1,bh); ctx.fillRect(sx+r*3,sy-bh/2+wave,1,bh);
    ctx.fillRect(sx-r*3,sy-bh/2-1+wave,r*6,1); ctx.fillRect(sx-r*3,sy+bh/2+wave,r*6,1);
    // Void-energy rib lines along body
    ctx.fillStyle=bc2;
    ctx.fillRect(sx-r*2+4,sy-bh/2+2+wave,r*4-8,bh-4);
    ctx.fillStyle=vc;

  _drawCrystalColossus(e,sx,sy){

// ============================================================
// CAMERA  — lerp follow with shake offset applied externally
// ============================================================
const Camera = {
  x:0, y:0,
  update(dt){
    const p=GS.player;
    const tx=Math.max(0,Math.min(WORLD_W*TILE_SIZE-SCREEN_W, p.x-SCREEN_W/2));
    const ty=Math.max(0,Math.min(WORLD_H*TILE_SIZE-SCREEN_H, p.y-SCREEN_H/2));
    const ease=1-Math.pow(0.04,dt);
    this.x+=(tx-this.x)*ease;
    this.y+=(ty-this.y)*ease;
  },
};

// ============================================================
// VILLAGE — peaceful NPCs, no combat, purely visual walkers
// ============================================================
const Village = {
  list: GS.npcs,

  // NPC appearance configs
  _defs:[
    {tx:193,ty:30,color:'#8a6840',hair:'#2a1808',name:'Villager'},
    {tx:199,ty:32,color:'#7a6070',hair:'#1a0a0a',name:'Elder'},
    {tx:212,ty:28,color:'#607050',hair:'#302010',name:'Herbalist'},
    {tx:196,ty:50,color:'#9a7050',hair:'#1a1008',name:'Blacksmith'},
    {tx:222,ty:42,color:'#7080a0',hair:'#0a0c18',name:'Wanderer'},
    {tx:57, ty:22, color:'#5a7040',hair:'#1a2010',name:'Grassland Elder', type:'grassland_elder'},
  ],

  init(){
    for(const d of this._defs){
      this.list.push({
        x:d.tx*TILE_SIZE+16, y:d.ty*TILE_SIZE+16,
        vx:(Math.random()-0.5)*20, vy:(Math.random()-0.5)*20,
        color:d.color, hair:d.hair, name:d.name,
        facing:1,
        wanderTimer:Math.random()*4,
        idleTimer:0,
      });
    }
  },

  update(dt){
    const vb=ZONES.VILLAGE.bounds;
    const px0=(vb.x+2)*TILE_SIZE, px1=(vb.x+vb.w-4)*TILE_SIZE;
    const py0=(vb.y+2)*TILE_SIZE, py1=(vb.y+vb.h-4)*TILE_SIZE;
    for(const n of this.list){
      n.wanderTimer-=dt;
      if(n.wanderTimer<=0){
        if(Math.random()<0.3){
          // Brief idle pause
          n.vx=0; n.vy=0; n.wanderTimer=1+Math.random()*2;
        } else {
          const a=Math.random()*Math.PI*2, spd=16+Math.random()*14;
          n.vx=Math.cos(a)*spd; n.vy=Math.sin(a)*spd;
          n.wanderTimer=2+Math.random()*4;
        }
      }
      const nx=n.x+n.vx*dt, ny=n.y+n.vy*dt;
      if(World.canMove(nx,n.y,7)&&nx>px0&&nx<px1){ n.x=nx; if(n.vx!==0) n.facing=n.vx>0?1:-1; }
      else { n.vx=-n.vx*0.5; n.wanderTimer=0.5; }
      if(World.canMove(n.x,ny,7)&&ny>py0&&ny<py1) n.y=ny;
      else { n.vy=-n.vy*0.5; n.wanderTimer=0.5; }
    }
  },

  draw(cx,cy){
    for(const n of this.list){
      const sx=(n.x-cx)|0, sy=(n.y-cy)|0;
      if(sx<-24||sx>SCREEN_W+24||sy<-24||sy>SCREEN_H+24) continue;
      // Shadow
      ctx.globalAlpha=0.28; ctx.fillStyle='#000';
      ctx.fillRect(sx-7,sy+8,14,3);
      ctx.globalAlpha=1;
      // Legs
      ctx.fillStyle='#383840'; ctx.fillRect(sx-5,sy+2,4,7); ctx.fillRect(sx+1,sy+2,4,7);
      // Body / tunic
      ctx.fillStyle=n.color; ctx.fillRect(sx-7,sy-6,14,9);
      // Head
      ctx.fillStyle='#c4a880'; ctx.fillRect(sx-4,sy-15,8,9);
      // Hair
      ctx.fillStyle=n.hair; ctx.fillRect(sx-4,sy-17,8,4);
      // Eyes
      ctx.fillStyle='#100808';
      const ex=n.facing>0?sx+1:sx-3;
      ctx.fillRect(ex,sy-12,2,2);
      // Name label (faint, only when player is nearby)
      const dist=Math.hypot(n.x-GS.player.x,n.y-GS.player.y);
      if(dist<80) R.text(n.name,sx,sy-24,'#a09068',8,'center');
    }
  },
};

// QUEST SYSTEM — "The Elder's Request"
// ============================================================
const Quest = {
  // Fragment world positions (tile→pixel)
  _frags:[
    { tx:27*32+16, ty:49*32+16, label:'Tome Fragment I',   hint:'in the Crumbling Ruins'    },
    { tx:82*32+16, ty:36*32+16, label:'Tome Fragment II',  hint:'deep in the Darkroot Forest'},
    { tx:28*32+16, ty:126*32+16,label:'Tome Fragment III', hint:'inside the Graveyard'       },
  ],

  get q(){ return GS.quest; },

  // Elder is Village.list[1]
  get elder(){ return Village.list[1]||null; },

  init(){
    // fragments are purely in-module; no GS.items needed
  },

  // Called from Player._interact()
  interactElder(px,py){
    // Check grassland elder first
    const gElder=Village.list.find(n=>n.type==='grassland_elder');
    if(gElder&&Math.hypot(px-gElder.x,py-gElder.y)<=55){
      return this._interactGrasslandElder(gElder);
    }
    const e=this.elder; if(!e) return false;
    if(Math.hypot(px-e.x,py-e.y)>55) return false;
    const q=this.q;
    if(q.phase===0){
      q.phase=1;
      UI.msg("Elder: 'My Ashen Tome was shattered. Find its 3 Fragments — Ruins, Forest, Graveyard.'",'rune',6);
      UI.msg("Quest started: The Elder's Request",'item',3);
      ScreenFX.flash('#c8a020',0.25,0.8);
    } else if(q.phase===1){
      const n=q.found.filter(Boolean).length;
      const next=this._frags.find((_,i)=>!q.found[i]);
      UI.msg(`Elder: '${3-n} fragment${3-n>1?'s':''} remain... seek one ${next?next.hint:'.'}'`,'rune',4);
    } else if(q.phase===2){
      q.phase=3;
      GS.player.runes+=2000; GS.player.totalRunes+=2000;
      GS.player.inventory.push('SOVEREIGN_RING');
      UI.msg("Elder: 'You have my eternal gratitude, Ashen One.'",'rune',5);
      UI.msg("Reward: +2000 Runes",'rune',3);
      UI.msg("Rare: Sovereign Ring",'item',3.5);
      ScreenFX.flash('#FFD040',0.4,1.2);
      Particles.rune(e.x,e.y);
    } else if(q.phase===3){
      UI.msg("Elder: 'May the flames guide you. The tome is whole again.'",'rune',3);
    }
    return true;
  },

  _interactGrasslandElder(e){
    const gq=GS.grasslandQuest;
    if(gq.phase===0){
      gq.phase=1;
      UI.msg("Elder: 'A monstrous warden has corrupted these lands. Head east into the verdant expanse and face the beast.'",'rune',6);
      UI.msg("Grassland Quest started",'item',3);
      ScreenFX.flash('#204010',0.25,0.8);
    } else if(gq.phase===1){
      UI.msg("Elder: 'The Verdant Warden prowls the eastern expanse. Grow strong, then challenge the beast at the sealed gate.'",'rune',4);
    } else if(gq.phase===2){
      gq.phase=3;
      GS.player.inventory.push('ARCHER_TALISMAN');
      UI.msg("Elder: 'You\\'ve done it! Take this — the Archer\\'s Talisman, blessed by the wind.'",'rune',5);
      UI.msg("Rare: Archer Talisman",'item',3);
      ScreenFX.flash('#40a020',0.4,1.2);
      Particles.rune(e.x,e.y);
    } else if(gq.phase===3){
      UI.msg("Elder: 'The Verdant Expanse is at peace once more. May the wind guide you.'",'rune',3);
    }
    return true;
  },

  // Called once per frame during 'playing' phase
  update(dt){
    const q=this.q;
    // Grassland quest phase check
    const gq=GS.grasslandQuest;
    if(gq.phase===1&&GS.miniBosses.grassland.defeated) gq.phase=2;
    if(q.phase!==1) return;
    const p=GS.player;
    this._frags.forEach((f,i)=>{
      if(q.found[i]) return;
      if(Math.hypot(p.x-f.tx,p.y-f.ty)<30){
        q.found[i]=true;
        UI.msg(`Found: ${f.label}`,'item',3);
        Particles.sparks(f.tx,f.ty,12);
        ScreenFX.flash('#c8a020',0.3,0.5);
        const done=q.found.every(Boolean);
        if(done){ q.phase=2; UI.msg("All fragments recovered! Return to the Elder in the Village.",'rune',5); }
        else {
          const next=this._frags.find((_,j)=>!q.found[j]);
          if(next) UI.msg(`Next: ${next.hint}`,'rune',3);
        }
      }
    });
  },

  draw(cx,cy){
    const q=this.q;
    // Draw uncollected fragments
    if(q.phase===1){
      const now=Date.now();
      this._frags.forEach((f,i)=>{
        if(q.found[i]) return;
        const sx=(f.tx-cx)|0, sy=(f.ty-cy)|0;
        if(sx<-40||sx>SCREEN_W+40||sy<-40||sy>SCREEN_H+40) return;
        // Pulsing glow
        const pulse=(now/400|0)%2;
        ctx.globalAlpha=0.20+pulse*0.12; ctx.fillStyle='#FFD040';
        ctx.fillRect(sx-12,sy-12,24,24);
        ctx.globalAlpha=1;
        // Orb — layered rects (no arc)
        ctx.fillStyle='#6a4010'; ctx.fillRect(sx-6,sy-6,12,12);
        ctx.fillStyle='#c8900a'; ctx.fillRect(sx-5,sy-5,10,10);
        ctx.fillStyle='#f0c040'; ctx.fillRect(sx-4,sy-4,8,8);
        ctx.fillStyle='#ffe880'; ctx.fillRect(sx-3,sy-3,4,4);
        ctx.fillStyle='#fffff0'; ctx.fillRect(sx-2,sy-2,2,2);
        // Floating rune marks (2px pixel cross)
        ctx.fillStyle='rgba(255,220,80,0.6)';
        ctx.fillRect(sx-8,sy,4,2); ctx.fillRect(sx+4,sy,4,2);
        ctx.fillRect(sx,sy-8,2,4); ctx.fillRect(sx,sy+4,2,4);
        // Label
        R.text(f.label,sx,sy-16,'#c8a060',8,'center');
      });
    }
    // Elder talk prompt
    const e=this.elder;
    if(e&&q.phase!==3){
      const sx=(e.x-cx)|0, sy=(e.y-cy)|0;
      if(Math.hypot(GS.player.x-e.x,GS.player.y-e.y)<60)
        R.text('[E] Talk',sx,sy-32,'#c8a060',10,'center');
    }
    // Grassland elder talk prompt
    const gElder=Village.list.find(n=>n.type==='grassland_elder');
    const gq=GS.grasslandQuest;
    if(gElder&&gq.phase!==3){
      const gsx=(gElder.x-cx)|0, gsy=(gElder.y-cy)|0;
      if(Math.hypot(GS.player.x-gElder.x,GS.player.y-gElder.y)<60)
        R.text('[E] Talk',gsx,gsy-32,'#60c030',10,'center');
    }
    // Minimap fragment dots (shown during active quest)
    if(q.phase===1){
      const mw=100,mh=66,mx=SCREEN_W-mw-8,my=36;
      const scx=mw/(WORLD_W*TILE_SIZE), scy=mh/(WORLD_H*TILE_SIZE);
      this._frags.forEach((f,i)=>{
        if(q.found[i]) return;
        const ex=(mx+f.tx*scx)|0, ey=(my+f.ty*scy)|0;
        ctx.fillStyle='#FFD040'; ctx.fillRect(ex-2,ey-2,4,4);
      });
    }
  },

  drawHUD(){
    const q=this.q; if(q.phase===0||q.phase===3) return;
    const n=q.found.filter(Boolean).length;
    if(q.phase===1){
      R.text(`QUEST  Tome Fragments  ${n} / 3`,8,SCREEN_H-54,'#b89040',9,'left');
      // Small fragment pips
      for(let i=0;i<3;i++){
        ctx.fillStyle=q.found[i]?'#FFD040':'#403020';
        ctx.fillRect(8+i*14,SCREEN_H-44,10,4);
      }
    } else if(q.phase===2){
      R.text('QUEST  Return to the Elder',8,SCREEN_H-54,'#FFD040',9,'left');
    }
  },
};

// ============================================================
// EQUIPMENT MENU
// ============================================================
const Equipment = {
  SLOTS: ['weapon','armor','ring','talisman'],
  SLOT_LABEL: {weapon:'WEAPON',armor:'ARMOR',ring:'RING',talisman:'TALISMAN'},
  SLOT_KEY:   {weapon:'[W]',  armor:'[A]',  ring:'[R]', talisman:'[T]'},

  equip(idx){
    const p=GS.player;
    if(idx<0||idx>=p.inventory.length) return;
    const id=p.inventory[idx];
    const item=EQUIPMENT_ITEMS[id]; if(!item) return;
    // Level requirement check
    if(item.levelReq&&p.level<item.levelReq){
      UI.msg(`Requires Level ${item.levelReq}  (You are Lv.${p.level})`,'rune',2.5);
      ScreenFX.flash('#602020',0.20,0.3);
      return;
    }
    const slot=item.slot;
    if(p.equipment[slot]) p.inventory.push(p.equipment[slot]); // swap old to inv
    p.equipment[slot]=id;
    p.inventory.splice(idx,1);
    p.equipCursor=Math.min(p.equipCursor, Math.max(0,p.inventory.length-1));
    // Clamp HP/Stamina to new max
    p.hp=Math.min(p.hp, Stats.maxHP());
    p.stamina=Math.min(p.stamina, Stats.maxStamina());
    UI.msg(`Equipped: ${item.name}`,'item',1.5);
  },

  unequip(slot){
    const p=GS.player;
    if(!p.equipment[slot]) return;
    p.inventory.push(p.equipment[slot]);
    p.equipment[slot]=null;
  },

  handleInput(){
    const p=GS.player;
    const len=p.inventory.length;
    if(Input.just('ArrowUp'))   p.equipCursor=Math.max(0,p.equipCursor-1);
    if(Input.just('ArrowDown')) p.equipCursor=Math.min(Math.max(0,len-1),p.equipCursor+1);
    if(Input.just('KeyE'))      this.equip(p.equipCursor);
    if(Input.just('KeyW'))      this.unequip('weapon');
    if(Input.just('KeyA'))      this.unequip('armor');
    if(Input.just('KeyR'))      this.unequip('ring');
    if(Input.just('KeyT'))      this.unequip('talisman');
  },

  draw(){
    // Dark overlay
    R.rectA(0,0,SCREEN_W,SCREEN_H,'#000',0.82);

    const PX=SCREEN_W/2-270|0, PY=50, PW=540, PH=520;
    // Outer border + panel bg
    ctx.fillStyle='#000'; ctx.fillRect(PX-4,PY-4,PW+8,PH+8);
    ctx.fillStyle='#080604'; ctx.fillRect(PX,PY,PW,PH);
    // Title bar
    ctx.fillStyle='#0e0a06'; ctx.fillRect(PX,PY,PW,26);
    R.shadow('EQUIPMENT',SCREEN_W/2,PY+18,'#c8a060','#000',14,'center');
    ctx.fillStyle='#2a1c0c'; ctx.fillRect(PX,PY+26,PW,1);

    const p=GS.player;

    // ---- LEFT COLUMN: equipped slots (x=PX+12) ----
    const LX=PX+12, SH=58;
    R.text('EQUIPPED',LX+90,PY+42,'#604828',8,'center');
    for(let i=0;i<this.SLOTS.length;i++){
      const slot=this.SLOTS[i];
      const sy2=PY+50+i*SH;
      const eqId=p.equipment[slot];
      const item=eqId?EQUIPMENT_ITEMS[eqId]:null;
      // Slot box
      ctx.fillStyle='#000'; ctx.fillRect(LX,sy2,200,SH-4);
      ctx.fillStyle=item?'#120e06':'#0a0a0a'; ctx.fillRect(LX+2,sy2+2,196,SH-8);
      // Slot header
      R.text(`${this.SLOT_KEY[slot]} ${this.SLOT_LABEL[slot]}`,LX+8,sy2+12,'#3c2e18',8);
      if(item){
        // Rarity strip (4px left edge)
        ctx.fillStyle=RARITY_COLOR[item.rarity]; ctx.fillRect(LX+2,sy2+2,4,SH-8);
        R.text(item.name,LX+14,sy2+28,RARITY_COLOR[item.rarity],11);
        R.text(item.desc||'',LX+14,sy2+42,'#706050',8);
      } else {
        R.text('— empty —',LX+14,sy2+30,'#282820',10);
      }
    }

    // ---- STATS BOX (below slots) ----
    const STY=PY+50+this.SLOTS.length*SH+6;
    ctx.fillStyle='#000'; ctx.fillRect(LX,STY,200,96);
    ctx.fillStyle='#0c0a06'; ctx.fillRect(LX+2,STY+2,196,92);
    R.text('PLAYER STATS',LX+100,STY+13,'#604828',8,'center');
    ctx.fillStyle='#1a1208'; ctx.fillRect(LX+2,STY+16,196,1);
    const mHP=Stats.maxHP(), mST=Stats.maxStamina(), mFP2=Stats.maxFP(), dmg=Stats.damage(), def=Stats.defense();
    R.text(`HP       ${Math.ceil(p.hp)} / ${mHP}`, LX+10,STY+26,'#cc6060',9);
    R.text(`FP       ${Math.ceil(p.fp)} / ${mFP2}`, LX+10,STY+38,'#4060c0',9);
    R.text(`Stamina  ${Math.ceil(p.stamina)} / ${mST}`, LX+10,STY+50,'#60a030',9);
    const upg=p.equipment.weapon?(p.weaponUpgrades[p.equipment.weapon]||0):0;
    const upgStr=upg>0?` (+${upg})`:''
    R.text(`Attack   base + ${dmg}${upgStr}`,         LX+10,STY+62,'#c8a060',9);
    R.text(`Defense  base + ${def}`,                  LX+10,STY+74,'#6090c0',9);

    // ---- RIGHT COLUMN: inventory list (x=PX+228) ----
    const RX=PX+228;
    R.text('INVENTORY',RX+142,PY+42,'#604828',8,'center');
    if(p.inventory.length===0){
      R.text('(empty)',RX+142,PY+90,'#303028',10,'center');
    }
    const maxVisible=8;
    const start=Math.max(0,p.equipCursor-maxVisible+1);
    for(let i=0;i<Math.min(p.inventory.length,maxVisible);i++){
      const idx=start+i;
      if(idx>=p.inventory.length) break;
      const id=p.inventory[idx];
      const item=EQUIPMENT_ITEMS[id]; if(!item) continue;
      const iy=PY+50+i*46;
      const sel=idx===p.equipCursor;
      // Row bg
      ctx.fillStyle='#000'; ctx.fillRect(RX,iy,300,42);
      ctx.fillStyle=sel?'#1a1408':'#0c0a06'; ctx.fillRect(RX+2,iy+2,296,38);
      // Selection bar
      if(sel){ ctx.fillStyle='#c8a060'; ctx.fillRect(RX+2,iy+2,3,38); }
      // Rarity swatch
      ctx.fillStyle=RARITY_COLOR[item.rarity]; ctx.fillRect(RX+10,iy+13,4,16);
      // Name & slot line
      R.text(item.name, RX+20,iy+20, sel?'#e8c870':RARITY_COLOR[item.rarity], 11);
      R.text(`[${this.SLOT_LABEL[item.slot]}]  ${RARITY_LABEL[item.rarity]}`, RX+20,iy+33,'#4a3c28',8);
      // Bonuses
      R.text(item.desc||'', RX+190,iy+20,'#607888',9,'left');
    }
    // Scroll indicator
    if(p.inventory.length>maxVisible)
      R.text(`${p.equipCursor+1}/${p.inventory.length}`,RX+284,PY+42,'#403828',8,'right');

    // ---- KEY ITEMS / CONSUMABLES ----
    if(p.consumables.length>0){
      const KY=STY+102;
