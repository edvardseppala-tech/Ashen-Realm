           SCREEN_W/2, PY+PH-6, '#3a3020', 8, 'center');
  },
};

// ============================================================
// LEVEL UP SYSTEM
// ============================================================
const LevelUp = {
  handleInput(){
    const p=GS.player;
    if(Input.just('ArrowUp'))   p.levelupCursor=Math.max(0,p.levelupCursor-1);
    if(Input.just('ArrowDown')) p.levelupCursor=Math.min(STAT_CHOICES.length-1,p.levelupCursor+1);
    // Number keys 1-5
    for(let i=1;i<=STAT_CHOICES.length;i++){
      if(Input.just(`Digit${i}`)) p.levelupCursor=i-1;
    }
    if(Input.just('KeyE')||Input.just('KeyJ')||Input.just('Space')){
      const ch=STAT_CHOICES[p.levelupCursor];
      p.statPoints[ch.key]+=ch.val;
      // Also heal for HP/FP/STA bonuses on level-up
      if(ch.key==='hp')      p.hp=Math.min(Stats.maxHP(),      p.hp      + ch.val);
      if(ch.key==='fp')      p.fp=Math.min(Stats.maxFP(),      p.fp      + ch.val);
      if(ch.key==='stamina') p.stamina=Math.min(Stats.maxStamina(), p.stamina + ch.val);
      p.pendingLevelUps--;
      if(p.pendingLevelUps>0){ p.levelupCursor=0; }
      else { GS.phase='playing'; UI.msg(`Level ${p.level} — ${ch.label.split(' ')[0]} increased!`,'levelup',2.5); ScreenFX.flash('#c8a060',0.30,0.4); }
    }
  },

  draw(){
    R.rectA(0,0,SCREEN_W,SCREEN_H,'#000',0.85);
    const p=GS.player;
    const cx=SCREEN_W/2, cy=SCREEN_H/2;
    const pw=340, ph=230+STAT_CHOICES.length*26;
    const px=cx-pw/2|0, py=cy-ph/2|0;

    // Panel
    ctx.fillStyle='#000'; ctx.fillRect(px-4,py-4,pw+8,ph+8);
    ctx.fillStyle='#08070a'; ctx.fillRect(px,py,pw,ph);
    // Gold top trim
    ctx.fillStyle='#3a2c08'; ctx.fillRect(px,py,pw,3);
    // Amber glow accent
    ctx.fillStyle='rgba(200,160,40,0.08)'; ctx.fillRect(px,py,pw,ph);

    // Title
    R.shadow('LEVEL UP',cx,py+26,'#c8a060','#000',22,'center');
    ctx.fillStyle='#2a1c0c'; ctx.fillRect(px+12,py+32,pw-24,1);

    // Level indicator
    R.text(`Level ${p.level-1}  →  Level ${p.level}`, cx, py+50,'#8a7040',12,'center');
    if(p.pendingLevelUps>1) R.text(`(${p.pendingLevelUps} choices remaining)`,cx,py+66,'#5a4830',10,'center');
    R.text('Choose a stat to increase:',cx,py+82,'#6a5830',10,'center');
    ctx.fillStyle='#1a1408'; ctx.fillRect(px+12,py+88,pw-24,1);

    // Choices
    for(let i=0;i<STAT_CHOICES.length;i++){
      const ch=STAT_CHOICES[i];
      const iy=py+98+i*26;
      const sel=i===p.levelupCursor;
      ctx.fillStyle=sel?'#1e1a0a':'#0c0a06'; ctx.fillRect(px+10,iy-18,pw-20,22);
      if(sel){ ctx.fillStyle='#c8a060'; ctx.fillRect(px+10,iy-18,3,22); }
      // Number key hint
      R.text(`${i+1}.`,px+18,iy,sel?'#706040':'#3a3020',10);
      R.text(ch.label,px+36,iy,sel?'#e8c870':RARITY_COLOR.uncommon,12);
      // Current value (if any)
      const cur=p.statPoints[ch.key]||0;
      if(cur>0) R.text(`(+${cur} total)`,px+pw-18,iy,'#504830',9,'right');
    }

    // Footer hint
    ctx.fillStyle='#0e0c08'; ctx.fillRect(px,py+ph-20,pw,20);
    R.text('Up/Down  Navigate    1-5  Select    E/J  Confirm',cx,py+ph-6,'#3a3020',8,'center');
  },
};

// ============================================================
// CLASS SELECT SCREEN
// ============================================================
const ClassSelect = {
  cursor:0,
  _ids:['SWORDSMAN','ASSASSIN','ARCHER','MAGE'],

  handleInput(){
    if(Input.just('KeyA')||Input.just('ArrowLeft'))  this.cursor=Math.max(0,this.cursor-1);
    if(Input.just('KeyD')||Input.just('ArrowRight')) this.cursor=Math.min(3,this.cursor+1);
    if(Input.just('KeyW')||Input.just('ArrowUp'))    this.cursor=Math.max(0,this.cursor-1);
    if(Input.just('KeyS')||Input.just('ArrowDown'))  this.cursor=Math.min(3,this.cursor+1);
    // Number shortcuts
    for(let i=1;i<=4;i++) if(Input.just(`Digit${i}`)) this.cursor=i-1;
    if(Input.just('KeyE')||Input.just('KeyJ')||Input.just('Space')) this._confirm();
  },

  _confirm(){
    const id=this._ids[this.cursor];
    const def=CLASS_DEFS[id];
    GS.playerClass=id;
    const p=GS.player;
    p.equipment.weapon=def.startWeapon;
    p.equipment.armor=def.startArmor;
    // Re-init HP/FP/STA with class bonuses applied
    p.hp=Stats.maxHP(); p.fp=Stats.maxFP(); p.stamina=Stats.maxStamina();
    GS.phase='playing';
    UI.msg(def.name.toUpperCase()+'  —  '+def.ability.upgrades[0].name,'levelup',3.5);
    ScreenFX.flash(def.color,0.55,0.9);
    UI.msg('Crumbling Ruins','zone',3);
  },

  draw(){
    const now=Date.now();
    ctx.fillStyle='#000'; ctx.fillRect(0,0,SCREEN_W,SCREEN_H);

    // Background ember particles
    ctx.globalAlpha=0.06; ctx.fillStyle='#c8a060';
    for(let i=0;i<18;i++){
      const bx=((i*137+now/60)|0)%SCREEN_W;
      const by=((i*97+now/40)|0)%SCREEN_H;
      ctx.fillRect(bx,by,2,2);
    }
    ctx.globalAlpha=1;

    // Title
    R.shadow('CHOOSE YOUR CLASS',SCREEN_W/2,54,'#c8a060','#000',22,'center');
    ctx.fillStyle='#3a2c08'; ctx.fillRect(SCREEN_W/2-220,64,440,1);

    const cardW=192, cardH=290, gap=18;
    const totalW=4*cardW+3*gap;
    const startX=(SCREEN_W-totalW)/2|0;
    const cardY=85;

    for(let i=0;i<4;i++){
      const id=this._ids[i];
      const def=CLASS_DEFS[id];
      const cx2=startX+i*(cardW+gap);
      const sel=i===this.cursor;

      // Card border
      ctx.fillStyle=sel?def.color:'#1a1408';
      ctx.fillRect(cx2-2,cardY-2,cardW+4,cardH+4);
      ctx.fillStyle=sel?def.darkColor:'#0a0806';
      ctx.fillRect(cx2,cardY,cardW,cardH);
      // Top color bar
      ctx.fillStyle=def.color; ctx.fillRect(cx2,cardY,cardW,4);

      // Class icon / mini sprite preview area
      const previewY=cardY+20;
      ctx.fillStyle='#060402'; ctx.fillRect(cx2+55,previewY,82,74);
      ctx.fillStyle=def.darkColor; ctx.fillRect(cx2+57,previewY+2,78,70);
      // Draw mini class figure
      this._drawMiniClass(id,cx2+96,previewY+38,sel);

      // Name
      R.shadow(def.name,cx2+cardW/2,previewY+86,sel?def.color:'#a08040','#000',15,'center');

      // Description lines
      for(let d=0;d<def.desc.length;d++)
        R.text(def.desc[d],cx2+cardW/2,previewY+106+d*16,sel?'#c0b070':'#605030',9,'center');

      // Divider
      ctx.fillStyle=sel?def.darkColor:'#1a1408';
      ctx.fillRect(cx2+10,previewY+148,cardW-20,1);

      // Stats
      const sb=def.statsBonus;
      const stats=[
        ['HP',    sb.hp,   '#e05050'],
        ['FP',    sb.fp,   '#5090e0'],
        ['STA',   sb.stamina,'#50c060'],
        ['ATK',   sb.damage, '#e09040'],
        ['DEF',   sb.defense,'#8090d0'],
        ['SPD',   sb.speed,  '#d0c040'],
      ];
      for(let s2=0;s2<stats.length;s2++){
        const [lbl,val,col]=stats[s2];
        const row=s2%3, col2=s2<3?0:1;
        const rx=cx2+12+col2*90, ry=previewY+162+row*20;
        R.text(lbl+':',rx,ry,'#504030',8);
        const sign=val>0?'+':val<0?'':' ';
        R.bold(sign+val,rx+28,ry,val>0?'#50c060':val<0?'#e05050':'#606060',8);
      }

      // Ability box
      ctx.fillStyle=sel?def.darkColor:'#080604';
      ctx.fillRect(cx2+8,previewY+218,cardW-16,50);
      ctx.fillStyle=def.color; ctx.fillRect(cx2+8,previewY+218,cardW-16,2);
      R.text('[Q] '+def.ability.upgrades[0].name,cx2+cardW/2,previewY+230,sel?def.color:'#604830',8,'center');
      const descLines=this._wrapText(def.ability.desc,cardW-22,8);
      for(let dl=0;dl<Math.min(2,descLines.length);dl++)
        R.text(descLines[dl],cx2+cardW/2,previewY+244+dl*14,sel?'#a09060':'#3a2c1a',7,'center');

      // Number hint
      if(!sel) R.text(`${i+1}`,cx2+8,cardY+12,'#302818',10);
      else { ctx.fillStyle=def.color; ctx.fillRect(cx2,cardY+cardH-22,cardW,22);
             R.bold('PRESS E TO CHOOSE',cx2+cardW/2,cardY+cardH-8,def.darkColor,9,'center'); }
    }

    // Bottom hint
    R.text('A/D  Navigate    1-4  Select    E  Confirm',SCREEN_W/2,SCREEN_H-12,'#2a2010',9,'center');
    R.vignette();
  },

  _wrapText(text,maxW,sz){
    const words=text.split(' '); const lines=[]; let line='';
    for(const w of words){
      const test=line?line+' '+w:w;
      if(test.length*sz*0.55>maxW&&line){ lines.push(line); line=w; }
      else line=test;
    }
    if(line) lines.push(line);
    return lines;
  },

  _drawMiniClass(id,cx2,cy,sel){
    // Tiny pixel art per class
    const def=CLASS_DEFS[id];
    const col=sel?def.color:def.darkColor;
    const trim=sel?'#fff':def.color;
    ctx.fillStyle='#000'; ctx.fillRect(cx2-6,cy+4,12,8); // legs
    ctx.fillStyle=col; ctx.fillRect(cx2-5,cy-10,10,14);  // body
    ctx.fillStyle='#c0906c'; ctx.fillRect(cx2-4,cy-22,8,12); // head
    if(id==='SWORDSMAN'){
      ctx.fillStyle=trim; ctx.fillRect(cx2+5,cy-8,14,3); // sword
      ctx.fillStyle='#8a6020'; ctx.fillRect(cx2-8,cy-10,6,8); // shield hint
    } else if(id==='ASSASSIN'){
      ctx.fillStyle='#181028'; ctx.fillRect(cx2-6,cy-28,12,20); // dark hood
      ctx.fillStyle=trim; ctx.fillRect(cx2+5,cy-4,10,2); // dagger
    } else if(id==='ARCHER'){
      ctx.fillStyle='#285020'; ctx.fillRect(cx2-6,cy-26,12,16); // green hood
      ctx.fillStyle='#6a3808'; ctx.fillRect(cx2+4,cy-20,2,18); // bow
      ctx.fillStyle=trim; ctx.fillRect(cx2+2,cy-18,8,1); // bowstring
    } else if(id==='MAGE'){
      ctx.fillStyle='#200840'; ctx.fillRect(cx2-5,cy-36,10,18); // hat tower
      ctx.fillStyle=col; ctx.fillRect(cx2-8,cy-22,16,4); // hat brim
      ctx.fillStyle=trim; ctx.fillRect(cx2+4,cy-6,12,2); // wand
      ctx.fillStyle='#c060ff'; ctx.fillRect(cx2+14,cy-8,4,6); // orb
    }
  },
};

// ============================================================
// UI SYSTEM
// ============================================================
const UI = {
  msgs: GS.messages,

  msg(text,type,dur){
    this.msgs=this.msgs.filter(m=>m.type!==type);
    if(text) this.msgs.push({text,type,timer:dur,max:dur});
    GS.messages=this.msgs;
  },

  update(dt){
    for(let i=this.msgs.length-1;i>=0;i--){
      this.msgs[i].timer-=dt;
      if(this.msgs[i].timer<=0) this.msgs.splice(i,1);
    }
  },

  draw(){
    const p=GS.player;
    this._hud(p);
    Quest.drawHUD();
    this._messages();
    this._bossBar();
    this._minimap();
    // Death fade overlay
    if(p.isDead){
      const a=Math.min(0.72, 1-p.deathTimer/3.5);
      R.rectA(0,0,SCREEN_W,SCREEN_H,'#000000',a);
    }
  },

  _hud(p){
    const mg=10, bw=136, bh=9, gap=5;
    const sy0=SCREEN_H-mg-bh*3-gap*2-12;

    // Dark iron panel — thick pixel border, stone-colored inset
    // Outer border (3px near-black)
    ctx.fillStyle='#000'; ctx.fillRect(mg-10,sy0-26,bw+24,bh*3+gap*2+42);
    // Iron plate bg
    ctx.fillStyle='#0c0a08'; ctx.fillRect(mg-7,sy0-23,bw+18,bh*3+gap*2+36);
    // Tarnished gold top trim strip
    ctx.fillStyle='#3a2c08'; ctx.fillRect(mg-7,sy0-23,bw+18,3);
    // Inner dark stone inset
    ctx.fillStyle='#060504'; ctx.fillRect(mg-4,sy0-18,bw+12,bh*3+gap*2+28);
    // Inner gold trim
    ctx.fillStyle='#2a2006'; ctx.fillRect(mg-4,sy0-18,bw+12,2);

    // Label boxes — dark iron with gold text
    const lblW=20;
    ctx.fillStyle='#000'; ctx.fillRect(mg-4,sy0,lblW,bh);
    ctx.fillStyle='#100c08'; ctx.fillRect(mg-3,sy0+1,lblW-2,bh-2);
    ctx.fillStyle='#000'; ctx.fillRect(mg-4,sy0+bh+gap,lblW,bh);
    ctx.fillStyle='#080810'; ctx.fillRect(mg-3,sy0+bh+gap+1,lblW-2,bh-2);
    ctx.fillStyle='#000'; ctx.fillRect(mg-4,sy0+(bh+gap)*2,lblW,bh);
    ctx.fillStyle='#080a06'; ctx.fillRect(mg-3,sy0+(bh+gap)*2+1,lblW-2,bh-2);

    R.text('HP',mg-1,sy0+bh-1,'#7a2c2c',8);
    R.text('FP',mg-1,sy0+bh+gap+bh-1,'#2c3c6a',8);
    R.text('ST',mg-1,sy0+(bh+gap)*2+bh-1,'#3a5010',8);

    // HP bar — deep blood red
    const mHP=Stats.maxHP(), mST=Stats.maxStamina();
    const hpFrac=p.hp/mHP;
    const hpCol=hpFrac<0.25?((Date.now()/200|0)%2?'#8a0808':'#500000'):'#7a1010';
    R.bar(mg+18,sy0,bw,bh,p.hp,mHP,hpCol,'#140202');
    R.text(`${Math.ceil(p.hp)}/${mHP}`,mg+22,sy0+bh-1,'#6a2020',8);

    // FP bar — deep midnight blue
    const sy1=sy0+bh+gap;
    const mFP=Stats.maxFP();
    R.bar(mg+18,sy1,bw,bh,p.fp,mFP,'#182060','#020408');
    R.text(`${Math.ceil(p.fp)}/${mFP}`,mg+22,sy1+bh-1,'#2a3060',8);

    // Stamina bar — dark tarnished gold
    const sy2=sy1+bh+gap;
    const stFlash=p.staminaEmpty>0&&(Date.now()/80|0)%2===0;
    R.bar(mg+18,sy2,bw,bh,p.stamina,mST,stFlash?'#601008':'#6a5208','#0a0802');
    R.text(`${Math.ceil(p.stamina)}/${mST}`,mg+22,sy2+bh-1,'#5a4808',8);

    // Level badge + XP progress bar
    ctx.fillStyle='#000'; ctx.fillRect(mg-4,sy0-28,bw+12,20);
    ctx.fillStyle='#100e0a'; ctx.fillRect(mg-3,sy0-27,bw+10,18);
    ctx.fillStyle='#2a2006'; ctx.fillRect(mg-3,sy0-27,bw+10,2);
    const nextThresh=LEVEL_THRESHOLDS[p.level]||LEVEL_THRESHOLDS[LEVEL_THRESHOLDS.length-1];
    const prevThresh=LEVEL_THRESHOLDS[p.level-1]||0;
    const xpFrac=p.level>=LEVEL_THRESHOLDS.length?1:
      Math.min(1,(p.totalRunes-prevThresh)/Math.max(1,nextThresh-prevThresh));
    const xpBarW=Math.max(0,(bw+8)*xpFrac)|0;
    ctx.fillStyle='#181008'; ctx.fillRect(mg-3,sy0-14,bw+10,6);
    ctx.fillStyle='#7a5e10'; ctx.fillRect(mg-3,sy0-14,xpBarW,6);
    R.text(`Lv.${p.level}/${LEVEL_THRESHOLDS.length}`,mg,sy0-16,'#6a5618',9);
    const wpnUpg=p.equipment.weapon?(p.weaponUpgrades[p.equipment.weapon]||0):0;
    if(p.equipment.weapon)
      R.text(`+${wpnUpg}`,mg+bw-2,sy0-16,'#a08030',9,'right');

    // Rune counter — dark iron box, tarnished gold rune symbol
    const rw=96;
    const rx=SCREEN_W-rw-mg;
    ctx.fillStyle='#000'; ctx.fillRect(rx-8,SCREEN_H-42,rw+14,34);
    ctx.fillStyle='#0c0a08'; ctx.fillRect(rx-5,SCREEN_H-40,rw+8,30);
    ctx.fillStyle='#2a2006'; ctx.fillRect(rx-5,SCREEN_H-40,rw+8,3); // gold trim
    R.text('RUNES',rx,SCREEN_H-28,'#3a2e0e',8);
    R.bold(`${p.runes}`,rx+rw-2,SCREEN_H-mg-2,'#8a6e18',13,'right');

    // Flask charges — Terraria-style hotbar, dark iron with gold trim
    const fc=PLAYER_CONFIG.flaskCharges;
    const fw=fc*16+12;
    const fx2=(SCREEN_W/2-fw/2)|0;
    const fy=SCREEN_H-mg-20;
    // Hotbar outer border
    ctx.fillStyle='#000'; ctx.fillRect(fx2-6,fy-18,fw+12,34);
    // Iron plate
    ctx.fillStyle='#0e0c0a'; ctx.fillRect(fx2-4,fy-16,fw+8,30);
    // Gold top trim
    ctx.fillStyle='#2e2408'; ctx.fillRect(fx2-4,fy-16,fw+8,3);
    R.text('FLASK',(SCREEN_W/2)|0,fy-5,'#3a2c0a',8,'center');
    for(let i=0;i<fc;i++){
      const full=i<p.flaskCharges;
      const bx=fx2+i*16+4;
      // Flask cell border
      ctx.fillStyle='#000'; ctx.fillRect(bx-1,fy+4,12,12);
      // Cell bg — dark iron (empty) or dark amber (full)
      ctx.fillStyle=full?'#2a1a04':'#0e0c08'; ctx.fillRect(bx,fy+5,10,10);
      // Gold trim on full cells
      if(full){
        ctx.fillStyle='#4a3408'; ctx.fillRect(bx,fy+5,10,1); // top trim
        ctx.fillStyle='#6a4c10'; ctx.fillRect(bx+1,fy+6,6,5);  // ember fill
        ctx.fillStyle='#8a6418'; ctx.fillRect(bx+2,fy+7,3,3);  // inner glow
      }
    }

    // Combo counter — dark iron box
    if(p.combo>=3){
      const ca=Math.min(1,p.comboTimer/2);
      ctx.globalAlpha=ca;
      ctx.fillStyle='#000'; ctx.fillRect(SCREEN_W/2-72,SCREEN_H-96,144,18);
      ctx.fillStyle='#100c06'; ctx.fillRect(SCREEN_W/2-70,SCREEN_H-94,140,14);
      R.bold(`${p.combo} HIT COMBO`,SCREEN_W/2,SCREEN_H-82,'#8a6810',11,'center');
      ctx.globalAlpha=1;
    }

    // ---- Class ability indicator ----
    if(GS.playerClass){
      const def=CLASS_DEFS[GS.playerClass];
      const ab=def.ability;
      const tier=abilityTier(p.level);
      const upg=ab.upgrades[tier];
      const sbx=mg-4, sbw=bw+22, sbh=18;
      const sby=sy0-48;
      const qReady=p.specialCooldown<=0&&p.fp>=ab.fpCost;
      const abgCol=qReady?def.darkColor:'#08060a';
      ctx.fillStyle='#000'; ctx.fillRect(sbx,sby,sbw,sbh);
      ctx.fillStyle=abgCol; ctx.fillRect(sbx+2,sby+2,sbw-4,sbh-4);
      // Left color accent bar
      ctx.fillStyle=def.color; ctx.fillRect(sbx,sby,3,sbh);
      R.text('[Q]',sbx+8,sby+12,def.color,9);
      if(qReady){
        R.bold(upg.name+'  READY',sbx+28,sby+12,def.color,9);
      } else if(p.specialCooldown>0){
        const maxCD=ab.cooldown;
        const bw2=sbw-44;
        ctx.fillStyle='#0c0a10'; ctx.fillRect(sbx+28,sby+4,bw2,8);
        ctx.fillStyle=def.darkColor; ctx.fillRect(sbx+28,sby+4,(bw2*(1-p.specialCooldown/maxCD))|0,8);
        ctx.fillStyle=def.color; ctx.fillRect(sbx+28,sby+4,1,8);
        R.text(p.specialCooldown.toFixed(1)+'s',sbx+sbw-6,sby+12,'#504840',8,'right');
        R.text(upg.name,sbx+28,sby+12,'#302820',8);
      } else {
        R.text('Not enough FP',sbx+28,sby+12,'#5a3020',9);
      }
      // Sneak timer bar (Archer)
      if(p.sneakTimer>0){
        const stbw=sbw-4;
        ctx.fillStyle='#000'; ctx.fillRect(sbx,sby-20,sbw,16);
        ctx.fillStyle='#0a140a'; ctx.fillRect(sbx+2,sby-18,stbw,12);
        const maxDur=ab.upgrades[abilityTier(p.level)].dur;
        ctx.fillStyle=def.color; ctx.fillRect(sbx+2,sby-18,(stbw*p.sneakTimer/maxDur)|0,12);
        R.text('STEALTH  '+p.sneakTimer.toFixed(1)+'s',sbx+sbw/2+2,sby-8,def.color,8,'center');
      }
    }
    // Frost aura indicator (Yeti Pelt)
    if(p.equipment.armor==='YETI_PELT'){
      ctx.globalAlpha=0.55; ctx.fillStyle='#2060c0';
      ctx.fillRect(mg-4,sy0-70,bw+22,14);
      ctx.globalAlpha=1;
      ctx.fillStyle='#000'; ctx.fillRect(mg-4,sy0-70,bw+22,14);
      ctx.fillStyle='#0c1424'; ctx.fillRect(mg-2,sy0-68,bw+18,10);
      R.text('❄ FROST AURA',mg,sy0-60,'#3060a0',8);
    }

    // Boss room sealed indicator
    if(GS.activeBossRoom){
      const id=GS.activeBossRoom.id;
      const col=id==='swamp'?'#40a020':id==='mountain'?'#6088cc':'#cc3030';
      const bg=id==='swamp'?'#0a1805':id==='mountain'?'#080c18':'#180808';
      ctx.fillStyle='#000'; ctx.fillRect(SCREEN_W/2-132,3,264,18);
      ctx.fillStyle=bg; ctx.fillRect(SCREEN_W/2-130,4,260,16);
      R.text('BOSS ROOM SEALED — Defeat the enemy to escape',SCREEN_W/2,16,col,9,'center');
    }

    // Controls hint
    const clsHint=GS.playerClass?`[Q] ${CLASS_DEFS[GS.playerClass].ability.name}  `:'';
    R.text(`WASD Move  J/K Attack  ${clsHint}Space Roll  E Interact  F Flask  Tab Equip`,
           SCREEN_W-mg,13,'#1e1e1e',8,'right');
  },

  _bossBar(){
    // Mini-boss bars
    for(const [key,mb] of Object.entries(GS.miniBosses)){
      if(!mb.active||!mb.ref||mb.ref.isDead) continue;
      const zoneMatch=(key==='swamp'&&GS.currentZone==='SWAMP')||(key==='mountain'&&GS.currentZone==='MOUNTAIN');
      if(!zoneMatch) continue;
      const bw=SCREEN_W-100, bh=12, bx=50, by=20;
      ctx.fillStyle='#000'; ctx.fillRect(bx-6,by-6,bw+12,bh+24);
      ctx.fillStyle='#0a0c0e'; ctx.fillRect(bx-3,by-3,bw+6,bh+18);
      ctx.fillStyle=key==='swamp'?'#1a3008':'#0c1828';
      ctx.fillRect(bx-3,by-3,bw+6,3);
      ctx.fillStyle='#0c0000'; ctx.fillRect(bx,by,bw,bh);
      const fw=(mb.ref.hp/mb.ref.maxHP*bw)|0;
      ctx.fillStyle=mb.ref.phase===2?(key==='swamp'?'#406010':'#2050a0'):(key==='swamp'?'#284010':'#182848');
      ctx.fillRect(bx,by,fw,bh);
      ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(bx,by,fw,2);
      if(mb.ref.phase===1){
        ctx.fillStyle='#100800'; ctx.fillRect(bx+(bw/2)|0,by,2,bh);
      }
      ctx.fillStyle='#000'; ctx.fillRect(bx,by+bh+2,bw,14);
      ctx.fillStyle='#0a0806'; ctx.fillRect(bx+1,by+bh+3,bw-2,12);
      const bname=mb.ref.cfg.name+(mb.ref.phase===2?'  [ PHASE II ]':'');
      R.bold(bname,SCREEN_W/2,by+bh+13,key==='swamp'?'#406010':'#304878',10,'center');
    }
    if(!GS.bossActive||!GS.bossRef||GS.bossRef.isDead) return;
    const boss=GS.bossRef;
    const bw=SCREEN_W-100, bh=12, bx=50, by=20;
    // Thick dark iron border (3px)
    ctx.fillStyle='#000'; ctx.fillRect(bx-6,by-6,bw+12,bh+24);
    ctx.fillStyle='#0e0c0a'; ctx.fillRect(bx-3,by-3,bw+6,bh+18);
    // Tarnished gold trim top
    ctx.fillStyle='#2a2006'; ctx.fillRect(bx-3,by-3,bw+6,3);
    // Bar bg — near-black dried blood
    ctx.fillStyle='#0c0000'; ctx.fillRect(bx,by,bw,bh);
    const fw=(boss.hp/boss.maxHP*bw)|0;
    // Bar fill — deep dried blood (phase 1) / ember red (phase 2)
    ctx.fillStyle=boss.phase===2?'#700808':'#4a0808';
    ctx.fillRect(bx,by,fw,bh);
    // Faint top gleam
    ctx.fillStyle='rgba(255,100,100,0.08)'; ctx.fillRect(bx,by,fw,2);
    // Phase 2 bar pulse
    if(boss.phase===2){
      ctx.fillStyle='rgba(180,20,20,0.15)'; ctx.fillRect(bx,by,fw,bh);
    }
    // Phase split marker
    if(boss.phase===1){
      ctx.fillStyle='#200000'; ctx.fillRect(bx+(bw/2)|0,by,2,bh);
    }
    // Name label — dark iron box, tarnished gold text
    ctx.fillStyle='#000'; ctx.fillRect(bx,by+bh+2,bw,14);
    ctx.fillStyle='#0a0806'; ctx.fillRect(bx+1,by+bh+3,bw-2,12);
    R.bold(`${ENEMY_TYPES.BOSS.name}${boss.phase===2?'  [ PHASE II ]':''}`,
           SCREEN_W/2,by+bh+13,'#6a5010',10,'center');
  },

  _messages(){
    const cX=SCREEN_W/2, cY=SCREEN_H/2;
    for(const m of this.msgs){
      const t=m.timer/m.max;
      let a=Math.min(1,t*3)*Math.min(1,(1-t)*3); if(a<0) a=0;
      let y=cY, sz=16, col='#c8a060';
      switch(m.type){
        case 'death':     sz=52; col='#CC2020'; y=cY-30; a=Math.min(1,(1-m.timer/m.max)*2.5); break;
        case 'bonfire':   sz=26; col='#FFB040'; y=cY+45; break;
        case 'boss':      sz=30; col='#c8a060'; break;
        case 'boss_won':  sz=38; col='#FFD060'; break;
        case 'zone':      sz=22; col='#8090a0'; y=cY+70; break;
        case 'levelup':   sz=22; col='#c8a060'; y=cY+50; break;
        case 'combo':     sz=16; col='#FFB020'; y=cY-50; break;
        case 'rune':      sz=14; col='#c8a060'; y=cY-70; break;
        case 'heal':      sz=14; col='#60FF60'; y=cY-90; break;
        case 'item':      sz=14; col='#60C0FF'; y=cY-70; break;
      }
      ctx.globalAlpha=a;
      if(sz>=22){
        ctx.font=`bold ${sz}px monospace`; ctx.textAlign='center';
        const tw=ctx.measureText(m.text).width;
        R.rectA(cX-tw/2-14,y-sz,tw+28,sz+12,'rgba(0,0,0,0.58)',1);
      }
      R.shadow(m.text,cX,y,col,'#000000',sz,'center');
      ctx.globalAlpha=1;
    }
  },

  _minimap(){
    const mw=100, mh=66, mx=SCREEN_W-mw-8, my=36;
    const scx=mw/(WORLD_W*TILE_SIZE), scy=mh/(WORLD_H*TILE_SIZE);
    // Dark iron border — 3px near-black + inner gold trim
    ctx.fillStyle='#000'; ctx.fillRect(mx-4,my-4,mw+8,mh+8);
    ctx.fillStyle='#0e0c0a'; ctx.fillRect(mx-2,my-2,mw+4,mh+4);
    ctx.fillStyle='#2a2006'; ctx.fillRect(mx-2,my-2,mw+4,2); // gold top trim
    ctx.fillStyle='#040402'; ctx.fillRect(mx,my,mw,mh);
    // Zone fills (pixel-crisp integer rects)
    for(const zid of GS.discoveredZones){
      const z=ZONES[zid]; if(!z) continue;
      const b=z.bounds;
      ctx.globalAlpha=0.9; ctx.fillStyle=z.ambientColor||'#1a1a1a';
      ctx.fillRect(mx+b.x*TILE_SIZE*scx|0, my+b.y*TILE_SIZE*scy|0,
                   b.w*TILE_SIZE*scx|0, b.h*TILE_SIZE*scy|0);
    }
    ctx.globalAlpha=1;
    // Enemy dots — dim dried-blood red
    for(const e of GS.enemies){
      if(e.isDead) continue;
      const ex=mx+e.x*scx|0, ey=my+e.y*scy|0;
      if(ex>mx&&ex<mx+mw&&ey>my&&ey<my+mh){
        ctx.fillStyle=e.isBoss?'#600808':'#401010';
        ctx.fillRect(ex-1,ey-1,3,3);
      }
    }
    // Bonfire dots — tarnished amber
    for(const bf of GS.bonfires){
      if(!bf.lit) continue;
      ctx.fillStyle='#7a4808';
      ctx.fillRect(mx+bf.x*scx-1|0,my+bf.y*scy-1|0,3,3);
    }
    // Bloodstain — very dark
    const p=GS.player;
    if(p.bloodstainX!==null){
      ctx.fillStyle='#3a0000';
      ctx.fillRect(mx+p.bloodstainX*scx-1|0,my+p.bloodstainY*scy-1|0,3,3);
    }
    // Player dot — tarnished gold
    ctx.fillStyle='#7a5c10';
    ctx.fillRect(mx+p.x*scx-1|0,my+p.y*scy-1|0,3,3);
    // Zone name label — dark iron box below map
    const zn=ZONES[GS.currentZone];
    if(zn){
      ctx.fillStyle='#000'; ctx.fillRect(mx-4,my+mh+2,mw+8,13);
      ctx.fillStyle='#0a0806'; ctx.fillRect(mx-2,my+mh+3,mw+4,11);
      R.text(zn.name,mx+mw/2,my+mh+12,'#3a3020',8,'center');
    }
  },

  // Bonfire rest full-screen overlay
  drawBonfireRest(){
    const frac=Math.min(1,(2.5-GS.bonfireRestTimer)/0.5);
    const fadeOut=GS.bonfireRestTimer<0.5 ? GS.bonfireRestTimer/0.5 : 1;
    const a=frac*fadeOut*0.82;
    R.rectA(0,0,SCREEN_W,SCREEN_H,'#000000',a);
    if(frac>0.5){
      const ta=Math.min(1,(frac-0.5)*2)*fadeOut;
      ctx.globalAlpha=ta;
      R.shadow('YOU HAVE RESTED', SCREEN_W/2, SCREEN_H/2-18, '#c8a060','#000',28,'center');
      R.shadow(GS.bonfireRestName, SCREEN_W/2, SCREEN_H/2+22, '#FFB040','#000',18,'center');
      ctx.globalAlpha=1;
    }
  },

  // Pause menu overlay
  drawPause(){
    R.rectA(0,0,SCREEN_W,SCREEN_H,'#000000',0.72);
    const cx=SCREEN_W/2, cy=SCREEN_H/2;
    R.shadow('PAUSED', cx, cy-80, '#c8a060','#000',36,'center');
    const controls=[
      ['WASD / Arrows','Move'],
      ['J',            'Light Attack'],
      ['K',            'Heavy Attack'],
      ['Q',            'Special Ability'],
      ['Space',        'Roll (i-frames)'],
      ['E',            'Interact / Rest'],
      ['F',            'Flask (heal)'],
      ['Esc',          'Pause'],
    ];
    const rowH=26, startY=cy-36;
    for(let i=0;i<controls.length;i++){
      const y=startY+i*rowH;
      R.shadow(controls[i][0], cx-10, y, '#c8a060','#000',14,'right');
      R.shadow(controls[i][1], cx+14, y, '#aaaaaa','#000',14,'left');
    }
    R.shadow('Press Esc to resume', cx, cy+120, '#606060','#000',12,'center');
  },

  // Title screen — no linear/radial gradients, no arcs
  drawTitle(){
    const now=Date.now();
    R.rect(0,0,SCREEN_W,SCREEN_H,'#060402');
    // Stepped overlay bands (no gradient)
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,SCREEN_W,SCREEN_H*0.18|0);
    ctx.fillStyle='rgba(0,0,0,0.20)'; ctx.fillRect(0,SCREEN_H*0.18|0,SCREEN_W,SCREEN_H*0.40|0);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,SCREEN_H*0.72|0,SCREEN_W,SCREEN_H*0.28|0);

    // Horizontal rules — solid 1px pixel lines (not gradient strokes)
    ctx.fillStyle='#b08830';
    ctx.fillRect(SCREEN_W*0.10|0, SCREEN_H*0.32|0, SCREEN_W*0.80|0, 1);
    ctx.fillRect(SCREEN_W*0.10|0, SCREEN_H*0.72|0, SCREEN_W*0.80|0, 1);
    // Fade corners with bg color
    ctx.fillStyle='#060402';
    ctx.fillRect(0,                 SCREEN_H*0.32|0, SCREEN_W*0.12|0, 1);
    ctx.fillRect(SCREEN_W*0.88|0,   SCREEN_H*0.32|0, SCREEN_W*0.12|0, 1);
    ctx.fillRect(0,                 SCREEN_H*0.72|0, SCREEN_W*0.12|0, 1);
    ctx.fillRect(SCREEN_W*0.88|0,   SCREEN_H*0.72|0, SCREEN_W*0.12|0, 1);

    // Title (integer blink steps instead of smooth sin)
    const pulse=(now/800|0)%16>1?1.0:0.88;
    ctx.globalAlpha=pulse;
    R.shadow('ASHEN REALM', SCREEN_W/2, SCREEN_H*0.26|0, '#c8a060','#000000',56,'center');
    ctx.globalAlpha=1;

    // Subtitle
    R.shadow('A Land Swallowed by Cinders', SCREEN_W/2, SCREEN_H*0.35|0, '#686868','#000',13,'center');

    // Lore blurb
    const lore=[
      'The fires have faded. The Ashen King stirs in his crumbling throne.',
      'Walk the ruins, venture into the darkroot, breach the castle walls.',
      'Seek the bonfires. Recover your runes. Endure.',
    ];
    for(let i=0;i<lore.length;i++)
      R.text(lore[i], SCREEN_W/2, SCREEN_H*0.49|0+i*18, '#484848', 11, 'center');

    // Controls box (GBC panel — thick black border)
    const controls=[
      ['WASD / Arrows','Move'],['J','Light Attack'],['K','Heavy Attack'],
      ['Space','Roll (i-frames)'],['E','Interact / Recover Runes'],['F','Use Flask'],
    ];
    const cx0=(SCREEN_W/2-128)|0, cy0=SCREEN_H*0.62|0;
    const boxH=controls.length*17+22;
    ctx.fillStyle='#000'; ctx.fillRect(cx0-8,cy0-20,266,boxH+4);
    ctx.fillStyle='#080604'; ctx.fillRect(cx0-6,cy0-18,262,boxH);
    R.text('CONTROLS',SCREEN_W/2,cy0-5,'#705030',9,'center');
    for(let i=0;i<controls.length;i++){
      R.bold(controls[i][0], cx0+6,  cy0+11+i*17, '#c8a060', 10, 'left');
      R.text(controls[i][1], cx0+148, cy0+11+i*17, '#607080', 10, 'left');
    }

    // Press any key — frame-stepped blink
    const blink=(now/500|0)%2===0;
    if(blink) R.shadow('— PRESS ANY KEY TO CHOOSE YOUR CLASS —', SCREEN_W/2, SCREEN_H*0.88|0, '#c8a060','#000',14,'center');

    R.vignette();
  },
};

// ============================================================
// MAIN LOOP
// ============================================================
let lastT=0, fps=0, fpsCtr=0, fpsT=0;

function loop(ts){
  const dt=Math.min((ts-lastT)/1000, 0.05); lastT=ts;
  GS.time+=dt; fpsCtr++; fpsT+=dt;
  if(fpsT>=1){ fps=fpsCtr; fpsCtr=0; fpsT=0; }

  // ---- UPDATE ----
  ScreenFX.update(dt);
  DmgNums.update(dt);

  if(GS.phase==='title'){
    Particles.update(dt);
    if(Math.random()<0.15) Particles.embers(Math.random()*SCREEN_W+Camera.x, SCREEN_H+Camera.y+20, 1);
    if(Input.anyKey()){ GS.phase='class_select'; ClassSelect.cursor=0; }
  } else if(GS.phase==='class_select'){
    ClassSelect.handleInput();
  } else if(GS.phase==='bonfire_rest'){
    GS.bonfireRestTimer-=dt;
    Particles.update(dt);
    Bonfires.update(dt);
    if(GS.bonfireRestTimer<=0) GS.phase='playing';
  } else if(GS.phase==='paused'){
    if(Input.just('Escape')) GS.phase='playing';
  } else if(GS.phase==='equipment'){
    Equipment.handleInput();
    if(Input.just('Tab')||Input.just('Escape')) GS.phase='playing';
  } else if(GS.phase==='levelup'){
    LevelUp.handleInput();
  } else if(GS.phase==='shop'){
    Shops.handleInput();
  } else if(GS.phase==='playing'){
    if(Input.just('Escape')){ GS.phase='paused'; }
    if(Input.just('Tab')){ GS.phase='equipment'; GS.player.equipCursor=0; }
    Camera.update(dt);
    Player.update(dt);
    Enemies.update(dt);
    Village.update(dt);
    Quest.update(dt);
    Bonfires.update(dt);
    Particles.update(dt);
    UI.update(dt);
  }

  // ---- DRAW ----
  if(GS.phase==='title'){
    UI.drawTitle();
    Particles.draw(0,0);
  } else if(GS.phase==='class_select'){
    ClassSelect.draw();
  } else {
    const cx=Camera.x, cy=Camera.y;
    ctx.fillStyle='#080808'; ctx.fillRect(0,0,SCREEN_W,SCREEN_H);

    ScreenFX.apply();
    World.draw(cx,cy);
    BossRooms.draw(cx,cy);
    Bonfires.draw(cx,cy);
    Chests.draw(cx,cy);
    Altars.draw(cx,cy);
    Shops.draw(cx,cy);
    Village.draw(cx,cy);
    Quest.draw(cx,cy);
    Enemies.draw(cx,cy);
    Particles.draw(cx,cy);
    Player.draw(cx,cy);
    DmgNums.draw(cx,cy);
    ScreenFX.restore();

    R.vignette();
    // Zone ambient tint
    const zt=ZONES[GS.currentZone];
    if(zt&&zt.fogTint){ ctx.fillStyle=zt.fogTint; ctx.fillRect(0,0,SCREEN_W,SCREEN_H); }

    ScreenFX.drawFlash();

    if(GS.phase==='bonfire_rest') UI.drawBonfireRest();
    if(GS.phase==='paused')       UI.drawPause();
    else if(GS.phase==='equipment') Equipment.draw();
    else if(GS.phase==='levelup')   { UI.draw(); LevelUp.draw(); }
    else if(GS.phase==='shop')      { UI.draw(); Shops.drawUI(); }
    else UI.draw();
  }

  drawScanlines();
  R.text(`${fps}fps`, 4, SCREEN_H-4, '#252525', 9);
  Input.clear();
  requestAnimationFrame(loop);
}

// ============================================================
// INIT
// ============================================================
function init(){
  Input.init();
  World.generate();
  Bonfires.init();
  Chests.init();
  Shops.init();
  Altars.init();
  Village.init();
  Quest.init();
  Enemies.init();
  Camera.x=GS.player.x-SCREEN_W/2;
  Camera.y=GS.player.y-SCREEN_H/2;
  // Pre-warm title particle embers
  for(let i=0;i<30;i++) Particles.embers(Math.random()*SCREEN_W, Math.random()*SCREEN_H, 1);
  requestAnimationFrame(ts=>{ lastT=ts; requestAnimationFrame(loop); });
}

window.addEventListener('load', init);
</script>
