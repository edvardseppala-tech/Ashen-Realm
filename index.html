}

const Input = {
  keys:{}, pressed:{}, released:{},
  init(){
    window.addEventListener('keydown', e=>{
      if(!this.keys[e.code]) this.pressed[e.code]=true;
      this.keys[e.code]=true;
      const game=['Space','KeyW','KeyS','KeyA','KeyD','KeyJ','KeyK','KeyQ','KeyE','KeyF',
                  'ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Escape','Tab','KeyR','KeyT',
                  'Digit1','Digit2','Digit3','Digit4','Digit5'];
      if(game.includes(e.code)) e.preventDefault();
    });
    window.addEventListener('keyup', e=>{ this.keys[e.code]=false; this.released[e.code]=true; });
  },
  clear(){ this.pressed={}; this.released={}; },
  down(c){ return !!this.keys[c]; },
  just(c){ return !!this.pressed[c]; },
  anyKey(){ return Object.keys(this.pressed).length > 0; },
};

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
canvas.width  = SCREEN_W;
canvas.height = SCREEN_H;
ctx.imageSmoothingEnabled = false;

const R = {
  rect(x,y,w,h,c)          { ctx.fillStyle=c; ctx.fillRect(x,y,w,h); },
  rectA(x,y,w,h,c,a)       { ctx.globalAlpha=a; ctx.fillStyle=c; ctx.fillRect(x,y,w,h); ctx.globalAlpha=1; },
  // pixel dot (2×2 block) — used for minimap dots
  dot(x,y,c)                { ctx.fillStyle=c; ctx.fillRect(x-1,y-1,3,3); },
  text(t,x,y,c,sz=14,align='left'){
    ctx.fillStyle=c; ctx.font=`${sz}px monospace`;
    ctx.textAlign=align; ctx.textBaseline='alphabetic'; ctx.fillText(t,x,y);
  },
  bold(t,x,y,c,sz=14,align='left'){
    ctx.fillStyle=c; ctx.font=`bold ${sz}px monospace`;
    ctx.textAlign=align; ctx.textBaseline='alphabetic'; ctx.fillText(t,x,y);
  },
  shadow(t,x,y,c,sc,sz=16,align='center'){
    ctx.font=`bold ${sz}px monospace`; ctx.textAlign=align; ctx.textBaseline='alphabetic';
    ctx.fillStyle=sc; ctx.fillText(t,x+2,y+2);
    ctx.fillStyle=c;  ctx.fillText(t,x,y);
  },
  // GBC-style bar: thick 2px black border, flat fill, 1px top highlight
  bar(x,y,w,h,cur,max,fill,bg='#111'){
    ctx.fillStyle='#000'; ctx.fillRect(x-2,y-2,w+4,h+4);
    ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
    const fw=Math.max(0,(cur/max)*w)|0;
    ctx.fillStyle=fill; ctx.fillRect(x,y,fw,h);
    ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(x,y,fw,1);
  },
  // GBC-style panel: solid black border, flat dark bg
  panel(x,y,w,h,bg='#0a0a0a'){
    ctx.fillStyle='#000'; ctx.fillRect(x-2,y-2,w+4,h+4);
    ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
  },
  // Stepped pixel vignette — dark oppressive edges
  vignette(){
    const S=SCREEN_W, H=SCREEN_H;
    // Top / bottom bands — heavy darkness
    ctx.fillStyle='rgba(0,0,0,0.80)'; ctx.fillRect(0,0,S,20); ctx.fillRect(0,H-20,S,20);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,20,S,14); ctx.fillRect(0,H-34,S,14);
    ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.fillRect(0,34,S,12); ctx.fillRect(0,H-46,S,12);
    ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(0,46,S,12); ctx.fillRect(0,H-58,S,12);
    // Left / right bands — heavy darkness
    ctx.fillStyle='rgba(0,0,0,0.80)'; ctx.fillRect(0,0,20,H); ctx.fillRect(S-20,0,20,H);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(20,0,14,H); ctx.fillRect(S-34,0,14,H);
    ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.fillRect(34,0,12,H); ctx.fillRect(S-46,0,12,H);
    ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(46,0,12,H); ctx.fillRect(S-58,0,12,H);
  },
};

// Compact pixel-sprite renderer — each char maps to a CSS color, '.' = transparent
// px,py = top-left corner, rows = string array, pal = {char:color}, sc = pixel scale
function pxS(px,py,rows,pal,sc=2){
  for(let y=0;y<rows.length;y++){
    const row=rows[y];
    for(let x=0;x<row.length;x++){
      const c=pal[row[x]];
      if(c){ ctx.fillStyle=c; ctx.fillRect((px+x*sc)|0,(py+y*sc)|0,sc,sc); }
    }
  }
}

// Mirror version of pxS — flips sprite horizontally
function pxSM(px,py,rows,pal,sc=2){
  const w=rows[0].length;
  for(let y=0;y<rows.length;y++){
    const row=rows[y];
    for(let x=0;x<row.length;x++){
      const c=pal[row[w-1-x]];
      if(c){ ctx.fillStyle=c; ctx.fillRect((px+x*sc)|0,(py+y*sc)|0,sc,sc); }
    }
  }
}

// ============================================================
// SCREEN FX — shake & flash
// ============================================================
const ScreenFX = {
  sx:0, sy:0,                 // current shake offset
  shakeMag:0, shakeTimer:0,
  flashAlpha:0, flashColor:'#fff', flashTimer:0, flashDur:0.3,

  shake(mag=6, dur=0.22){ this.shakeMag=mag; this.shakeTimer=dur; },
  flash(color='#fff', alpha=0.35, dur=0.25){
    this.flashColor=color; this.flashAlpha=alpha; this.flashTimer=dur; this.flashDur=dur;
  },

  update(dt){
    if(this.shakeTimer>0){
      this.shakeTimer-=dt;
      const t=Math.max(0,this.shakeTimer/0.22);
      this.sx=(Math.random()-0.5)*this.shakeMag*t*2;
      this.sy=(Math.random()-0.5)*this.shakeMag*t*2;
    } else { this.sx=0; this.sy=0; }
    if(this.flashTimer>0) this.flashTimer-=dt;
  },

  apply()  { ctx.save(); ctx.translate(this.sx, this.sy); ctx.imageSmoothingEnabled=false; },
  restore(){ ctx.restore(); ctx.imageSmoothingEnabled=false; },

  drawFlash(){
    if(this.flashTimer<=0) return;
    const a=(this.flashTimer/this.flashDur)*this.flashAlpha;
    ctx.fillStyle=this.flashColor; ctx.globalAlpha=a;
    ctx.fillRect(0,0,SCREEN_W,SCREEN_H); ctx.globalAlpha=1;
  },
};

// FLOATING DAMAGE NUMBERS
// ============================================================
const DmgNums = {
  _list:[],

  add(x, y, val, color='#FFD060', big=false){
    this._list.push({
      x, y, vy:-55-Math.random()*30, vx:(Math.random()-0.5)*28,
      val: big ? val : val,
      color, sz: big?20:13,
      life: big?1.2:0.75, max: big?1.2:0.75,
    });
  },

  update(dt){
    for(let i=this._list.length-1;i>=0;i--){
      const n=this._list[i];
      n.x+=n.vx*dt; n.y+=n.vy*dt; n.vy+=40*dt;
      n.life-=dt;
      if(n.life<=0) this._list.splice(i,1);
    }
  },

  draw(cx,cy){
    for(const n of this._list){
      const a=Math.min(1,(n.life/n.max)*2);
      ctx.globalAlpha=a;
      ctx.font=`bold ${n.sz}px monospace`; ctx.textAlign='center';
      ctx.fillStyle='#000000'; ctx.fillText(n.val,n.x-cx+1,n.y-cy+1);
      ctx.fillStyle=n.color;  ctx.fillText(n.val,n.x-cx,n.y-cy);
    }
    ctx.globalAlpha=1;
  },
};

// ============================================================
// STATS — calculates effective player stats from base + equipment
// ============================================================
const Stats = {
  _sum(key){ let v=0; for(const id of Object.values(GS.player.equipment)) if(id) v+=(EQUIPMENT_ITEMS[id]?.bonuses[key]||0); return v; },
  _sp(key)  { return GS.player.statPoints[key]||0; },
  _cls(key) { const c=GS.playerClass; return c?(CLASS_DEFS[c].statsBonus[key]||0):0; },
  _upgBonus(){
    const p=GS.player; const w=p.equipment.weapon;
    if(!w) return 0;
    const upg=p.weaponUpgrades[w]||0;
    if(upg<=0) return 0;
    const baseDmg=EQUIPMENT_ITEMS[w]?.bonuses?.damage||0;
    return Math.round(baseDmg * upg * 0.25);
  },
  weaponUpgLevel(){
    const p=GS.player; const w=p.equipment.weapon;
    return w ? (p.weaponUpgrades[w]||0) : 0;
  },
  damage()    { return this._sum('damage')  + this._sp('damage')  + this._upgBonus() + this._cls('damage');  },
  defense()   { return this._sum('defense') + this._sp('defense') + this._cls('defense'); },
  maxHP()     { return PLAYER_CONFIG.maxHP      + this._sum('hp')      + this._sp('hp')      + this._cls('hp');      },
  maxFP()     { return PLAYER_CONFIG.maxFP      + this._sum('fp')      + this._sp('fp')      + this._cls('fp');      },
  maxStamina(){ return PLAYER_CONFIG.maxStamina + this._sum('stamina') + this._sp('stamina') + this._cls('stamina'); },
  speed()     { return PLAYER_CONFIG.speed + this._cls('speed'); },
};

    lf(10,6,18,18);
    // Entry gap in south wall (to village connector)
    for(let x=b.x+8;x<=b.x+24;x++) this._set(x,b.y+b.h-1,T.SWAMP_FLOOR);
  },

  _mountain(){
    const b=ZONES.MOUNTAIN.bounds; // x:220 y:132 w:57 h:65
    this._fill(b.x,b.y,b.w,b.h,T.MOUNTAIN_FLOOR);
    const lf=(tx,ty,tw,th)=>this._fill(b.x+tx,b.y+ty,tw,th,T.MOUNTAIN_FLOOR);
    const lr=(tx,ty,tw,th)=>this._fill(b.x+tx,b.y+ty,tw,th,T.MOUNTAIN_WALL);

    // Rocky border
    for(let x=b.x;x<b.x+b.w;x++){ this._set(x,b.y,T.MOUNTAIN_WALL); this._set(x,b.y+b.h-1,T.MOUNTAIN_WALL); }
    for(let y=b.y;y<b.y+b.h;y++){ this._set(b.x,y,T.MOUNTAIN_WALL); this._set(b.x+b.w-1,y,T.MOUNTAIN_WALL); }

    // Boulder formations
    lr(4,3,6,8); lr(14,2,5,9); lr(24,4,6,7); lr(38,3,5,8); lr(48,2,6,8);
    lr(5,16,4,7); lr(18,15,5,8); lr(30,17,4,7); lr(44,14,5,8);
    lr(3,30,5,8); lr(15,29,4,9); lr(27,31,5,7); lr(40,28,6,8); lr(50,30,4,8);
    lr(6,44,4,7); lr(17,43,5,8); lr(29,45,4,7); lr(42,42,5,8);
    lr(4,56,5,6); lr(18,55,4,7); lr(32,57,5,6); lr(46,54,5,7);

    // Snow patches (lighter floor variant uses same tile, just variation in draw)
    // Carved paths through the mountain
    lf(5,5,4,60);   // western trail
    lf(24,5,5,60);  // center trail
    lf(44,5,5,60);  // eastern trail
    lf(5,20,50,5);  // horizontal pass 1
    lf(5,38,50,5);  // horizontal pass 2
    lf(5,54,50,5);  // horizontal pass 3
    // Boss arena — wide open center
    lf(14,6,30,24);
    // Entry gap in west wall (to castle connector)
    for(let y=b.y+10;y<=b.y+26;y++) this._set(b.x,y,T.MOUNTAIN_FLOOR);
  },

  _connectors(){
    // 1. Ruins ↔ Forest — eastern corridor x=67-77, y=55-102
    this._carve(67,55,10,47,T.RUINS_FLOOR);
    // Forest entry side (y=55-94)
    for(let cy=55;cy<=94;cy++) for(let cx=70;cx<=77;cx++) this._set(cx,cy,T.FOREST_FLOOR);

    // 2. Forest ↔ Castle — south corridor x=128-140, y=90-115
    this._carve(128,90,12,26,T.FOREST_FLOOR);
    // Castle-side floor
    for(let cy=112;cy<=117;cy++) for(let cx=128;cx<=140;cx++) this._set(cx,cy,T.CASTLE_FLOOR);

    // 3. Forest ↔ Village — east passage x=166-173, y=22-50
    this._carve(166,22,10,30,T.FOREST_FLOOR);
    for(let cy=22;cy<=50;cy++) for(let cx=170;cx<=175;cx++) this._set(cx,cy,T.VILLAGE_FLOOR);

    // 4. Ruins south approach to bridge x=46-54, y=96-103
    this._carve(46,96,10,8,T.RUINS_FLOOR);

    // 5. Castle north from bridge x=46-54, y=112-120
    for(let cy=112;cy<=120;cy++) for(let cx=46;cx<=54;cx++) this._set(cx,cy,T.CASTLE_FLOOR);

    // 6. Ruined bridge approach from forest side x=36-48, y=95-103
    this._carve(36,95,14,9,T.FOREST_FLOOR);

    // 7. Village ↔ Swamp — east passage x=237-244, y=55-80
    for(let cy=55;cy<=80;cy++) for(let cx=237;cx<=244;cx++) this._set(cx,cy,T.VILLAGE_FLOOR);
    // Transition to swamp floor
    for(let cy=55;cy<=80;cy++) for(let cx=241;cx<=244;cx++) this._set(cx,cy,T.SWAMP_FLOOR);

    // 8. Castle ↔ Mountain — east passage x=218-224, y=142-158
    for(let cy=142;cy<=158;cy++) for(let cx=218;cx<=224;cx++) this._set(cx,cy,T.CASTLE_FLOOR);
    for(let cy=142;cy<=158;cy++) for(let cx=221;cx<=224;cx++) this._set(cx,cy,T.MOUNTAIN_FLOOR);
  },

  _waterAndBridge(){
    // River strip between ruins/forest and castle
    for(let cy=103;cy<=113;cy++) for(let cx=18;cx<=220;cx++) this._set(cx,cy,T.WATER);
    // Ruins bridge — 8 tiles wide, stone walkway
    for(let cy=103;cy<=113;cy++) for(let cx=46;cx<=54;cx++) this._set(cx,cy,T.RUINS_FLOOR);
    // Bridge guard rails (wall blocks flanking bridge)
    for(let cy=103;cy<=113;cy++){
      this._set(45,cy,T.RUINS_WALL); this._set(55,cy,T.RUINS_WALL);
    }
    // Forest side: secondary crossing near castle connector — stepping stones
    for(let cy=103;cy<=113;cy++) for(let cx=130;cx<=138;cx++) this._set(cx,cy,T.FOREST_FLOOR);
  },

  _border(){
    for(let x=0;x<WORLD_W;x++){ this.map[0][x]=T.WALL; this.map[WORLD_H-1][x]=T.WALL; }
    for(let y=0;y<WORLD_H;y++){ this.map[y][0]=T.WALL; this.map[y][WORLD_W-1]=T.WALL; }
  },

  _grassland(){
    const b=ZONES.GRASSLAND.bounds; // x:5 y:1 w:155 h:36
    this._fill(b.x,b.y,b.w,b.h,T.GRASS_FLOOR);
    const lg=(tx,ty,tw,th)=>this._fill(b.x+tx,b.y+ty,tw,th,T.GRASS_WALL);

    // Border hedge
    for(let x=b.x;x<b.x+b.w;x++){ this._set(x,b.y,T.GRASS_WALL); }
    for(let y=b.y;y<b.y+b.h;y++){ this._set(b.x,y,T.GRASS_WALL); this._set(b.x+b.w-1,y,T.GRASS_WALL); }

    // Hedge/rock formations (interior obstacles)
    lg(4,3,8,4);  lg(15,2,6,5);  lg(25,4,8,3);  lg(36,3,5,4);  lg(48,2,7,4);
    lg(60,4,6,3); lg(70,2,8,4);  lg(82,3,6,4);  lg(95,2,7,3);  lg(108,4,5,4);
    lg(120,2,8,3); lg(132,3,6,4); lg(143,2,7,4);
    lg(4,14,5,6); lg(18,13,6,5); lg(30,15,5,5); lg(42,13,7,5); lg(56,14,5,6);
    lg(68,13,6,5); lg(80,15,7,4); lg(92,13,5,6); lg(105,14,6,5); lg(118,13,7,5);
    lg(130,15,5,5); lg(142,13,6,5);
    lg(4,25,7,5);  lg(18,24,5,6); lg(30,26,7,4); lg(44,24,5,6); lg(58,25,6,5);
    lg(72,24,7,5); lg(86,26,5,5); lg(100,24,6,5); lg(114,25,7,4); lg(128,24,5,6);

    // Village clearing — open 30×16 area at (x:35, y:14 local) → abs (40,15)
    const vx=b.x+35, vy=b.y+14;
    this._fill(vx,vy,30,16,T.GRASS_FLOOR);
    // Inn building
    this._fill(vx+2,vy+2,10,8,T.GRASS_WALL);
    this._fill(vx+3,vy+3,8,6,T.GRASS_FLOOR); // hollow interior
    this._set(vx+7,vy+8,T.GRASS_FLOOR); // door
    // Shop building
    this._fill(vx+16,vy+2,10,8,T.GRASS_WALL);
    this._fill(vx+17,vy+3,8,6,T.GRASS_FLOOR);
    this._set(vx+21,vy+8,T.GRASS_FLOOR); // door

    // Boss arena — far right, open 28×24 at local (x:120, y:6) → abs (125,7)
    const ax=b.x+120, ay=b.y+6;
    this._fill(ax,ay,28,24,T.GRASS_FLOOR);
    // Boss room hedge border (semi-enclosed)
    for(let x=ax;x<ax+28;x++){ this._set(x,ay,T.GRASS_WALL); this._set(x,ay+24,T.GRASS_WALL); }
    for(let y=ay;y<ay+25;y++){ this._set(ax,y,T.GRASS_WALL); this._set(ax+27,y,T.GRASS_WALL); }
    // Boss fog gate — west entrance (ay+8 to ay+14)
    for(let fy=ay+8;fy<=ay+14;fy++) this._set(ax,fy,T.FOG_GATE);

    // Connector: south edge of grassland connects to ruins north (y:38) via corridor at x:35-42
    for(let cy=b.y+b.h-2;cy<=38;cy++) for(let cx=35;cx<=42;cx++) this._set(cx,cy,T.GRASS_FLOOR);
  },

  tile(wx,wy){
    const tx=wx/TILE_SIZE|0, ty=wy/TILE_SIZE|0;
    if(tx<0||ty<0||tx>=WORLD_W||ty>=WORLD_H) return T.WALL;
    return this.map[ty][tx];
  },

  passable(t){
    return t!==T.WALL&&t!==T.RUINS_WALL&&t!==T.FOREST_TREE&&
           t!==T.CASTLE_WALL&&t!==T.WATER&&t!==T.VILLAGE_WALL&&
           t!==T.SWAMP_WALL&&t!==T.MOUNTAIN_WALL&&t!==T.GRASS_WALL;
  },

  canMove(wx,wy,r){
    const pts=[[-r,-r],[r,-r],[-r,r],[r,r],[0,-r],[0,r],[-r,0],[r,0]];
    for(const[ox,oy] of pts) if(!this.passable(this.tile(wx+ox,wy+oy))) return false;
    return true;
  },

  zoneAt(wx,wy){
    const tx=wx/TILE_SIZE, ty=wy/TILE_SIZE;
    const order=['BOSS_ARENA','SWAMP','MOUNTAIN','VILLAGE','FOREST','GRASSLAND','RUINS','CASTLE'];
    for(const id of order){
      const b=ZONES[id].bounds;
      if(tx>=b.x&&tx<b.x+b.w&&ty>=b.y&&ty<b.y+b.h) return id;
    }
    return 'RUINS';
  },

  draw(cx,cy){
    const tx0=Math.max(0,(cx/TILE_SIZE)|0),    ty0=Math.max(0,(cy/TILE_SIZE)|0);
    const tx1=Math.min(WORLD_W,Math.ceil((cx+SCREEN_W)/TILE_SIZE)+1);
    const ty1=Math.min(WORLD_H,Math.ceil((cy+SCREEN_H)/TILE_SIZE)+1);
    const now=Date.now();
    for(let ty=ty0;ty<ty1;ty++) for(let tx=tx0;tx<tx1;tx++){
      const sx=tx*TILE_SIZE-cx, sy=ty*TILE_SIZE-cy;
      this._drawTile(this.map[ty][tx],sx,sy,tx,ty,now);
    }
  },

  _drawTile(tile,sx,sy,tx,ty,now){
    // Combo style: SNES RPG readability + Dark Souls atmosphere
    // Readable earthy tones, visible textures, but grim and dark overall
    const S=TILE_SIZE; // 32px
    switch(tile){

      // ---- Void / impassable ----
      case T.FLOOR:
      case T.WALL:
        ctx.fillStyle='#0a0808'; ctx.fillRect(sx,sy,S,S);
        break;

      // ---- Crumbling Ruins — warm sandstone, ancient & crumbling ----
      case T.RUINS_FLOOR:{
        const base=((tx+ty)%2===0)?'#4e4234':'#463c2e';
        ctx.fillStyle=base; ctx.fillRect(sx,sy,S,S);
        // 1px dark border
        ctx.fillStyle='#1a1410';
        ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        // Stone tile grid — visible mortar
        ctx.fillStyle='#2a2218';
        ctx.fillRect(sx,sy+16,S,1); ctx.fillRect(sx+16,sy,1,S);
        // Stone face highlight
        ctx.fillStyle='rgba(220,200,160,0.14)';
        ctx.fillRect(sx+2,sy+2,14,1); ctx.fillRect(sx+2,sy+2,1,7);
        // Bottom/right shadow
        ctx.fillStyle='rgba(0,0,0,0.28)';
        ctx.fillRect(sx,sy+26,S,6); ctx.fillRect(sx+26,sy,6,S);
        // Aged cracks — visible warm brown
        if((tx*7+ty*3)%9===0){
          ctx.fillStyle='#261e14';
          ctx.fillRect(sx+7,sy+9,1,9); ctx.fillRect(sx+8,sy+16,5,1);
        }
        if((tx*3+ty*11)%13===0){
          ctx.fillStyle='#261e14';
          ctx.fillRect(sx+20,sy+5,1,7); ctx.fillRect(sx+16,sy+9,5,1);
        }
        // Dust/ash fleck
        if((tx*13+ty*7)%17===0){
          ctx.fillStyle='rgba(230,210,170,0.14)';
          ctx.fillRect(sx+14,sy+20,3,2);
        }
        break;}

      case T.RUINS_WALL:{
        // Sandstone ashlar — visible warm stone blocks
        ctx.fillStyle='#302820'; ctx.fillRect(sx,sy,S,S);
        // 1px dark border
        ctx.fillStyle='#0e0c08'; ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        // Mortar lines
        ctx.fillStyle='#1a1410';
        ctx.fillRect(sx,sy+14,S,2); ctx.fillRect(sx,sy+28,S,2);
        const or2=((ty%2)===0)?0:8;
        // Warm stone bricks — clearly visible
        ctx.fillStyle='#3e3228';
        ctx.fillRect(sx+or2+1, sy+2,  13,10);
        ctx.fillRect(sx+or2+18,sy+2,  11,10);
        ctx.fillRect(sx+or2+1, sy+16, 15,10);
        ctx.fillRect(sx+or2+20,sy+16,  9,10);
        // Highlight on brick faces
        ctx.fillStyle='#5a4a36';
        ctx.fillRect(sx+or2+1, sy+2,  13,1);
        ctx.fillRect(sx+or2+18,sy+2,  11,1);
        ctx.fillRect(sx+or2+1, sy+16, 15,1);
        ctx.fillRect(sx+or2+20,sy+16,  9,1);
        // Bottom shadow
        ctx.fillStyle='rgba(0,0,0,0.45)';
        ctx.fillRect(sx,sy+28,S,4);
        // Moss on some bricks — visible dark green
        if((tx*5+ty*9)%15===0){
          ctx.fillStyle='#203818';
          ctx.fillRect(sx+or2+2,sy+5,4,4); ctx.fillRect(sx+or2+8,sy+20,5,3);
        }
        break;}

      // ---- Darkroot Forest — rich dark moss, gnarled living trees ----
      case T.FOREST_FLOOR:{
        const g=((tx+ty)%3===0)?'#243818':'#1e3014';
        ctx.fillStyle=g; ctx.fillRect(sx,sy,S,S);
        // 1px dark green border
        ctx.fillStyle='#0c1208';
        ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        // Soil beneath
        ctx.fillStyle='#16100a'; ctx.fillRect(sx,sy+24,S,8);
        // Edge shadow
        ctx.fillStyle='rgba(0,0,0,0.32)';
        ctx.fillRect(sx+26,sy,6,S); ctx.fillRect(sx,sy+26,S,6);
        // Grass blades — more visible olive-green
        if((tx*5+ty*7)%7===0){
          ctx.fillStyle='#3a5220';
          ctx.fillRect(sx+4, sy+12,2,11);
          ctx.fillRect(sx+12,sy+8, 2,13);
          ctx.fillRect(sx+22,sy+14,2,9);
          ctx.fillStyle='#2e4018';
          ctx.fillRect(sx+6, sy+14,1,8);
          ctx.fillRect(sx+20,sy+17,1,6);
        }
        if((tx*11+ty*3)%11===0){
          ctx.fillStyle='#304a1c';
          ctx.fillRect(sx+16,sy+10,2,12);
          ctx.fillRect(sx+26,sy+16,2,8);
        }
        // Root patches — visible warm brown
        if((tx*9+ty*5)%19===0){
          ctx.fillStyle='rgba(50,30,10,0.28)';
          ctx.fillRect(sx+6,sy+16,10,7);
        }
        break;}

      case T.FOREST_TREE:{
        // Deep forest void
        ctx.fillStyle='#0a100a'; ctx.fillRect(sx,sy,S,S);
        ctx.fillStyle='#060806'; ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        // Trunk — warm brown, visible
        ctx.fillStyle='#3a2410'; ctx.fillRect(sx+11,sy+16,10,16);
        ctx.fillStyle='#4e3018'; ctx.fillRect(sx+12,sy+17,6,13); // face
        ctx.fillStyle='#1e1008'; ctx.fillRect(sx+11,sy+28,10,4); // root shadow
        // Bark splits
        ctx.fillStyle='#1c1008';
        ctx.fillRect(sx+12,sy+18,1,10); ctx.fillRect(sx+16,sy+20,1,8);
        // Roots
        ctx.fillStyle='#301c0c';
        ctx.fillRect(sx+5,sy+27,8,4); ctx.fillRect(sx+20,sy+28,7,3);
        // Canopy — rich dark greens, visible and layered
        ctx.fillStyle='#1a3010'; ctx.fillRect(sx+2,sy+10,28,14);
        ctx.fillStyle='#203a14'; ctx.fillRect(sx+4,sy+6,24,10);
        ctx.fillStyle='#284618'; ctx.fillRect(sx+6,sy+2,20,8);
        ctx.fillStyle='#1e3c12'; ctx.fillRect(sx+10,sy+0,12,5);
        // Leaf highlights — visible bright-ish
        ctx.fillStyle='#3a5e20';
        ctx.fillRect(sx+4, sy+6,  6,1);
        ctx.fillRect(sx+8, sy+2,  6,1);
        ctx.fillRect(sx+4, sy+10, 8,1);
        ctx.fillRect(sx+18,sy+6,  5,1);
        // Canopy shadow
        ctx.fillStyle='rgba(0,0,0,0.42)';
        ctx.fillRect(sx+2,sy+22,28,4);
        break;}

      // ---- Castle Approach — cold blue-grey flagstone ----
      case T.CASTLE_FLOOR:{
        const c=((tx+ty)%2===0)?'#28282e':'#222228';
        ctx.fillStyle=c; ctx.fillRect(sx,sy,S,S);
        // 1px dark border
        ctx.fillStyle='#101014';
        ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        ctx.fillRect(sx,sy+16,S,1); ctx.fillRect(sx+16,sy,1,S);
        // Faint face highlight
        ctx.fillStyle='rgba(180,190,220,0.08)';
        ctx.fillRect(sx+2,sy+2,S-4,1); ctx.fillRect(sx+2,sy+2,1,S-4);
        // Edge shadow
        ctx.fillStyle='rgba(0,0,0,0.38)';
        ctx.fillRect(sx+26,sy,6,S); ctx.fillRect(sx,sy+26,S,6);
        // Blood stain — slightly more visible
        if((tx*7+ty*11)%23===0){
          ctx.fillStyle='rgba(100,18,18,0.30)';
          ctx.fillRect(sx+7,sy+9,12,7);
          ctx.fillStyle='rgba(60,10,10,0.20)';
          ctx.fillRect(sx+9,sy+11,8,4);
        }
        break;}

      case T.CASTLE_WALL:{
        // Cold dark stone — more readable than before
        ctx.fillStyle='#181c22'; ctx.fillRect(sx,sy,S,S);
        // 1px dark border
        ctx.fillStyle='#0a0c10'; ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        // Mortar — visible
        ctx.fillStyle='#0e1016';
        ctx.fillRect(sx,sy+15,S,2); ctx.fillRect(sx,sy+28,S,2);
        const ow2=((ty%2)===0)?0:8;
        // Stone blocks — readable blue-grey
        ctx.fillStyle='#22262e';
        ctx.fillRect(sx+ow2+1, sy+2,  13,11);
        ctx.fillRect(sx+ow2+18,sy+2,  11,11);
        ctx.fillRect(sx+ow2+1, sy+17, 14, 9);
        ctx.fillRect(sx+ow2+19,sy+17,  9, 9);
        // Face highlight — visible
        ctx.fillStyle='#303644';
        ctx.fillRect(sx+ow2+1, sy+2,  13,1);
        ctx.fillRect(sx+ow2+18,sy+2,  11,1);
        ctx.fillRect(sx+ow2+1, sy+17, 14,1);
        // Bottom shadow
        ctx.fillStyle='rgba(0,0,0,0.55)';
        ctx.fillRect(sx,sy+28,S,4);
        break;}

      // ---- Fog Gate — blood-red animated mist ----
      case T.FOG_GATE:{
        ctx.fillStyle='#120610'; ctx.fillRect(sx,sy,S,S);
        const frame=(now/180|0)%16;
        ctx.fillStyle='rgba(100,15,25,0.70)'; ctx.fillRect(sx,sy,S,S);
        ctx.fillStyle='rgba(150,30,40,0.45)';
        ctx.fillRect(sx+2, sy+(frame)%32,      6,18);
        ctx.fillRect(sx+14,sy+(frame+10)%32,   6,14);
        ctx.fillRect(sx+24,sy+(frame+6)%32,    5,18);
        ctx.fillStyle='rgba(200,50,60,0.22)';
        ctx.fillRect(sx+8, sy+(32-frame)%32,   4,12);
        ctx.fillRect(sx+20,sy+(32-frame+8)%32, 4,10);
        // Edge glow — more visible
        ctx.fillStyle='rgba(180,30,40,0.30)';
        ctx.fillRect(sx,sy,S,2); ctx.fillRect(sx,sy+S-2,S,2);
        ctx.fillRect(sx,sy,2,S); ctx.fillRect(sx+S-2,sy,2,S);
        break;}

      // ---- Boss Arena — scorched stone, ember cracks ----
      case T.BOSS_FLOOR:{
        ctx.fillStyle='#160808'; ctx.fillRect(sx,sy,S,S);
        ctx.fillStyle='#0e0606'; ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        ctx.fillRect(sx,sy+16,S,1); ctx.fillRect(sx+16,sy,1,S);
        // Smoldering ember veins — more visible
        if((tx*3+ty*5)%6===0){
          const hot=(now/600|0)%2;
          ctx.fillStyle=hot?'rgba(180,55,15,0.25)':'rgba(130,35,10,0.18)';
          ctx.fillRect(sx+4,sy+4,S-8,S-8);
          ctx.fillStyle=hot?'#802010':'#501808';
          ctx.fillRect(sx+12,sy+14,2,6); ctx.fillRect(sx+10,sy+18,6,2);
        }
        // Blood cracks
        if((tx*11+ty*7)%17===0){
          ctx.fillStyle='#4a1010';
          ctx.fillRect(sx+6,sy+8,1,10); ctx.fillRect(sx+7,sy+14,7,1);
        }
        break;}

      // ---- Water — deep river, readable blue ----
      case T.WATER:{
        const wf=(now/300|0)%4;
        ctx.fillStyle='#0c1a30'; ctx.fillRect(sx,sy,S,S);
        ctx.fillStyle='#0a1020'; ctx.fillRect(sx,sy,S,1); ctx.fillRect(sx,sy,1,S);
        ctx.fillStyle='rgba(18,40,70,0.72)'; ctx.fillRect(sx,sy,S,S);
        // Ripples — more visible
        const wr=(ty*11+wf*6)%S;
        ctx.fillStyle='rgba(45,90,140,0.55)';
        ctx.fillRect(sx,sy+wr,S,2); ctx.fillRect(sx,sy+(wr+14)%S,S,2);
        ctx.fillStyle='rgba(70,130,180,0.28)';
        ctx.fillRect(sx,sy+(wr+7)%S,S,1);
        // Surface sheen
        ctx.fillStyle='rgba(80,130,180,0.14)';
        ctx.fillRect(sx,sy,S,3);

// PARTICLE SYSTEM
// ============================================================
const Particles = {
  _p: GS.particles,

  embers(x,y,n=2){
    for(let i=0;i<n;i++) this._p.push({
      type:'ember', x, y,
      vx:(Math.random()-0.5)*65, vy:-Math.random()*85-20,
      life:0.9+Math.random()*0.6, max:1.5,
      sz:1.5+Math.random()*2.5,
      color:Math.random()>0.5?'#FF6020':'#FFB040',
    });
  },

  sparks(x,y,n=8){
    for(let i=0;i<n;i++){
      const a=(Math.PI*2*i/n)+Math.random()*0.5, spd=70+Math.random()*90;
      this._p.push({type:'spark',x,y, vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
        life:0.25+Math.random()*0.2, max:0.45, sz:2+Math.random()*2,
        color:Math.random()>0.5?'#FFD060':'#FF8020'});
    }
  },

  heal(x,y,n=8){
    for(let i=0;i<n;i++){
      const a=(Math.PI*2*i/n);
      this._p.push({type:'rune',x,y, vx:Math.cos(a)*45,vy:Math.sin(a)*45-20,
        life:0.7,max:0.7,sz:3,color:'#60FF60'});
    }
  },

  death(x,y,color,n=18){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, spd=25+Math.random()*110;
      this._p.push({type:'death',
        x:x+(Math.random()-0.5)*18, y:y+(Math.random()-0.5)*18,
        vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
        life:0.6+Math.random()*0.8, max:1.4, sz:3+Math.random()*5, color});
    }
  },

  rune(x,y){
    for(let i=0;i<8;i++){
      const a=Math.PI*2*i/8;
      this._p.push({type:'rune',x,y, vx:Math.cos(a)*55,vy:Math.sin(a)*55-25,
        life:0.7,max:0.7,sz:4,color:'#c8a060'});
    }
  },

  update(dt){
    for(let i=this._p.length-1;i>=0;i--){
      const p=this._p[i];
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
      if(p.type==='ember')       { p.vy+=18*dt; p.vx*=0.98; }
      else if(p.type==='spark')  { p.vx*=0.84; p.vy*=0.84; }
      else if(p.type==='death')  { p.vx*=0.91; p.vy*=0.91; }
      if(p.life<=0) this._p.splice(i,1);
    }
  },

  draw(cx,cy){
    for(const p of this._p){
      const a=Math.max(0,p.life/p.max);
      const sx=(p.x-cx)|0, sy=(p.y-cy)|0;
      const s=Math.max(1,p.sz|0);
      ctx.globalAlpha=a; ctx.fillStyle=p.color;
      ctx.fillRect(sx-(s>>1),sy-(s>>1),s,s);
    }
    ctx.globalAlpha=1;
  },
};

const Bonfires = {
  list: GS.bonfires,

  init(){
    this.list.push(
      {id:0, x:10*TILE_SIZE+16, y:48*TILE_SIZE+16, lit:true,  name:'Ruins Bonfire'},
      {id:1, x:57*TILE_SIZE+16, y:90*TILE_SIZE+16, lit:false, name:'Deep Ruins Bonfire'},
      {id:2, x:111*TILE_SIZE+16,y:45*TILE_SIZE+16, lit:false, name:'Forest Bonfire'},
      {id:3, x:205*TILE_SIZE+16,y:46*TILE_SIZE+16, lit:false, name:'Village Bonfire'},
      {id:4, x:152*TILE_SIZE+16,y:148*TILE_SIZE+16,lit:false, name:'Castle Bonfire'},
      {id:5, x:249*TILE_SIZE+16,y:10*TILE_SIZE+16, lit:false, name:'Swamp Bonfire'},
      {id:6, x:228*TILE_SIZE+16,y:143*TILE_SIZE+16,lit:false, name:'Peak Bonfire'},
      {id:7, x:48*TILE_SIZE+16, y:20*TILE_SIZE+16, lit:false, name:'Verdant Bonfire'}
    );
    const p=GS.player;
    p.bonfireX=this.list[0].x; p.bonfireY=this.list[0].y;
  },

  interact(px,py){
    const anyBoss=GS.bossActive||GS.miniBosses.swamp.active||GS.miniBosses.mountain.active||GS.miniBosses.grassland.active;
    if(anyBoss){ UI.msg('Cannot rest during a boss fight!','rune',2); return false; }
    for(const bf of this.list)
      if(Math.hypot(px-bf.x,py-bf.y)<50){ this.rest(bf); return true; }
    return false;
  },

  rest(bf){
    bf.lit=true;
    const p=GS.player;
    p.hp=Stats.maxHP(); p.fp=Stats.maxFP(); p.stamina=Stats.maxStamina();
    p.flaskCharges=PLAYER_CONFIG.flaskCharges;
    p.bonfireX=bf.x; p.bonfireY=bf.y;
    Enemies.respawnAll();
    // Bonfire rest overlay
    GS.phase='bonfire_rest';
    GS.bonfireRestTimer=2.5;
    GS.bonfireRestName=bf.name;
    ScreenFX.flash('#FFA020', 0.45, 0.6);
    for(let i=0;i<25;i++) Particles.embers(bf.x, bf.y);
  },

  update(dt){
    for(const bf of this.list)
      if(bf.lit && Math.random()<0.25) Particles.embers(bf.x,bf.y,1);
  },

  draw(cx,cy){
    for(const bf of this.list){
      const sx=(bf.x-cx)|0, sy=(bf.y-cy)|0;
      if(sx<-60||sx>SCREEN_W+60||sy<-60||sy>SCREEN_H+60) continue;
      const now=Date.now();
      // Stone base — flat pixel rects, no ellipse
      ctx.fillStyle='#1e1818'; ctx.fillRect(sx-12,sy+6,24,4);
      ctx.fillStyle='#3a3030'; ctx.fillRect(sx-10,sy+2,20,6);
      ctx.fillStyle='#504848'; ctx.fillRect(sx-8, sy-2, 16,6);
      ctx.fillStyle='#5e5252'; ctx.fillRect(sx-6, sy-4,  4,4);
      ctx.fillStyle='#5e5252'; ctx.fillRect(sx+2, sy-4,  4,4);
      if(bf.lit){
        // Animated pixel flame (4-frame cycle via integer time)
        const frame=(now/100|0)%4;
        // Ember glow — warm amber, the ONLY warm light in the dark world
        // Largest ring very faint, innermost bright
        ctx.globalAlpha=0.06; ctx.fillStyle='#c06010'; ctx.fillRect(sx-64,sy-52,128,90);
        ctx.globalAlpha=0.10; ctx.fillStyle='#d07010'; ctx.fillRect(sx-48,sy-40,96,72);
        ctx.globalAlpha=0.16; ctx.fillStyle='#e07810'; ctx.fillRect(sx-32,sy-28,64,52);
        ctx.globalAlpha=0.24; ctx.fillStyle='#e88010'; ctx.fillRect(sx-20,sy-18,40,36);
        ctx.globalAlpha=0.32; ctx.fillStyle='#f09010'; ctx.fillRect(sx-12,sy-10,24,22);
        ctx.globalAlpha=1;
        // Flame shapes per frame (outer orange)
        ctx.fillStyle='#c84008';
        const F=[
          [[sx-4,sy-4,8,6],[sx-3,sy-10,6,8],[sx-2,sy-16,4,8]],
          [[sx-5,sy-4,10,6],[sx-4,sy-10,8,8],[sx-2,sy-17,5,9]],
          [[sx-4,sy-4,8,6],[sx-3,sy-11,6,9],[sx-1,sy-16,3,8]],
          [[sx-5,sy-4,10,6],[sx-3,sy-10,7,8],[sx-2,sy-16,4,7]],
        ][frame];
        for(const[fx,fy,fw,fh] of F) ctx.fillRect(fx,fy,fw,fh);
        // Inner flame (tarnished amber — not bright yellow)
        ctx.fillStyle='#d07818';
        ctx.fillRect(sx-2,sy-4,4,4); ctx.fillRect(sx-2,sy-10,4,6); ctx.fillRect(sx-1,sy-14,2,5);
        // Core (deep gold, not white-hot)
        ctx.fillStyle='#e89020';
        ctx.fillRect(sx-1,sy-6,2,4); ctx.fillRect(sx-1,sy-10,2,4);
        ctx.fillStyle='#f0a828'; ctx.fillRect(sx-1,sy-12,2,2);
      } else {
        // Unlit — ash pile
        ctx.fillStyle='#2a1a0a'; ctx.fillRect(sx-4,sy-2,8,4);
        ctx.fillStyle='#1a1208'; ctx.fillRect(sx-2,sy-4,4,2);
      }
      // Interaction prompt
      if(GS.phase==='playing'){
        const dist=Math.hypot(GS.player.x-bf.x,GS.player.y-bf.y);
        if(dist<55) R.text('[E] Rest',sx,sy-(bf.lit?34:24),'#c8a060',10,'center');
      }
    }
  },
};

           x, y, pt:0, collected:false,
           color:RARITY_COLOR[def.rarity]||'#c0c0d0',
           glow: RARITY_GLOW[def.rarity]||'#888898' };
}

  interact(px,py){
    for(const c of this.list){
      if(c.opened) continue;
      if(Math.hypot(px-c.x,py-c.y)<44){ this._open(c); return true; }
    }
    return false;
  },

  _open(chest){
    chest.opened=true;
    const ix=chest.x+(Math.random()-0.5)*20, iy=chest.y+(Math.random()-0.5)*20;

    if(chest.fixedItem){
      if(chest.fixedConsumable){
        // It's a consumable / summon item from ITEMS
        const def=ITEMS[chest.fixedItem];
        if(def){
          GS.items.push({...def, ikey:chest.fixedItem, x:ix, y:iy, pt:0, collected:false,
            isConsumable:true });
          UI.msg(`Found: ${def.name}`,'item',3);
        }
      } else {
        // It's equipment from EQUIPMENT_ITEMS
        const drop=_makeDropItem(chest.fixedItem, ix, iy);
        if(drop){ GS.items.push(drop); UI.msg(`${RARITY_LABEL[drop.rarity]}: ${drop.name}`,'item',3); }
      }
    } else {
      const table=LOOT_TABLES[chest.zone]||[];
      const candidates=table.filter(e=>Math.random()<e.chance);
      if(candidates.length){
        const entry=candidates[Math.floor(Math.random()*candidates.length)];
        const drop=_makeDropItem(entry.item, ix, iy);
        if(drop){ GS.items.push(drop); UI.msg(`${RARITY_LABEL[drop.rarity]}: ${drop.name}`,'item',2.5); }
      } else {
        UI.msg('Empty Chest','rune',1.5);
      }
    }
    Particles.sparks(chest.x,chest.y,14);
    ScreenFX.flash('#c8a060',0.15,0.3);
  },

  draw(cx,cy){
    for(const c of this.list){
      const sx=(c.x-cx)|0, sy=(c.y-cy)|0;
      if(sx<-40||sx>SCREEN_W+40||sy<-40||sy>SCREEN_H+40) continue;
      if(c.opened){
        // Open — flat lid leaning back
        ctx.fillStyle='#2a1a08'; ctx.fillRect(sx-12,sy-2,24,8);
        ctx.fillStyle='#1a1006'; ctx.fillRect(sx-10,sy-8,20,6);
        ctx.fillStyle='#3a2410'; ctx.fillRect(sx-8,sy-6,16,4);
      } else {
        // Closed chest body
        ctx.fillStyle='#3a2010'; ctx.fillRect(sx-12,sy,24,10);
        // Lid
        ctx.fillStyle='#4e2e14'; ctx.fillRect(sx-12,sy-10,24,11);
        ctx.fillStyle='#6a4020'; ctx.fillRect(sx-10,sy-8,20,5);
        // Gold trim
        ctx.fillStyle='#a07828';
        ctx.fillRect(sx-12,sy-10,24,2); ctx.fillRect(sx-12,sy,24,2);
        ctx.fillRect(sx-12,sy-10,2,22); ctx.fillRect(sx+10,sy-10,2,22);
        // Latch
        ctx.fillStyle='#c8a030'; ctx.fillRect(sx-3,sy-2,6,6);
        ctx.fillStyle='#FFD040'; ctx.fillRect(sx-1,sy,2,2);
        // Interaction prompt
        if(GS.phase==='playing'){
          const dist=Math.hypot(GS.player.x-c.x,GS.player.y-c.y);
          if(dist<54) R.text('[E] Open',sx,sy-18,'#c8a060',10,'center');
        }
      }
    }
  },
};

const Shops = {
  list:[],

  init(){
    for(const d of SHOP_DEFS)
      this.list.push({...d, x:d.tx*TILE_SIZE+16, y:d.ty*TILE_SIZE+16});
  },

  interact(px,py){
    if(GS.shopOpen) return false;
    for(const s of this.list){
      if(Math.hypot(px-s.x,py-s.y)<52){
        GS.shopOpen=true; GS.shopRef=s; GS.shopCursor=0;
        GS.phase='shop';
        UI.msg(s.name,'zone',1.5);
        return true;
      }
    }
    return false;
  },

  close(){
    GS.shopOpen=false; GS.shopRef=null; GS.shopCursor=0;
    GS.phase='playing';
  },

  handleInput(){
    const s=GS.shopRef; if(!s) return;
    const p=GS.player;
    const items=this._visibleItems(s);
    const n=items.length;
    if(Input.just('Escape')||Input.just('Tab')){ this.close(); return; }
    if(Input.just('ArrowUp')||Input.just('KeyW')) GS.shopCursor=(GS.shopCursor-1+n)%n;
    if(Input.just('ArrowDown')||Input.just('KeyS')) GS.shopCursor=(GS.shopCursor+1)%n;
    if(Input.just('KeyE')||Input.just('KeyJ')||Input.just('Space')){
      const sel=items[GS.shopCursor]; if(!sel) return;
      this._buy(s, sel);
    }
  },

  _visibleItems(s){
    // Build the effective item list, computing upgrade entry price dynamically
    return s.stock.map(entry=>{
      if(entry.type!=='upgrade') return entry;
      const p=GS.player;
      const w=p.equipment.weapon;
      if(!w) return {...entry, label:'Upgrade Weapon', price:-1, unavail:'No weapon equipped'};
      const curLvl=p.weaponUpgrades[w]||0;
      if(curLvl>=5) return {...entry, label:`${EQUIPMENT_ITEMS[w].name}  MAX`, price:-1, unavail:'Already max level'};
      const cost=UPGRADE_COSTS[curLvl];
      return {...entry, label:`Upgrade ${EQUIPMENT_ITEMS[w].name} +${curLvl+1}`, price:cost, unavail:null};
    });
  },

  _buy(s, entry){
    const p=GS.player;
    if(entry.unavail){ UI.msg(entry.unavail,'rune',1.5); return; }
    if(entry.price<0){ UI.msg('Cannot upgrade','rune',1.5); return; }
    if(p.runes<entry.price){ UI.msg('Not enough Runes','rune',1.5); return; }

    if(entry.type==='equip'){
      const def=EQUIPMENT_ITEMS[entry.id];
      if(!def) return;
      if(p.inventory.includes(entry.id)){ UI.msg('Already owned','rune',1.5); return; }
      p.runes-=entry.price;
      p.inventory.push(entry.id);
      UI.msg(`Bought: ${def.name}`,'item',2.5);
      Particles.rune(p.x,p.y);
    } else if(entry.type==='item'){
      const def=ITEMS[entry.id];
      if(!def) return;
      p.runes-=entry.price;
      if(def.effect==='flask') p.flaskCharges=Math.min(9,p.flaskCharges+1);
      else if(def.effect==='runes'){ p.runes+=def.value; p.totalRunes+=def.value; }
      UI.msg(`Bought: ${def.name}`,'item',2);
      Particles.rune(p.x,p.y);
    } else if(entry.type==='upgrade'){
      const w=p.equipment.weapon;
      if(!w) return;
      const curLvl=p.weaponUpgrades[w]||0;
      p.runes-=entry.price;
      p.weaponUpgrades[w]=curLvl+1;
      UI.msg(`${EQUIPMENT_ITEMS[w].name} upgraded to +${curLvl+1}!`,'item',3);
      ScreenFX.flash('#c8a060',0.25,0.4);
      Particles.sparks(p.x,p.y,12);
    }
  },

  draw(cx,cy){
    for(const s of this.list){
      const sx=(s.x-cx)|0, sy=(s.y-cy)|0;
      if(sx<-50||sx>SCREEN_W+50||sy<-50||sy>SCREEN_H+50) continue;
      // Merchant NPC sprite
      this._drawMerchant(sx,sy,s.isBlacksmith);
      // Interaction prompt
      if(GS.phase==='playing'){
        const dist=Math.hypot(GS.player.x-s.x,GS.player.y-s.y);
        if(dist<60) R.text('[E] Talk',sx,sy-22,'#c8a060',10,'center');
      }
    }
  },

  _drawMerchant(sx,sy,isBs){
    const cc=isBs?'#3a2808':'#2a3028'; // blacksmith=brown, merchant=dark green
    const tc=isBs?'#c88030':'#60a040'; // trim color
    // Legs
    ctx.fillStyle='#1a1814'; ctx.fillRect(sx-5,sy+4,4,9); ctx.fillRect(sx+1,sy+4,4,9);
    ctx.fillStyle='#000'; ctx.fillRect(sx-6,sy+4,1,9); ctx.fillRect(sx+5,sy+4,1,9);
    // Body — robe/apron
    ctx.fillStyle=cc; ctx.fillRect(sx-7,sy-8,14,13);
    ctx.fillStyle='#000'; ctx.fillRect(sx-8,sy-8,1,13); ctx.fillRect(sx+7,sy-8,1,13);
    ctx.fillRect(sx-7,sy-9,14,1); ctx.fillRect(sx-7,sy+5,14,1);
    ctx.fillStyle=tc; ctx.fillRect(sx-7,sy-8,14,2); // trim
    // Head
    ctx.fillStyle='#4a3a28'; ctx.fillRect(sx-5,sy-19,10,12);
    ctx.fillStyle='#000'; ctx.fillRect(sx-6,sy-19,1,12); ctx.fillRect(sx+5,sy-19,1,12);
    ctx.fillRect(sx-5,sy-20,10,1); ctx.fillRect(sx-5,sy-7,10,1);

    if(isBs){
      // Hammer
      ctx.fillStyle='#382818'; ctx.fillRect(sx+8,sy-14,3,20);
      ctx.fillStyle='#000'; ctx.fillRect(sx+7,sy-14,1,20); ctx.fillRect(sx+11,sy-14,1,20);

      ctx.fillStyle='#606058'; ctx.fillRect(sx+8,sy-16,5,4); // face gleam
    } else {
      // Scroll/bag
      ctx.fillStyle='#503810'; ctx.fillRect(sx-11,sy-6,6,10);
      ctx.fillStyle='#000'; ctx.fillRect(sx-12,sy-6,1,10); ctx.fillRect(sx-5,sy-6,1,10);
      ctx.fillStyle='#c8a040'; ctx.fillRect(sx-11,sy-6,6,2); ctx.fillRect(sx-11,sy+2,6,2);

  drawUI(){
    const s=GS.shopRef; if(!s) return;
    const p=GS.player;
    const W=420, H=360, bx=(SCREEN_W-W)/2|0, by=(SCREEN_H-H)/2|0;
    // Panel
    ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,SCREEN_W,SCREEN_H);
    ctx.fillStyle='#0c0a08'; ctx.fillRect(bx,by,W,H);
    ctx.fillStyle='#000'; ctx.fillRect(bx-3,by-3,W+6,H+6);
    ctx.fillStyle='#2a2006'; ctx.fillRect(bx,by,W,3); // gold top trim
    // Title
    R.shadow(s.name.toUpperCase(), bx+W/2, by+24, '#c8a060','#000',20,'center');
    R.text(`Runes: ${p.runes}`, bx+W-14, by+24,'#FFD040',13,'right');
    // Items
    const items=this._visibleItems(s);
    const rowH=44, startY=by+54;
    for(let i=0;i<items.length;i++){
      const entry=items[i];
      const iy=startY+i*rowH;
      const sel=(i===GS.shopCursor);
      // Row bg
      ctx.fillStyle=sel?'#201e0e':'#0e0c08'; ctx.fillRect(bx+10,iy,W-20,rowH-4);
      if(sel){ ctx.fillStyle='#c8a060'; ctx.fillRect(bx+10,iy,3,rowH-4); }
      // Label
      let label='', desc='', priceStr='', priceCol='#FFD040';
      if(entry.type==='equip'){
        const def=EQUIPMENT_ITEMS[entry.id]||{};
        const owned=p.inventory.includes(entry.id);
        label=def.name||entry.id;
        desc=def.desc||'';
        priceStr=owned?'Owned':`${entry.price} Runes`;
        priceCol=owned?'#606060':'#FFD040';
      } else if(entry.type==='item'){
        const def=ITEMS[entry.id]||{};
        label=def.name||entry.id;
        desc=def.desc||`Effect: ${def.effect}`;
        priceStr=`${entry.price} Runes`;
      } else if(entry.type==='upgrade'){
        label=entry.label||'Upgrade Weapon';
        desc=entry.unavail||'Upgrades weapon damage +25% per level';
        priceStr=entry.price>0?`${entry.price} Runes`:(entry.unavail?'—':'MAX');
        priceCol=p.runes>=(entry.price||0)?'#FFD040':'#a03030';
      }
      const canAfford=(entry.type!=='upgrade'||!entry.unavail)&&
                       (entry.type==='equip'?!p.inventory.includes(entry.id):true)&&
                       p.runes>=(entry.price||0);
      R.bold(label, bx+22, iy+17, sel?'#ffe090':'#c8a060', 12,'left');
      R.text(desc, bx+22, iy+33, '#604a2a', 10,'left');
      R.bold(priceStr, bx+W-22, iy+17, priceCol, 12,'right');
    }
    // Footer
    ctx.fillStyle='#1a1810'; ctx.fillRect(bx,by+H-26,W,26);
    R.text('[↑↓] Navigate  [E/J] Buy  [Esc] Close', bx+W/2, by+H-9,'#503c20',10,'center');
    // Upgrade tooltip
    if(p.equipment.weapon){
      const upg=p.weaponUpgrades[p.equipment.weapon]||0;
      const wname=EQUIPMENT_ITEMS[p.equipment.weapon]?.name||'?';
      R.text(`Equipped: ${wname} +${upg}  │  Total ATK: ${Stats.damage()}`, bx+W/2, by+H-40,'#888070',10,'center');
    }
  },
};

        UI.msg(`You hold the ${def?.name||'key'}. The sealed gate to the south awaits.`,'rune',3);

      const def=ITEMS[alt.item];

    ctx.fillStyle='#6040a0'; ctx.fillRect(sx-4,sy-2,8,2);

    unlockMsg:'THE ASHEN KING AWAKENS', flashCol:'#6020a0',
    noItemMsg:'A seal bars your path... Find the Ashen Sigil.',
    spawn(){ Enemies.spawnBoss(); GS.flags.fogGateEntered=true; },
    isDefeated(){ return GS.bossDefeated; },
    isActive(){   return GS.bossActive; },
  },
  swamp: {
    // Swamp boss clearing tile bounds x:248..271, y:1..25
    px0:248*32, py0:32, px1:271*32, py1:25*32,
    requiredItem:'HORROR_TOTEM',
    unlockMsg:'THE SWAMP HORROR STIRS', flashCol:'#204010',
    noItemMsg:'A cursed seal bars the inner sanctum... Find the Horror Totem.',
    spawn(){ Enemies.spawnMiniBoss('SWAMP_MONSTER','swamp'); GS.miniBosses.swamp.summoned=true; },
    isDefeated(){ return GS.miniBosses.swamp.defeated; },

  },
  mountain: {
    // Mountain boss clearing tile bounds x:233..265, y:136..162
    px0:233*32, py0:136*32, px1:265*32, py1:162*32,
    requiredItem:'YETI_EFFIGY',
    unlockMsg:'THE GLACIAL YETI AWAKENS', flashCol:'#202840',
    noItemMsg:'Frost seals this passage... Find the Yeti Effigy.',
    spawn(){ Enemies.spawnMiniBoss('YETI','mountain'); GS.miniBosses.mountain.summoned=true; },
    isDefeated(){ return GS.miniBosses.mountain.defeated; },

  },
  grassland: {
    // Grassland boss arena tile bounds x:125..153, y:7..31
    px0:125*32, py0:7*32, px1:153*32, py1:31*32,

    unlockMsg:'THE VERDANT WARDEN AWAKENS', flashCol:'#204010',
    noItemMsg:"Ancient roots bar the way... Find the Warden's Seal.",
    spawn(){ Enemies.spawnMiniBoss('VERDANT_WARDEN','grassland'); GS.miniBosses.grassland.summoned=true; },
    isDefeated(){ return GS.miniBosses.grassland.defeated; },
    isActive(){   return GS.miniBosses.grassland.active; },
  },

const BossRooms = {
  // Called when player walks through a boss fog gate with required item
  enter(id){
    const def=BOSS_ROOM_DEFS[id]; if(!def) return;
    GS.activeBossRoom={ id, px0:def.px0, py0:def.py0, px1:def.px1, py1:def.py1 };
    def.spawn();
    UI.msg(def.unlockMsg,'boss',4);
    UI.msg('The door seals behind you...','rune',3);
    ScreenFX.flash(def.flashCol,0.6,1.0);
    ScreenFX.shake(8,0.5);
  },

  // Called when boss/miniboss is killed, or when player respawns
  unlock(notify=true){
    if(!GS.activeBossRoom) return;
    GS.activeBossRoom=null;
    if(notify) UI.msg('The seal has lifted.','rune',2.5);
  },

  // Clamp player position to active room bounds
  clamp(p){
    if(!GS.activeBossRoom) return;
    const br=GS.activeBossRoom;
    const S=PLAYER_CONFIG.size+2;
    p.x=Math.max(br.px0+S, Math.min(br.px1-S, p.x));
    p.y=Math.max(br.py0+S, Math.min(br.py1-S, p.y));
  },

  // Draw sealed door visuals at each boss room entry
  draw(cx,cy){
    if(!GS.activeBossRoom) return;
    const id=GS.activeBossRoom.id;
    const now=Date.now();
    const pulse=(now/300|0)%2;
    // Determine entry fog gate screen positions
    if(id==='main'){
      for(let tx=127;tx<=131;tx++){
        for(let ty=164;ty<=166;ty++){
          const sx=tx*32-cx|0, sy=ty*32-cy|0;
          if(sx<-40||sx>SCREEN_W+40) continue;
          ctx.globalAlpha=0.55+pulse*0.15; ctx.fillStyle='#500010';
          ctx.fillRect(sx,sy,32,32);
          ctx.globalAlpha=1;
        }
      }
      const sx=(129*32+16)-cx|0, sy=(165*32)-cy|0;
      R.text('SEALED',sx,sy-6,'#cc2030',10,'center');
    } else if(id==='swamp'){
      for(let tx=253;tx<=266;tx++){
        const sx=tx*32-cx|0, sy=24*32-cy|0;
        if(sx<-40||sx>SCREEN_W+40) continue;
        ctx.globalAlpha=0.50+pulse*0.15; ctx.fillStyle='#102808';
        ctx.fillRect(sx,sy,32,32);
        ctx.globalAlpha=1;
      }
      const sx=(260*32)-cx|0, sy=(24*32)-cy|0;
      R.text('SEALED',sx,sy-6,'#40a020',10,'center');
    } else if(id==='mountain'){
      for(let ty=140;ty<=158;ty++){
        const sx=234*32-cx|0, sy=ty*32-cy|0;
        if(sy<-40||sy>SCREEN_H+40) continue;
        ctx.globalAlpha=0.50+pulse*0.15; ctx.fillStyle='#0c1830';
        ctx.fillRect(sx,sy,32,32);
        ctx.globalAlpha=1;
      }
      const sx=234*32-cx|0, sy=(149*32)-cy|0;
      R.text('SEALED',sx-4,sy,'#3060a8',10,'right');
    } else if(id==='grassland'){
      for(let ty=15;ty<=23;ty++){
        const sx=125*32-cx|0, sy=ty*32-cy|0;
        if(sy<-40||sy>SCREEN_H+40) continue;
        ctx.globalAlpha=0.50+pulse*0.15; ctx.fillStyle='#102808';
        ctx.fillRect(sx,sy,32,32);
        ctx.globalAlpha=1;
      }
      const sx=125*32-cx|0, sy=(19*32)-cy|0;
      R.text('SEALED',sx-4,sy,'#40a020',10,'right');
    }
  },
};

// ============================================================
// PLAYER SYSTEM
// ============================================================
let atkHitbox=null; // {x,y,w,h,dmg,type,timer,hit:Set}

const Player = {
  update(dt){
    const p=GS.player;
    if(p.isDead){ this._updateDeath(dt); return; }
    // Timers
    if(p.hitFlash>0)     p.hitFlash    -=dt;
    if(p.staminaEmpty>0) p.staminaEmpty-=dt;
    if(p.combo>0){ p.comboTimer-=dt; if(p.comboTimer<=0){ p.combo=0; } }
    this._move(dt);
    this._roll(dt);
    this._attack(dt);
    this._special(dt);
    this._staminaRegen(dt);
    this._interact();
    this._flask();
    this._checkZone();
    this._checkFogGate();
    this._checkMiniBossZone();
    this._checkItems();
    this._checkLevel();
  },

  _move(dt){
    const p=GS.player;
    p.isMoving=false; // reset each frame; set true below if keys held
    // Root effect (vine grab, etc.) — can't move but can still act
    if(p.rootTimer>0){ p.rootTimer-=dt; BossRooms.clamp(p); return; }
    if(p.isRolling) return;
    const root=p.isAttacking&&p.attackType==='heavy';
    let dx=0, dy=0;
    if(!root){
      if(Input.down('KeyW')||Input.down('ArrowUp'))    dy-=1;
      if(Input.down('KeyS')||Input.down('ArrowDown'))  dy+=1;
      if(Input.down('KeyA')||Input.down('ArrowLeft'))  dx-=1;
      if(Input.down('KeyD')||Input.down('ArrowRight')) dx+=1;
    }
    if(dx||dy){
      const len=Math.sqrt(dx*dx+dy*dy); dx/=len; dy/=len;
      p.facing.x=dx; p.facing.y=dy;
      p.isMoving=true;
      p.walkPhase=(p.walkPhase+dt*3.5)%4; // 3.5 strides/sec → smooth 2-frame cycle
    }
    const spd=p.isAttacking ? Stats.speed()*0.35 : Stats.speed();
    const nx=p.x+dx*spd*dt, ny=p.y+dy*spd*dt;
    if(World.canMove(nx,p.y,PLAYER_CONFIG.size-1)) p.x=nx;
    if(World.canMove(p.x,ny,PLAYER_CONFIG.size-1)) p.y=ny;
    // Clamp to active boss room bounds
    BossRooms.clamp(p);
  },

  _roll(dt){
    const p=GS.player;
    // Sneak timer countdown
    if(p.sneakTimer>0){ p.sneakTimer-=dt; if(p.sneakTimer<=0){ p.sneakTimer=0; UI.msg('Reappeared','rune',0.8); } }
    if(p.isRolling){
      p.rollTimer-=dt; p.rollITimer-=dt;
      const baseDur = p.megaDash ? p.megaDashDur : PLAYER_CONFIG.rollDuration;
      const prog=1-(p.rollTimer/baseDur);
      const baseSpd = p.megaDash ? p.megaDashSpd : PLAYER_CONFIG.rollSpeed;
      const spd = p.megaDash ? baseSpd*(1-prog*0.25) : baseSpd*(1-prog*0.5);
      const nx=p.x+p.rollDx*spd*dt, ny=p.y+p.rollDy*spd*dt;
      if(World.canMove(nx,p.y,PLAYER_CONFIG.size-3)) p.x=nx;
      if(World.canMove(p.x,ny,PLAYER_CONFIG.size-3)) p.y=ny;
      BossRooms.clamp(p);
      p.isInvincible=(p.rollITimer>0); // always true throughout dash now
      if(p.rollTimer<=0){ p.isRolling=false; p.isInvincible=false; p.megaDash=false; }
      return;
    }
    if(Input.just('Space')&&!p.isAttacking){
      if(p.stamina>=PLAYER_CONFIG.rollStaminaCost){
        p.stamina-=PLAYER_CONFIG.rollStaminaCost;
        p.isRolling=true;
        p.rollTimer=PLAYER_CONFIG.rollDuration;
        p.rollITimer=PLAYER_CONFIG.rollIFrames; // full invincibility throughout
        let dx=0, dy=0;
        if(Input.down('KeyW')||Input.down('ArrowUp'))    dy-=1;
        if(Input.down('KeyS')||Input.down('ArrowDown'))  dy+=1;
        if(Input.down('KeyA')||Input.down('ArrowLeft'))  dx-=1;
        if(Input.down('KeyD')||Input.down('ArrowRight')) dx+=1;
        if(!dx&&!dy){ dx=p.facing.x; dy=p.facing.y; }
        const l=Math.sqrt(dx*dx+dy*dy)||1;
        p.rollDx=dx/l; p.rollDy=dy/l;
      } else {
        p.staminaEmpty=0.4;
      }
    }
  },

  _attack(dt){
    const p=GS.player;
    if(p.attackCooldown>0) p.attackCooldown-=dt;
    if(p.isAttacking){
      p.attackTimer-=dt;
      if(atkHitbox){ this._syncHitbox(); this._checkHits(); atkHitbox.timer-=dt; if(atkHitbox.timer<=0) atkHitbox=null; }
      if(p.attackTimer<=0){ p.isAttacking=false; atkHitbox=null; }
      return;
    }
    if(p.attackCooldown>0) return;
    if(Input.just('KeyJ')&&p.stamina>=PLAYER_CONFIG.lightStamina){
      p.stamina-=PLAYER_CONFIG.lightStamina; p.isAttacking=true; p.attackType='light';
      p.attackTimer=PLAYER_CONFIG.lightDur; p.attackCooldown=PLAYER_CONFIG.attackCooldown;
      this._makeHitbox('light');
    } else if(Input.just('KeyK')&&p.stamina>=PLAYER_CONFIG.heavyStamina){
      p.stamina-=PLAYER_CONFIG.heavyStamina; p.isAttacking=true; p.attackType='heavy';
      p.attackTimer=PLAYER_CONFIG.heavyDur; p.attackCooldown=PLAYER_CONFIG.attackCooldown;
      this._makeHitbox('heavy');
    } else if((Input.just('KeyJ')||Input.just('KeyK'))&&p.stamina<PLAYER_CONFIG.lightStamina){
      p.staminaEmpty=0.4;
    }
  },

  _makeHitbox(type){
    const p=GS.player;
    const range=type==='light'?52:72, w=type==='light'?34:56;
    atkHitbox={
      x:p.x+p.facing.x*range-w/2, y:p.y+p.facing.y*range-w/2,
      w,h:w, dmg:(type==='light'?PLAYER_CONFIG.lightDmg:PLAYER_CONFIG.heavyDmg)+Stats.damage(),
      type, timer:type==='light'?PLAYER_CONFIG.lightDur:PLAYER_CONFIG.heavyDur,
      hit:new Set()
    };
    this._checkHits();
  },

  _syncHitbox(){
    if(!atkHitbox) return;
    const p=GS.player;
    const range=atkHitbox.type==='light'?52:72, w=atkHitbox.w;
    atkHitbox.x=p.x+p.facing.x*range-w/2;
    atkHitbox.y=p.y+p.facing.y*range-w/2;
  },

  _checkHits(){
    if(!atkHitbox) return;
    const hx=atkHitbox.x+atkHitbox.w/2, hy=atkHitbox.y+atkHitbox.h/2;
    const p=GS.player;
    for(const e of GS.enemies){
      if(e.isDead||atkHitbox.hit.has(e.id)) continue;
      if(Math.hypot(e.x-hx,e.y-hy)<atkHitbox.w/2+e.size){
        Enemies.damage(e, atkHitbox.dmg, p.facing.x, p.facing.y);
        atkHitbox.hit.add(e.id);
        Particles.sparks(e.x,e.y,8);
        // Combo tracking
        p.combo++; p.comboTimer=2.0;
        if(p.combo===3) UI.msg('COMBO x3','combo',1.0);
        else if(p.combo===5) UI.msg('COMBO x5','combo',1.2);
        else if(p.combo>=8) UI.msg(`COMBO x${p.combo}`,'combo',1.2);
      }
    }
  },

  _staminaRegen(dt){
    const p=GS.player;
    if(!p.isRolling&&!p.isAttacking)
      p.stamina=Math.min(Stats.maxStamina(), p.stamina+PLAYER_CONFIG.staminaRegen*dt);
  },

  _interact(){
    if(!Input.just('KeyE')) return;
    const p=GS.player;
    if(Bonfires.interact(p.x,p.y)) return;
    if(Chests.interact(p.x,p.y)) return;
    if(Altars.interact(p.x,p.y)) return;
    if(Shops.interact(p.x,p.y)) return;
    if(Quest.interactElder(p.x,p.y)) return;
    // Bloodstain recovery
    if(p.bloodstainX!==null && Math.hypot(p.x-p.bloodstainX,p.y-p.bloodstainY)<32){
      p.runes+=p.bloodstainRunes; p.totalRunes+=p.bloodstainRunes;
      UI.msg(`Recovered ${p.bloodstainRunes} Runes`,'rune',2);
      Particles.rune(p.x,p.y);
      p.bloodstainX=null; p.bloodstainY=null; p.bloodstainRunes=0;
    }
    // TODO: NPC interaction, shop, lore items
  },

  _flask(){
    const p=GS.player;
    if(!Input.just('KeyF')||p.flaskCharges<=0||p.hp>=Stats.maxHP()) return;
    p.flaskCharges--;
    p.hp=Math.min(Stats.maxHP(), p.hp+PLAYER_CONFIG.flaskHeal);
    UI.msg(`+${PLAYER_CONFIG.flaskHeal} HP`,'heal',1.2);
    Particles.heal(p.x,p.y-10,8);
    ScreenFX.flash('#40a040',0.18,0.3);
  },

  _checkZone(){
    const p=GS.player;
    const z=World.zoneAt(p.x,p.y);
    if(z!==GS.currentZone){
      GS.currentZone=z; GS.discoveredZones.add(z);
      if(ZONES[z]) UI.msg(ZONES[z].name,'zone',3);
      ScreenFX.flash('#ffffff',0.12,0.5);
    }
  },

  _checkFogGate(){
    const p=GS.player;
    if(World.tile(p.x,p.y)!==T.FOG_GATE) return;
    const tx=p.x/TILE_SIZE|0, ty=p.y/TILE_SIZE|0;

    // Determine which fog gate based on tile position
    let roomId=null;
    if(tx>=127&&tx<=131&&ty>=164&&ty<=166) roomId='main';
    else if(tx>=253&&tx<=266&&ty===24)      roomId='swamp';
    else if(tx===234&&ty>=140&&ty<=158)     roomId='mountain';
    else if(tx===125&&ty>=15&&ty<=23)       roomId='grassland';
    if(!roomId) return;

    const def=BOSS_ROOM_DEFS[roomId];
    // Already defeated — allow free passage
    if(def.isDefeated()) return;
    // Boss room already active — player inside, clamping handles rest
    if(def.isActive()) return;
    // Check for required item
    const hasItem=p.consumables.includes(def.requiredItem);
    if(!hasItem){
      UI.msg(def.noItemMsg,'rune',3);
      p.x-=p.facing.x*18; p.y-=p.facing.y*18;
      return;
    }
    // Consume item, enter room
    p.consumables.splice(p.consumables.indexOf(def.requiredItem),1);
    BossRooms.enter(roomId);
  },

  _checkItems(){
    const p=GS.player;
    for(const item of GS.items){
      if(item.collected) continue;
      if(Math.hypot(p.x-item.x,p.y-item.y)<20){
        item.collected=true;
        if(item.isEquipment){
          p.inventory.push(item.equipId);
          UI.msg(`${RARITY_LABEL[EQUIPMENT_ITEMS[item.equipId]?.rarity||'common']}: ${item.name}`,'item',2);
        } else if(item.effect==='flask'){ p.flaskCharges=Math.min(9,p.flaskCharges+item.value); UI.msg(`+1 ${item.name}`,'item',2); }
        else if(item.effect==='runes'){ p.runes+=item.value; p.totalRunes+=item.value; UI.msg(`+${item.value} Runes`,'rune',2); }
        else if(item.effect==='summon'){
          if(!p.consumables.includes(item.ikey)) p.consumables.push(item.ikey);
          UI.msg(`Obtained: ${item.name}`,'item',3);
        }
        Particles.rune(p.x,p.y);
      }
    }
  },

  _abilityTier(){ return abilityTier(GS.player.level); },

  _special(dt){
    const p=GS.player;
    if(p.specialCooldown>0) p.specialCooldown-=dt;
    if(!Input.just('KeyQ')) return;
    if(!GS.playerClass){ UI.msg('Choose a class first','rune',1.5); return; }
    if(p.specialCooldown>0){ UI.msg('Ability cooling down','rune',0.8); return; }
    const def=CLASS_DEFS[GS.playerClass];
    const ab=def.ability;
    const tier=this._abilityTier();
    const upg=ab.upgrades[tier];
    if(p.fp<ab.fpCost){ UI.msg('Not enough FP','rune',1); return; }

    p.fp-=ab.fpCost;
    p.specialCooldown=ab.cooldown;

    switch(ab.key){
      case 'mega_slice':{
        // Wide sweeping hitbox — hits everything in a broad arc
        const dmg=(PLAYER_CONFIG.lightDmg+Stats.damage())*upg.dmgMult;
        const hw=upg.w/2;
        // Create three overlapping hitboxes to fake a wide sweep
        const offsets=[-hw*0.55, 0, hw*0.55];
        for(const off of offsets){
          const ox=-p.facing.y*off, oy=p.facing.x*off;
          const hx=p.x+p.facing.x*upg.range+ox-hw/2;
          const hy=p.y+p.facing.y*upg.range+oy-hw/2;
          atkHitbox={x:hx,y:hy,w:upg.w,h:upg.w,dmg,type:'heavy',timer:0.45,hit:atkHitbox?new Set([...atkHitbox.hit]):new Set()};
          this._checkHits();
        }
        atkHitbox=null;
        Particles.sparks(p.x+p.facing.x*upg.range, p.y+p.facing.y*upg.range, 14);
        ScreenFX.flash('#c8a060',0.22,0.18);
        UI.msg(upg.name+'!','combo',0.9);
        break;
      }
      case 'mega_dash':{
        // Supercharged dash with full i-frames
        let dx=0,dy=0;
        if(Input.down('KeyW')||Input.down('ArrowUp'))    dy-=1;
        if(Input.down('KeyS')||Input.down('ArrowDown'))  dy+=1;
        if(Input.down('KeyA')||Input.down('ArrowLeft'))  dx-=1;
        if(Input.down('KeyD')||Input.down('ArrowRight')) dx+=1;
        if(!dx&&!dy){ dx=p.facing.x; dy=p.facing.y; }
        const l=Math.sqrt(dx*dx+dy*dy)||1;
        p.rollDx=dx/l; p.rollDy=dy/l;
        p.isRolling=true; p.megaDash=true;
        p.megaDashSpd=upg.spd; p.megaDashDur=upg.dur;
        p.rollTimer=upg.dur; p.rollITimer=upg.dur;
        Particles.sparks(p.x,p.y,10);
        UI.msg(upg.name+'!','combo',0.7);
        break;
      }
      case 'mega_sneak':{
        p.sneakTimer=upg.dur;
        ScreenFX.flash('#283018',0.4,0.5);
        UI.msg(upg.name+'!  ('+upg.dur.toFixed(1)+'s)','combo',1.0);
        break;
      }
      case 'mega_fireball':{
        const dx=p.facing.x, dy=p.facing.y;
        GS.projectiles.push({
          x:p.x+dx*22, y:p.y+dy*22,
          vx:dx*upg.spd, vy:dy*upg.spd,
          dmg:upg.dmg+Stats.damage(), sz:upg.sz,
          life:4.5, color:'#ff4010', glow:'#ff8020',
          isPlayerProj:true, isFireball:true, fireballSz:upg.sz
        });
        Particles.sparks(p.x+dx*22,p.y+dy*22,12);
        ScreenFX.flash('#601008',0.20,0.25);
        UI.msg(upg.name+'!','combo',0.9);
        break;
      }
    }
  },

  _checkLevel(){
    const p=GS.player;
    const newLevel=Math.min(LEVEL_THRESHOLDS.length, LEVEL_THRESHOLDS.filter(t=>p.totalRunes>=t).length);
    if(newLevel>p.level){
      p.pendingLevelUps+=(newLevel-p.level);
      // Announce ability upgrade at milestones
      if(GS.playerClass&&[5,10,15,20].includes(newLevel)){
        const ab=CLASS_DEFS[GS.playerClass].ability;
        const t=abilityTier(newLevel);
        setTimeout(()=>UI.msg(`Ability upgraded: ${ab.upgrades[t].name}!`,'levelup',3),400);
        ScreenFX.flash(CLASS_DEFS[GS.playerClass].color,0.35,0.6);
      }
      p.level=newLevel;
      if(GS.phase==='playing'){
        GS.phase='levelup';
        p.levelupCursor=0;
      }
    }
  },

  _checkMiniBossZone(){
    // Mini-bosses are now summoned via altars — this method is a no-op
    // (kept for structure; actual summoning handled by Altars.interact)
  },

  takeDamage(dmg){
    const p=GS.player;
    if(p.isInvincible||p.isDead) return;
    const actual=Math.max(1, dmg-Stats.defense());
    p.hp-=actual; p.hitFlash=0.25;
    Particles.sparks(p.x,p.y,10);
    ScreenFX.shake(5,0.18);
    DmgNums.add(p.x,p.y-20, `-${Math.ceil(dmg)}`, '#FF4040');
    if(p.hp<=0){ p.hp=0; this._die(); }
  },

  _die(){
    const p=GS.player;
    p.isDead=true; p.deathTimer=3.5;
    p.bloodstainX=p.x; p.bloodstainY=p.y;
    p.bloodstainRunes=p.runes; p.runes=0;
    p.combo=0; p.comboTimer=0;
    atkHitbox=null;
    Particles.death(p.x,p.y,'#a03020',28);
    UI.msg('YOU DIED','death',4);
    ScreenFX.shake(10,0.4);
  },

  _updateDeath(dt){
    const p=GS.player; p.deathTimer-=dt;
    if(p.deathTimer<=0) this._respawn();
  },

  _respawn(){
    const p=GS.player;
    p.isDead=false; p.hp=Stats.maxHP(); p.fp=Stats.maxFP(); p.stamina=Stats.maxStamina();
    p.flaskCharges=PLAYER_CONFIG.flaskCharges;
    p.x=p.bonfireX; p.y=p.bonfireY;
    p.isRolling=false; p.isAttacking=false; p.isInvincible=false;
    p.hitFlash=0; p.combo=0; p.rootTimer=0; p.sneakTimer=0; p.megaDash=false;
    atkHitbox=null;
    // Unlock boss room (boss resets on respawnAll)
    GS.activeBossRoom=null;
    // Reset boss references so they can be re-summoned
    if(GS.bossActive){ GS.bossActive=false; GS.bossRef=null; GS.flags.fogGateEntered=false; }
    if(GS.miniBosses.swamp.active){ GS.miniBosses.swamp.active=false; GS.miniBosses.swamp.ref=null; GS.miniBosses.swamp.summoned=false; }
    if(GS.miniBosses.mountain.active){ GS.miniBosses.mountain.active=false; GS.miniBosses.mountain.ref=null; GS.miniBosses.mountain.summoned=false; }
    if(GS.miniBosses.grassland.active){ GS.miniBosses.grassland.active=false; GS.miniBosses.grassland.ref=null; GS.miniBosses.grassland.summoned=false; }
    Enemies.respawnAll();
    GS.messages=GS.messages.filter(m=>m.type!=='death');
  },

  draw(cx,cy){
    const p=GS.player;
    const sx=(p.x-cx)|0, sy=(p.y-cy)|0;
    const baseA=p.isDead?Math.max(0,p.deathTimer/2):1;
    ctx.globalAlpha=baseA;

    // Roll ghost trail
    if(p.isRolling){
      for(let i=3;i>=1;i--){
        ctx.globalAlpha=baseA*(0.14-i*0.04);
        ctx.fillStyle='#607080';
        ctx.fillRect((sx-p.rollDx*i*9)|0-5,(sy-p.rollDy*i*9)|0-5,10,10);
      }
      ctx.globalAlpha=baseA;
    }

    // I-frame glow (outer border rect)
    if(p.isInvincible){
      ctx.fillStyle='#3060a0';
      ctx.fillRect(sx-16,sy-36,32,46);
    }

    // Root vine glow
    if(p.rootTimer>0){
      const rf=Math.sin(Date.now()/80)*0.15+0.35;
      ctx.globalAlpha=baseA*rf; ctx.fillStyle='#204010';
      ctx.fillRect(sx-18,sy-38,36,50);
      ctx.globalAlpha=baseA; ctx.fillStyle='#30601c';
      ctx.fillRect(sx-18,sy+12,36,4);
      ctx.fillRect(sx-18,sy-38,4,50);
      ctx.fillRect(sx+14,sy-38,4,50);
      ctx.globalAlpha=baseA;
    }

    // Frost aura (Yeti Pelt)
    if(p.equipment.armor==='YETI_PELT'){
      const ft=((Date.now()/300)|0)%3;
      ctx.globalAlpha=baseA*0.22; ctx.fillStyle='#2060c0';
      ctx.fillRect(sx-16-ft,sy-38-ft,32+ft*2,46+ft*2);
      ctx.globalAlpha=baseA;
    }

    // Hit flash border
    if(p.hitFlash>0){
      ctx.fillStyle='#FF2020';
      ctx.fillRect(sx-16,sy-36,32,46);
    }

    // Ground shadow
    ctx.globalAlpha=baseA*0.42; ctx.fillStyle='#000';
    ctx.fillRect(sx-10,sy+8,20,5);
    ctx.globalAlpha=baseA;

    // Sneak fade (Archer invisibility)
    if(p.sneakTimer>0){
      const blinkFast=Math.sin(Date.now()/120)>0;
      ctx.globalAlpha=baseA*(p.sneakTimer<0.8?(blinkFast?0.30:0.10):0.22);
    }

    // ── Pixel-art class sprite ──────────────────────────────
    const cls=GS.playerClass||'SWORDSMAN';
    const spr=CLS_SPRITES[cls]||CLS_SPRITES.SWORDSMAN;

    let sprRows, yOff=0;
    if(p.isDead){
      sprRows=spr.idle[0]; yOff=8;
    } else if(p.isRolling){
      // Crouched — draw sprite lower so head dips down
      sprRows=spr.idle[0]; yOff=6;
    } else if(p.isAttacking){
      sprRows=spr.attack?spr.attack[0]:spr.idle[0];
    } else if(p.isMoving){
      // Alternate stride ↔ neutral every half-cycle
      const wf=Math.floor(p.walkPhase)%2;
      sprRows=wf===0?spr.walk[0]:spr.idle[0];
    } else {
      sprRows=spr.idle[0];
      // Subtle vertical bob: shift up 1 px every other 0.5 s
      yOff=Math.floor(GS.time*2)%2===0?0:-2;
    }

    // Mirror sprite when facing left
    const facingLeft=p.facing.x<-0.3&&Math.abs(p.facing.x)>Math.abs(p.facing.y);
    if(facingLeft){
      pxSM(sx-14, sy-34+yOff, sprRows, spr.pal, 2);
    } else {
      pxS(sx-14, sy-34+yOff, sprRows, spr.pal, 2);
    }
    ctx.globalAlpha=baseA;
    // ── End sprite ─────────────────────────────────────────

    // Talisman — cord + bead
    if(p.equipment.talisman){
      const talCol=p.equipment.talisman==='EMBER_TALISMAN'?'#a02808':
                   p.equipment.talisman==='WOODEN_TALISMAN'?'#4a2c0a':
                   p.equipment.talisman==='ARCHER_TALISMAN'?'#306040':'#303840';
      ctx.fillStyle='#0a0a0a'; ctx.fillRect(sx-1,sy+1,2,5);
      ctx.fillStyle='#000'; ctx.fillRect(sx-2,sy+5,4,1);
      ctx.fillStyle=talCol; ctx.fillRect(sx-2,sy+5,4,4);
    }

    // Ring pip on wrist
    if(p.equipment.ring){
      const ringCol=p.equipment.ring==='SOVEREIGN_RING'?'#a08010':
                    p.equipment.ring==='CRIMSON_RING'?'#801010':'#404850';
      ctx.fillStyle='#000'; ctx.fillRect(sx+8,sy-1,4,3);
      ctx.fillStyle=ringCol; ctx.fillRect(sx+9,sy,2,2);
    }

    // Facing dot
    if(!p.isDead){
      ctx.fillStyle='#7a5810';
      const fd=11;
      ctx.fillRect((sx+Math.round(p.facing.x*fd))-1,(sy+Math.round(p.facing.y*fd))-1,2,2);
    }

    // ---- WEAPON ----
    // Visual varies by equipped weapon:
    //   null/unarmed  → short rusty dagger
    //   IRON_SWORD    → standard straight sword (gray-blue)
    //   HOLLOW_BLADE  → longer, cold steel with blue tint
    //   ASHEN_GREATSWORD → wide two-hander, ash-gray + ember glow
    if(!p.isDead){
      const eqWeapon=p.equipment.weapon;
      const facingAngle=Math.atan2(p.facing.y,p.facing.x);
      ctx.save();
      ctx.translate(sx,sy);
      ctx.rotate(facingAngle);
      ctx.globalAlpha=baseA;

      // Shared weapon draw — identical pixels in both rest and swing
      const drawWeaponShape=(w)=>{
        if(w==='RUSTY_SWORD'){
          ctx.fillStyle='#1a1208'; ctx.fillRect(5,-2,6,4);    // handle
          ctx.fillStyle='#281c0c'; ctx.fillRect(9,-3,4,6);    // crossguard (worn)
          ctx.fillStyle='#282010'; ctx.fillRect(13,-2,20,4);  // rusty blade
          ctx.fillStyle='#342818'; ctx.fillRect(13,-2,12,2);  // face
          ctx.fillStyle='#4a3a24'; ctx.fillRect(14,-2,6,1);   // dim spot of old gleam
          ctx.fillStyle='#1e1808'; ctx.fillRect(33,-1,3,3);   // tip (worn)
        } else if(w==='SMALL_DAGGER'){
          ctx.fillStyle='#181018'; ctx.fillRect(4,-2,7,4);    // dark handle
          ctx.fillStyle='#302040'; ctx.fillRect(10,-3,3,6);   // purple guard
          ctx.fillStyle='#1c1828'; ctx.fillRect(13,-2,18,4);  // blade
          ctx.fillStyle='#282438'; ctx.fillRect(13,-2,12,2);  // face
          ctx.fillStyle='#382c4c'; ctx.fillRect(13,-2,7,1);   // gleam
          ctx.fillStyle='#141020'; ctx.fillRect(30,0,3,2);    // sharp tip
        } else if(w==='OLD_BOW'){
          // Bow — vertical arc drawn rotated with player
          ctx.fillStyle='#4a3010'; ctx.fillRect(4,-1,4,3);    // grip
          ctx.fillStyle='#3a2408'; ctx.fillRect(8,-10,3,8);   // upper limb
          ctx.fillStyle='#3a2408'; ctx.fillRect(8,2,3,8);     // lower limb
          ctx.fillStyle='#503018'; ctx.fillRect(9,-2,2,4);    // center riser
          ctx.fillStyle='#182820'; ctx.fillRect(8,-10,1,22);  // string shadow
          ctx.fillStyle='#304820'; ctx.fillRect(9,-10,1,22);  // bowstring
        } else if(w==='OLD_WAND'){
          ctx.fillStyle='#2c1c08'; ctx.fillRect(4,-2,26,4);   // wand shaft
          ctx.fillStyle='#3a2810'; ctx.fillRect(5,-1,22,2);   // face
          ctx.fillStyle='#3a1050'; ctx.fillRect(28,-4,8,8);   // orb base
          ctx.fillStyle='#6020a0'; ctx.fillRect(29,-3,6,6);   // magic orb
          ctx.fillStyle='#c060ff'; ctx.fillRect(30,-2,3,3);   // orb glow
          ctx.fillStyle='#000'; ctx.fillRect(28,-4,1,8); ctx.fillRect(36,-4,1,8); // outline
        } else if(w==='VINE_STAFF'){
          ctx.fillStyle='#1a2c08'; ctx.fillRect(5,-2,8,4);    // handle wrap
          ctx.fillStyle='#0e1a04'; ctx.fillRect(11,-3,4,6);   // grip knot
          ctx.fillStyle='#142006'; ctx.fillRect(15,-2,28,4);  // staff shaft
          ctx.fillStyle='#1c2c08'; ctx.fillRect(15,-1,26,2);  // shaft face
          ctx.fillStyle='#2a4010'; ctx.fillRect(43,-4,8,8);   // orb socket
          ctx.fillStyle='#1e5808'; ctx.fillRect(44,-3,6,6);   // toxic orb
          ctx.fillStyle='#60c820'; ctx.fillRect(45,-2,3,3);   // orb glow
          ctx.fillStyle='#182c06'; ctx.fillRect(43,-4,1,8); ctx.fillRect(51,-4,1,8); // outline
        } else if(w==='HUNTERS_BOW'||w==='FOREST_BOW'){
          const bowCol=w==='FOREST_BOW'?'#2a4010':'#3a2808';
          ctx.fillStyle=bowCol; ctx.fillRect(4,-1,4,3);    // grip
          ctx.fillStyle=bowCol; ctx.fillRect(8,-12,4,10);  // upper limb
          ctx.fillStyle=bowCol; ctx.fillRect(8,2,4,10);    // lower limb
          ctx.fillStyle='#503018'; ctx.fillRect(9,-2,2,4); // center riser
          ctx.fillStyle='#304820'; ctx.fillRect(10,-12,1,26); // bowstring
          if(w==='FOREST_BOW'){ctx.fillStyle='#204010'; ctx.fillRect(7,-14,3,4); ctx.fillRect(7,10,3,4);} // limb tips
        } else if(w==='LONGBOW'||w==='WARDEN_BOW'){
          const lbCol=w==='WARDEN_BOW'?'#2a4a18':'#4a3010';
          ctx.fillStyle=lbCol; ctx.fillRect(4,-1,5,3);     // grip
          ctx.fillStyle=lbCol; ctx.fillRect(8,-14,5,12);   // upper limb
          ctx.fillStyle=lbCol; ctx.fillRect(8,2,5,12);     // lower limb
          ctx.fillStyle='#6a4818'; ctx.fillRect(9,-2,3,4); // center riser
          ctx.fillStyle='#304828'; ctx.fillRect(11,-14,1,30); // bowstring
          if(w==='WARDEN_BOW'){ctx.fillStyle='#40c820'; ctx.fillRect(10,-16,3,4); ctx.fillRect(10,12,3,4);} // glowing tips
        } else if(w==='OAK_STAFF'||w==='EMBER_ROD'){
          const stCol=w==='EMBER_ROD'?'#3a1808':'#2c1c08';
          ctx.fillStyle=stCol; ctx.fillRect(4,-2,26,4);    // staff shaft
          ctx.fillStyle=w==='EMBER_ROD'?'#5a2810':'#3a2810'; ctx.fillRect(5,-1,22,2); // face
          const orbCol=w==='EMBER_ROD'?'#e04010':'#a060e0';
          ctx.fillStyle=orbCol; ctx.fillRect(28,-5,10,10); // orb
          ctx.fillStyle='#fff'; ctx.fillRect(30,-3,3,3);   // orb highlight
          ctx.fillStyle='#000'; ctx.fillRect(28,-5,1,10); ctx.fillRect(38,-5,1,10); // outline
        } else if(w==='CRYSTAL_WAND'||w==='ARCANE_TOME'){
          if(w==='ARCANE_TOME'){
            ctx.fillStyle='#1a0c30'; ctx.fillRect(4,-4,18,8);  // tome base
            ctx.fillStyle='#2a1840'; ctx.fillRect(5,-3,16,6);  // tome cover
            ctx.fillStyle='#8040c0'; ctx.fillRect(6,-3,2,6);   // spine
            ctx.fillStyle='#c080ff'; ctx.fillRect(7,-2,8,1);   // rune line
            ctx.fillStyle='#ff80ff'; ctx.fillRect(22,-3,6,6);  // magic gem
            ctx.fillStyle='#fff'; ctx.fillRect(23,-2,3,3);
          } else {
            ctx.fillStyle='#0a1028'; ctx.fillRect(4,-2,24,4);   // crystal shaft
            ctx.fillStyle='#182048'; ctx.fillRect(5,-1,22,2);   // face
            ctx.fillStyle='#2040a8'; ctx.fillRect(27,-6,10,10); // crystal orb
            ctx.fillStyle='#80b0ff'; ctx.fillRect(29,-4,6,6);   // glow
            ctx.fillStyle='#e0f0ff'; ctx.fillRect(30,-3,3,3);   // core
          }
        } else if(w==='ASHEN_GREATSWORD'){
          ctx.fillStyle='#3a2008'; ctx.fillRect(4,-3,10,6);   // handle
          ctx.fillStyle='#6a4010'; ctx.fillRect(12,-6,6,12);  // crossguard
          ctx.fillStyle='#1c1c24'; ctx.fillRect(18,-5,34,10); // blade base
          ctx.fillStyle='#2a2a38'; ctx.fillRect(18,-3,32,6);  // blade body
          ctx.fillStyle='#3c3c50'; ctx.fillRect(18,-2,30,2);  // face
          ctx.fillStyle='#505060'; ctx.fillRect(18,-2,14,1);  // partial gleam
          ctx.fillStyle='#1a1a22'; ctx.fillRect(50,-2,6,5);   // tip
        } else if(w==='HOLLOW_BLADE'){
          ctx.fillStyle='#2e1c08'; ctx.fillRect(6,-2,7,4);    // handle
          ctx.fillStyle='#303858'; ctx.fillRect(11,-4,4,8);   // blue-tinted guard
          ctx.fillStyle='#1c2030'; ctx.fillRect(15,-3,30,5);  // blade base
          ctx.fillStyle='#283048'; ctx.fillRect(15,-2,28,3);  // blade face
          ctx.fillStyle='#384060'; ctx.fillRect(15,-2,14,1);  // cold dim gleam
          ctx.fillStyle='#202838'; ctx.fillRect(43,-1,4,3);   // tip
        } else if(w==='IRON_SWORD'){
          ctx.fillStyle='#2e1c08'; ctx.fillRect(6,-2,7,4);    // handle
          ctx.fillStyle='#302010'; ctx.fillRect(11,-4,5,8);   // crossguard
          ctx.fillStyle='#1c1c28'; ctx.fillRect(16,-3,26,5);  // blade base
          ctx.fillStyle='#282836'; ctx.fillRect(16,-2,24,3);  // blade face
          ctx.fillStyle='#383848'; ctx.fillRect(16,-2,12,1);  // dim gleam
          ctx.fillStyle='#1e1e28'; ctx.fillRect(40,-1,4,3);   // tip
        } else {
          // Unarmed — short dark dagger
          ctx.fillStyle='#1e1208'; ctx.fillRect(5,-1,5,3);    // stub handle
          ctx.fillStyle='#281808'; ctx.fillRect(9,-2,3,5);    // guard
          ctx.fillStyle='#242018'; ctx.fillRect(12,-2,12,4);  // short blade
          ctx.fillStyle='#302c20'; ctx.fillRect(12,-2,8,2);   // face
        }
      };

      if(p.isAttacking){
        const dur=p.attackType==='light'?PLAYER_CONFIG.lightDur:PLAYER_CONFIG.heavyDur;
        const prog=Math.min(1,1-(p.attackTimer/dur));
        const half=p.attackType==='light'?0.85:1.15;
        ctx.rotate(-half+prog*half*2);
        drawWeaponShape(eqWeapon);
      } else {
        ctx.rotate(0.42);
        drawWeaponShape(eqWeapon);
      }
      ctx.restore();
    }

    ctx.globalAlpha=1;

    // Attack hitbox (pixel outline)
    if(atkHitbox){
      ctx.globalAlpha=0.22;
      ctx.fillStyle=atkHitbox.type==='light'?'#FFE080':'#FF8040';
      ctx.fillRect(atkHitbox.x-cx,atkHitbox.y-cy,atkHitbox.w,atkHitbox.h);
      ctx.globalAlpha=1;
      ctx.fillStyle=atkHitbox.type==='light'?'#FFD040':'#FF6020';
      // Pixel outline (4 edge rects)
      const hx=atkHitbox.x-cx, hy=atkHitbox.y-cy, hw=atkHitbox.w, hh=atkHitbox.h;
      ctx.fillRect(hx,hy,hw,1); ctx.fillRect(hx,hy+hh-1,hw,1);
      ctx.fillRect(hx,hy,1,hh); ctx.fillRect(hx+hw-1,hy,1,hh);
    }

    // Bloodstain (pixel cross)
    if(p.bloodstainX!==null){
      const bsx=(p.bloodstainX-cx)|0, bsy=(p.bloodstainY-cy)|0;
      if(bsx>-25&&bsx<SCREEN_W+25&&bsy>-25&&bsy<SCREEN_H+25){
        ctx.fillStyle='#660000';
        ctx.fillRect(bsx-10,bsy-2,20,4); ctx.fillRect(bsx-2,bsy-10,4,20);
        ctx.fillStyle='#aa1818';
        ctx.fillRect(bsx-6,bsy-1,12,2); ctx.fillRect(bsx-1,bsy-6,2,12);
        const dist=Math.hypot(p.x-p.bloodstainX,p.y-p.bloodstainY);
        if(dist<90) R.text(`[E] Recover ${p.bloodstainRunes} Runes`,bsx,bsy-16,'#c8a060',10,'center');
      }
    }
  },
};
