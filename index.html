// EQUIPMENT MENU
// ============================================================
const Equipment = {
  SLOTS: ['weapon','armor','ring','talisman'],
  SLOT_LABEL: {weapon:'WEAPON',armor:'ARMOR',ring:'RING',talisman:'TALISMAN'},
  SLOT_KEY:   {weapon:'[W]',  armor:'[A]',  ring:'[R]', talisman:'[T]'},

  equip(idx){
    const p=GS.player;
    if(idx<0||idx>=p.inventory.length) return;
    const id=p.inventory[idx];
    const item=EQUIPMENT_ITEMS[id]; if(!item) return;
    const slot=item.slot;
    if(p.equipment[slot]) p.inventory.push(p.equipment[slot]); // swap old to inv
    p.equipment[slot]=id;
    p.inventory.splice(idx,1);
    p.equipCursor=Math.min(p.equipCursor, Math.max(0,p.inventory.length-1));
    // Clamp HP/Stamina to new max
    p.hp=Math.min(p.hp, Stats.maxHP());
    p.stamina=Math.min(p.stamina, Stats.maxStamina());
    UI.msg(`Equipped: ${item.name}`,'item',1.5);
  },

  unequip(slot){
    const p=GS.player;
    if(!p.equipment[slot]) return;
    p.inventory.push(p.equipment[slot]);
    p.equipment[slot]=null;
  },

  handleInput(){
    const p=GS.player;
    const len=p.inventory.length;
    if(Input.just('ArrowUp'))   p.equipCursor=Math.max(0,p.equipCursor-1);
    if(Input.just('ArrowDown')) p.equipCursor=Math.min(Math.max(0,len-1),p.equipCursor+1);
    if(Input.just('KeyE'))      this.equip(p.equipCursor);
    if(Input.just('KeyW'))      this.unequip('weapon');
    if(Input.just('KeyA'))      this.unequip('armor');
    if(Input.just('KeyR'))      this.unequip('ring');
    if(Input.just('KeyT'))      this.unequip('talisman');
  },

  draw(){
    // Dark overlay
    R.rectA(0,0,SCREEN_W,SCREEN_H,'#000',0.82);

    const PX=SCREEN_W/2-270|0, PY=50, PW=540, PH=520;
    // Outer border + panel bg
    ctx.fillStyle='#000'; ctx.fillRect(PX-4,PY-4,PW+8,PH+8);
    ctx.fillStyle='#080604'; ctx.fillRect(PX,PY,PW,PH);
    // Title bar
    ctx.fillStyle='#0e0a06'; ctx.fillRect(PX,PY,PW,26);
    R.shadow('EQUIPMENT',SCREEN_W/2,PY+18,'#c8a060','#000',14,'center');
    ctx.fillStyle='#2a1c0c'; ctx.fillRect(PX,PY+26,PW,1);

    const p=GS.player;

    // ---- LEFT COLUMN: equipped slots (x=PX+12) ----
    const LX=PX+12, SH=58;
    R.text('EQUIPPED',LX+90,PY+42,'#604828',8,'center');
    for(let i=0;i<this.SLOTS.length;i++){
      const slot=this.SLOTS[i];
      const sy2=PY+50+i*SH;
      const eqId=p.equipment[slot];
      const item=eqId?EQUIPMENT_ITEMS[eqId]:null;
      // Slot box
      ctx.fillStyle='#000'; ctx.fillRect(LX,sy2,200,SH-4);
      ctx.fillStyle=item?'#120e06':'#0a0a0a'; ctx.fillRect(LX+2,sy2+2,196,SH-8);
      // Slot header
      R.text(`${this.SLOT_KEY[slot]} ${this.SLOT_LABEL[slot]}`,LX+8,sy2+12,'#3c2e18',8);
      if(item){
        // Rarity strip (4px left edge)
        ctx.fillStyle=RARITY_COLOR[item.rarity]; ctx.fillRect(LX+2,sy2+2,4,SH-8);
        R.text(item.name,LX+14,sy2+28,RARITY_COLOR[item.rarity],11);
        R.text(item.desc||'',LX+14,sy2+42,'#706050',8);
      } else {
        R.text('— empty —',LX+14,sy2+30,'#282820',10);
      }
    }

    // ---- STATS BOX (below slots) ----
    const STY=PY+50+this.SLOTS.length*SH+6;
    ctx.fillStyle='#000'; ctx.fillRect(LX,STY,200,82);
    ctx.fillStyle='#0c0a06'; ctx.fillRect(LX+2,STY+2,196,78);
    R.text('PLAYER STATS',LX+100,STY+13,'#604828',8,'center');
    ctx.fillStyle='#1a1208'; ctx.fillRect(LX+2,STY+16,196,1);
    const mHP=Stats.maxHP(), mST=Stats.maxStamina(), dmg=Stats.damage(), def=Stats.defense();
    R.text(`HP       ${Math.ceil(p.hp)} / ${mHP}`, LX+10,STY+30,'#cc6060',9);
    R.text(`Stamina  ${Math.ceil(p.stamina)} / ${mST}`, LX+10,STY+44,'#60a030',9);
    R.text(`Attack   base + ${dmg}`,                 LX+10,STY+58,'#c8a060',9);
    R.text(`Defense  base + ${def}`,                 LX+10,STY+72,'#6090c0',9);

    // ---- RIGHT COLUMN: inventory list (x=PX+228) ----
    const RX=PX+228;
    R.text('INVENTORY',RX+142,PY+42,'#604828',8,'center');
    if(p.inventory.length===0){
      R.text('(empty)',RX+142,PY+90,'#303028',10,'center');
    }
    const maxVisible=8;
    const start=Math.max(0,p.equipCursor-maxVisible+1);
    for(let i=0;i<Math.min(p.inventory.length,maxVisible);i++){
      const idx=start+i;
      if(idx>=p.inventory.length) break;
      const id=p.inventory[idx];
      const item=EQUIPMENT_ITEMS[id]; if(!item) continue;
      const iy=PY+50+i*46;
      const sel=idx===p.equipCursor;
      // Row bg
      ctx.fillStyle='#000'; ctx.fillRect(RX,iy,300,42);
      ctx.fillStyle=sel?'#1a1408':'#0c0a06'; ctx.fillRect(RX+2,iy+2,296,38);
      // Selection bar
      if(sel){ ctx.fillStyle='#c8a060'; ctx.fillRect(RX+2,iy+2,3,38); }
      // Rarity swatch
      ctx.fillStyle=RARITY_COLOR[item.rarity]; ctx.fillRect(RX+10,iy+13,4,16);
      // Name & slot line
      R.text(item.name, RX+20,iy+20, sel?'#e8c870':RARITY_COLOR[item.rarity], 11);
      R.text(`[${this.SLOT_LABEL[item.slot]}]  ${RARITY_LABEL[item.rarity]}`, RX+20,iy+33,'#4a3c28',8);
      // Bonuses
      R.text(item.desc||'', RX+190,iy+20,'#607888',9,'left');
    }
    // Scroll indicator
    if(p.inventory.length>maxVisible)
      R.text(`${p.equipCursor+1}/${p.inventory.length}`,RX+284,PY+42,'#403828',8,'right');

    // ---- FOOTER ----
    ctx.fillStyle='#0e0a06'; ctx.fillRect(PX,PY+PH-18,PW,18);
    R.text('Up/Down  Navigate    E  Equip    W/A/R/T  Unequip slot    Tab  Close',
           SCREEN_W/2, PY+PH-6, '#3a3020', 8, 'center');
  },
};

// ============================================================
// UI SYSTEM
// ============================================================
const UI = {
  msgs: GS.messages,

  msg(text,type,dur){
    this.msgs=this.msgs.filter(m=>m.type!==type);
    if(text) this.msgs.push({text,type,timer:dur,max:dur});
    GS.messages=this.msgs;
  },

  update(dt){
    for(let i=this.msgs.length-1;i>=0;i--){
      this.msgs[i].timer-=dt;
      if(this.msgs[i].timer<=0) this.msgs.splice(i,1);
    }
  },

  draw(){
    const p=GS.player;
    this._hud(p);
    Quest.drawHUD();
    this._messages();
    this._bossBar();
    this._minimap();
    // Death fade overlay
    if(p.isDead){
      const a=Math.min(0.72, 1-p.deathTimer/3.5);
      R.rectA(0,0,SCREEN_W,SCREEN_H,'#000000',a);
    }
  },

  _hud(p){
    const mg=10, bw=130, bh=8, gap=4;
    const sy0=SCREEN_H-mg-bh*3-gap*2-10;

    // GBC-style panel: thick black border, flat bg
    ctx.fillStyle='#000';
    ctx.fillRect(mg-8,sy0-22,bw+18,bh*3+gap*2+34);
    ctx.fillStyle='#080606';
    ctx.fillRect(mg-6,sy0-20,bw+14,bh*3+gap*2+30);

    // Label boxes (solid black)
    ctx.fillStyle='#000';
    ctx.fillRect(mg-4,sy0-2,18,bh+4);
    ctx.fillRect(mg-4,sy0+bh+gap-2,18,bh+4);
    ctx.fillRect(mg-4,sy0+(bh+gap)*2-2,18,bh+4);

    // Labels
    R.text('HP',mg-2,sy0+bh,'#c06060',8);
    R.text('FP',mg-2,sy0+bh+gap+bh,'#6060c0',8);
    R.text('ST',mg-2,sy0+(bh+gap)*2+bh,'#60a030',8);

    // HP bar
    const mHP=Stats.maxHP(), mST=Stats.maxStamina();
    const hpFrac=p.hp/mHP;
    const hpCol=hpFrac<0.25?((Date.now()/200|0)%2?'#FF1010':'#880000'):'#CC2020';
    R.bar(mg+16,sy0,bw,bh,p.hp,mHP,hpCol,'#1a0606');
    R.text(`${Math.ceil(p.hp)}/${mHP}`,mg+20,sy0+bh,'#c08080',8);

    // FP bar
    const sy1=sy0+bh+gap;
    R.bar(mg+16,sy1,bw,bh,p.fp,PLAYER_CONFIG.maxFP,'#1840a8','#060810');
    R.text(`${Math.ceil(p.fp)}/${PLAYER_CONFIG.maxFP}`,mg+20,sy1+bh,'#7070c0',8);

    // Stamina bar
    const sy2=sy1+bh+gap;
    const stFlash=p.staminaEmpty>0&&(Date.now()/80|0)%2===0;
    R.bar(mg+16,sy2,bw,bh,p.stamina,mST,
          stFlash?'#CC2000':'#408010','#060a04');
    R.text(`${Math.ceil(p.stamina)}/${mST}`,mg+20,sy2+bh,'#80b040',8);

    // Level badge
    ctx.fillStyle='#000'; ctx.fillRect(mg-4,sy0-22,36,14);
    ctx.fillStyle='#0c0a08'; ctx.fillRect(mg-2,sy0-20,32,10);
    R.text(`Lv.${p.level}`,mg,sy0-11,'#807060',9);

    // Rune counter (bottom right — GBC box)
    const rw=88;
    const rx=SCREEN_W-rw-mg;
    ctx.fillStyle='#000'; ctx.fillRect(rx-6,SCREEN_H-38,rw+10,30);
    ctx.fillStyle='#0c0a06'; ctx.fillRect(rx-4,SCREEN_H-36,rw+6,26);
    R.text('RUNES',rx+2,SCREEN_H-26,'#504028',8);
    R.bold(`${p.runes}`,rx+rw-2,SCREEN_H-mg-2,'#c8a060',13,'right');

    // Flask charges (bottom center — GBC pixel boxes)
    const fc=PLAYER_CONFIG.flaskCharges;
    const fw=fc*14+10;

    const fy=SCREEN_H-mg-18;
    ctx.fillStyle='#000'; ctx.fillRect(fx2-4,fy-16,fw+8,30);
    ctx.fillStyle='#0c0a06'; ctx.fillRect(fx2-2,fy-14,fw+4,26);
    R.text('FLASK',(SCREEN_W/2)|0,fy-4,'#504020',8,'center');
    for(let i=0;i<fc;i++){
      const full=i<p.flaskCharges;
      const bx=fx2+i*14+2;
      // Outer black border
      ctx.fillStyle='#000'; ctx.fillRect(bx,fy+4,10,10);

      ctx.fillStyle=full?'#a86010':'#181008'; ctx.fillRect(bx+1,fy+5,8,8);
      // Highlight
      if(full){ ctx.fillStyle='#FFB030'; ctx.fillRect(bx+2,fy+6,4,3); }
    }

    if(p.combo>=3){
      const ca=Math.min(1,p.comboTimer/2);
      ctx.globalAlpha=ca;
      ctx.fillStyle='#000'; ctx.fillRect(SCREEN_W/2-68,SCREEN_H-92,136,14);
      R.bold(`${p.combo} HIT COMBO`,SCREEN_W/2,SCREEN_H-80,'#FFB020',11,'center');
      ctx.globalAlpha=1;

    // Controls hint (faint top-right)
    R.text('WASD Move  J/K Attack  Space Roll  E Interact  F Flask  Tab Equipment  Esc Pause',
           SCREEN_W-mg,13,'#242424',8,'right');
  },

  _bossBar(){
    if(!GS.bossActive||!GS.bossRef||GS.bossRef.isDead) return;
    const boss=GS.bossRef;
    const bw=SCREEN_W-80, bh=10, bx=40, by=18;
    // GBC thick border
    ctx.fillStyle='#000'; ctx.fillRect(bx-4,by-4,bw+8,bh+8);
    ctx.fillStyle='#140000'; ctx.fillRect(bx,by,bw,bh);
    const fw=(boss.hp/boss.maxHP*bw)|0;
    ctx.fillStyle=boss.phase===2?'#BB1808':'#771808';
    ctx.fillRect(bx,by,fw,bh);
    ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(bx,by,fw,2);
    // Phase split marker
    if(boss.phase===1){
      ctx.fillStyle='#440000'; ctx.fillRect(bx+(bw/2)|0,by,2,bh);
    }
    // Name label (black box below bar)
    ctx.fillStyle='#000'; ctx.fillRect(bx,by+bh+2,bw,12);
    ctx.fillStyle='#0a0000'; ctx.fillRect(bx+1,by+bh+3,bw-2,10);
    R.bold(`${ENEMY_TYPES.BOSS.name}${boss.phase===2?'  [ PHASE II ]':''}`,
           SCREEN_W/2,by+bh+12,'#c8a060',10,'center');
  },

  _messages(){
    const cX=SCREEN_W/2, cY=SCREEN_H/2;
    for(const m of this.msgs){
      const t=m.timer/m.max;
      let a=Math.min(1,t*3)*Math.min(1,(1-t)*3); if(a<0) a=0;
      let y=cY, sz=16, col='#c8a060';
      switch(m.type){
        case 'death':     sz=52; col='#CC2020'; y=cY-30; a=Math.min(1,(1-m.timer/m.max)*2.5); break;
        case 'bonfire':   sz=26; col='#FFB040'; y=cY+45; break;
        case 'boss':      sz=30; col='#c8a060'; break;
        case 'boss_won':  sz=38; col='#FFD060'; break;
        case 'zone':      sz=22; col='#8090a0'; y=cY+70; break;
        case 'levelup':   sz=22; col='#c8a060'; y=cY+50; break;
        case 'combo':     sz=16; col='#FFB020'; y=cY-50; break;
        case 'rune':      sz=14; col='#c8a060'; y=cY-70; break;
        case 'heal':      sz=14; col='#60FF60'; y=cY-90; break;
        case 'item':      sz=14; col='#60C0FF'; y=cY-70; break;
      }
      ctx.globalAlpha=a;
      if(sz>=22){
        ctx.font=`bold ${sz}px monospace`; ctx.textAlign='center';
        const tw=ctx.measureText(m.text).width;
        R.rectA(cX-tw/2-14,y-sz,tw+28,sz+12,'rgba(0,0,0,0.58)',1);
      }
      R.shadow(m.text,cX,y,col,'#000000',sz,'center');
      ctx.globalAlpha=1;
    }
  },

  _minimap(){
    const mw=100, mh=66, mx=SCREEN_W-mw-8, my=36;
    const scx=mw/(WORLD_W*TILE_SIZE), scy=mh/(WORLD_H*TILE_SIZE);
    // GBC black border panel
    ctx.fillStyle='#000'; ctx.fillRect(mx-2,my-2,mw+4,mh+4);
    ctx.fillStyle='#060606'; ctx.fillRect(mx,my,mw,mh);
    // Zone fills (pixel-crisp integer rects)
    for(const zid of GS.discoveredZones){
      const z=ZONES[zid]; if(!z) continue;
      const b=z.bounds;
      ctx.globalAlpha=0.9; ctx.fillStyle=z.ambientColor||'#1a1a1a';
      ctx.fillRect(mx+b.x*TILE_SIZE*scx|0, my+b.y*TILE_SIZE*scy|0,
                   b.w*TILE_SIZE*scx|0, b.h*TILE_SIZE*scy|0);
    }
    ctx.globalAlpha=1;
    // Enemy 2×2 dots
    for(const e of GS.enemies){
      if(e.isDead) continue;
      const ex=mx+e.x*scx|0, ey=my+e.y*scy|0;
      if(ex>mx&&ex<mx+mw&&ey>my&&ey<my+mh){
        ctx.fillStyle=e.isBoss?'#FF1000':'#802010';
        ctx.fillRect(ex-1,ey-1,3,3);
      }
    }
    // Bonfire dots
    for(const bf of GS.bonfires){
      if(!bf.lit) continue;
      ctx.fillStyle='#FF5010';
      ctx.fillRect(mx+bf.x*scx-1|0,my+bf.y*scy-1|0,3,3);
    }
    // Bloodstain
    const p=GS.player;
    if(p.bloodstainX!==null){
      ctx.fillStyle='#770000';
      ctx.fillRect(mx+p.bloodstainX*scx-1|0,my+p.bloodstainY*scy-1|0,3,3);
    }
    // Player dot (bright 3×3)
    ctx.fillStyle='#FFD040';
    ctx.fillRect(mx+p.x*scx-1|0,my+p.y*scy-1|0,3,3);
    // Zone name label below map
    const zn=ZONES[GS.currentZone];
    if(zn){
      ctx.fillStyle='#000'; ctx.fillRect(mx-2,my+mh+2,mw+4,11);
      R.text(zn.name,mx+mw/2,my+mh+10,'#484848',8,'center');
    }
  },

  // Bonfire rest full-screen overlay
  drawBonfireRest(){
    const frac=Math.min(1,(2.5-GS.bonfireRestTimer)/0.5);
    const fadeOut=GS.bonfireRestTimer<0.5 ? GS.bonfireRestTimer/0.5 : 1;
    const a=frac*fadeOut*0.82;
    R.rectA(0,0,SCREEN_W,SCREEN_H,'#000000',a);
    if(frac>0.5){
      const ta=Math.min(1,(frac-0.5)*2)*fadeOut;
      ctx.globalAlpha=ta;
      R.shadow('YOU HAVE RESTED', SCREEN_W/2, SCREEN_H/2-18, '#c8a060','#000',28,'center');
      R.shadow(GS.bonfireRestName, SCREEN_W/2, SCREEN_H/2+22, '#FFB040','#000',18,'center');
      ctx.globalAlpha=1;
    }
  },

  // Title screen — no linear/radial gradients, no arcs
  drawTitle(){

    // Stepped overlay bands (no gradient)
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,SCREEN_W,SCREEN_H*0.18|0);
    ctx.fillStyle='rgba(0,0,0,0.20)'; ctx.fillRect(0,SCREEN_H*0.18|0,SCREEN_W,SCREEN_H*0.40|0);

    const pulse=(now/800|0)%16>1?1.0:0.88;
    ctx.globalAlpha=pulse;
    R.shadow('ASHEN REALM', SCREEN_W/2, SCREEN_H*0.26|0, '#c8a060','#000000',56,'center');
    ctx.globalAlpha=1;

    // Subtitle
    R.shadow('A Land Swallowed by Cinders', SCREEN_W/2, SCREEN_H*0.35|0, '#686868','#000',13,'center');

    // Lore blurb
    const lore=[
      'The fires have faded. The Ashen King stirs in his crumbling throne.',

    for(let i=0;i<lore.length;i++)
      R.text(lore[i], SCREEN_W/2, SCREEN_H*0.49|0+i*18, '#484848', 11, 'center');

    // Controls box (GBC panel — thick black border)
    const controls=[
      ['WASD / Arrows','Move'],['J','Light Attack'],['K','Heavy Attack'],
      ['Space','Roll (i-frames)'],['E','Interact / Recover Runes'],['F','Use Flask'],
    ];
    const cx0=(SCREEN_W/2-128)|0, cy0=SCREEN_H*0.62|0;
    const boxH=controls.length*17+22;
    ctx.fillStyle='#000'; ctx.fillRect(cx0-8,cy0-20,266,boxH+4);
    ctx.fillStyle='#080604'; ctx.fillRect(cx0-6,cy0-18,262,boxH);

    for(let i=0;i<controls.length;i++){
      R.bold(controls[i][0], cx0+6,  cy0+11+i*17, '#c8a060', 10, 'left');
      R.text(controls[i][1], cx0+148, cy0+11+i*17, '#607080', 10, 'left');
    }

    // Press any key — frame-stepped blink
    const blink=(now/500|0)%2===0;
    if(blink) R.shadow('— PRESS ANY KEY TO BEGIN —', SCREEN_W/2, SCREEN_H*0.88|0, '#c8a060','#000',14,'center');

    R.vignette();
  },
};

// ============================================================
// MAIN LOOP
// ============================================================
let lastT=0, fps=0, fpsCtr=0, fpsT=0;

function loop(ts){
  const dt=Math.min((ts-lastT)/1000, 0.05); lastT=ts;
  GS.time+=dt; fpsCtr++; fpsT+=dt;
  if(fpsT>=1){ fps=fpsCtr; fpsCtr=0; fpsT=0; }

  // ---- UPDATE ----
  ScreenFX.update(dt);
  DmgNums.update(dt);

  if(GS.phase==='title'){
    Particles.update(dt);
    // Ambient embers on title
    if(Math.random()<0.15) Particles.embers(Math.random()*SCREEN_W+Camera.x, SCREEN_H+Camera.y+20, 1);
    if(Input.anyKey()){ GS.phase='playing'; UI.msg('Crumbling Ruins','zone',3); }
  } else if(GS.phase==='bonfire_rest'){
    GS.bonfireRestTimer-=dt;
    Particles.update(dt);
    Bonfires.update(dt);
    if(GS.bonfireRestTimer<=0) GS.phase='playing';
  } else if(GS.phase==='paused'){
    if(Input.just('Escape')) GS.phase='playing';
  } else if(GS.phase==='equipment'){
    Equipment.handleInput();
    if(Input.just('Tab')||Input.just('Escape')) GS.phase='playing';
  } else if(GS.phase==='playing'){
    if(Input.just('Escape')){ GS.phase='paused'; }
    if(Input.just('Tab')){ GS.phase='equipment'; GS.player.equipCursor=0; }
    Camera.update(dt);
    Player.update(dt);
    Enemies.update(dt);
    Village.update(dt);
    Quest.update(dt);
    Bonfires.update(dt);
    Particles.update(dt);
    UI.update(dt);
  }

  // ---- DRAW ----
  if(GS.phase==='title'){
    UI.drawTitle();
    Particles.draw(0,0);
  } else {
    const cx=Camera.x, cy=Camera.y;
    ctx.fillStyle='#080808'; ctx.fillRect(0,0,SCREEN_W,SCREEN_H);

    ScreenFX.apply();
    World.draw(cx,cy);
    Bonfires.draw(cx,cy);
    Chests.draw(cx,cy);
    Village.draw(cx,cy);
    Quest.draw(cx,cy);
    Enemies.draw(cx,cy);
    Particles.draw(cx,cy);
    Player.draw(cx,cy);
    DmgNums.draw(cx,cy);
    ScreenFX.restore();

    R.vignette();
    // Zone ambient tint
    const zt=ZONES[GS.currentZone];
    if(zt&&zt.fogTint){ ctx.fillStyle=zt.fogTint; ctx.fillRect(0,0,SCREEN_W,SCREEN_H); }

    ScreenFX.drawFlash();

    if(GS.phase==='bonfire_rest') UI.drawBonfireRest();
    if(GS.phase==='paused')    UI.drawPause();
    else if(GS.phase==='equipment') Equipment.draw();
    else UI.draw();
  }

  drawScanlines();
  R.text(`${fps}fps`, 4, SCREEN_H-4, '#252525', 9);
  Input.clear();
  requestAnimationFrame(loop);
}

// ============================================================
// INIT
// ============================================================
function init(){
  Input.init();
  World.generate();
  Bonfires.init();
  Chests.init();
  Village.init();
  Quest.init();
  Enemies.init();
  Camera.x=GS.player.x-SCREEN_W/2;
  Camera.y=GS.player.y-SCREEN_H/2;
  // Pre-warm title particle embers
  for(let i=0;i<30;i++) Particles.embers(Math.random()*SCREEN_W, Math.random()*SCREEN_H, 1);
  requestAnimationFrame(ts=>{ lastT=ts; requestAnimationFrame(loop); });
}

window.addEventListener('load', init);
</script>
</body>
</html>
