function abilityTier(level){
  if(level>=20) return 4;
  if(level>=15) return 3;
  if(level>=10) return 2;
  if(level>=5)  return 1;
  return 0;
}

const Input = {
  keys:{}, pressed:{}, released:{},
  init(){
    window.addEventListener('keydown', e=>{
      if(!this.keys[e.code]) this.pressed[e.code]=true;
      this.keys[e.code]=true;
      const game=['Space','KeyW','KeyS','KeyA','KeyD','KeyJ','KeyK','KeyQ','KeyE','KeyF','KeyL',
                  'ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Escape','Tab','KeyR','KeyT',
                  'Digit1','Digit2','Digit3','Digit4','Digit5'];
      if(game.includes(e.code)) e.preventDefault();
    });
    window.addEventListener('keyup', e=>{ this.keys[e.code]=false; this.released[e.code]=true; });
  },
  clear(){ this.pressed={}; this.released={}; },
  down(c){ return !!this.keys[c]; },
  just(c){ return !!this.pressed[c]; },
  anyKey(){ return Object.keys(this.pressed).length > 0; },
};

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
canvas.width  = SCREEN_W;
canvas.height = SCREEN_H;
ctx.imageSmoothingEnabled = false;

const R = {
  rect(x,y,w,h,c)          { ctx.fillStyle=c; ctx.fillRect(x,y,w,h); },
  rectA(x,y,w,h,c,a)       { ctx.globalAlpha=a; ctx.fillStyle=c; ctx.fillRect(x,y,w,h); ctx.globalAlpha=1; },
  // pixel dot (2×2 block) — used for minimap dots
  dot(x,y,c)                { ctx.fillStyle=c; ctx.fillRect(x-1,y-1,3,3); },
  text(t,x,y,c,sz=14,align='left'){
    ctx.fillStyle=c; ctx.font=`${sz}px monospace`;
    ctx.textAlign=align; ctx.textBaseline='alphabetic'; ctx.fillText(t,x,y);
  },
  bold(t,x,y,c,sz=14,align='left'){
    ctx.fillStyle=c; ctx.font=`bold ${sz}px monospace`;
    ctx.textAlign=align; ctx.textBaseline='alphabetic'; ctx.fillText(t,x,y);
  },
  shadow(t,x,y,c,sc,sz=16,align='center'){
    ctx.font=`bold ${sz}px monospace`; ctx.textAlign=align; ctx.textBaseline='alphabetic';
    ctx.fillStyle=sc; ctx.fillText(t,x+2,y+2);
    ctx.fillStyle=c;  ctx.fillText(t,x,y);
  },
  // GBC-style bar: thick 2px black border, flat fill, 1px top highlight
  bar(x,y,w,h,cur,max,fill,bg='#111'){
    ctx.fillStyle='#000'; ctx.fillRect(x-2,y-2,w+4,h+4);
    ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
    const fw=Math.max(0,(cur/max)*w)|0;
    ctx.fillStyle=fill; ctx.fillRect(x,y,fw,h);
    ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(x,y,fw,1);
  },
  // GBC-style panel: solid black border, flat dark bg
  panel(x,y,w,h,bg='#0a0a0a'){
    ctx.fillStyle='#000'; ctx.fillRect(x-2,y-2,w+4,h+4);
    ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
  },
  // Stepped pixel vignette — dark oppressive edges
  vignette(){
    const S=SCREEN_W, H=SCREEN_H;
    // Top / bottom bands — heavy darkness
    ctx.fillStyle='rgba(0,0,0,0.80)'; ctx.fillRect(0,0,S,20); ctx.fillRect(0,H-20,S,20);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,20,S,14); ctx.fillRect(0,H-34,S,14);
    ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.fillRect(0,34,S,12); ctx.fillRect(0,H-46,S,12);
    ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(0,46,S,12); ctx.fillRect(0,H-58,S,12);
    // Left / right bands — heavy darkness
    ctx.fillStyle='rgba(0,0,0,0.80)'; ctx.fillRect(0,0,20,H); ctx.fillRect(S-20,0,20,H);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(20,0,14,H); ctx.fillRect(S-34,0,14,H);
    ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.fillRect(34,0,12,H); ctx.fillRect(S-46,0,12,H);
    ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(46,0,12,H); ctx.fillRect(S-58,0,12,H);
  },
};

// Compact pixel-sprite renderer — each char maps to a CSS color, '.' = transparent
// px,py = top-left corner, rows = string array, pal = {char:color}, sc = pixel scale
function pxS(px,py,rows,pal,sc=2){
  for(let y=0;y<rows.length;y++){
    const row=rows[y];
    for(let x=0;x<row.length;x++){
      const c=pal[row[x]];
      if(c){ ctx.fillStyle=c; ctx.fillRect((px+x*sc)|0,(py+y*sc)|0,sc,sc); }
    }
  }
}

// Mirror version of pxS — flips sprite horizontally
function pxSM(px,py,rows,pal,sc=2){
  const w=rows[0].length;
  for(let y=0;y<rows.length;y++){
    const row=rows[y];
    for(let x=0;x<row.length;x++){
      const c=pal[row[w-1-x]];
      if(c){ ctx.fillStyle=c; ctx.fillRect((px+x*sc)|0,(py+y*sc)|0,sc,sc); }
    }
  }
}

function drawScanlines(){
  ctx.globalAlpha=0.09;

}

// ============================================================
// SCREEN FX — shake & flash
// ============================================================
const ScreenFX = {
  sx:0, sy:0,                 // current shake offset
  shakeMag:0, shakeTimer:0,
  flashAlpha:0, flashColor:'#fff', flashTimer:0, flashDur:0.3,

  shake(mag=6, dur=0.22){ this.shakeMag=mag; this.shakeTimer=dur; },
  flash(color='#fff', alpha=0.35, dur=0.25){
    this.flashColor=color; this.flashAlpha=alpha; this.flashTimer=dur; this.flashDur=dur;
  },

  update(dt){
    if(this.shakeTimer>0){
      this.shakeTimer-=dt;
      const t=Math.max(0,this.shakeTimer/0.22);
      this.sx=(Math.random()-0.5)*this.shakeMag*t*2;
      this.sy=(Math.random()-0.5)*this.shakeMag*t*2;
    } else { this.sx=0; this.sy=0; }
    if(this.flashTimer>0) this.flashTimer-=dt;
  },

  apply()  { ctx.save(); ctx.translate(this.sx, this.sy); ctx.imageSmoothingEnabled=false; },
  restore(){ ctx.restore(); ctx.imageSmoothingEnabled=false; },

  drawFlash(){
    if(this.flashTimer<=0) return;
    const a=(this.flashTimer/this.flashDur)*this.flashAlpha;
    ctx.fillStyle=this.flashColor; ctx.globalAlpha=a;
    ctx.fillRect(0,0,SCREEN_W,SCREEN_H); ctx.globalAlpha=1;
  },
};

// ============================================================
// FLOATING DAMAGE NUMBERS
// ============================================================
const DmgNums = {
  _list:[],

  add(x, y, val, color='#FFD060', big=false){
    this._list.push({
      x, y, vy:-55-Math.random()*30, vx:(Math.random()-0.5)*28,
      val: big ? val : val,
      color, sz: big?20:13,
      life: big?1.2:0.75, max: big?1.2:0.75,
    });
  },

  update(dt){
    for(let i=this._list.length-1;i>=0;i--){
      const n=this._list[i];
      n.x+=n.vx*dt; n.y+=n.vy*dt; n.vy+=40*dt;
      n.life-=dt;
      if(n.life<=0) this._list.splice(i,1);
    }
  },

  draw(cx,cy){
    for(const n of this._list){
      const a=Math.min(1,(n.life/n.max)*2);
      ctx.globalAlpha=a;
      ctx.font=`bold ${n.sz}px monospace`; ctx.textAlign='center';
      ctx.fillStyle='#000000'; ctx.fillText(n.val,n.x-cx+1,n.y-cy+1);
      ctx.fillStyle=n.color;  ctx.fillText(n.val,n.x-cx,n.y-cy);
    }
    ctx.globalAlpha=1;
  },
};

// ============================================================
// STATS — calculates effective player stats from base + equipment
// ============================================================
const Stats = {
  _sum(key){ let v=0; for(const id of Object.values(GS.player.equipment)) if(id) v+=(EQUIPMENT_ITEMS[id]?.bonuses[key]||0); return v; },
  _sp(key)  { return GS.player.statPoints[key]||0; },
  _cls(key) { const c=GS.playerClass; return c?(CLASS_DEFS[c].statsBonus[key]||0):0; },
  _upgBonus(){
    const p=GS.player; const w=p.equipment.weapon;
    if(!w) return 0;
    const upg=p.weaponUpgrades[w]||0;
    if(upg<=0) return 0;
    const baseDmg=EQUIPMENT_ITEMS[w]?.bonuses?.damage||0;
    return Math.round(baseDmg * upg * 0.25);
  },
  weaponUpgLevel(){
    const p=GS.player; const w=p.equipment.weapon;
    return w ? (p.weaponUpgrades[w]||0) : 0;
  },
  damage()    { return this._sum('damage')  + this._sp('damage')  + this._upgBonus() + this._cls('damage');  },
  defense()   { return this._sum('defense') + this._sp('defense') + this._cls('defense'); },
  maxHP()     { return PLAYER_CONFIG.maxHP      + this._sum('hp')      + this._sp('hp')      + this._cls('hp');      },
  maxFP()     { return PLAYER_CONFIG.maxFP      + this._sum('fp')      + this._sp('fp')      + this._cls('fp');      },
  maxStamina(){ return PLAYER_CONFIG.maxStamina + this._sum('stamina') + this._sp('stamina') + this._cls('stamina'); },
  speed()     { return PLAYER_CONFIG.speed + this._cls('speed'); },
};

    for(let x=0;x<WORLD_W;x++){ this.map[0][x]=T.WATER; this.map[WORLD_H-1][x]=T.WATER; }
    for(let y=0;y<WORLD_H;y++){ this.map[y][0]=T.WATER; this.map[y][WORLD_W-1]=T.WATER; }

  _fillVoids(){
    for(let ty=0;ty<WORLD_H;ty++){
      for(let tx=0;tx<WORLD_W;tx++){
        if(this.map[ty][tx]!==T.WALL) continue;
        let rep=T.MOUNTAIN_WALL;
        // ── Ocean border band ─────────────────────────────
        if(tx<=3||ty<=3||tx>=WORLD_W-4||ty>=WORLD_H-4) rep=T.WATER;
        else if(ty<5) rep=T.WATER;
        else if(tx<5) rep=T.WATER;
        else if(tx>=WORLD_W-5) rep=T.WATER;
        else if(ty>=WORLD_H-5) rep=T.WATER;
        // ── Gap between grassland and ruins ──
        else if(ty===37&&tx>=5&&tx<75) rep=T.GRASS_FLOOR;
        // ── West cliff ──
        else if(tx<18&&ty>=38&&ty<200) rep=T.MOUNTAIN_WALL;
        // ── Forest/Ruins above river ──
        else if(ty>=95&&ty<103&&tx>=75&&tx<128) rep=T.RUINS_FLOOR;
        else if(ty>=95&&ty<103&&tx>=140&&tx<185) rep=T.FOREST_FLOOR;
        // ── Forest east-extension gap (new w:140 zone, x=170-184 not yet carved) ──
        else if(tx>=170&&tx<185&&ty>=5&&ty<60) rep=T.FOREST_FLOOR;
        // ── Below village, left of mountain (now mostly forest) ──
        else if(tx>=170&&tx<185&&ty>=60&&ty<112) rep=T.FOREST_FLOOR;
        else if(tx>=185&&tx<220&&ty>=60&&ty<112) rep=T.MOUNTAIN_WALL;
        // ── Village east edge — thin strip col=240 connecting village to swamp corridor ──
        else if(tx===240&&ty>=55&&ty<=80) rep=T.VILLAGE_FLOOR;
        // ── Between swamp/desert and castle/mountain ──
        else if(tx>=220&&tx<241&&ty>=78&&ty<132) rep=T.MOUNTAIN_WALL;
        // ── Desert region gap (swamp south / desert north seam) ──
        else if(tx>=241&&tx<278&&ty>=74&&ty<78) rep=T.SWAMP_FLOOR;
        // ── Desert / mountain seam ──
        else if(tx>=241&&tx<278&&ty>=131&&ty<136) rep=T.DESERT_FLOOR;
        // ── South void below CASTLE ──
        else if(ty>=170&&ty<200&&tx>=18&&tx<220) rep=T.CASTLE_WALL;
        // ── Endgame corridor seam ──
        else if(ty>=197&&ty<202&&tx>=118&&tx<140) rep=T.BOSS_FLOOR;
        // ── Endgame zones — fill inter-zone gaps ──
        else if(ty>=200&&ty<202&&tx>=5&&tx<275) rep=T.VOLCANIC_FLOOR;
        else if(ty>=202&&ty<238&&tx>=5&&tx<275){
          // volcanic left, abyssal right (already filled by _endgameZones)
          rep=(tx<140)?T.VOLCANIC_WALL:T.ABYSSAL_WALL;
        }
        else if(ty>=238&&ty<275&&tx>=5&&tx<275){
          rep=(tx<140)?T.CRYSTAL_WALL:T.CORRUPTED_WALL;
        }
        this.map[ty][tx]=rep;
      }
    }
  },

  tile(wx,wy){
    const tx=wx/TILE_SIZE|0, ty=wy/TILE_SIZE|0;
    if(tx<0||ty<0||tx>=WORLD_W||ty>=WORLD_H) return T.WALL;
    return this.map[ty][tx];
  },

  passable(t){
    return t!==T.WALL&&t!==T.RUINS_WALL&&t!==T.FOREST_TREE&&
           t!==T.CASTLE_WALL&&t!==T.WATER&&t!==T.VILLAGE_WALL&&
           t!==T.SWAMP_WALL&&t!==T.MOUNTAIN_WALL&&t!==T.GRASS_WALL&&
           t!==T.HOUSE_WALL&&t!==T.DESERT_WALL&&
           t!==T.VOLCANIC_WALL&&t!==T.ABYSSAL_WALL&&
           t!==T.CRYSTAL_WALL&&t!==T.CORRUPTED_WALL;
  },

  canMove(wx,wy,r){
    const pts=[[-r,-r],[r,-r],[-r,r],[r,r],[0,-r],[0,r],[-r,0],[r,0]];
    for(const[ox,oy] of pts) if(!this.passable(this.tile(wx+ox,wy+oy))) return false;
    return true;
  },

  zoneAt(wx,wy){
    const tx=wx/TILE_SIZE, ty=wy/TILE_SIZE;
    const order=['BOSS_ARENA','SWAMP','DESERT','MOUNTAIN','CORRUPTED','CRYSTAL','ABYSSAL','VOLCANIC','VILLAGE','FOREST','GRASSLAND','RUINS','CASTLE'];
    for(const id of order){
      if(!ZONES[id]) continue;
      const b=ZONES[id].bounds;
      if(tx>=b.x&&tx<b.x+b.w&&ty>=b.y&&ty<b.y+b.h) return id;
    }
    return 'RUINS';
  },

  draw(cx,cy){
    const tx0=Math.max(0,(cx/TILE_SIZE)|0),    ty0=Math.max(0,(cy/TILE_SIZE)|0);
    const tx1=Math.min(WORLD_W,Math.ceil((cx+SCREEN_W)/TILE_SIZE)+1);
    const ty1=Math.min(WORLD_H,Math.ceil((cy+SCREEN_H)/TILE_SIZE)+1);
    const now=Date.now();
    for(let ty=ty0;ty<ty1;ty++) for(let tx=tx0;tx<tx1;tx++){
      const sx=tx*TILE_SIZE-cx, sy=ty*TILE_SIZE-cy;
      this._drawTile(this.map[ty][tx],sx,sy,tx,ty,now);
    }
  },

  _drawTile(tile,sx,sy,tx,ty,now){

    // Readable earthy tones, visible textures, but grim and dark overall
    const S=TILE_SIZE; // 32px

      // ---- Verdant Expanse — lush grass, bright greens ----

const Particles = {
  _p: GS.particles,

  embers(x,y,n=2){
    for(let i=0;i<n;i++) this._p.push({
      type:'ember', x, y,
      vx:(Math.random()-0.5)*65, vy:-Math.random()*85-20,
      life:0.9+Math.random()*0.6, max:1.5,
      sz:1.5+Math.random()*2.5,
      color:Math.random()>0.5?'#FF6020':'#FFB040',
    });
  },

  sparks(x,y,n=8){
    for(let i=0;i<n;i++){
      const a=(Math.PI*2*i/n)+Math.random()*0.5, spd=70+Math.random()*90;
      this._p.push({type:'spark',x,y, vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
        life:0.25+Math.random()*0.2, max:0.45, sz:2+Math.random()*2,
        color:Math.random()>0.5?'#FFD060':'#FF8020'});
    }
  },

  heal(x,y,n=8){
    for(let i=0;i<n;i++){
      const a=(Math.PI*2*i/n);
      this._p.push({type:'rune',x,y, vx:Math.cos(a)*45,vy:Math.sin(a)*45-20,
        life:0.7,max:0.7,sz:3,color:'#60FF60'});
    }
  },

  death(x,y,color,n=18){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, spd=25+Math.random()*110;
      this._p.push({type:'death',
        x:x+(Math.random()-0.5)*18, y:y+(Math.random()-0.5)*18,
        vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
        life:0.6+Math.random()*0.8, max:1.4, sz:3+Math.random()*5, color});
    }
  },

  rune(x,y){
    for(let i=0;i<8;i++){
      const a=Math.PI*2*i/8;
      this._p.push({type:'rune',x,y, vx:Math.cos(a)*55,vy:Math.sin(a)*55-25,
        life:0.7,max:0.7,sz:4,color:'#c8a060'});
    }
  },

  update(dt){
    for(let i=this._p.length-1;i>=0;i--){
      const p=this._p[i];
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
      if(p.type==='ember')       { p.vy+=18*dt; p.vx*=0.98; }
      else if(p.type==='spark')  { p.vx*=0.84; p.vy*=0.84; }
      else if(p.type==='death')  { p.vx*=0.91; p.vy*=0.91; }
      if(p.life<=0) this._p.splice(i,1);
    }
  },

  draw(cx,cy){
    for(const p of this._p){
      const a=Math.max(0,p.life/p.max);
      const sx=(p.x-cx)|0, sy=(p.y-cy)|0;
      const s=Math.max(1,p.sz|0);
      ctx.globalAlpha=a; ctx.fillStyle=p.color;
      ctx.fillRect(sx-(s>>1),sy-(s>>1),s,s);
    }
    ctx.globalAlpha=1;
  },
};

// ABILITY VFX — weapon-ability visual effects (fillRect only)
// ============================================================
const VFX = {
  _fx: GS.vfx,

  // Arc of rects swept in front of player — used for all melee slashes
  slash(x,y,angle,radius,arcSpan,col,colInner,dur){
    this._fx.push({type:'slash',x,y,angle,radius,arcSpan,col,colInner,timer:dur,max:dur});
  },

  // Expanding ring of dots — for shockwaves / AoE hits
  shockwave(x,y,maxR,col,dur){
    this._fx.push({type:'shockwave',x,y,maxR,col,timer:dur,max:dur});
  },

  // Three bands expanding outward in facing direction — for push waves
  forcewave(x,y,angle,len,wid,col,dur){
    this._fx.push({type:'forcewave',x,y,angle,len,wid,col,timer:dur,max:dur});
  },

  // Orbiting silver ring around player — for counter stance buff
  counterstance(dur){
    const i=this._fx.findIndex(f=>f.type==='counterstance');
    if(i>=0) this._fx.splice(i,1);
    this._fx.push({type:'counterstance',timer:dur,max:dur});
  },

  // Movement afterimage streak from (x1,y1) to (x2,y2)
  streak(x1,y1,x2,y2,col,dur){
    this._fx.push({type:'streak',x1,y1,x2,y2,col,timer:dur,max:dur});
  },

  update(dt){
    for(let i=this._fx.length-1;i>=0;i--){
      this._fx[i].timer-=dt;
      if(this._fx[i].timer<=0) this._fx.splice(i,1);
    }
  },

  draw(cx,cy){
    const now=Date.now();
    for(const f of this._fx){
      const t=Math.max(0,f.timer/f.max); // 1=just spawned, 0=expired

      switch(f.type){

        case 'slash':{
          // Fan of rects along an arc — outer ring + inner ring for depth
          const N=16;
          for(let i=0;i<N;i++){
            const a=f.angle-f.arcSpan/2+i*(f.arcSpan/(N-1));
            // Outer ring — larger squares
            const ox=(f.x+Math.cos(a)*f.radius-cx)|0;
            const oy=(f.y+Math.sin(a)*f.radius-cy)|0;
            ctx.globalAlpha=t*0.88;
            ctx.fillStyle=f.col;
            ctx.fillRect(ox-3,oy-3,7,7);
            // Inner ring — smaller, brighter
            const ix=(f.x+Math.cos(a)*f.radius*0.62-cx)|0;
            const iy=(f.y+Math.sin(a)*f.radius*0.62-cy)|0;
            ctx.globalAlpha=t*0.55;
            ctx.fillStyle=f.colInner;
            ctx.fillRect(ix-2,iy-2,5,5);
          }
          // Bright tip at arc center
          const tipX=(f.x+Math.cos(f.angle)*f.radius-cx)|0;
          const tipY=(f.y+Math.sin(f.angle)*f.radius-cy)|0;
          ctx.globalAlpha=t*0.95;
          ctx.fillStyle=f.colInner;
          ctx.fillRect(tipX-4,tipY-4,9,9);
          ctx.globalAlpha=t*0.50;
          ctx.fillStyle='#ffffff';
          ctx.fillRect(tipX-2,tipY-2,5,5);
          break;
        }

        case 'shockwave':{
          // Ring expands outward as timer drains
          const curR=f.maxR*(1-t);
          const N=28;
          for(let i=0;i<N;i++){
            const a=(i/N)*Math.PI*2;
            // Main ring
            const ox=(f.x+Math.cos(a)*curR-cx)|0;
            const oy=(f.y+Math.sin(a)*curR-cy)|0;
            ctx.globalAlpha=t*0.85;
            ctx.fillStyle=f.col;
            ctx.fillRect(ox-3,oy-3,7,7);
            // Trailing inner ring (smaller, behind)
            const ir=curR*0.80;
            const ix=(f.x+Math.cos(a)*ir-cx)|0;
            const iy=(f.y+Math.sin(a)*ir-cy)|0;
            ctx.globalAlpha=t*0.42;
            ctx.fillStyle=f.col;
            ctx.fillRect(ix-2,iy-2,4,4);
          }
          break;
        }

        case 'forcewave':{
          // Three wave-fronts marching outward in facing direction
          const perpX=-Math.sin(f.angle), perpY=Math.cos(f.angle);
          for(let wave=0;wave<3;wave++){
            const prog=Math.max(0,(1-t)-wave*0.18);
            const dist=prog*f.len;
            if(dist<=0) continue;
            const wx=(f.x+Math.cos(f.angle)*dist-cx)|0;
            const wy=(f.y+Math.sin(f.angle)*dist-cy)|0;
            const alpha=(1-prog)*0.82*(1-wave*0.28);
            const halfW=(f.wid*(1-prog*0.35))*0.5;
            // Draw perpendicular band as a row of rects
            const step=9, NW=Math.ceil(halfW/step);
            for(let j=-NW;j<=NW;j++){
              const falloff=1-Math.abs(j)/NW;
              ctx.globalAlpha=alpha*falloff;
              ctx.fillStyle=f.col;
              const rx=(wx+perpX*j*step)|0, ry=(wy+perpY*j*step)|0;
              ctx.fillRect(rx-3,ry-3,7,7);
            }
          }
          break;
        }

        case 'counterstance':{
          const p=GS.player;
          const r=28, N=8;
          // Blink rapidly when about to expire (< 1 s left)
          const blink=f.timer<1.0&&(now%200)<100;
          if(blink) break;
          // Outer ring — slowly rotates
          const rot=(now/600)*Math.PI*2;
          for(let i=0;i<N;i++){
            const a=rot+i*(Math.PI*2/N);
            const ox=(p.x+Math.cos(a)*r-cx)|0;
            const oy=(p.y+Math.sin(a)*r-cy)|0;
            ctx.globalAlpha=Math.min(1,t*4)*0.80;
            ctx.fillStyle='#c8d8f0';
            ctx.fillRect(ox-2,oy-2,5,5);
          }
          // Inner ring — faster counter-rotation, smaller
          const rot2=-(now/300)*Math.PI*2;
          for(let i=0;i<N;i++){
            const a=rot2+i*(Math.PI*2/N);
            const ox=(p.x+Math.cos(a)*16-cx)|0;
            const oy=(p.y+Math.sin(a)*16-cy)|0;
            ctx.globalAlpha=Math.min(1,t*4)*0.50;
            ctx.fillStyle='#ffffff';
            ctx.fillRect(ox-1,oy-1,3,3);
          }
          break;
        }

        case 'streak':{
          // Dotted afterimage trail from (x1,y1) to (x2,y2), fades quickly
          const dx=f.x2-f.x1, dy=f.y2-f.y1;
          const len=Math.hypot(dx,dy);
          if(len<2) break;
          const steps=Math.min(14, Math.ceil(len/12));
          for(let i=0;i<=steps;i++){
            const frac=i/steps;
            const sx=(f.x1+dx*frac-cx)|0;
            const sy=(f.y1+dy*frac-cy)|0;
            // Fade: bright at end (x2,y2), dim at start
            ctx.globalAlpha=t*(0.2+frac*0.7);
            ctx.fillStyle=f.col;
            const sz=Math.max(2,(4*(1-frac*0.5))|0);
            ctx.fillRect(sx-(sz>>1),sy-(sz>>1),sz,sz);
          }
          break;
        }

      }
      ctx.globalAlpha=1;
    }
  },
};

      {id:9,  x:12*TILE_SIZE+16, y:210*TILE_SIZE+16,lit:false, name:'Volcanic Gateway Bonfire'},
      {id:10, x:148*TILE_SIZE+16,y:210*TILE_SIZE+16,lit:false, name:'Abyssal Gateway Bonfire'},
      {id:11, x:12*TILE_SIZE+16, y:246*TILE_SIZE+16,lit:false, name:'Crystal Gateway Bonfire'},
      {id:12, x:148*TILE_SIZE+16,y:246*TILE_SIZE+16,lit:false, name:'Corrupted Gateway Bonfire'}
    );
    const p=GS.player;
    p.bonfireX=this.list[0].x; p.bonfireY=this.list[0].y;
  },

  interact(px,py){
    const anyBoss=GS.bossActive||GS.miniBosses.swamp.active||GS.miniBosses.mountain.active||GS.miniBosses.grassland.active
      ||GS.desertBoss.active
      ||GS.endgameBoss.volcanic.active||GS.endgameBoss.abyssal.active
      ||GS.endgameBoss.crystal.active||GS.endgameBoss.corrupted.active;
    if(anyBoss){ UI.msg('Cannot rest during a boss fight!','rune',2); return false; }
    for(const bf of this.list)
      if(Math.hypot(px-bf.x,py-bf.y)<50){ this.rest(bf); return true; }
    return false;
  },

  rest(bf){
    bf.lit=true;
    const p=GS.player;
    p.hp=Stats.maxHP(); p.fp=Stats.maxFP(); p.stamina=Stats.maxStamina();
    p.flaskCharges=PLAYER_CONFIG.flaskCharges;
    p.bonfireX=bf.x; p.bonfireY=bf.y;
    Enemies.respawnAll();
    // Bonfire rest overlay
    GS.phase='bonfire_rest';
    GS.bonfireRestTimer=2.5;
    GS.bonfireRestName=bf.name;
    ScreenFX.flash('#FFA020', 0.45, 0.6);
    for(let i=0;i<25;i++) Particles.embers(bf.x, bf.y);
  },

  update(dt){
    for(const bf of this.list)
      if(bf.lit && Math.random()<0.25) Particles.embers(bf.x,bf.y,1);
  },

  draw(cx,cy){
    for(const bf of this.list){
      const sx=(bf.x-cx)|0, sy=(bf.y-cy)|0;
      if(sx<-60||sx>SCREEN_W+60||sy<-60||sy>SCREEN_H+60) continue;
      const now=Date.now();
      // Stone base — flat pixel rects, no ellipse
      ctx.fillStyle='#1e1818'; ctx.fillRect(sx-12,sy+6,24,4);
      ctx.fillStyle='#3a3030'; ctx.fillRect(sx-10,sy+2,20,6);
      ctx.fillStyle='#504848'; ctx.fillRect(sx-8, sy-2, 16,6);
      ctx.fillStyle='#5e5252'; ctx.fillRect(sx-6, sy-4,  4,4);
      ctx.fillStyle='#5e5252'; ctx.fillRect(sx+2, sy-4,  4,4);
      if(bf.lit){
        // Animated pixel flame (4-frame cycle via integer time)
        const frame=(now/100|0)%4;
        // Ember glow — warm amber, the ONLY warm light in the dark world
        // Largest ring very faint, innermost bright
        ctx.globalAlpha=0.06; ctx.fillStyle='#c06010'; ctx.fillRect(sx-64,sy-52,128,90);
        ctx.globalAlpha=0.10; ctx.fillStyle='#d07010'; ctx.fillRect(sx-48,sy-40,96,72);
        ctx.globalAlpha=0.16; ctx.fillStyle='#e07810'; ctx.fillRect(sx-32,sy-28,64,52);
        ctx.globalAlpha=0.24; ctx.fillStyle='#e88010'; ctx.fillRect(sx-20,sy-18,40,36);
        ctx.globalAlpha=0.32; ctx.fillStyle='#f09010'; ctx.fillRect(sx-12,sy-10,24,22);
        ctx.globalAlpha=1;
        // Flame shapes per frame (outer orange)
        ctx.fillStyle='#c84008';
        const F=[
          [[sx-4,sy-4,8,6],[sx-3,sy-10,6,8],[sx-2,sy-16,4,8]],
          [[sx-5,sy-4,10,6],[sx-4,sy-10,8,8],[sx-2,sy-17,5,9]],
          [[sx-4,sy-4,8,6],[sx-3,sy-11,6,9],[sx-1,sy-16,3,8]],
          [[sx-5,sy-4,10,6],[sx-3,sy-10,7,8],[sx-2,sy-16,4,7]],
        ][frame];
        for(const[fx,fy,fw,fh] of F) ctx.fillRect(fx,fy,fw,fh);
        // Inner flame (tarnished amber — not bright yellow)
        ctx.fillStyle='#d07818';
        ctx.fillRect(sx-2,sy-4,4,4); ctx.fillRect(sx-2,sy-10,4,6); ctx.fillRect(sx-1,sy-14,2,5);
        // Core (deep gold, not white-hot)
        ctx.fillStyle='#e89020';
        ctx.fillRect(sx-1,sy-6,2,4); ctx.fillRect(sx-1,sy-10,2,4);
        ctx.fillStyle='#f0a828'; ctx.fillRect(sx-1,sy-12,2,2);
      } else {
        // Unlit — ash pile
        ctx.fillStyle='#2a1a0a'; ctx.fillRect(sx-4,sy-2,8,4);
        ctx.fillStyle='#1a1208'; ctx.fillRect(sx-2,sy-4,4,2);
      }
      // Interaction prompt
      if(GS.phase==='playing'){
        const dist=Math.hypot(GS.player.x-bf.x,GS.player.y-bf.y);
        if(dist<55) R.text('[E] Rest',sx,sy-(bf.lit?34:24),'#c8a060',10,'center');
      }
    }
  },
};

const RARITY_COLOR = { common:'#c0c0d0', uncommon:'#4878e8', rare:'#FFD040' };
const RARITY_GLOW  = { common:'#888898', uncommon:'#2850b8', rare:'#c8a010' };

function _makeDropItem(itemKey, x, y){
  const def=EQUIPMENT_ITEMS[itemKey]; if(!def) return null;
  return { ...def, equipId:itemKey, isEquipment:true,
           x, y, pt:0, collected:false,
           color:RARITY_COLOR[def.rarity]||'#c0c0d0',
           glow: RARITY_GLOW[def.rarity]||'#888898' };
}

const Chests = {
  list: GS.chests,

  init(){
    const pos=[
      // ---- GUARANTEED PROGRESSION GEAR ----
      {tx:45,  ty:55,  zone:'RUINS',    fixedItem:'HOLLOW_BLADE'},
      {tx:113, ty:65,  zone:'FOREST',   fixedItem:'CHAIN_MAIL'},
      {tx:204, ty:32,  zone:'VILLAGE',  fixedItem:'CRIMSON_RING'},
      // ---- RANDOM CHESTS ----
      {tx:23,  ty:50,  zone:'RUINS'},
      {tx:52,  ty:62,  zone:'RUINS'},
      {tx:8,   ty:88,  zone:'RUINS'},
      {tx:88,  ty:22,  zone:'FOREST'},
      {tx:140, ty:55,  zone:'FOREST'},
      {tx:55,  ty:130, zone:'CASTLE'},
      {tx:195, ty:148, zone:'CASTLE'},
      {tx:252, ty:22,  zone:'SWAMP'},
      {tx:263, ty:58,  zone:'SWAMP'},
      {tx:232, ty:152, zone:'MOUNTAIN'},
      {tx:258, ty:155, zone:'MOUNTAIN'},
      // ---- DESERT CHESTS ----
      {tx:248, ty:90,  zone:'DESERT',   fixedItem:'BONE_BLADE'},
      {tx:262, ty:108, zone:'DESERT'},
      {tx:252, ty:120, zone:'DESERT'},
      // ---- END-GAME CHESTS ----
      {tx:30,  ty:210, zone:'VOLCANIC'},
      {tx:90,  ty:218, zone:'VOLCANIC'},
      {tx:160, ty:210, zone:'ABYSSAL'},
      {tx:240, ty:218, zone:'ABYSSAL'},
      {tx:30,  ty:248, zone:'CRYSTAL'},
      {tx:90,  ty:256, zone:'CRYSTAL'},
      {tx:160, ty:248, zone:'CORRUPTED'},
      {tx:240, ty:256, zone:'CORRUPTED'},
    ];
    for(const p of pos){
      // Validate position is on a passable tile
      const ct=World.tile(p.tx*TILE_SIZE+16, p.ty*TILE_SIZE+16);
      if(!World.passable(ct)) continue;
      this.list.push({
        x:p.tx*TILE_SIZE+16, y:p.ty*TILE_SIZE+16,
        zone:p.zone, opened:false,
        fixedItem:p.fixedItem||null,
        fixedConsumable:false,
      });
    }
  },

  interact(px,py){
    for(const c of this.list){
      if(c.opened) continue;
      if(Math.hypot(px-c.x,py-c.y)<44){ this._open(c); return true; }
    }
    return false;
  },

  _open(chest){
    chest.opened=true;
    const ix=chest.x+(Math.random()-0.5)*20, iy=chest.y+(Math.random()-0.5)*20;

    if(chest.fixedItem){
      if(chest.fixedConsumable){
        // It's a consumable / summon item from ITEMS
        const def=ITEMS[chest.fixedItem];
        if(def){
          GS.items.push({...def, ikey:chest.fixedItem, x:ix, y:iy, pt:0, collected:false,
            isConsumable:true });
          UI.msg(`Found: ${def.name}`,'item',3);
        }
      } else {
        // It's equipment from EQUIPMENT_ITEMS
        const drop=_makeDropItem(chest.fixedItem, ix, iy);
        if(drop){ GS.items.push(drop); UI.msg(`${RARITY_LABEL[drop.rarity]}: ${drop.name}`,'item',3); }
      }
    } else {
      const table=LOOT_TABLES[chest.zone]||[];
      const candidates=table.filter(e=>Math.random()<e.chance);
      if(candidates.length){
        const entry=candidates[Math.floor(Math.random()*candidates.length)];
        const drop=_makeDropItem(entry.item, ix, iy);
        if(drop){ GS.items.push(drop); UI.msg(`${RARITY_LABEL[drop.rarity]}: ${drop.name}`,'item',2.5); }
      } else {
        UI.msg('Empty Chest','rune',1.5);
      }
    }
    Particles.sparks(chest.x,chest.y,14);
    ScreenFX.flash('#c8a060',0.15,0.3);
  },

  draw(cx,cy){
    for(const c of this.list){
      const sx=(c.x-cx)|0, sy=(c.y-cy)|0;
      if(sx<-40||sx>SCREEN_W+40||sy<-40||sy>SCREEN_H+40) continue;
      if(c.opened){
        // Open — flat lid leaning back
        ctx.fillStyle='#2a1a08'; ctx.fillRect(sx-12,sy-2,24,8);
        ctx.fillStyle='#1a1006'; ctx.fillRect(sx-10,sy-8,20,6);
        ctx.fillStyle='#3a2410'; ctx.fillRect(sx-8,sy-6,16,4);
      } else {
        // Closed chest body
        ctx.fillStyle='#3a2010'; ctx.fillRect(sx-12,sy,24,10);
        // Lid
        ctx.fillStyle='#4e2e14'; ctx.fillRect(sx-12,sy-10,24,11);
        ctx.fillStyle='#6a4020'; ctx.fillRect(sx-10,sy-8,20,5);
        // Gold trim
        ctx.fillStyle='#a07828';
        ctx.fillRect(sx-12,sy-10,24,2); ctx.fillRect(sx-12,sy,24,2);
        ctx.fillRect(sx-12,sy-10,2,22); ctx.fillRect(sx+10,sy-10,2,22);
        // Latch
        ctx.fillStyle='#c8a030'; ctx.fillRect(sx-3,sy-2,6,6);
        ctx.fillStyle='#FFD040'; ctx.fillRect(sx-1,sy,2,2);
        // Interaction prompt
        if(GS.phase==='playing'){
          const dist=Math.hypot(GS.player.x-c.x,GS.player.y-c.y);
          if(dist<54) R.text('[E] Open',sx,sy-18,'#c8a060',10,'center');
        }
      }
    }
  },
};

const Shops = {
  list:[],

  init(){
    for(const d of SHOP_DEFS)
      this.list.push({...d, x:d.tx*TILE_SIZE+16, y:d.ty*TILE_SIZE+16});
  },

  interact(px,py){
    if(GS.shopOpen) return false;
    for(const s of this.list){
      if(Math.hypot(px-s.x,py-s.y)<52){
        GS.shopOpen=true; GS.shopRef=s; GS.shopCursor=0;
        GS.phase='shop';
        UI.msg(s.name,'zone',1.5);
        return true;
      }
    }
    return false;
  },

  close(){
    GS.shopOpen=false; GS.shopRef=null; GS.shopCursor=0;
    GS.phase='playing';
  },

  handleInput(){
    const s=GS.shopRef; if(!s) return;
    const p=GS.player;
    const items=this._visibleItems(s);
    const n=items.length;
    if(Input.just('Escape')||Input.just('Tab')){ this.close(); return; }
    if(Input.just('ArrowUp')||Input.just('KeyW')) GS.shopCursor=(GS.shopCursor-1+n)%n;
    if(Input.just('ArrowDown')||Input.just('KeyS')) GS.shopCursor=(GS.shopCursor+1)%n;
    if(Input.just('KeyE')||Input.just('KeyJ')||Input.just('Space')){
      const sel=items[GS.shopCursor]; if(!sel) return;
      this._buy(s, sel);
    }
  },

  _visibleItems(s){
    // Build the effective item list, computing upgrade entry price dynamically
    return s.stock.map(entry=>{
      if(entry.type!=='upgrade') return entry;
      const p=GS.player;
      const w=p.equipment.weapon;
      if(!w) return {...entry, label:'Upgrade Weapon', price:-1, unavail:'No weapon equipped'};
      const curLvl=p.weaponUpgrades[w]||0;
      if(curLvl>=5) return {...entry, label:`${EQUIPMENT_ITEMS[w].name}  MAX`, price:-1, unavail:'Already max level'};
      const cost=UPGRADE_COSTS[curLvl];
      return {...entry, label:`Upgrade ${EQUIPMENT_ITEMS[w].name} +${curLvl+1}`, price:cost, unavail:null};
    });
  },

  _buy(s, entry){
    const p=GS.player;
    if(entry.unavail){ UI.msg(entry.unavail,'rune',1.5); return; }
    if(entry.price<0){ UI.msg('Cannot upgrade','rune',1.5); return; }
    if(p.runes<entry.price){ UI.msg('Not enough Runes','rune',1.5); return; }

    if(entry.type==='equip'){
      const def=EQUIPMENT_ITEMS[entry.id];
      if(!def) return;
      if(p.inventory.includes(entry.id)){ UI.msg('Already owned','rune',1.5); return; }
      p.runes-=entry.price;
      p.inventory.push(entry.id);
      UI.msg(`Bought: ${def.name}`,'item',2.5);
      Particles.rune(p.x,p.y);
    } else if(entry.type==='item'){
      const def=ITEMS[entry.id];
      if(!def) return;
      p.runes-=entry.price;
      if(def.effect==='flask') p.flaskCharges=Math.min(9,p.flaskCharges+1);
      else if(def.effect==='runes'){ p.runes+=def.value; p.totalRunes+=def.value; }
      UI.msg(`Bought: ${def.name}`,'item',2);
      Particles.rune(p.x,p.y);
    } else if(entry.type==='upgrade'){
      const w=p.equipment.weapon;
      if(!w) return;
      const curLvl=p.weaponUpgrades[w]||0;
      p.runes-=entry.price;
      p.weaponUpgrades[w]=curLvl+1;
      UI.msg(`${EQUIPMENT_ITEMS[w].name} upgraded to +${curLvl+1}!`,'item',3);
      ScreenFX.flash('#c8a060',0.25,0.4);
      Particles.sparks(p.x,p.y,12);
    }
  },

  draw(cx,cy){
    for(const s of this.list){
      const sx=(s.x-cx)|0, sy=(s.y-cy)|0;
      if(sx<-50||sx>SCREEN_W+50||sy<-50||sy>SCREEN_H+50) continue;
      // Merchant NPC sprite
      this._drawMerchant(sx,sy,s.isBlacksmith);
      // Interaction prompt
      if(GS.phase==='playing'){
        const dist=Math.hypot(GS.player.x-s.x,GS.player.y-s.y);
        if(dist<60) R.text('[E] Talk',sx,sy-22,'#c8a060',10,'center');
      }
    }
  },

  _drawMerchant(sx,sy,isBs){
    const cc=isBs?'#3a2808':'#2a3028'; // blacksmith=brown, merchant=dark green
    const tc=isBs?'#c88030':'#60a040'; // trim color
    // Legs
    ctx.fillStyle='#1a1814'; ctx.fillRect(sx-5,sy+4,4,9); ctx.fillRect(sx+1,sy+4,4,9);
    ctx.fillStyle='#000'; ctx.fillRect(sx-6,sy+4,1,9); ctx.fillRect(sx+5,sy+4,1,9);
    // Body — robe/apron
    ctx.fillStyle=cc; ctx.fillRect(sx-7,sy-8,14,13);
    ctx.fillStyle='#000'; ctx.fillRect(sx-8,sy-8,1,13); ctx.fillRect(sx+7,sy-8,1,13);
    ctx.fillRect(sx-7,sy-9,14,1); ctx.fillRect(sx-7,sy+5,14,1);
    ctx.fillStyle=tc; ctx.fillRect(sx-7,sy-8,14,2); // trim
    // Head
    ctx.fillStyle='#4a3a28'; ctx.fillRect(sx-5,sy-19,10,12);
    ctx.fillStyle='#000'; ctx.fillRect(sx-6,sy-19,1,12); ctx.fillRect(sx+5,sy-19,1,12);
    ctx.fillRect(sx-5,sy-20,10,1); ctx.fillRect(sx-5,sy-7,10,1);
    // Hood/hat
    ctx.fillStyle=cc; ctx.fillRect(sx-6,sy-22,12,5);
    ctx.fillStyle='#000'; ctx.fillRect(sx-6,sy-23,12,1);
    // Eyes
    ctx.fillStyle='#c8b060'; ctx.fillRect(sx-3,sy-15,2,2); ctx.fillRect(sx+1,sy-15,2,2);
    if(isBs){
      // Hammer
      ctx.fillStyle='#382818'; ctx.fillRect(sx+8,sy-14,3,20);
      ctx.fillStyle='#000'; ctx.fillRect(sx+7,sy-14,1,20); ctx.fillRect(sx+11,sy-14,1,20);
      ctx.fillStyle='#484440'; ctx.fillRect(sx+7,sy-16,7,6);
      ctx.fillStyle='#000'; ctx.fillRect(sx+7,sy-17,7,1); ctx.fillRect(sx+14,sy-16,1,6);
      ctx.fillStyle='#606058'; ctx.fillRect(sx+8,sy-16,5,4); // face gleam
    } else {
      // Scroll/bag
      ctx.fillStyle='#503810'; ctx.fillRect(sx-11,sy-6,6,10);
      ctx.fillStyle='#000'; ctx.fillRect(sx-12,sy-6,1,10); ctx.fillRect(sx-5,sy-6,1,10);
      ctx.fillStyle='#c8a040'; ctx.fillRect(sx-11,sy-6,6,2); ctx.fillRect(sx-11,sy+2,6,2);
    }
  },

  drawUI(){
    const s=GS.shopRef; if(!s) return;
    const p=GS.player;
    const W=420, H=360, bx=(SCREEN_W-W)/2|0, by=(SCREEN_H-H)/2|0;
    // Panel
    ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,SCREEN_W,SCREEN_H);
    ctx.fillStyle='#0c0a08'; ctx.fillRect(bx,by,W,H);
    ctx.fillStyle='#000'; ctx.fillRect(bx-3,by-3,W+6,H+6);
    ctx.fillStyle='#2a2006'; ctx.fillRect(bx,by,W,3); // gold top trim
    // Title
    R.shadow(s.name.toUpperCase(), bx+W/2, by+24, '#c8a060','#000',20,'center');
    R.text(`Runes: ${p.runes}`, bx+W-14, by+24,'#FFD040',13,'right');
    // Items
    const items=this._visibleItems(s);
    const rowH=44, startY=by+54;
    for(let i=0;i<items.length;i++){
      const entry=items[i];
      const iy=startY+i*rowH;
      const sel=(i===GS.shopCursor);
      // Row bg
      ctx.fillStyle=sel?'#201e0e':'#0e0c08'; ctx.fillRect(bx+10,iy,W-20,rowH-4);
      if(sel){ ctx.fillStyle='#c8a060'; ctx.fillRect(bx+10,iy,3,rowH-4); }
      // Label
      let label='', desc='', priceStr='', priceCol='#FFD040';
      if(entry.type==='equip'){
        const def=EQUIPMENT_ITEMS[entry.id]||{};
        const owned=p.inventory.includes(entry.id);
        label=def.name||entry.id;
        desc=def.desc||'';
        priceStr=owned?'Owned':`${entry.price} Runes`;
        priceCol=owned?'#606060':'#FFD040';
      } else if(entry.type==='item'){
        const def=ITEMS[entry.id]||{};
        label=def.name||entry.id;
        desc=def.desc||`Effect: ${def.effect}`;
        priceStr=`${entry.price} Runes`;
      } else if(entry.type==='upgrade'){
        label=entry.label||'Upgrade Weapon';
        desc=entry.unavail||'Upgrades weapon damage +25% per level';
        priceStr=entry.price>0?`${entry.price} Runes`:(entry.unavail?'—':'MAX');
        priceCol=p.runes>=(entry.price||0)?'#FFD040':'#a03030';
      }
      const canAfford=(entry.type!=='upgrade'||!entry.unavail)&&
                       (entry.type==='equip'?!p.inventory.includes(entry.id):true)&&
                       p.runes>=(entry.price||0);
      R.bold(label, bx+22, iy+17, sel?'#ffe090':'#c8a060', 12,'left');
      R.text(desc, bx+22, iy+33, '#604a2a', 10,'left');

    }
    // Footer
    ctx.fillStyle='#1a1810'; ctx.fillRect(bx,by+H-26,W,26);
    R.text('[↑↓] Navigate  [E/J] Buy  [Esc] Close', bx+W/2, by+H-9,'#503c20',10,'center');
    // Upgrade tooltip
    if(p.equipment.weapon){
      const upg=p.weaponUpgrades[p.equipment.weapon]||0;

      R.text(`Equipped: ${wname} +${upg}  │  Total ATK: ${Stats.damage()}`, bx+W/2, by+H-40,'#888070',10,'center');
    }
  },
};

const ALTAR_DEFS = [
  {id:'main_boss', label:'Ashen Altar', tx:129, ty:163, zone:'CASTLE', flashCol:'#6020a0'},
  {id:'swamp_boss', label:'Swamp Totem', tx:261, ty:38, zone:'SWAMP', flashCol:'#204010'},

  {id:'desert_shrine', label:'Desert Obelisk', tx:256, ty:95, zone:'DESERT', flashCol:'#d08010'},

const Altars = {
  list:[],

  init(){
    for(const d of ALTAR_DEFS)
      this.list.push({...d, x:d.tx*TILE_SIZE+16, y:d.ty*TILE_SIZE+16, activated:false});
  },

  interact(px,py){
    for(const alt of this.list){
      if(alt.activated) continue;
      if(Math.hypot(px-alt.x,py-alt.y)<52){
        this._tryActivate(alt);
        return true;
      }
    }
    return false;
  },

  _tryActivate(alt){
    // Altars are lore/hint shrines — bosses are entered via sealed fog gate doors
    if(alt.id==='main_boss'){
      if(GS.bossDefeated){
        UI.msg('The Ashen King has been slain. His throne lies empty.','rune',3); return;
      }
      UI.msg("Ashen Altar: 'The Ashen King dwells beyond the sealed southern gate. Grow strong before you enter.'", 'rune', 4);
    } else if(alt.id==='swamp_boss'){
      if(GS.miniBosses.swamp.defeated){
        UI.msg('The Swamp Horror is slain. The bog grows quiet.','rune',3); return;
      }
      UI.msg("Swamp Totem: 'Something ancient festers in the northern marsh. Approach the sealed gate to face it.'", 'rune', 4);
    } else if(alt.id==='mtn_boss'){
      if(GS.miniBosses.mountain.defeated){
        UI.msg('The Glacial Yeti has fallen. The mountain passes are clear.','rune',3); return;
      }
      UI.msg("Frost Shrine: 'A great beast prowls the peak. The sealed western gate leads to its domain.'", 'rune', 4);
    } else if(alt.id==='desert_shrine'){
      if(GS.desertBoss.defeated){
        UI.msg('The Sand Serpent is slain. The sands are still.','rune',3); return;
      }
      if(!GS.desertGateOpen){
        UI.msg("Desert Obelisk: 'The passage to the serpent\\'s lair is sealed. Seek the Desert Key.'", 'rune', 4);
      } else {
        UI.msg("Desert Obelisk: 'The passage is open. The Sand Serpent awaits in the deep arena.'", 'rune', 3);
      }
    }
  },

  draw(cx,cy){
    for(const alt of this.list){
      const sx=(alt.x-cx)|0, sy=(alt.y-cy)|0;
      if(sx<-50||sx>SCREEN_W+50||sy<-50||sy>SCREEN_H+50) continue;
      // Altars are now permanent hint shrines — always visible
      this._drawAltar(sx,sy,alt);
      if(GS.phase==='playing'){
        const dist=Math.hypot(GS.player.x-alt.x,GS.player.y-alt.y);
        if(dist<60) R.text('[E] Offer',sx,sy-28,'#c8a060',10,'center');
      }
    }
  },

  _drawAltar(sx,sy,alt){
    const now=Date.now();
    // Stone base
    ctx.fillStyle='#1e1e28'; ctx.fillRect(sx-14,sy+8,28,8);
    ctx.fillStyle='#2a2838'; ctx.fillRect(sx-12,sy+2,24,8);
    ctx.fillStyle='#343248'; ctx.fillRect(sx-10,sy-4,20,8);
    // Rune etching
    ctx.fillStyle='#4a3878'; ctx.fillRect(sx-8,sy,16,2);
    ctx.fillStyle='#6040a0'; ctx.fillRect(sx-4,sy-2,8,2);
    // Flame/glow atop altar
    const pulse=(now/400|0)%2;
    const gcol=alt.id==='swamp_boss'?'#204010':alt.id==='mtn_boss'?'#102030':'#300828';
    ctx.globalAlpha=0.28+pulse*0.10;
    ctx.fillStyle=gcol; ctx.fillRect(sx-16,sy-20,32,24);
    ctx.globalAlpha=1;
    // Orb
    const ocol=alt.id==='swamp_boss'?'#60c030':alt.id==='mtn_boss'?'#60a8e0':'#a040d0';
    ctx.fillStyle=ocol; ctx.fillRect(sx-4,sy-14,8,8);
    ctx.fillStyle='#fff'; ctx.fillRect(sx-2,sy-12,3,3);
    ctx.fillStyle='#000'; ctx.fillRect(sx-4,sy-14,1,8); ctx.fillRect(sx+4,sy-14,1,8);
    ctx.fillRect(sx-4,sy-15,8,1); ctx.fillRect(sx-4,sy-6,8,1);
    // Label
    R.text(alt.label,sx,sy-20,ocol,9,'center');
  },
};

// PLAYER SYSTEM
// ============================================================
let atkHitbox=null; // {x,y,w,h,dmg,type,timer,hit:Set}

const Player = {
  update(dt){
    const p=GS.player;
    if(p.isDead){ this._updateDeath(dt); return; }
    // Timers
    if(p.hitFlash>0)     p.hitFlash    -=dt;
    if(p.staminaEmpty>0) p.staminaEmpty-=dt;
    if(p.combo>0){ p.comboTimer-=dt; if(p.comboTimer<=0){ p.combo=0; } }
    this._move(dt);
    this._roll(dt);
    this._attack(dt);
    this._special(dt);
    this._weaponAbility(dt);
    this._staminaRegen(dt);
    this._interact();
    this._flask();
    this._checkZone();
    this._checkFogGate();
    this._checkMiniBossZone();
    this._checkItems();
    this._checkLevel();
  },

  _move(dt){
    const p=GS.player;
    p.isMoving=false; // reset each frame; set true below if keys held
    // Root effect (vine grab, etc.) — can't move but can still act
    if(p.rootTimer>0){ p.rootTimer-=dt; BossRooms.clamp(p); return; }
    if(p.isRolling) return;
    const root=p.isAttacking&&p.attackType==='heavy';
    let dx=0, dy=0;
    if(!root){
      if(Input.down('KeyW')||Input.down('ArrowUp'))    dy-=1;
      if(Input.down('KeyS')||Input.down('ArrowDown'))  dy+=1;
      if(Input.down('KeyA')||Input.down('ArrowLeft'))  dx-=1;
      if(Input.down('KeyD')||Input.down('ArrowRight')) dx+=1;
    }
    if(dx||dy){
      const len=Math.sqrt(dx*dx+dy*dy); dx/=len; dy/=len;
      p.facing.x=dx; p.facing.y=dy;
      p.isMoving=true;
      p.walkPhase=(p.walkPhase+dt*3.5)%4; // 3.5 strides/sec → smooth 2-frame cycle
    }
    const spd=p.isAttacking ? Stats.speed()*0.35 : Stats.speed();
    const nx=p.x+dx*spd*dt, ny=p.y+dy*spd*dt;
    if(World.canMove(nx,p.y,PLAYER_CONFIG.size-1)) p.x=nx;
    if(World.canMove(p.x,ny,PLAYER_CONFIG.size-1)) p.y=ny;
    // Push-out: if somehow inside a wall (knockback/clamp rounding), nudge to nearest open cell
    if(!World.canMove(p.x,p.y,PLAYER_CONFIG.size-1)){
      const S=TILE_SIZE;
      const tx=(p.x/S)|0, ty=(p.y/S)|0;
      let best=null, bestD=Infinity;
      for(let ddy=-2;ddy<=2;ddy++) for(let ddx=-2;ddx<=2;ddx++){
        if(!ddx&&!ddy) continue;
        const cx=(tx+ddx)*S+S/2, cy=(ty+ddy)*S+S/2;
        if(World.canMove(cx,cy,PLAYER_CONFIG.size-1)){
          const d=Math.hypot(cx-p.x,cy-p.y);
          if(d<bestD){ best={cx,cy}; bestD=d; }
        }
      }
      if(best){ p.x=best.cx; p.y=best.cy; }
    }
    // Clamp to active boss room bounds
    BossRooms.clamp(p);
  },

  _roll(dt){
    const p=GS.player;
    // Sneak timer countdown
    if(p.sneakTimer>0){ p.sneakTimer-=dt; if(p.sneakTimer<=0){ p.sneakTimer=0; UI.msg('Reappeared','rune',0.8); } }
    if(p.isRolling){
      p.rollTimer-=dt; p.rollITimer-=dt;
      const baseDur = p.megaDash ? p.megaDashDur : PLAYER_CONFIG.rollDuration;
      const prog=1-(p.rollTimer/baseDur);
      const baseSpd = p.megaDash ? p.megaDashSpd : PLAYER_CONFIG.rollSpeed;
      const spd = p.megaDash ? baseSpd*(1-prog*0.25) : baseSpd*(1-prog*0.5);
      const nx=p.x+p.rollDx*spd*dt, ny=p.y+p.rollDy*spd*dt;
      const okX=World.canMove(nx,p.y,PLAYER_CONFIG.size-3);
      const okY=World.canMove(p.x,ny,PLAYER_CONFIG.size-3);
      if(okX) p.x=nx; else p.rollDx=0; // absorb x on wall hit → slide along y
      if(okY) p.y=ny; else p.rollDy=0; // absorb y on wall hit → slide along x
      if(!okX&&!okY){ p.isRolling=false; p.isInvincible=false; p.megaDash=false; return; }
      BossRooms.clamp(p);
      p.isInvincible=(p.rollITimer>0);
      if(p.rollTimer<=0){ p.isRolling=false; p.isInvincible=false; p.megaDash=false; }
      return;
    }
    if(Input.just('Space')&&!p.isAttacking){
      if(p.stamina>=PLAYER_CONFIG.rollStaminaCost){
        p.stamina-=PLAYER_CONFIG.rollStaminaCost;
        p.isRolling=true;
        p.rollTimer=PLAYER_CONFIG.rollDuration;
        p.rollITimer=PLAYER_CONFIG.rollIFrames; // full invincibility throughout
        let dx=0, dy=0;
        if(Input.down('KeyW')||Input.down('ArrowUp'))    dy-=1;
        if(Input.down('KeyS')||Input.down('ArrowDown'))  dy+=1;
        if(Input.down('KeyA')||Input.down('ArrowLeft'))  dx-=1;
        if(Input.down('KeyD')||Input.down('ArrowRight')) dx+=1;
        if(!dx&&!dy){ dx=p.facing.x; dy=p.facing.y; }
        const l=Math.sqrt(dx*dx+dy*dy)||1;
        p.rollDx=dx/l; p.rollDy=dy/l;
      } else {
        p.staminaEmpty=0.4;
      }
    }
  },

  _attack(dt){
    const p=GS.player;
    if(p.attackCooldown>0) p.attackCooldown-=dt;
    if(p.counterTimer>0){
      p.counterTimer-=dt;
      if(p.counterTimer<=0){
        p.counterActive=false;
        // Ensure the VFX ring fully expires (timer already drains naturally)
      }
    }
    if(p.isAttacking){
      p.attackTimer-=dt;
      if(atkHitbox){ this._syncHitbox(); this._checkHits(); atkHitbox.timer-=dt; if(atkHitbox.timer<=0) atkHitbox=null; }
      if(p.attackTimer<=0){ p.isAttacking=false; atkHitbox=null; }
      return;
    }
    if(p.attackCooldown>0) return;
    const w=p.equipment.weapon;
    const isBow=BOW_WEAPONS.has(w), isWand=WAND_WEAPONS.has(w);
    const lightJ=Input.just('KeyJ'), heavyK=Input.just('KeyK');
    if((lightJ||heavyK)&&p.stamina<PLAYER_CONFIG.lightStamina){ p.staminaEmpty=0.4; return; }
    if(!lightJ&&!heavyK) return;
    const type=lightJ?'light':'heavy';
    p.isAttacking=true; p.attackType=type;
    p.attackTimer=type==='light'?PLAYER_CONFIG.lightDur:PLAYER_CONFIG.heavyDur;
    p.attackCooldown=PLAYER_CONFIG.attackCooldown;
    if(type==='light') p.stamina-=PLAYER_CONFIG.lightStamina;
    else               p.stamina-=PLAYER_CONFIG.heavyStamina;
    if(isBow){
      // Fire arrow projectile — no melee hitbox
      const spd = type==='light' ? 310 : 250;
      const dmg = (type==='light'?PLAYER_CONFIG.lightDmg:PLAYER_CONFIG.heavyDmg)+Stats.damage();
      const sz  = type==='light' ? 5 : 8;
      const angle=Math.atan2(p.facing.y,p.facing.x);
      GS.projectiles.push({
        x:p.x+p.facing.x*18, y:p.y+p.facing.y*18,
        vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
        dmg, sz, life:2.8,
        color:'#9a5018', glow:'#d09040',
        isPlayerProj:true, isArrow:true,
        angle, // for draw rotation
      });
      Particles.sparks(p.x+p.facing.x*14,p.y+p.facing.y*14,3);
    } else if(isWand){
      // Fire magic bolt projectile — no melee hitbox
      const wp=WAND_PROJ[w]||WAND_PROJ.OLD_WAND;
      const spd = type==='light' ? wp.spd : wp.spd*0.75;
      const dmg = (type==='light'?PLAYER_CONFIG.lightDmg:PLAYER_CONFIG.heavyDmg)+Stats.damage();
      const sz  = type==='light' ? wp.sz : wp.sz+3;
      const angle=Math.atan2(p.facing.y,p.facing.x);
      GS.projectiles.push({
        x:p.x+p.facing.x*16, y:p.y+p.facing.y*16,
        vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
        dmg, sz, life:2.5,
        color:wp.col, glow:wp.glow,
        isPlayerProj:true, isMagicBolt:true,
        isIce:wp.isIce, isToxic:wp.isToxic,
      });
      Particles.sparks(p.x+p.facing.x*14,p.y+p.facing.y*14,4);
    } else {
      this._makeHitbox(type);
    }
  },

  _makeHitbox(type){
    const p=GS.player;
    const range=type==='light'?52:72, w=type==='light'?34:56;
    let dmg=(type==='light'?PLAYER_CONFIG.lightDmg:PLAYER_CONFIG.heavyDmg)+Stats.damage();
    if(p.counterActive){
      dmg*=3; p.counterActive=false; p.counterTimer=0;
      ScreenFX.flash('#808090',0.3,0.18);
      // Remove counter stance VFX ring immediately on trigger
      const ci=GS.vfx.findIndex(f=>f.type==='counterstance');
      if(ci>=0) GS.vfx.splice(ci,1);
    }
    atkHitbox={
      x:p.x+p.facing.x*range-w/2, y:p.y+p.facing.y*range-w/2,
      w,h:w, dmg, type, timer:type==='light'?PLAYER_CONFIG.lightDur:PLAYER_CONFIG.heavyDur,
      hit:new Set()
    };
    this._checkHits();
  },

  _syncHitbox(){
    if(!atkHitbox) return;
    const p=GS.player;
    const range=atkHitbox.type==='light'?52:72, w=atkHitbox.w;
    atkHitbox.x=p.x+p.facing.x*range-w/2;
    atkHitbox.y=p.y+p.facing.y*range-w/2;
  },

  _checkHits(){
    if(!atkHitbox) return;
    const hx=atkHitbox.x+atkHitbox.w/2, hy=atkHitbox.y+atkHitbox.h/2;
    const p=GS.player;
    for(const e of GS.enemies){
      if(e.isDead||atkHitbox.hit.has(e.id)) continue;
      if(Math.hypot(e.x-hx,e.y-hy)<atkHitbox.w/2+e.size){
        Enemies.damage(e, atkHitbox.dmg, p.facing.x, p.facing.y);
        atkHitbox.hit.add(e.id);
        Particles.sparks(e.x,e.y,8);
        // Lifesteal (Hollow Blade Soul Drain)
        if(atkHitbox.isLifesteal){
          const heal=Math.ceil(atkHitbox.dmg*0.25);
          p.hp=Math.min(Stats.maxHP(),p.hp+heal);
          UI.msg(`+${heal} HP stolen`,'rune',0.8);
        }
        // Combo tracking
        p.combo++; p.comboTimer=2.0;
        if(p.combo===3) UI.msg('COMBO x3','combo',1.0);
        else if(p.combo===5) UI.msg('COMBO x5','combo',1.2);
        else if(p.combo>=8) UI.msg(`COMBO x${p.combo}`,'combo',1.2);
      }
    }
  },

  _staminaRegen(dt){
    const p=GS.player;
    if(!p.isRolling&&!p.isAttacking)
      p.stamina=Math.min(Stats.maxStamina(), p.stamina+PLAYER_CONFIG.staminaRegen*dt);
  },

  _interact(){
    if(!Input.just('KeyE')) return;
    const p=GS.player;
    if(Bonfires.interact(p.x,p.y)) return;
    if(Chests.interact(p.x,p.y)) return;
    if(Altars.interact(p.x,p.y)) return;
    if(Shops.interact(p.x,p.y)) return;
    if(Quest.interactElder(p.x,p.y)) return;
    // Bloodstain recovery
    if(p.bloodstainX!==null && Math.hypot(p.x-p.bloodstainX,p.y-p.bloodstainY)<32){
      p.runes+=p.bloodstainRunes; p.totalRunes+=p.bloodstainRunes;
      UI.msg(`Recovered ${p.bloodstainRunes} Runes`,'rune',2);
      Particles.rune(p.x,p.y);
      p.bloodstainX=null; p.bloodstainY=null; p.bloodstainRunes=0;
    }
    // TODO: NPC interaction, shop, lore items
  },

  _flask(){
    const p=GS.player;
    if(!Input.just('KeyF')||p.flaskCharges<=0||p.hp>=Stats.maxHP()) return;
    p.flaskCharges--;
    p.hp=Math.min(Stats.maxHP(), p.hp+PLAYER_CONFIG.flaskHeal);
    UI.msg(`+${PLAYER_CONFIG.flaskHeal} HP`,'heal',1.2);
    Particles.heal(p.x,p.y-10,8);
    ScreenFX.flash('#40a040',0.18,0.3);
  },

  _checkZone(){
    const p=GS.player;
    const z=World.zoneAt(p.x,p.y);
    if(z!==GS.currentZone){
      GS.currentZone=z; GS.discoveredZones.add(z);
      if(ZONES[z]) UI.msg(ZONES[z].name,'zone',3);
      ScreenFX.flash('#ffffff',0.12,0.5);
    }
    // House interior detection
    if(World.tile(p.x,p.y)===T.HOUSE_FLOOR){
      const tx=p.x/TILE_SIZE|0, ty=p.y/TILE_SIZE|0;
      GS.insideHouse=HOUSE_DEFS.find(
        h=>tx>=h.wx&&tx<h.wx+h.ww&&ty>=h.wy&&ty<h.wy+h.wh
      )||null;
    } else {
      GS.insideHouse=null;
    }
  },

  _checkFogGate(){
    const p=GS.player;
    if(World.tile(p.x,p.y)!==T.FOG_GATE) return;
    const tx=p.x/TILE_SIZE|0, ty=p.y/TILE_SIZE|0;

    // === DESERT KEY GATE — south wall of swamp ===
    if(tx>=253&&tx<=266&&(ty===76||ty===77)){
      if(GS.desertGateOpen) return; // already unlocked, passable
      if(p.consumables.includes('DESERT_KEY')){
        p.consumables=p.consumables.filter(k=>k!=='DESERT_KEY');
        GS.desertGateOpen=true;
        // Clear fog gate tiles to passable desert floor
        for(let gx=251;gx<=268;gx++){
          if(World.map[76]&&World.map[76][gx]===T.FOG_GATE) World.map[76][gx]=T.SWAMP_FLOOR;
          if(World.map[77]&&World.map[77][gx]===T.FOG_GATE) World.map[77][gx]=T.DESERT_FLOOR;
        }
        UI.msg('Desert Passage Unsealed!','boss',3.5);
        ScreenFX.flash('#d4a030',0.5,0.8);
      } else {
        UI.msg('Sealed Gate — Desert Passage Key required','rune',2);
        p.y-=56;
      }
      return;
    }

    // === END-GAME GATE — south of Boss Arena ===
    if(tx>=127&&tx<=131&&(ty>=197&&ty<=202)){
      if(GS.endgameUnlocked) return;
      const all5=GS.bossDefeated&&GS.miniBosses.swamp.defeated&&
        GS.miniBosses.mountain.defeated&&GS.miniBosses.grassland.defeated&&
        GS.desertBoss.defeated;
      if(all5){
        GS.endgameUnlocked=true;
        for(let gx=125;gx<=133;gx++)
          for(let gy=197;gy<=204;gy++)
            if(World.map[gy]&&World.map[gy][gx]===T.FOG_GATE) World.map[gy][gx]=T.VOLCANIC_FLOOR;
        UI.msg('THE GATE OF RECKONING OPENS','boss',5);
        ScreenFX.flash('#8040ff',0.7,1.2);
      } else {
        UI.msg('Five rulers must fall to break this seal','rune',2.5);
        p.y-=56;
      }
      return;
    }

    // === END-GAME BOSS ROOM GATES ===
    let endZone=null;
    if(tx>=5&&tx<=139&&ty>=200&&ty<=204) endZone='volcanic';
    else if(tx>=140&&tx<=274&&ty>=200&&ty<=204) endZone='abyssal';
    else if(tx>=5&&tx<=139&&ty>=236&&ty<=240) endZone='crystal';
    else if(tx>=140&&tx<=274&&ty>=236&&ty<=240) endZone='corrupted';
    if(endZone){
      if(!GS.endgameUnlocked){ UI.msg('Requires end-game access','rune',2); p.y-=40; return; }
      const eb=GS.endgameBoss[endZone];
      if(eb.defeated) return;
      if(eb.active) return;
      BossRooms.enter('eg_'+endZone);
      return;
    }

    // === DESERT BOSS ROOM GATE ===
    if(tx>=241&&tx<=277&&ty>=128&&ty<=132){
      if(GS.desertBoss.defeated) return;
      if(GS.desertBoss.active) return;
      if(!GS.desertGateOpen){ UI.msg('Desert passage is sealed','rune',2); if(ty>=130) p.y+=40; else p.y-=40; return; }
      BossRooms.enter('desert');
      return;
    }

    // === STANDARD BOSS ROOM FOG GATES ===
    let roomId=null;
    if(tx>=127&&tx<=131&&ty>=164&&ty<=166) roomId='main';
    else if(tx>=253&&tx<=266&&ty===24)      roomId='swamp';
    else if(tx===234&&ty>=140&&ty<=158)     roomId='mountain';
    else if(tx===125&&ty>=15&&ty<=23)       roomId='grassland';
    if(!roomId) return;

    const def=BOSS_ROOM_DEFS[roomId];
    if(def.isDefeated()) return;
    if(def.isActive()) return;
    BossRooms.enter(roomId);
  },

  _checkItems(){
    const p=GS.player;
    for(const item of GS.items){
      if(item.collected) continue;
      if(Math.hypot(p.x-item.x,p.y-item.y)<20){
        item.collected=true;
        if(item.isEquipment){
          p.inventory.push(item.equipId);
          UI.msg(`${RARITY_LABEL[EQUIPMENT_ITEMS[item.equipId]?.rarity||'common']}: ${item.name}`,'item',2);
        } else if(item.effect==='flask'){ p.flaskCharges=Math.min(9,p.flaskCharges+item.value); UI.msg(`+1 ${item.name}`,'item',2); }
        else if(item.effect==='runes'){ p.runes+=item.value; p.totalRunes+=item.value; UI.msg(`+${item.value} Runes`,'rune',2); }
        else if(item.effect==='key'||item.effect==='summon'){
          if(!p.consumables.includes(item.ikey)) p.consumables.push(item.ikey);
          UI.msg(`Found: ${item.name}`,'item',3.5);
        }
        Particles.rune(p.x,p.y);
      }
    }
  },

  _abilityTier(){ return abilityTier(GS.player.level); },

  _special(dt){
    const p=GS.player;
    if(p.specialCooldown>0) p.specialCooldown-=dt;
    if(!Input.just('KeyQ')) return;
    if(!GS.playerClass){ UI.msg('Choose a class first','rune',1.5); return; }
    if(p.specialCooldown>0){ UI.msg('Ability cooling down','rune',0.8); return; }
    const def=CLASS_DEFS[GS.playerClass];
    const ab=def.ability;
    const tier=this._abilityTier();
    const upg=ab.upgrades[tier];
    if(p.fp<ab.fpCost){ UI.msg('Not enough FP','rune',1); return; }

    p.fp-=ab.fpCost;
    p.specialCooldown=ab.cooldown;

    switch(ab.key){
      case 'mega_slice':{
        // Wide sweeping hitbox — hits everything in a broad arc
        const dmg=(PLAYER_CONFIG.lightDmg+Stats.damage())*upg.dmgMult;
        const hw=upg.w/2;
        // Create three overlapping hitboxes to fake a wide sweep
        const offsets=[-hw*0.55, 0, hw*0.55];
        for(const off of offsets){
          const ox=-p.facing.y*off, oy=p.facing.x*off;
          const hx=p.x+p.facing.x*upg.range+ox-hw/2;
          const hy=p.y+p.facing.y*upg.range+oy-hw/2;
          atkHitbox={x:hx,y:hy,w:upg.w,h:upg.w,dmg,type:'heavy',timer:0.45,hit:atkHitbox?new Set([...atkHitbox.hit]):new Set()};
          this._checkHits();
        }
        atkHitbox=null;
        Particles.sparks(p.x+p.facing.x*upg.range, p.y+p.facing.y*upg.range, 14);
        ScreenFX.flash('#c8a060',0.22,0.18);
        UI.msg(upg.name+'!','combo',0.9);
        break;
      }
      case 'mega_dash':{
        // Supercharged dash with full i-frames
        let dx=0,dy=0;
        if(Input.down('KeyW')||Input.down('ArrowUp'))    dy-=1;
        if(Input.down('KeyS')||Input.down('ArrowDown'))  dy+=1;
        if(Input.down('KeyA')||Input.down('ArrowLeft'))  dx-=1;
        if(Input.down('KeyD')||Input.down('ArrowRight')) dx+=1;
        if(!dx&&!dy){ dx=p.facing.x; dy=p.facing.y; }
        const l=Math.sqrt(dx*dx+dy*dy)||1;
        p.rollDx=dx/l; p.rollDy=dy/l;
        p.isRolling=true; p.megaDash=true;
        p.megaDashSpd=upg.spd; p.megaDashDur=upg.dur;
        p.rollTimer=upg.dur; p.rollITimer=upg.dur;
        Particles.sparks(p.x,p.y,10);
        UI.msg(upg.name+'!','combo',0.7);
        break;
      }
      case 'mega_sneak':{
        p.sneakTimer=upg.dur;
        ScreenFX.flash('#283018',0.4,0.5);
        UI.msg(upg.name+'!  ('+upg.dur.toFixed(1)+'s)','combo',1.0);
        break;
      }
      case 'mega_fireball':{
        const dx=p.facing.x, dy=p.facing.y;
        GS.projectiles.push({
          x:p.x+dx*22, y:p.y+dy*22,
          vx:dx*upg.spd, vy:dy*upg.spd,
          dmg:upg.dmg+Stats.damage(), sz:upg.sz,
          life:4.5, color:'#ff4010', glow:'#ff8020',
          isPlayerProj:true, isFireball:true, fireballSz:upg.sz
        });
        Particles.sparks(p.x+dx*22,p.y+dy*22,12);
        ScreenFX.flash('#601008',0.20,0.25);
        UI.msg(upg.name+'!','combo',0.9);
        break;
      }
    }
  },

        VFX.slash(p.x,p.y, angle, 80, Math.PI*0.65, '#c87820','#ffa030', 0.32);
        ScreenFX.flash('#906030',0.18,0.2);

      case 'SMALL_DAGGER':{ // Blade Rush — lunge forward + hit

        p.x+=lx*44; p.y+=ly*44;
        // Keep in bounds
        p.x=Math.max(TILE_SIZE,Math.min((WORLD_W-1)*TILE_SIZE,p.x));
        p.y=Math.max(TILE_SIZE,Math.min((WORLD_H-1)*TILE_SIZE,p.y));
        const hw2=40;
        atkHitbox={
          x:p.x+lx*36-hw2/2, y:p.y+ly*36-hw2/2,
          w:hw2, h:hw2, dmg:baseDmg*1.6, type:'light', timer:0.2, hit:new Set(),

        this._checkHits(); atkHitbox=null;
        Particles.sparks(p.x,p.y,8);
        // Motion afterimage streak + tight slash arc at endpoint

        UI.msg('Blade Rush!','combo',0.8);

      }
      case 'IRON_SWORD':{ // Steel Counter — buff next hit 3x
        p.counterActive=true; p.counterTimer=3.5;

        VFX.counterstance(3.5);
        ScreenFX.flash('#808090',0.2,0.3);
        UI.msg('Counter Stance!','combo',1.2);
        break;
      }
      case 'HOLLOW_BLADE':{ // Soul Drain — lifesteal heavy hit
        const hw3=52;
        atkHitbox={
          x:p.x+p.facing.x*60-hw3/2, y:p.y+p.facing.y*60-hw3/2,

        Particles.sparks(p.x+p.facing.x*48,p.y+p.facing.y*48,10);
        // Dark purple sweeping drain arc + collapsing shockwave
        VFX.slash(p.x,p.y, angle, 66, Math.PI*0.55, '#9010c0','#d040ff', 0.30);
        VFX.shockwave(p.x,p.y, 58, '#6008a0', 0.28);
        ScreenFX.flash('#400050',0.2,0.25);
        UI.msg('Soul Drain!','combo',0.9);
        break;
      }
      case 'ASHEN_GREATSWORD':{ // Ground Slam — AoE ring around player
        const aoeR=96;
        atkHitbox={
          x:p.x-aoeR, y:p.y-aoeR,
          w:aoeR*2, h:aoeR*2, dmg:baseDmg*2.4, type:'heavy', timer:0.4, hit:new Set(),
        };
        this._checkHits(); atkHitbox=null;
        for(let i=0;i<16;i++) Particles.sparks(
          p.x+Math.cos(i*0.393)*aoeR*0.7, p.y+Math.sin(i*0.393)*aoeR*0.7, 4);
        // Double shockwave ring — outer ember-orange + inner bright fire
        VFX.shockwave(p.x,p.y, aoeR,    '#c05010', 0.45);
        VFX.shockwave(p.x,p.y, aoeR*0.6,'#ff8020', 0.32);
        ScreenFX.flash('#604020',0.28,0.35);
        ScreenFX.shake(8,0.25);

        break;
      }
      // ── DESERT WEAPONS ───────────────────────────────────────────────────
      case 'BONE_BLADE':{ // Bone Splinter — scatter 5 bone shards in a cone
        const spread2=0.32;
        for(let i=-2;i<=2;i++){
          const a=angle+i*spread2*0.5;
          const jit=(Math.random()-0.5)*0.08;

            x:p.x+p.facing.x*14, y:p.y+p.facing.y*14,

        ScreenFX.flash('#604820',0.15,0.18);
        UI.msg('Bone Splinter!','combo',0.9);
        break;
      }
      case 'SAND_LANCE':{ // Sand Thrust — lunge + sand explosion
        const lx2=p.facing.x, ly2=p.facing.y;
        const rx0=p.x, ry0=p.y;
        p.x+=lx2*52; p.y+=ly2*52;
        p.x=Math.max(TILE_SIZE,Math.min((WORLD_W-1)*TILE_SIZE,p.x));
        p.y=Math.max(TILE_SIZE,Math.min((WORLD_H-1)*TILE_SIZE,p.y));
        const hw4=56;
        atkHitbox={
          x:p.x+lx2*40-hw4/2, y:p.y+ly2*40-hw4/2,
          w:hw4, h:hw4, dmg:baseDmg*1.9, type:'heavy', timer:0.25, hit:new Set(),
        };
        this._checkHits(); atkHitbox=null;
        Particles.sparks(p.x,p.y,10);
        VFX.streak(rx0,ry0, p.x,p.y, '#e0c870', 0.25);
        VFX.shockwave(p.x+lx2*40,p.y+ly2*40, 70, '#d4a830', 0.38);
        VFX.slash(p.x,p.y, angle, 60, Math.PI*0.44, '#e0c050','#fff0a0', 0.20);
        ScreenFX.flash('#705820',0.18,0.2);
        ScreenFX.shake(5,0.18);
        UI.msg('Sand Thrust!','combo',0.9);
        break;
      }
      // ── ENDGAME WEAPONS ───────────────────────────────────────────────────
      case 'ABYSSAL_BLADE':{ // Void Rend — wide dark energy sweep
        const aoeR2=112;
        atkHitbox={
          x:p.x+p.facing.x*48-aoeR2/2, y:p.y+p.facing.y*48-aoeR2/2,
          w:aoeR2, h:aoeR2, dmg:baseDmg*2.8, type:'heavy', timer:0.4, hit:new Set(),
        };
        this._checkHits(); atkHitbox=null;
        Particles.sparks(p.x+p.facing.x*50,p.y+p.facing.y*50,14);
        VFX.slash(p.x,p.y, angle, 96, Math.PI*0.80, '#1020a0','#4060ff', 0.38);
        VFX.shockwave(p.x,p.y, aoeR2*0.7, '#0820c0', 0.32);
        ScreenFX.flash('#060820',0.3,0.35);
        ScreenFX.shake(7,0.22);
        UI.msg('Void Rend!','combo',1.0);
        break;
      }
      case 'VOID_LANCE':{ // Void Pierce — fast void bolt, pierces all enemies
        GS.projectiles.push({
          x:p.x+p.facing.x*20, y:p.y+p.facing.y*20,
          vx:Math.cos(angle)*540, vy:Math.sin(angle)*540,
          dmg:baseDmg*2.4, sz:10, life:3.5,
          color:'#1828c0', glow:'#4060ff',
          isPlayerProj:true, isMagicBolt:true,
          isPiercing:true, piercedIds:new Set(),
        });
        // Trailing void particles
        for(let i=0;i<4;i++){
          const jit=(Math.random()-0.5)*0.18;
          GS.projectiles.push({
            x:p.x+p.facing.x*(8+i*4), y:p.y+p.facing.y*(8+i*4),
            vx:Math.cos(angle+jit)*420, vy:Math.sin(angle+jit)*420,
            dmg:1, sz:4, life:1.0,
            color:'#0814a0', glow:'#2040d0',
            isPlayerProj:true, isMagicBolt:true,
          });
        }
        Particles.sparks(p.x+p.facing.x*16,p.y+p.facing.y*16,8);
        ScreenFX.flash('#040830',0.22,0.25);
        UI.msg('Void Pierce!','combo',0.9);
        break;
      }
      case 'CRYSTAL_SCEPTER':{ // Crystal Barrage — 5 shards in a fan
        const spreadC=0.22;
        for(let i=-2;i<=2;i++){
          const a=angle+i*spreadC;
          GS.projectiles.push({
            x:p.x+p.facing.x*16+(-p.facing.y*i*8), y:p.y+p.facing.y*16+(p.facing.x*i*8),
            vx:Math.cos(a)*360, vy:Math.sin(a)*360,
            dmg:baseDmg*1.3, sz:9, life:3.0,
            color:'#40b0d8', glow:'#80e0ff',
            isPlayerProj:true, isMagicBolt:true, isIce:true,
          });
        }
        Particles.sparks(p.x+p.facing.x*14,p.y+p.facing.y*14,12);
        ScreenFX.flash('#0c3050',0.22,0.28);
        UI.msg('Crystal Barrage!','combo',0.9);
        break;
      }
      case 'CORRUPTED_SWORD':{ // Corruption Burst — AoE explosion of corruption
        const aoeR3=104;
        atkHitbox={
          x:p.x-aoeR3, y:p.y-aoeR3,
          w:aoeR3*2, h:aoeR3*2, dmg:baseDmg*3.0, type:'heavy', timer:0.45, hit:new Set(),
        };
        this._checkHits(); atkHitbox=null;
        for(let i=0;i<20;i++){
          const a=(i/20)*Math.PI*2;
          GS.projectiles.push({
            x:p.x+Math.cos(a)*20, y:p.y+Math.sin(a)*20,
            vx:Math.cos(a)*160, vy:Math.sin(a)*160,
            dmg:baseDmg*0.4, sz:7, life:1.4,
            color:'#6010b0', glow:'#c040ff',
            isPlayerProj:true, isMagicBolt:true,
          });
        }
        Particles.sparks(p.x,p.y,16);
        VFX.shockwave(p.x,p.y, aoeR3,    '#8020c0', 0.50);
        VFX.shockwave(p.x,p.y, aoeR3*0.55,'#c040ff', 0.35);
        ScreenFX.flash('#200040',0.35,0.45);
        ScreenFX.shake(10,0.30);
        UI.msg('Corruption Burst!','combo',1.2);
        break;
      }
    }
  },

  _checkLevel(){
    const p=GS.player;
    const newLevel=Math.min(LEVEL_THRESHOLDS.length, LEVEL_THRESHOLDS.filter(t=>p.totalRunes>=t).length);
    if(newLevel>p.level){
      p.pendingLevelUps+=(newLevel-p.level);
      // Announce ability upgrade at milestones
      if(GS.playerClass&&[5,10,15,20].includes(newLevel)){
        const ab=CLASS_DEFS[GS.playerClass].ability;
        const t=abilityTier(newLevel);
        setTimeout(()=>UI.msg(`Ability upgraded: ${ab.upgrades[t].name}!`,'levelup',3),400);
        ScreenFX.flash(CLASS_DEFS[GS.playerClass].color,0.35,0.6);
      }
      p.level=newLevel;
      if(GS.phase==='playing'){
        GS.phase='levelup';
        p.levelupCursor=0;
      }
    }
  },

  _checkMiniBossZone(){
    // Mini-bosses are now summoned via altars — this method is a no-op
    // (kept for structure; actual summoning handled by Altars.interact)
  },

  takeDamage(dmg){
    const p=GS.player;
    if(p.isInvincible||p.isDead) return;
    const actual=Math.max(1, dmg-Stats.defense());
    p.hp-=actual; p.hitFlash=0.25;
    Particles.sparks(p.x,p.y,10);
    ScreenFX.shake(5,0.18);
    DmgNums.add(p.x,p.y-20, `-${Math.ceil(dmg)}`, '#FF4040');
    if(p.hp<=0){ p.hp=0; this._die(); }
  },

  _die(){
    const p=GS.player;
    p.isDead=true; p.deathTimer=3.5;
    p.bloodstainX=p.x; p.bloodstainY=p.y;
    p.bloodstainRunes=p.runes; p.runes=0;
    p.combo=0; p.comboTimer=0;
    atkHitbox=null;
    Particles.death(p.x,p.y,'#a03020',28);
    UI.msg('YOU DIED','death',4);
    ScreenFX.shake(10,0.4);
  },

  _updateDeath(dt){
    const p=GS.player; p.deathTimer-=dt;
    if(p.deathTimer<=0) this._respawn();
  },

  _respawn(){
    const p=GS.player;
    p.isDead=false; p.hp=Stats.maxHP(); p.fp=Stats.maxFP(); p.stamina=Stats.maxStamina();
    p.flaskCharges=PLAYER_CONFIG.flaskCharges;
    p.x=p.bonfireX; p.y=p.bonfireY;
    p.isRolling=false; p.isAttacking=false; p.isInvincible=false;
    p.hitFlash=0; p.combo=0; p.rootTimer=0; p.sneakTimer=0; p.megaDash=false;
    atkHitbox=null;
    // Unlock boss room — full reset of boss state, but defeated flags persist (one-time kill)
    GS.activeBossRoom=null;
    // Reset boss so it can be re-entered at full HP when player re-enters
    GS.bossActive=false; GS.bossRef=null; GS.flags.fogGateEntered=false;
    const mb=GS.miniBosses;
    if(!mb.swamp.defeated){    mb.swamp.active=false;    mb.swamp.ref=null;    mb.swamp.summoned=false; }
    if(!mb.mountain.defeated){ mb.mountain.active=false; mb.mountain.ref=null; mb.mountain.summoned=false; }
    if(!mb.grassland.defeated){ mb.grassland.active=false; mb.grassland.ref=null; mb.grassland.summoned=false; }
    // Desert boss reset
    if(!GS.desertBoss.defeated){ GS.desertBoss.active=false; GS.desertBoss.ref=null; }
    // End-game boss resets
    for(const z of ['volcanic','abyssal','crystal','corrupted']){
      const eb=GS.endgameBoss[z];
      if(eb&&!eb.defeated){ eb.active=false; eb.ref=null; }
    }
    Enemies.respawnAll();
    GS.messages=GS.messages.filter(m=>m.type!=='death');
  },

  draw(cx,cy){
    const p=GS.player;
    const sx=(p.x-cx)|0, sy=(p.y-cy)|0;
    const baseA=p.isDead?Math.max(0,p.deathTimer/2):1;
    ctx.globalAlpha=baseA;

    // Roll ghost trail
    if(p.isRolling){
      for(let i=3;i>=1;i--){
        ctx.globalAlpha=baseA*(0.14-i*0.04);
        ctx.fillStyle='#607080';
        ctx.fillRect((sx-p.rollDx*i*9)|0-5,(sy-p.rollDy*i*9)|0-5,10,10);
      }
      ctx.globalAlpha=baseA;
    }

    // I-frame glow (outer border rect)
    if(p.isInvincible){
      ctx.fillStyle='#3060a0';
      ctx.fillRect(sx-16,sy-36,32,46);
    }

    // Root vine glow
    if(p.rootTimer>0){
      const rf=Math.sin(Date.now()/80)*0.15+0.35;
      ctx.globalAlpha=baseA*rf; ctx.fillStyle='#204010';
      ctx.fillRect(sx-18,sy-38,36,50);
      ctx.globalAlpha=baseA; ctx.fillStyle='#30601c';
      ctx.fillRect(sx-18,sy+12,36,4);
      ctx.fillRect(sx-18,sy-38,4,50);
      ctx.fillRect(sx+14,sy-38,4,50);
      ctx.globalAlpha=baseA;
    }

    // Frost aura (Yeti Pelt)
    if(p.equipment.armor==='YETI_PELT'){
      const ft=((Date.now()/300)|0)%3;
      ctx.globalAlpha=baseA*0.22; ctx.fillStyle='#2060c0';
      ctx.fillRect(sx-16-ft,sy-38-ft,32+ft*2,46+ft*2);
      ctx.globalAlpha=baseA;
    }

    // Hit flash border
    if(p.hitFlash>0){
      ctx.fillStyle='#FF2020';
      ctx.fillRect(sx-16,sy-36,32,46);
    }

    // Ground shadow
    ctx.globalAlpha=baseA*0.42; ctx.fillStyle='#000';
    ctx.fillRect(sx-10,sy+8,20,5);
    ctx.globalAlpha=baseA;

    // Sneak fade (Archer invisibility)
    if(p.sneakTimer>0){
      const blinkFast=Math.sin(Date.now()/120)>0;
      ctx.globalAlpha=baseA*(p.sneakTimer<0.8?(blinkFast?0.30:0.10):0.22);
    }

    // ── Pixel-art class sprite ──────────────────────────────
    const cls=GS.playerClass||'SWORDSMAN';
    const spr=CLS_SPRITES[cls]||CLS_SPRITES.SWORDSMAN;

    let sprRows, yOff=0;
    if(p.isDead){
      sprRows=spr.idle[0]; yOff=8;
    } else if(p.isRolling){
      // Crouched — draw sprite lower so head dips down
      sprRows=spr.idle[0]; yOff=6;
    } else if(p.isAttacking){
      sprRows=spr.attack?spr.attack[0]:spr.idle[0];
    } else if(p.isMoving){
      // Alternate stride ↔ neutral every half-cycle
      const wf=Math.floor(p.walkPhase)%2;
      sprRows=wf===0?spr.walk[0]:spr.idle[0];
    } else {
      sprRows=spr.idle[0];
      // Subtle vertical bob: shift up 1 px every other 0.5 s
      yOff=Math.floor(GS.time*2)%2===0?0:-2;
    }

    // Mirror sprite when facing left
    const facingLeft=p.facing.x<-0.3&&Math.abs(p.facing.x)>Math.abs(p.facing.y);
    if(facingLeft){
      pxSM(sx-14, sy-34+yOff, sprRows, spr.pal, 2);
    } else {
      pxS(sx-14, sy-34+yOff, sprRows, spr.pal, 2);
    }
    ctx.globalAlpha=baseA;
    // ── End sprite ─────────────────────────────────────────

    // ── Armor overlay (drawn on top of base sprite) ─────────
    {
      const armorId=p.equipment.armor;
      if(armorId&&!p.isDead){
        const yo=sy-34+yOff; // sprite top-left y (with bob offset)
        const xo=sx-14;      // sprite top-left x
        // R(col, row, colWidth, rowHeight, color) — draw on sprite grid (2px/cell)
        const R=(c,r,cw,rh,col)=>{ ctx.fillStyle=col; ctx.fillRect(xo+c*2,yo+r*2,cw*2,rh*2); };
        // Walk-phase leg offsets — left/right leg animate ±2 px in opposite directions
        const wf=p.isMoving?Math.floor(p.walkPhase)%2:-1;
        const lLegOff= wf===0?-2:(wf===1? 2:0); // left leg y offset px
        const rLegOff=-lLegOff;                   // right leg opposite
        // Leg-aware draw: L=left-leg column range (2-5), R=right-leg (8-11)
        const Rl=(c,r,cw,rh,col)=>{ ctx.fillStyle=col; ctx.fillRect(xo+c*2,yo+r*2+lLegOff,cw*2,rh*2); };
        const Rr=(c,r,cw,rh,col)=>{ ctx.fillStyle=col; ctx.fillRect(xo+c*2,yo+r*2+rLegOff,cw*2,rh*2); };
        ctx.globalAlpha=baseA;
        switch(armorId){
          case 'OLD_HOOD':
            // Soft weathered leather hood with stitched rim
            R(1,0,12,1,'#2a1608'); // hood outer shadow
            R(2,0,10,2,'#3e2410'); // hood band
            R(2,0,10,1,'#5a3818'); // hood top face
            R(2,1, 4,1,'#4a2c10'); R(8,1,4,1,'#4a2c10'); // band shading
            R(1,2, 2,5,'#2c1808'); // left drape shadow
            R(11,2,2,5,'#2c1808'); // right drape shadow
            R(3,7, 8,1,'#3e2410'); // chin shadow under hood
            break;
          case 'POINTY_HAT':
            // Tall wizard hat with star band and glowing tip
            ctx.fillStyle='#1c0830'; ctx.fillRect(xo+8,yo-16,12,8);  // lower cone
            ctx.fillStyle='#220e3c'; ctx.fillRect(xo+10,yo-24,8,8); // mid cone
            ctx.fillStyle='#2a1048'; ctx.fillRect(xo+12,yo-30,4,6); // upper cone
            ctx.fillStyle='#320c58'; ctx.fillRect(xo+13,yo-34,2,4); // sharp tip
            ctx.fillStyle='#8040c0'; ctx.fillRect(xo+11,yo-16,2,2); // star left
            ctx.fillStyle='#8040c0'; ctx.fillRect(xo+15,yo-16,2,2); // star right
            ctx.fillStyle='#c060ff'; ctx.fillRect(xo+13,yo-18,2,2); // star top
            // Brim
            R(0,0,14,2,'#1c0830'); // brim body
            R(1,0,12,1,'#3c2cc0'); // brim accent
            R(4,1, 2,1,'#9050ff'); R(8,1,2,1,'#9050ff'); // brim gems
            R(5,0, 4,1,'#240e40'); // brim center shadow
            break;
          case 'OLD_CLOAK':
            // Dark billowing cloak with purple clasp
            R(2,6,10,1,'#1a1024'); // collar pre-shadow
            R(2,7,10,2,'#261a34'); // collar body
            R(3,7, 8,1,'#342444'); // collar face highlight
            R(5,7, 4,1,'#1e1630'); // collar center shadow
            R(6,7, 2,2,'#5038a0'); // clasp body
            R(6,7, 2,1,'#7858c8'); // clasp face
            R(7,7, 1,1,'#c0a0ff'); // clasp gem sparkle
            R(0,8, 2,8,'#18102c'); // left cloak side
            R(12,8,2,8,'#18102c'); // right cloak side
            R(0,7, 2,3,'#1e1630'); // left shoulder drape
            R(12,7,2,3,'#1e1630'); // right shoulder drape
            R(1,14,1,4,'#150e24'); // left cloak bottom taper
            R(12,14,1,4,'#150e24'); // right cloak bottom taper
            break;
          case 'LEATHER_CHESTPLATE':
            // Brown padded chest with shoulder pads and knee guards
            R(0,7, 4,3,'#4a2808'); // left shoulder pad body
            R(0,7, 4,1,'#6a3c14'); // left shoulder face
            R(1,7, 2,1,'#7a4818'); // left pad highlight
            R(10,7,4,3,'#4a2808'); // right shoulder pad body
            R(10,7,4,1,'#6a3c14'); // right shoulder face
            R(11,7,2,1,'#7a4818'); // right pad highlight
            // Chest straps
            R(2,9,10,2,'#3a2008'); // chest band shadow
            R(2,9,10,1,'#5a3010'); // chest band face
            R(5,9, 4,1,'#6a3c14'); // center band highlight
            // Rivet row
            R(3,10,1,1,'#8a5020'); R(6,10,1,1,'#8a5020'); R(9,10,1,1,'#8a5020'); R(11,10,1,1,'#8a5020');
            // Belt
            R(2,12,10,2,'#4a2808'); // belt body
            R(2,12,10,1,'#5a3010'); // belt face
            R(5,12, 4,2,'#7a4e10'); // buckle plate
            R(6,12, 2,1,'#c09030'); // buckle shine

        }
      };

      if(p.isAttacking){
        const dur=p.attackType==='light'?PLAYER_CONFIG.lightDur:PLAYER_CONFIG.heavyDur;
        const prog=Math.min(1,1-(p.attackTimer/dur));
        const half=p.attackType==='light'?0.85:1.15;
        ctx.rotate(-half+prog*half*2);
        drawWeaponShape(eqWeapon);
      } else {
        ctx.rotate(0.42);
        drawWeaponShape(eqWeapon);
      }
      ctx.restore();
    }

    ctx.globalAlpha=1;

    // Attack hitbox (pixel outline)
    if(atkHitbox){
      ctx.globalAlpha=0.22;
      ctx.fillStyle=atkHitbox.type==='light'?'#FFE080':'#FF8040';
      ctx.fillRect(atkHitbox.x-cx,atkHitbox.y-cy,atkHitbox.w,atkHitbox.h);
      ctx.globalAlpha=1;
      ctx.fillStyle=atkHitbox.type==='light'?'#FFD040':'#FF6020';
      // Pixel outline (4 edge rects)
      const hx=atkHitbox.x-cx, hy=atkHitbox.y-cy, hw=atkHitbox.w, hh=atkHitbox.h;
      ctx.fillRect(hx,hy,hw,1); ctx.fillRect(hx,hy+hh-1,hw,1);
      ctx.fillRect(hx,hy,1,hh); ctx.fillRect(hx+hw-1,hy,1,hh);
    }

    // Bloodstain (pixel cross)
    if(p.bloodstainX!==null){
      const bsx=(p.bloodstainX-cx)|0, bsy=(p.bloodstainY-cy)|0;
      if(bsx>-25&&bsx<SCREEN_W+25&&bsy>-25&&bsy<SCREEN_H+25){
        ctx.fillStyle='#660000';
        ctx.fillRect(bsx-10,bsy-2,20,4); ctx.fillRect(bsx-2,bsy-10,4,20);
        ctx.fillStyle='#aa1818';
        ctx.fillRect(bsx-6,bsy-1,12,2); ctx.fillRect(bsx-1,bsy-6,2,12);
        const dist=Math.hypot(p.x-p.bloodstainX,p.y-p.bloodstainY);
        if(dist<90) R.text(`[E] Recover ${p.bloodstainRunes} Runes`,bsx,bsy-16,'#c8a060',10,'center');
      }
    }
  },
};

      [0,0],[1,0],[-1,0],[0,1],[0,-1],[2,0],[-2,0],[0,2],[0,-2]
